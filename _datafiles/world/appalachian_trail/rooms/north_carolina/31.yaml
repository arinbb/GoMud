roomid: 31
zone: North Carolina
title: Nantahala Mountains / Franklin Area
description: "The trail rolls through the heart of the Nantahala range, crossing a series of balds and gaps between Standing Indian and the Nantahala Outdoor Center. To the west, the town of Franklin sits in the Little Tennessee River valley\x97the first officially designated AT Community, recognized in 2010 for its support of thru-hikers. Franklin was built on the site of Nikwasi, a Cherokee town that thrived here for a thousand years. The Nikwasi Mound, a 20-foot earthen ceremonial mound, still stands in the center of town, one of the oldest intact structures in the Appalachians. Wayah Bald rises ahead, its name Cherokee for wolf\x97red wolves once roamed these ridges and were sacred to the Cherokee. A CCC-built stone observation tower crowns the bald, offering 360-degree views of the Nantahala range."
