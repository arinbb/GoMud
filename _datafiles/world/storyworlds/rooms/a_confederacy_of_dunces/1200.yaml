nouns:
  clock: >-
    The D.H. Holmes clock, a grand timepiece mounted above the entrance to the
    department store. It has been a meeting place for New Orleanians for decades.
    In the future, a bronze statue of a large man in a hunting cap will stand
    here, but that is a long way off and a sad story.
  cap: >-
    A green hunting cap with earflaps. It is the most recognizable hat in
    American literature. The earflaps are down despite the heat, giving its
    wearer the appearance of a large, irritable bloodhound who has read too
    much Boethius.
  store: >-
    D.H. Holmes, the grand Canal Street department store. Its display windows
    show the latest fashions from at least two decades ago, arranged with the
    serene confidence of people who believe that style, like geometry, is eternal.
    The store will close in 1989. Everything closes eventually.
