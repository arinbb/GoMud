nouns:
  freeway: >-
    Eight lanes of American ambition, slightly congested, slightly glorious.
    The concrete has been here since the 1950s. The cars get newer; the traffic
    stays the same. Everybody is going somewhere. Very few people know exactly where.
  palms: >-
    The palm trees along the median are tall and improbable, their shaggy tops
    swaying in smog-warm air. They are not native to California. Neither is most
    of California.
  skyline: >-
    The LA skyline: a handful of glass towers above a flat expanse of smaller
    things. It looks like somebody started building a city and then got distracted
    by all the sunshine and never quite finished.
idlemessages:
- Traffic thickens briefly, then relaxes. The freeway breathes.
- A bumper sticker on the car ahead reads something you cannot quite make out.
- 'A radio from another car overlaps with yours for a moment: two songs, one road.'
- The palm trees do not move. Then the wind hits and they all move at once.
- A state highway patrol cruiser passes in the fast lane. Nobody speeds up.
- The smog horizon turns from white to orange as the afternoon deepens.
- The van is out there somewhere, rolling along at exactly the speed limit.
