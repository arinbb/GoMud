nouns:
  grass: >-
    Green, even, carefully maintained. The kind of lawn that would be aspirational
    in a neighborhood but here is just functional -- the dead deserve this. The
    sprinklers run early in the morning. The grass is always green. This is one
    of the things that is reliable about this place.
  graves: >-
    The headstones in their approximate rows. Names and dates, mostly. Some
    with small additional lines -- a sentence or a phrase that the family
    chose to say in stone what they could not say in time. The older ones
    are weathered to the same grey. The newer ones are still white.
  sky: >-
    LA blue, high and clear. A cemetery sky. It does not concern itself with
    what is below it, which is either a comfort or it is not.
  headstones: >-
    Each one a compression of a life into dates and a name and sometimes a
    line. 'Beloved Father.' 'She Loved Her Garden.' 'Gone Too Soon.' The
    formulas of grief that feel insufficient when you write them and then
    turn out to hold something after all.
  grave: >-
    Nathaniel Samuel Fisher Sr. The dates. And beneath: 'He Taught Us How
    to Live.' The family put that on after a long discussion. It is true and
    it is complicated and it is what the stone says. Fresh flowers in the
    grave vase -- Ruth was here recently. She comes on Thursdays.
