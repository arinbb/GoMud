exits:
  north:
    roomid: 2240
    exitmessage: The Southern air releases you and you head back north to the ranch.
nouns:
  courthouse: >-
    White columns, broad steps, the flag above it in the dead August air.
    The courthouse square is the center of every small Southern town, the
    place where the public record is kept -- births and deaths and deeds and
    judgments, all of it filed in the same building, all of it the same story
    told different ways. From the outside it is very beautiful. The history
    inside it is not simple. Neil Young is not saying the beauty is not real.
    He is saying the beauty is not the whole story.
  banjo: >-
    The banjo is an African instrument that became a Southern instrument that
    became a symbol for both the best and worst of what the South contains.
    The player here plays it straight -- fast and clean and honest -- and the
    sound carries across the clay road and the pine trees and the kudzu and
    all of it, carrying all of it.
  critique: >-
    The critique is not from outside. The critique is from inside, from love,
    from the particular anger of someone who sees potential being wasted. The
    song is not satisfied with less than what the place could be. That is not
    the same as dismissal. Ask Neil Young. Ask Lynyrd Skynyrd. Both of them
    loved the place. Both of them were right about it. You can hold both.
  clay: >-
    The red clay is specific to this landscape, the color of oxidized iron, the
    color of old blood, the color of a soil that has been worked for centuries
    by people who did not choose to work it. It stains your boots. It does not
    wash out easily. This is also not an accident.
idlemessages:
- The banjo plays a fast reel, clear and direct, carrying everything the instrument carries.
- The heat presses down, thick and specific, the weight of an August afternoon in the Deep South.
- Kudzu has crept over the fence along the road, covering it in green, patient and relentless.
- The courthouse sits in the afternoon light, beautiful and complicated, everything it represents present in how it looks.
- A mockingbird runs through its catalog in the magnolia -- six songs in a row, then silence.
- The red clay road runs straight to the ridge, heat rising from it in slow waves.
- The smell of pine resin and diesel and magnolia, the specific perfume of this landscape.
