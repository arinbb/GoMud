roomid: 15
zone: Georgia
title: Low Gap Shelter
description: "A three-sided wooden shelter sits at 3,050 feet in a low gap between ridges. The shelter is standard AT construction\x97tin roof, wooden platform, open front facing downhill. A side trail leads east into a cove where water can be found. The privy is off to the right. A bear box stands at the edge of the clearing. The gap channels breezes nicely, and the surrounding hardwoods provide good shade. Flat tent sites are available near the shelter. A trail register hangs from its nail on the post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 9
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "Standard three-sided lean-to with tin roof and wooden platform. Well-used but in decent shape. The gap location means good airflow and fewer bugs."
  platform: "The sleeping platform holds about twelve. The wood is worn and smooth, scratched by trekking poles and pack frames."
  register: "A spiral notebook in a zip-lock bag. The usual mix of trail names, mileage counts, and complaints about the weather."
  water: "The water source is via a side trail east into a cove. It flows from a seep in the hillside, collected in a small pool. Filter before drinking."
  privy: "The privy sits in the trees to the right of the shelter. Door still attached, which counts as luxury."
  bearbox: "A brown steel bear box, standard issue. The latch requires a twist-and-lift motion that baffles bears but also some hikers."
  tentsites: "Several flat tent sites surround the shelter clearing, cushioned with leaf litter."
idlemessages:
- A breeze channels through the low gap, rustling the leaves overhead.
- A towhee scratches in the leaf litter near the shelter, flipping leaves aside with both feet.
- The gap funnels wind down from the ridgeline, keeping the air moving.
- Acorn caps and hickory shells litter the ground\x97squirrels have been busy here.
- Water drips somewhere in the cove to the east, a faint but steady sound.
- A red-tailed hawk screams from somewhere above the gap, the sound echoing between ridges.
