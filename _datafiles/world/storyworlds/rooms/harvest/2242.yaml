roomid: 2242
zone: Harvest
title: Harvest
description: >-
  A wheat field at the golden hour, the stalks head-high and heavy, the air
  thick with pollen and dust and the sweetness of a harvest almost ready. The <ansi fg="itemname">combine</ansi> waits at the far edge of the field,
  patient and enormous, the machine that will change everything. Above the
  ridge to the east, the <ansi fg="itemname">harvest moon</ansi> is rising --
  orange and enormous, closer to the earth than it has any right to be. The <ansi fg="itemname">wheat</ansi> bends in the evening wind, the whole field
  moving at once in a slow gold wave that starts somewhere and ends somewhere
  and is beautiful in between. The ground is warm underfoot. The day has not
  yet broken, but the night has not yet taken it. Everything is in the moment
  just before the change.
mapsymbol: '2'
maplegend: Harvest
biome: farmland
exits:
  ranch:
    roomid: 2240
    mapdirection: southwest
    exitmessage: You push back through the wheat toward the ranch.
nouns:
  combine: >-
    A harvesting combine, massive and rust-red, parked at the edge of the field
    with the patience of a machine that knows its moment is coming. The blades
    are clean. The cab is empty. When it moves through this field, the wheat
    that has been growing all season will become something else -- grain, harvest,
    the year's work made into something you can hold. That time is not yet.
  moon: >-
    The harvest moon, orange-gold and enormous, hanging low over the ridge as
    if it came closer this year just to see. It is not the same moon as other
    nights -- it is older, warmer, weighted with meaning. In its light, the
    wheat turns from gold to amber to the color of something that is almost
    memory. You can see your shadow in it, long and reaching.
  wheat: >-
    The wheat is ready. You can feel it in the weight of the stalks, the way
    they give and spring back just slightly. Run your hand along the tops and
    the awns scratch your palm. The smell is specific: raw grain, dust, the
    green-going-dry of a season completing itself. This is what the word
    harvest means before it means anything else.
idlemessages:
- The wheat bends in a long wave, east to west, the whole field moving like breathing.
- The harvest moon climbs a degree, the shadows on the field shifting.
- Pollen drifts in the golden air, catching the last of the direct light.
- A quail calls from somewhere deep in the field, answered by nothing, calling again.
- The combine sits at the field edge, patient, its moment coming.
- The stalks click softly against each other in the breeze, a thousand small percussions.
- The light is the exact color of the word golden. There is no better word for it.
