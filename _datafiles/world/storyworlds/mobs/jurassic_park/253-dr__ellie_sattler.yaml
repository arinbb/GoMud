character:
  name: Dr. Ellie Sattler
  description: >-
    A woman in her early thirties, dressed for fieldwork in practical layers,
    hair pulled back. She moves through any room the way a capable person
    moves through a crisis: efficiently, without drama, doing the next
    necessary thing. She is a paleobotanist who has seen more than most of
    her colleagues in plant biology, and she approaches the island's flora
    with the focus of someone who knows that understanding it might save lives.
    It might. She is already working on that.
