roomid: 61
zone: Great Smoky Mountains
title: Mollies Ridge / Spence Field
description: "The trail follows the high spine of the Smokies along a seemingly endless ridgeline, the North Carolina-Tennessee border running directly beneath your boots. The forest here transitions between dense hardwoods and open grassy balds\x97mysterious treeless meadows that nobody fully understands. Spence Field opens up to your north, a rolling expanse of grass and wildflowers with views that stretch to the horizon in every direction. The wind is constant up here, bending the grass in silver waves. Gregory Bald and Parson Bald rise to the south. On clear days you can see the haze-blue outline of mountains fifty miles distant. Three shelters serve this stretch, each perched on the ridgeline with the wind singing through the gaps in the logs."
biome: mountains
