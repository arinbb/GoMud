character:
  name: Dr. Jennifer Melfi
  description: >-
    A composed, handsome woman in her mid-forties, professionally dressed in
    the careful neutral way of therapists who have been trained not to signal
    too much. She wears glasses. She keeps a notepad on her knee. Her expression
    is consistently open, unreadable in the way that very good listeners are
    unreadable -- she is receiving everything and transmitting almost nothing.
    She is the most controlled person in any room she occupies, which is partly
    training and partly necessity. She is treating a man who is dangerous, and
    she chose to continue. This says something about her that she is still working
    out.
