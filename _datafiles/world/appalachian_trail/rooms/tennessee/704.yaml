roomid: 704
zone: Tennessee
title: Little Laurel Shelter
description: "A weathered shelter sits in a laurel thicket on the slopes below the trail, surrounded by mountain laurel and rhododendron so dense you cannot see more than twenty feet in any direction. The three-sided structure sleeps eight. A small creek runs through the hollow below, its water stained brown with tannin from the laurel roots but perfectly safe to filter and drink. The laurel creates a natural enclosure that feels both protective and slightly claustrophobic. Tent sites are scarce in the dense undergrowth. A bear box and privy complete the site. A trail register hangs from a nail on the shelter post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 36
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A standard three-sided shelter showing its age. The wood is dark and moss grows on the north-facing logs. Functional but atmospheric."
  platform: "The sleeping platform holds eight. The wood is worn and slightly soft in places."
  register: "A trail register in a damp zip-lock bag. The laurel shade keeps everything perpetually moist here."
  creek: "A small tannin-stained creek runs through the hollow. The water looks like weak tea but is safe once filtered."
  laurel: "Mountain laurel and rhododendron form an impenetrable wall around the shelter, their gnarled trunks intertwined. In late spring, the laurel blooms white and pink, filling the thicket with color."
  privy: "The privy is barely visible in the laurel thicket, accessible by a narrow beaten path."
  bearbox: "A bear box wedged into a small clearing between laurel trunks."
idlemessages:
- Laurel branches creak and scrape against each other in the breeze, an eerie sound.
- The tannin-dark creek murmurs through the hollow, staining everything it touches brown.
- A wren darts through the laurel thicket, vanishing into the dense undergrowth.
- The shelter feels enclosed, cocooned in laurel. The sky is barely visible above.
- Moisture drips from laurel leaves even when it has not rained. The shade here is perpetual.
- A spider web stretches between laurel trunks, jeweled with water droplets.
