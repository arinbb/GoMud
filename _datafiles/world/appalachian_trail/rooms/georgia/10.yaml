roomid: 10
zone: Georgia
title: Stover Creek Shelter
description: "A large three-sided wooden shelter sits in a quiet hollow near Stover Creek. Built in 2006 to replace the original that was moved here in 1984, this is one of the newer shelters in Georgia. The sleeping platform is spacious\x97room for sixteen\x97and the wood still has that relatively fresh-cut look compared to the older shelters up trail. Flat tent sites ring the clearing, and a well-worn path leads down to the creek for water. A bear box stands at the edge of the clearing, its heavy metal lid dented from years of use. The privy is uphill to the left. A trail register hangs from a nail on the shelter post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 3
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A standard AT three-sided lean-to with a raised wooden sleeping platform. The roof is tin, the walls rough-hewn lumber. Sixteen can sleep here shoulder to shoulder, though eight is more comfortable. Mouse droppings dot the edges of the platform."
  platform: "The sleeping platform is made of rough planks raised about two feet off the ground. It slopes very slightly toward the open front\x97just enough that you notice when you try to sleep."
  register: "A spiral-bound notebook in a gallon zip-lock bag hangs from a nail on the shelter post. It is full of entries from thru-hikers, section hikers, and weekend warriors. Trail names, dates, complaints about blisters, and bad jokes."
  water: "Stover Creek runs nearby, audible from the shelter. The water is clear and cold, tumbling over smooth stones. You would want to filter it before drinking."
  creek: "Stover Creek flows through the hollow, a reliable year-round water source. The crossing stones are slippery with algae."
  privy: "A basic wooden privy sits uphill from the shelter, its door hanging slightly askew. The smell announces it before you arrive."
  bearbox: "A heavy steel bear box, painted brown, with a latch that requires opposable thumbs to open. Inside are various food bags left by hikers. The lid is dented and scratched from years of curious bears testing it."
  tentsites: "Several flat, cleared areas ring the shelter clearing. The ground is packed dirt and leaf litter, soft enough for tent stakes."
idlemessages:
- Stover Creek murmurs in the hollow below, a steady liquid sound that never quite stops.
- A mouse skitters along the edge of the sleeping platform and disappears into a crack in the wall.
- The tin roof pings softly as it contracts in the cooling evening air.
- Somewhere in the trees, a barred owl calls\x97"Who cooks for you? Who cooks for you-all?"
- A breeze carries the smell of creek water and wet leaves into the shelter.
- The bear box lid clangs as a hiker retrieves their food bag.
