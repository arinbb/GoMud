roomid: 1413
zone: Matilda
title: Country Lane
description: >-
  A narrow <ansi fg="10">lane</ansi> that winds through the countryside, bordered
  by <ansi fg="itemname">hedgerows</ansi> full of wildflowers and birdsong. The
  air is sweet and clean here, utterly different from the stale corridors of
  Crunchem Hall. <ansi fg="itemname">Buttercups</ansi> and <ansi fg="itemname">daisies</ansi>
  dot the grassy verges. The lane curves gently between green <ansi fg="itemname">fields</ansi>,
  leading away from the main road toward something quieter, simpler, more honest.
  A hand-painted <ansi fg="itemname">sign</ansi> nailed to a fencepost points
  <ansi fg="exit">south</ansi> toward a cottage. The main road is back to the
  <ansi fg="exit">north</ansi>.
mapsymbol: ~
maplegend: Country Lane
