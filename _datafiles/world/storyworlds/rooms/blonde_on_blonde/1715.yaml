    exitmessage: You slip back through the passage into the candlelit loft.
nouns:
  typewriter: >-
    A portable typewriter, black, the carriage halfway through a sheet of
    paper. The three lines typed on it are hard to read in this light. One
    word is clear: JOHANNA. The rest trails off into a dash and nothing.
    Dylan could not finish the line here. He finished it somewhere else.
    This is where it started.
  bed: >-
    Hotel-made, then slept-in, then remade by someone who could not decide
    whether to sleep or write. The pillow holds the shape of a head. The
    bedspread is the Chelsea standard -- floral, faded, institutional in its
    dignity. People who mattered slept in this bed. You are standing at the
    foot of it like a visitor to a shrine, which is what you are.
  mirror: >-
    The dresser mirror, silvered, slightly tilted forward in its frame so
    it shows mostly the floor but also your feet and the hem of the room.
    It has been reflecting this room since 1905 when the hotel opened. It
    has seen everyone who stayed here and told none of them what they looked
    like from the room's perspective.
  window: >-
    The window faces West 23rd Street. Traffic. A radio somewhere. The
    sound of New York at whatever hour this is, which sounds the same
    at two in the morning as at two in the afternoon if you close your
    eyes and let it be ambient. Through the glass: the city he was living
    inside when he wrote everything. It looks ordinary. It was not.
idlemessages:
- The typewriter carriage holds the unfinished line. The cursor is as far as it went.
- 'Street noise rises and falls through the window -- a city being itself, indifferent and generative.'
- The mirror shows the room and does not comment.
- 'The bed was slept in. The writing desk was used. This is what making something looks like, after.'
- A fire engine passes below, the sound rising and falling in the Doppler of the street. Then quiet.
- 'You are in the room where it happened. That is everything. That is also nothing. That is Chelsea Hotel.'
