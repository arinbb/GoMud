character:
  name: the waitress
  description: >-
    A young woman in a white blouse and dark skirt, moving between the pub
    tables with the practised ease of someone who has worked here long enough
    to know everyone's order. At her collar she wears a small silver brooch —
    a pretty piece, a spray of flowers in delicate worked silver. It looks
    expensive and personal, like something kept from a special occasion rather
    than worn to work. She touches it sometimes without seeming to notice
    she is doing it.
  raceid: 1
  level: 3
