character:
  name: Danny Whitten
  description: >-
    A young man sitting in the corner of the barn on a hay bale, a guitar
    across his knees. He is thin and pale, his eyes present but fading, like
    a radio station you are slowly driving out of range of. He was the
    guitarist for Crazy Horse, Neil's other band — the loud one, the raw one.
    He wrote Come On Baby Let's Go Downtown. He is talented and haunted and
    everyone in the barn knows he is in trouble. He does not play with the
    Stray Gators. He just sits in the corner and watches, not quite part of
    the session anymore, not quite gone yet.
