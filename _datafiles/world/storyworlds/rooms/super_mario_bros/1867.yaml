roomid: 1867
zone: Super Mario Bros
title: World 3-1 Night Level
description: >-
  The same overworld layout, but the sky has gone <ansi fg="4">dark blue</ansi>
  -- the first night level, a palette swap that changes the feeling entirely.
  The stars are square pixel-art stars, white dots on deep blue. The ground
  is the same brown but the shadows are longer, the colors cooler. Two
  <ansi fg="itemname">Hammer Bros</ansi> stand on elevated brick platforms,
  hurling pixelated hammers in arcs that fill the corridor with danger.
  They hop on the spot between throws, bouncing on their platforms with
  an energy that reads as menace. The night level is famous for difficulty --
  the Hammer Bros are the point where many first-time players put the
  controller down. The darkness makes everything feel more serious. West
  leads <ansi fg="exit">back</ansi>; south descends to <ansi fg="exit">World 4</ansi>.
mapsymbol: N
maplegend: Night Level
biome: land
