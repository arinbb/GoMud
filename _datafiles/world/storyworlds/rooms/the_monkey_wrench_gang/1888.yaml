roomid: 1888
zone: The Monkey Wrench Gang
title: The Canyon Floor
description: >-
  A <ansi fg="red">slot canyon</ansi> narrows here to a passage twenty feet wide, its
  walls of <ansi fg="red">Navajo sandstone</ansi> rising hundreds of feet on either side,
  so smooth and so close that the sky is reduced to a <ansi fg="cyan">ribbon of blue</ansi>
  overhead. The walls are sculpted by water — undulating curves, polished surfaces,
  the cross-bedding of ancient dunes made visible in the stone. The colors shift from
  cream to salmon to deep red to purple depending on the light and the hour. The floor
  is fine sand, smooth and cold, carrying the faint moisture of the last flash flood.
  The silence here is absolute and architectural, contained by the walls on all sides
  like sound in a cathedral. A narrow <ansi fg="itemname">trail</ansi> runs south through
  the sand, its passage marked by bootprints. To the <ansi fg="exit">trail</ansi>
  heading <ansi fg="exit">north</ansi> is the way back up to the strip mine road.
  To the <ansi fg="exit">south</ansi>, the canyon widens toward the hidden camp.
