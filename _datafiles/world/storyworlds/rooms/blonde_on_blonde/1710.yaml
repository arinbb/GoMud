roomid: 1710
zone: Blonde on Blonde
title: Temporary Like Achilles
description: >-
  A <ansi fg="8">closed door</ansi>. That is all. A heavy door in a bare
  hallway, the door with no knob on your side, the door that does not open
  from here. The hallway is narrow and goes nowhere else. There is nothing
  to look at except the <ansi fg="itemname">door</ansi>, the thin strip of
  <ansi fg="itemname">light</ansi> under it, the <ansi fg="itemname">grain
  of the wood</ansi> that you have had time to memorize. You have been
  waiting. She knows you are out here. Everybody knows you are out here.
  Achilles sat before the gates of Troy for years and it meant something.
  You have been here one song's length and it means the same thing. Waiting
  is its own statement. The door has not opened. The door will not open
  during this particular visit. The honey-dripping way she waits inside
  -- waiting for nothing, attended by everything -- is the hum behind the
  closed door. You are honey-blind. The door is honey-shut. The
  <ansi fg="exit">studio</ansi> is back to the west.
mapsymbol: A
maplegend: Temporary Like Achilles
biome: house
exits:
  west:
    roomid: 1700
    exitmessage: You step back from the door that does not open. Maybe it will open for someone else.
nouns:
  door: >-
    A solid door. No knob on your side. The hinges are on the other side
    too. You cannot see how it opens; you only know it opens inward, away
    from you. Achilles knew. You know. The knowing doesn't help.
  light: >-
    A sliver of warm light under the door, more than enough to see that
    someone is home, less than enough to see anything of what is inside.
    The light does not change. It has not dimmed or brightened since you
    arrived. She is in there living at a constant temperature, a constant
    luminosity, a constant distance from you.
  grain: >-
    The wood grain of the door -- oak, probably, the rings of some tree
    that grew in concentric patience. You have been standing here long
    enough to trace the grain from top to bottom and memorize its shapes.
    There is a knot at shoulder height. The knot is not metaphorical.
    Everything else is.
idlemessages:
- The light under the door is unchanged. She is still in there. The situation is unchanged.
- You wait. Achilles waited. The door distinguishes neither of you from anyone else who has waited.
- 'The silence from inside is full -- full of her, full of everything she is not saying.'
- 'A sound from within: not a footstep, not a word, just the sound of someone occupying a room.'
- The door does not open. This has been true for the entire song. It will remain true.
- 'You are, temporarily, like Achilles. The door is, temporarily, like Troy.'
