roomid: 2465
zone: Tass Times in Tonetown
title: Gramps Workshop
description: >-
  Behind a false wall in the cabin, accessed through a disguised panel in
  the bookcase, Gramps' real workshop is the room where the hoop was born.
  <ansi fg="itemname">Blueprints</ansi> cover every surface -- rolled, folded,
  pinned flat, layered four deep on the main table. They show the hoop in
  every stage of development: sketches from the initial idea, precise engineering
  drawings, annotated revisions, and a final schematic that shows how the iron
  ring becomes a portal between dimensions. <ansi fg="itemname">Models</ansi>
  of the hoop in various sizes hang from the ceiling on strings, some of them
  glowing faintly with residual dimensional energy. <ansi fg="itemname">Notes</ansi>
  on the walls track the discovery of Tonetown: early confused entries becoming
  clearer, then excited, then urgent. The most recent note reads: IF SNOTTY
  GETS THE HOOP SPECS, HE CAN CLOSE THE PORTAL PERMANENTLY. DO NOT LET
  SNOTTY GET THE HOOP SPECS. South leads back to the main cabin.
