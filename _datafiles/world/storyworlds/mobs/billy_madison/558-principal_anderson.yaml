  - "say The 1974 state championship was a very good year. I don't talk about it. But it was."
character:
  name: Principal Anderson
  description: >-
    A man in his fifties who has been principal long enough to have stopped
    being surprised by people and started being genuinely interested in them
    instead. His suit is pressed but comfortable, the suit of someone who decided
    years ago that he wasn't going to be intimidating. His handshake is real. His
    patience is not infinite but it is very large. There are three wrestling trophies
    on his shelf that he never mentions and never removes. He gave a man-child in a
    Hawaiian shirt a legitimate chance to prove himself, and he was right to.
