roomid: 39
zone: Tennessee
title: Watauga Lake / Iron Mountain
description: "The trail descends from the Roan Highlands through hardwood forest and laurel thickets toward Watauga Lake, a TVA reservoir that fills a drowned valley between the Iron Mountains. The lake is startlingly blue against the green mountains, its shoreline ragged with coves and points. Laurel Fork Gorge cuts through ancient rock on the approach, its waterfalls and cascades making this one of the most scenic stretches in Tennessee. Beyond the lake, the trail climbs onto Iron Mountain and follows its long spine north toward Virginia. The Overmountain Shelter\x97a converted barn that once slept thirty hikers on an open loft\x97sat along this stretch on historically significant ground. In September 1780, the Overmountain Men marched this very path on their way to fight the British at the Battle of Kings Mountain. The barn shelter has been closed by the Forest Service due to structural issues, but the history remains in the ground beneath your feet. Damascus, Virginia\x97trail town of all trail towns\x97waits at the end of Iron Mountain."
