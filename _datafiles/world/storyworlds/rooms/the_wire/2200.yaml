nouns:
  couch: >-
    An orange sectional sofa that has no business being in a courtyard, which is
    precisely why it is here. It is the throne room of the Pit. Business is
    conducted from this couch. Judgments are rendered. The springs are shot but
    nobody says anything. You do not comment on the couch.
  buildings: >-
    Low-rise public housing, three stories, brick facing peeling away from
    concrete block. The windows on the upper floors have people in them who
    are not visible but are there. The game is played in the courtyard but
    observed from above.
  package: >-
    You cannot see it and would not find it if you looked. But it is here
    somewhere -- in a stash, behind a brick, under the couch, with a youngster
    running lookout twenty feet away. It is always here. That is the whole point.
  lookout: >-
    A boy, maybe thirteen. He is doing nothing. He is watching everything.
    He is making sixty dollars a day to do nothing, which is more than his mother
    makes at the laundry, so the math is not complicated, even if the consequences are.
spawninfo:
- mobid: 496
  message: '<ansi fg="8">Marlo Stanfield materializes in the Pit, still as a stone, watching everything.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- A lookout boy calls something in a low voice and the courtyard rearranges itself without visible hurry.
- A police cruiser rolls past the end of the street. Nobody runs. Nobody needs to.
- The orange couch absorbs another minute of this corner, which has absorbed a thousand years of corners.
- Rain is coming. The sky over West Baltimore has a yellow-grey bruise along the horizon.
- A package changes hands somewhere in the shadows. If you saw it, you did not see it.
- 'Someone upstairs puts on music. It drifts down into the courtyard and disappears.'
- The game is the game. The Pit has been the Pit since before anyone here was born.
