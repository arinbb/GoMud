roomid: 1869
zone: Super Mario Bros
title: World 5-1 Gray Overworld
description: >-
  Something has shifted. The trees here are a different gray-green, the
  sky a slightly cooler shade, the ground a lighter brown that reads almost
  as beige. The <ansi fg="itemname">color palette</ansi> has changed --
  the same layout, but the hues are different, the cheerfulness slightly
  muted. This is World 5, and the game is telling you through color alone
  that the easy part is behind you. A row of <ansi fg="itemname">pipes</ansi>
  lines the path, taller than in earlier worlds, and the gaps between
  platforms are wider. The enemies move fractionally faster. The question-mark
  blocks still gleam with the same gold, but fewer of them, and further
  apart. West leads <ansi fg="exit">back</ansi>; a green <ansi fg="exit">pipe</ansi>
  descends south; south also continues onward.
