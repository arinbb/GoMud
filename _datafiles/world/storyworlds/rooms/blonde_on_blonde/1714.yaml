roomid: 1714
zone: Blonde on Blonde
title: Sad Eyed Lady of the Lowlands
description: >-
  A <ansi fg="8">vast warehouse at the edge of dawn</ansi>. The windows are
  high and industrial, paned in old glass, and through them the sky is doing
  the slow work of becoming morning -- a gray that will take eleven minutes
  to brighten, or longer, or forever. <ansi fg="itemname">Pallets</ansi> of
  unspecified cargo occupy the warehouse floor in irregular formations, casting
  long morning-shadow that moves too slowly to watch. Against the far window,
  backlit by the not-yet-dawn, a <ansi fg="itemname">silhouette</ansi> -- a
  woman's shape, still as the light, luminous in the way that outlines can
  be luminous when the source is behind them. She is <ansi fg="cyan">Sara</ansi>,
  who Dylan would marry, for whom he wrote the longest song on the album, the
  longest side of vinyl ever cut for a pop record at that point. The organ
  sustains a chord. It has been sustaining this chord since before you arrived.
  It will sustain it after you leave. The warehouse is enormous. You are small
  in it. She is enormous too, in the way that people are enormous when someone
  has written eleven minutes of music to describe their eyes. Sad eyes, lowland
  eyes, mercury-mouthed, savage-gifted. She waits. The warehouse breathes.
  The <ansi fg="exit">studio</ansi> is back up.
mapsymbol: E
maplegend: Sad Eyed Lady of the Lowlands
biome: house
exits:
  up:
    roomid: 1700
    exitmessage: The organ chord follows you out as you climb back to the studio.
nouns:
  silhouette: >-
    Backlit by the warehouse windows, the dawn not yet arrived but arriving.
    Her outline is precise and still. The sad eyes are invisible from here --
    you know they are sad because Dylan said so, because the whole song is
    built around the fact that they are sad. The warehouse holds her the way
    a cathedral holds a saint: not confining, illuminating.
  windows: >-
    Industrial warehouse windows, each pane six inches by eight, set in iron
    frames running the length of the far wall at ceiling height. The morning
    light comes through them in horizontal bands that move down the wall
    as the sun rises. In eleven minutes the whole wall will be lit. That is
    the length of the song. That is the measurement.
  pallets: >-
    Stacked with cargo that could be anything -- product, material, history.
    The pallet labels are faded or in a language you do not know. They form
    a city of boxes in the warehouse, with avenues between them leading to
    the far window, to her. The city does not matter. It is just the distance
    between you and the light.
  organ: >-
    You cannot see the organ. You can hear it. A Hammond B3, probably, the
    kind with the Leslie cabinet, the sound rotating in its housing. The
    chord it holds is the chord of the whole song -- not a hymn chord, not
    a blues chord, something more patient than either. It has been playing
    since 1966. It is playing now. It will play until the needle lifts.
spawninfo:
- mobid: 283
  message: The warehouse light shifts and she is there, at the far window, backlit and still.
idlemessages:
- The organ chord sustains. It does not resolve. It does not need to.
- The dawn light moves down the far wall in a band that is almost imperceptibly slow.
- 'Her silhouette against the window: still. Then a breath. Then still again.'
- The warehouse is cold and large and she fills it anyway, the way a sustained organ note fills a room.
- 'The pallets stand in their patient formations, holding things, saying nothing, being the world she inhabits.'
- 'Eleven minutes. The light has moved three bands since you arrived. This is time. This is the song.'
- 'Mercury mouth. Savage gift. Sad eyes. The warehouse knows exactly what it holds.'
