character:
  name: Janine Melnitz
  description: >-
    A woman with large glasses and hair that has strong opinions, dressed with the
    practical style of someone who has made a decision about her appearance and is
    not reconsidering it. She sits at the reception desk with the unassailable
    composure of a person who has decided that the strangeness of her workplace is
    simply a feature of having an interesting job. Her Brooklyn accent is thick and
    precise. She answers every phone call with exactly three words: "Ghostbusters,
    whaddya want." She has been doing this for six months and shows no signs of
    expanding the greeting.
