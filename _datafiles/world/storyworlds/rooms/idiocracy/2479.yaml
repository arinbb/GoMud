roomid: 2479
zone: Idiocracy
title: Congress
description: >-
  The chamber of the United States Congress in 2505 is the original hall, mostly
  intact, which makes the contrast more vivid. The <ansi fg="itemname">seats</ansi>
  are full of representatives eating, sleeping, watching screens, and occasionally
  saying things that are not policy. The <ansi fg="itemname">podium</ansi> at the
  front has a microphone into which someone said something this morning that was
  recorded as official legislative testimony. The <ansi fg="itemname">ceiling</ansi>
  is painted with classical allegories that look down on what is happening below
  with an expression that the painter, being dead, cannot comment on. A
  <ansi fg="itemname">bullet hole pattern</ansi> in the ceiling tiles marks where
  President Camacho fired his rifle last session to get the floor. It worked. It
  always works. Order was restored.
