roomid: 1609
zone: Die Die My Darling
title: The Upper Landing
description: >-
  The upper landing is narrow, its carpet the same faded grey-brown as below.
  The <ansi fg="8">walls</ansi> continue their inventory of religious imagery — a
  carved wooden plaque reading <ansi fg="white">WATCH AND PRAY</ansi>, a framed
  engraving of the Annunciation, a row of small devotional cards pinned to the
  plasterwork. The low light from a single bulb in a plain shade catches the dark
  wood of the doors that line the corridor. <ansi fg="exit">North</ansi> leads to
  the guest bedroom. <ansi fg="exit">East</ansi> to the sewing room. <ansi
  fg="exit">South</ansi> to the attic room. A narrow door at the end of the
  landing gives access back <ansi fg="exit">down</ansi> to the entrance hall.
  The landing smells of lavender sachets and old wood, and it is very quiet.
