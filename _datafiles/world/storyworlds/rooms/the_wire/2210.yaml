title: The Docks
description: >-
  The Port of Baltimore, Local 1514, the <ansi fg="8">International Brotherhood
  of Stevedores</ansi>. The piers smell of diesel and brine and the particular
  exhaustion of men whose work the city depends on and has forgotten about.
  <ansi fg="itemname">Shipping containers</ansi> are stacked four and five high
  in rows that go back as far as you can see, their metal sides painted with
  the names of shipping lines from a dozen countries. The <ansi fg="8">cranes</ansi>
  are enormous and precise and most of them are idle. The union hall has a
  <ansi fg="itemname">bulletin board</ansi> with job postings and a phone number
  and a photograph of Frank Sobotka that was taken when things were different.
  The port is dying. Containerization killed it slower than anyone expected
  and faster than anyone was ready for. The <ansi fg="exit">street</ansi> is to
  the east, and the <ansi fg="exit">Greek Diner</ansi> is to the north.
