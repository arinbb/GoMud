character:
  name: Danny Whitten
  description: >-
    A ghost presence on the small stage -- a man with a guitar, or almost a
    man, or the memory of one. He plays the fingerpicking pattern he taught
    to Neil Young, the one that became this song, slow and clear. He does not
    quite meet your eyes. He may not be able to see you from wherever he is.
    He is not frightening. He is just gone, in the specific way the needle
    makes you gone. The light barely reaches him, which is intentional, or
    it would be if he were here to intend it.
