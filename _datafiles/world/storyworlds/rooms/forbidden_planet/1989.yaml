roomid: 1989
zone: Forbidden Planet
title: The Krell Power Shaft
description: >-
  You stand at the top of a <ansi fg="cyan">shaft</ansi> that descends through
  the planet's crust for seven thousand eight hundred levels. The walls are
  smooth Krell alloy in a perfect circle thirty feet across, lit from within
  by a blue-white <ansi fg="cyan">glow</ansi> that intensifies with depth.
  The <ansi fg="itemname">energy output</ansi> of this single shaft exceeds
  the combined power generation of the entire United Planets. Every twenty
  seconds, a pulse of visible light travels upward through the shaft from
  below -- a heartbeat of the machine, regular as clockwork, older than
  civilization. The air here smells of ozone and something else, something
  with no name, the smell of compressed time. Above you, the
  <ansi fg="exit">lab</ansi>. Below, deeper than any human has gone, the
  <ansi fg="exit">deep</ansi> Krell.
mapsymbol: P
maplegend: Power Shaft
biome: cave
exits:
  lab:
    roomid: 1988
    mapdirection: up
  deep:
    roomid: 1990
    mapdirection: down
nouns:
  shaft: >-
    The shaft is perfectly circular, the alloy walls as smooth as polished
    glass. There is no ladder, no elevator, no apparent means of descent. The
    Krell did not need them. They moved through their own machine by thought.
    You are clinging to the edge of a concept built for minds that no longer
    exist, using tools they did not design for you.
  glow: >-
    The blue-white glow of the power shaft has a quality unlike any light
    produced by human technology. It is not reflected and not generated by any
    visible source -- it simply is, suffusing the alloy walls from within, as
    if the metal itself has learned to emit light. It has been emitting that
    light for two hundred thousand years.
  output: >-
    Morbius's instruments measure the power output of this shaft at
    approximately 10 to the 26th ergs per second. He arrived at this estimate
    after three months of measurement and four attempts to invent new units
    of measurement because the existing ones were insufficient. The machine
    does not notice this expenditure. It has nine thousand more shafts like
    this one.
idlemessages:
- A pulse of blue-white light rises from the abyss below and passes upward through the shaft, regular as breathing.
- The hum of the machine fills your chest cavity, resonates in your molars, vibrates the fluid in your inner ear.
- Looking down into the shaft induces a profound vertigo -- not from height alone but from scale, from time.
- The walls pulse once, brighten, return to baseline. Seven thousand eight hundred levels below, something shifted.
- 'The air at this depth carries a faint warmth: the heat of two hundred thousand years of continuous operation.'
- Another pulse rises from below. You count the interval. Twenty seconds. Exactly twenty seconds. Always twenty seconds.
