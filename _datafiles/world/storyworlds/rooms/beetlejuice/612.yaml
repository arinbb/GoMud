roomid: 612
zone: Beetlejuice
title: The Waiting Room
description: >-
  A vast bureaucratic waiting room that looks like the DMV designed by someone
  who died in one. Rows of uncomfortable <ansi fg="itemname">benches</ansi>
  stretch in every direction, occupied by the recently deceased in various states
  of disrepair. A long <ansi fg="itemname">counter</ansi> runs along the far
  wall, staffed by a green-skinned receptionist. A
  <ansi fg="itemname">number display</ansi> on the wall clicks over with
  agonizing slowness. Stacks of outdated <ansi fg="itemname">magazines</ansi>
  sit on side tables -- "Afterlife Weekly," "Better Crypts and Gardens." A
  dispenser offers numbered <ansi fg="itemname">tickets</ansi>. There are doors
  everywhere -- most labeled with destinations you don't recognize. One unmarked
  door in the corner seems to lead somewhere very wrong.
mapsymbol: W
maplegend: Waiting Room
biome: city
exits:
  north:
    roomid: 613
    exitmessage: You approach the frosted glass door labeled "J. BUTCHER - CASEWORKER" and push it open.
  wrong door:
    roomid: 614
    secret: true
    exitmessage: You open the unmarked door. Sand and heat blast your face. This was a mistake.
nouns:
  counter: >-
    The reception counter is scratched formica in an institutional green. Behind
    it sits Miss Argentina, the former beauty queen turned receptionist, her
    green skin a sharp contrast to her faded sash. A small brass bell sits on
    the counter with a sign: "Ring for Service (Please Don't)." Behind her,
    filing cabinets stretch back into impossible depths.
  tickets: >-
    The ticket dispenser is a chrome box mounted on the wall. A sign reads "TAKE
    A NUMBER." The numbers appear to be in the nine millions. The current number
    being served, according to the display, is somewhere in the three millions.
    This could take a while. An eternity, even.
  benches: >-
    The benches are hard wood polished smooth by countless dead posteriors. The
    waiting dead sit in various conditions -- a man cut in half reads a magazine
    with both halves, a woman covered in bee stings knits placidly, a football
    team in full gear argues about the play that killed them. Nobody looks happy
    but nobody looks surprised either. Death, it seems, involves a lot of
    waiting.
  number: >-
    The number display clicks from 3,457,892 to 3,457,893. A faint cheer rises
    from somewhere in the back of the room. At this rate, your number should be
    called in roughly six hundred years.
  magazines: >-
    The magazine selection is uniquely morbid. "Afterlife Weekly" features a
    cover story on "10 Haunting Tricks The Living HATE." "Better Crypts and
    Gardens" has a spread on mausoleum decorating. "Cosmopolidead" promises "Get
    That Deathly Glow in Just 30 Days." They're all at least forty years out of
    date.
spawninfo:
- mobid: 28
  message: Miss Argentina adjusts her faded sash and sighs from behind the reception counter.
  idlecommands:
  - say Take a number. Have a seat. Someone will be with you in... well. Eventually.
  - ""
  - emote files a nail that may or may not still be attached to her finger.
  - ""
  - say If I could go back, I'd have used a different shade of nail polish. That's my only regret.
  - ""
  - say Juno's office is through the door to the north. If you have an appointment. Which you don't.
  - ""
  maxwander: 0
  respawnrate: 3 real minutes
- mobid: 30
  message: The ghost of an entire football team files in, still arguing about the final play.
  idlecommands:
  - say I TOLD you we should have punted!
  - ""
  - emote huddles with his ghostly teammates, drawing plays on an invisible clipboard.
  - ""
  - say Has anyone seen our bus driver? He was here a minute ago. Well, forty years ago.
  - ""
  maxwander: 0
  respawnrate: 5 real minutes
- mobid: 31
  message: A man as flat as a pancake slides in sideways and takes a seat on the bench.
  idlecommands:
  - emote turns sideways and nearly disappears from view.
  - ""
  - say Road roller. Don't ask.
  - ""
  maxwander: 0
  respawnrate: 5 real minutes
- itemid: 113
  container: tickets
  respawnrate: 3 real minutes
idlemessages:
- The number display clicks forward one number. A sigh of collective disappointment fills the room.
- A dead postal worker shuffles to the counter, is handed a form, and shuffles back to the bench without a word.
- The football team starts doing the wave in their section of benches. Nobody joins them.
- A woman with a hatchet in her head laughs at something in "Afterlife Weekly."
- Someone's number is called. They've been waiting so long they've forgotten how to stand.
- The flattened man gets stuck between two bench slats and has to be pried free.
