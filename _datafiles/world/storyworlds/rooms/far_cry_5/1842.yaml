roomid: 1842
zone: Far Cry 5
title: Falls End
description: >-
  The resistance town clings to itself with the stubborn dignity of a community
  that has refused to give up its name. <ansi fg="10">Falls End</ansi> — a main
  street, a gas station, a <ansi fg="itemname">general store</ansi> boarded
  against looting, a diner with a <ansi fg="red">CLOSED</ansi> sign that has
  been there for weeks. The <ansi fg="itemname">Spread Eagle Bar</ansi> is open,
  its neon sign burning in the daylight like a declaration of independence.
  A <ansi fg="itemname">church</ansi> at the end of the street is being
  laboriously de-cult-ified — Eden's Gate symbols pried from the walls, the
  original cross re-hung at some effort. <ansi fg="itemname">Nick Rye</ansi>
  walks the perimeter, watching the roads. This is home. This is worth fighting
  for. The bar is to the <ansi fg="exit">east</ansi>. The church is to the <ansi fg="exit">north</ansi>. The county road is <ansi fg="exit">south</ansi>.
