idlecommands:
  - emote scribbles something on a napkin, crosses it out, writes it again.
  - emote plays a brief harmonica phrase -- not a song, just a thought.
  - emote adjusts his sunglasses without looking up from the lyric sheet.
  - say Something about the key. Something about the key.
  - emote sets the pencil down, picks it up, sets it down again.
