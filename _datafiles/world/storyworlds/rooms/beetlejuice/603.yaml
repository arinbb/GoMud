roomid: 603
zone: Beetlejuice
title: Maitland House - Front Hallway
description: >-
  A warm front hallway with dark wood wainscoting and floral wallpaper that's
  been half stripped away -- evidence of the Deetz renovation. A grand <ansi fg="itemname">staircase</ansi> curves upward to the second floor. To the
  south is the front door. The living room opens to the east, and a hallway leads
  north to the kitchen. The walls show a strange tension between two decorating
  styles: Barbara's cozy New England warmth and Delia's aggressive modernist
  makeover. A <ansi fg="itemname">coat rack</ansi> by the door holds a man's
  tweed jacket and a woman's cardigan that nobody has worn in quite some time.
