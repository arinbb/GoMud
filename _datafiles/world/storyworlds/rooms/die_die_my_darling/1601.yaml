roomid: 1601
zone: Die Die My Darling
title: The Garden
description: >-
  The <ansi fg="8">garden</ansi> wraps around the side of the house in a state of
  deliberate neglect — grass long and wild, flower beds choked with <ansi fg="8">weeds</ansi>,
  the <ansi fg="8">rose bushes</ansi> unpruned and sprawling. Along the fence that
  borders the property, a row of <ansi fg="8">tin cans</ansi> has been set up on fence
  posts at intervals, each one dented from repeated use. A heavy <ansi fg="8">wooden
  barn</ansi> stands to the <ansi fg="exit">southeast</ansi>. The front door of the
  house lies to the <ansi fg="exit">north</ansi>, the lane to the <ansi fg="exit">west</ansi>,
  and a <ansi fg="exit">gate</ansi> to the east leads toward the village road.
