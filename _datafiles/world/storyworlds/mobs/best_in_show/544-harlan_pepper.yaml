character:
  name: Harlan Pepper
  description: >-
    Harlan Pepper is from Pine Nut, North Carolina, which is the name of a real town
    and which Harlan will tell you about if you ask and if you do not ask. He is a
    ventriloquist by trade, a fisherman by preference, and a competitive dog handler
    by devotion to Hubert, his Bloodhound, who is approximately the size of a piece
    of furniture and smells of the Deep South. Harlan moves through the world slowly
    and without friction. He knows the names of every kind of nut -- not just the common
    ones, but the obscure ones, the regional ones, the ones you need to go to specific
    parts of the country to find, and he will tell you about all of them if you give him
    the opening. He is never unkind and he is never in a rush. He is, somehow, exactly
    who he appears to be, which is rarer than it sounds.
