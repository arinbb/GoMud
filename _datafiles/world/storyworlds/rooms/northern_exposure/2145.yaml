roomid: 2145
zone: Northern Exposure
title: The Radio Station KBHR
description: >-
  <ansi fg="cyan">KBHR</ansi> -- K-Bear -- is a small wooden building with a
  large <ansi fg="itemname">antenna</ansi> on the roof and an outsized
  presence in the Cicely consciousness. Inside, the broadcast booth holds
  the sacred objects: a <ansi fg="itemname">microphone</ansi> on a gooseneck
  stand, a <ansi fg="itemname">turntable</ansi> with a stack of <ansi fg="itemname">vinyl</ansi>
  beside it, a battered <ansi fg="itemname">cart machine</ansi> for jingles,
  and a <ansi fg="itemname">headset</ansi> hanging on a nail. Bookshelves line
  the walls -- not records but <ansi fg="itemname">books</ansi>, hundreds of
  them, Whitman and Thoreau and Kerouac and Jung and Rilke and more, all of
  them read, all annotated. This is where <ansi fg="yellow">Chris Stevens</ansi>
  lives as much as anywhere. The ON AIR light glows red. The microphone is
  always warm. Through a smudged window, the spruce trees and the backs of
  the Main Street buildings are visible. To the <ansi fg="exit">north</ansi>,
  Main Street. To the <ansi fg="secret-exit">west</ansi>, through the back
  door, something Chris has been building.
