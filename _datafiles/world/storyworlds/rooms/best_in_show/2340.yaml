nouns:
  armchair: >-
    Every armchair in the lobby currently has a dog in it, or has recently had a dog
    in it, or is being regarded by a dog as a future sitting location. The hotel
    staff have accepted this. At some point last year, they accepted this.
  desk: >-
    The front desk clerk is a man named Dale who has been working here for eleven
    years and has never before experienced anything like the Mayflower weekend. His
    face is a study in controlled professional dismay. Behind him, the key rack
    is fully occupied. Every room is taken by someone with a dog.
  weimaraner: >-
    The Weimaraner sits six feet from the front desk and stares at the clerk with
    the focused, unblinking attention of an animal that knows exactly what it wants
    and has infinite patience. The clerk has tried not making eye contact. It does
    not help. The Weimaraner's name is Beatrice.
  crate: >-
    The travel crate is custom-fitted, ventilated, and worth more than most cars.
    Inside it, a Standard Poodle called Rhapsody in White sits in perfect composure,
    as if she is simply waiting for the world to catch up to her standard.
  elevator: >-
    The elevator opens every few minutes to reveal another dog-show contestant in
    various states of readiness. Some have their grooming cases. Some have their
    dogs on leads. Some have the thousand-yard stare of someone who has been doing
    this for eight years and is not sure if they love it or if it has simply
    become who they are.
spawninfo:
- mobid: 540
  message: "<ansi fg=\"8\">Gerry Fleck ambles into the lobby with a pleasant smile, Winky the Norwich Terrier trotting at his heel. He looks around with the contentment of a man who is genuinely happy to be here and is not entirely sure why everyone else seems so tense.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- A Norwich Terrier trots across the lobby tile and disappears under an armchair.
- The elevator opens. A man steps out carrying a show lead, a grooming box, and an expression of controlled determination.
- 'Dale at the front desk answers the phone and, without being asked, says: "Yes, we do allow dogs. Yes, all kinds."'
- A woman in a trim blazer walks past carrying a poodle under one arm and a trophy case under the other. She is already winning in her own mind.
- Two handlers stop in the middle of the lobby to compare conditioning spray recommendations. Nobody else uses this much spray.
- A Bloodhound lumbers through the lobby with solemn purpose. Where it is going, it is not saying.
- The bellhop has walked past with the same luggage cart six times. His expression says he does not want to explain.
- A dog being walked to the elevator turns its head and makes eye contact with you. This dog has competed before. This dog knows things.
