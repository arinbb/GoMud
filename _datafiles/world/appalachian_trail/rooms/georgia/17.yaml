roomid: 17
zone: Georgia
title: Tray Mountain Shelter
description: "A three-sided wooden shelter perches at 4,200 feet on the slopes of Tray Mountain, one of the higher shelters in Georgia. The elevation shows\x97the trees are shorter here, wind-stunted oaks and mountain laurel replacing the towering hardwoods of the lower gaps. On clear days, gaps in the canopy reveal sweeping views of the Blue Ridge. The sleeping platform is standard, the privy functional. A spring runs downhill from the shelter, and a bear box guards the clearing. The wind is a constant presence at this height. A trail register hangs from the shelter post."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 20
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A standard three-sided lean-to at high elevation. The tin roof has been patched multiple times\x97wind damage is common up here. The walls show their age but hold firm."
  platform: "The sleeping platform holds about twelve. The wood is weathered and gray from exposure to the mountain elements."
  register: "The shelter register shows entries from hikers impressed by the views and battered by the wind in equal measure."
  water: "A spring flows downhill from the shelter. It runs well most of the year, though the descent to reach it is steep."
  spring: "The spring is downhill from the shelter\x97a steep, short scramble. The water is cold and clear."
  privy: "The privy clings to the slope above the shelter, its door perpetually rattling in the wind."
  bearbox: "A bear box wedged between two trees at the clearing edge. The metal is cold to the touch at this elevation."
  views: "Through gaps in the wind-stunted trees, the Blue Ridge mountains roll in every direction\x97ridge after ridge fading to blue and purple in the distance."
idlemessages:
- Wind sweeps across Tray Mountain at 4,200 feet, bending the stunted oaks.
- A view opens through the wind-sculpted trees\x97ridgelines rolling north toward the Smokies.
- The mountain laurel rattles its leathery leaves in the constant wind.
- A junco flits along the shelter edge, pecking at crumbs left by hikers.
- The spring trickles faintly downhill\x97you can hear it in the quiet moments between gusts.
- Clouds drift at eye level across the exposed ridge, trailing wisps of mist through the trees.
