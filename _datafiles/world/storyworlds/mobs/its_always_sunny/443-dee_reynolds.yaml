character:
  name: Dee Reynolds
  description: >-
    A tall woman with the posture of someone who is constantly bracing for
    an insult and the expression of someone who has been proved right about
    that every single day for thirty years. She has genuine ambitions —
    acting, standup, a life beyond this bar — that the Gang dismantles with
    cheerful thoroughness on a daily basis. She is smarter than she is
    given credit for and more fragile than she lets on, and the combination
    of those two things has made her exactly as terrible as everyone around
    her, which is the real tragedy. Her brother Dennis calls her a bird.
    She is not a bird.
