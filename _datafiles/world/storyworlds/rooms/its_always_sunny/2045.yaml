  message: 'Charlie Kelly emerges from behind the furnace with a mop, which is doing nothing for the floor situation.'
  respawnrate: 5 real minutes
idlemessages:
- A rat trap snaps somewhere in the dark. Silence. Then skittering, as if the rat has assessed the situation and moved on.
- The furnace groans through a cycle, a long settling sound like a building sighing at the end of a long day.
- Something drips from the ceiling into a bucket that has been positioned to catch it. The bucket is nearly full. No one has emptied the bucket.
- Charlie has written something on the wall in grease pencil. It says 'RATZ' with an arrow pointing down. This is either a warning or a label.
- The overhead light flickers twice, recovers, and then dims slightly. It has been dimming slightly for six months.
- 'From upstairs, muffled: the sound of the jukebox playing three notes and stopping.'
