roomid: 2342
zone: Best in Show
title: Swan Suite
description: >-
  The Swan suite is a standard hotel room elevated, by force of personality, into a
  battleground. A <ansi fg="itemname">Weimaraner</ansi> named Beatrice lies on the king
  bed with the absolute sovereignty of a dog who has been informed, at length, that she
  is special. The <ansi fg="itemname">coffee table</ansi> holds a Starbucks cup, a
  <ansi fg="itemname">self-help book</ansi> with the spine broken at a chapter called
  "Communicating Your Needs," and a second Starbucks cup that is cold because the argument
  started before anyone finished drinking. The <ansi fg="itemname">bathroom mirror</ansi>
  has a sticky note on it that reads something in neat handwriting that is either a
  daily affirmation or a threat. The room is very clean, very tense, and very small for
  the amount of feeling currently being processed in it. The <ansi fg="exit">lobby corridor</ansi>
  is west. Sherri Ann's suite is <ansi fg="exit">east</ansi>.
mapsymbol: W
maplegend: Swan Suite
biome: house
exits:
  west:
    roomid: 2340
  east:
