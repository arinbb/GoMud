roomid: 705
zone: Tennessee
title: Jerry Cabin Shelter
description: "Jerry Cabin Shelter is an old log cabin converted into a hiker shelter, sitting in a grassy clearing at the edge of a spruce grove. Unlike most AT shelters, this one has four walls and a door\x97though the door rarely closes properly anymore. The cabin is small and dark inside, with a sleeping loft accessible by a rough ladder. The logs are hand-hewn and chinked with concrete, the work of someone who built things to last. A spring runs from a pipe in the hillside nearby. The clearing around the cabin has good tent sites in the grass, and the evening light here is beautiful when the sky is clear. A bear box and privy serve the site. A trail register sits on a shelf inside the cabin."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 36
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  cabin: "Jerry Cabin is a proper log cabin, not a standard three-sided lean-to. Four walls, a door, a sleeping loft. The logs are hand-hewn and darkened with age. Someone put real craftsmanship into this building."
  loft: "A sleeping loft accessible by a rough wooden ladder. The space is low-ceilinged and cozy, fitting maybe six hikers. The wood creaks under your weight."
  register: "A trail register sits on a shelf inside the cabin, protected from the weather better than most."
  spring: "A piped spring runs from the hillside near the cabin. The water is cold and reliable, emerging from a PVC pipe stuck into the bank."
  door: "The cabin door is heavy wood with a crude latch. It does not close properly anymore\x97the frame has shifted over the decades\x97but it provides more protection than the typical open-faced shelter."
  privy: "A privy stands in the tree line beyond the clearing."
  bearbox: "A bear box sits in the grass near the cabin."
  clearing: "The grassy clearing around the cabin is open and pleasant, ringed by spruce and hardwoods. Good tent sites dot the grass."
idlemessages:
- The old cabin door creaks in the wind, swinging open a few inches before catching on the warped frame.
- Evening light slants across the grassy clearing, turning everything golden.
- The piped spring trickles steadily, a thin sound against the evening quiet.
- A red squirrel chatters from the spruce grove, defending its territory against all comers.
- The cabin smells of old wood, smoke, and the faint sweetness of spruce resin.
- Stars begin to appear above the clearing as the sky deepens from blue to black.
