roomid: 601
zone: Great Smoky Mountains
title: Spence Field Shelter
description: "Spence Field Shelter perches at 4,915 feet on the edge of one of the Smokies' great grassy balds, its chain-link front looking out over a rolling meadow of grass and wildflowers. This is one of the more scenic shelter locations on the entire AT. In June, flame azaleas bloom orange and red across the bald, and the sunset views to the west are legendary among thru-hikers. The shelter is the standard Smokies design\x97three stone-and-timber walls, chain-link fence, sleeping platform for twelve, privy uphill. A reservation is required. The wind is constant here, funneling across the exposed bald and rattling the fence like a percussion instrument. Deer graze on the bald at dusk, and bears patrol the tree line looking for careless food storage."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 61
    exitmessage: You follow the side trail back to the AT ridge.
    mapdirection: east
nouns:
  shelter: "Standard Smokies backcountry shelter with chain-link bear fence. The stonework foundation is solid, laid by hand decades ago. The timber walls have been carved with hundreds of trail names and dates."
  bald: "Spence Field bald stretches in front of the shelter, a rolling expanse of grass that glows gold in the evening light. The grass ripples in the wind like water. Flame azaleas dot the edges in June. The origin of the balds remains debated\x97ancient grazing, Native American burning, or ice age remnants."
  fence: "The chain-link fence is the signature feature of every Smokies shelter. It latches from the inside with a hook. Bears have been known to figure it out. The fence sags in the middle from years of hikers leaning against it to watch the sunset over the bald."
  register: "The shelter register is thick with entries praising the sunset views from Spence Field. A recurring theme: people who planned to hike further but could not make themselves leave."
  spring: "A spring flows below the shelter on the north side. The water emerges from a rocky seep and is piped to a collection point. Cold and reliable in most seasons."
  privy: "Uphill to the north. The standard Smokies composting privy, with a door that does not quite latch and a view of the bald if you leave it open."
  azaleas: "TODO_RESEARCH: Specific bloom timing for flame azaleas at Spence Field elevation. Generally mid-June, but varies with elevation and weather patterns."
idlemessages:
- The grass on the bald ripples in the wind like a golden sea, catching the last light of day.
- A deer steps out of the tree line onto the bald, ears forward, testing the wind.
- The sunset paints the western sky in bands of orange, pink, and purple above the Tennessee Valley.
- The chain-link fence hums in the wind like a strange instrument.
- A whip-poor-will begins its repetitive call from the edge of the bald as darkness settles.
- Stars emerge above the open bald one by one, then all at once.
