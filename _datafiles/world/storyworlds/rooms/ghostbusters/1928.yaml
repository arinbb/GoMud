    exitmessage: You take the elevator up to Dana Barrett's floor.
nouns:
  gargoyles: >-
    The carved stone figures along the upper cornices were added during construction
    in 1924 and have never been properly cataloged. They are not in the original
    architectural plans. Nobody who worked on the building remembers who carved
    them or when. They are not gargoyles in the traditional sense -- they have too
    many teeth, their positioning is too deliberate, and they face inward toward
    the building's peak rather than outward as gargoyles should. At night, two of
    them glow.
  facade: >-
    The building was designed by Ivo Shandor, architect and secret leader of the
    Gozer Worshippers of 1920s Manhattan. He designed 55 Central Park West as a
    "Shandor Building" -- 22 floors, 2.7 tons of galvanized iron in the structure,
    configured to act as a giant antenna for summoning inter-dimensional entities.
    This is all public record. Nobody reads public records.
  door: >-
    The lobby door is glass and brass and is currently being assaulted by Louis Tully
    and his extensive key ring. None of his keys work on this door. They never have.
    Louis lives here. He has been locked out fifteen times this year alone. He always
    finds a way back in. This is not that way.
