roomid: 1106
zone: In Utero
title: Dumb
description: >-
  A wide open <ansi fg="itemname">meadow</ansi> under a sky that cannot decide
  whether to clear or to weep. Everything is slightly grey -- the <ansi fg="itemname">grass</ansi>, the air, the light -- but not unpleasantly so.
  It is the grey of a Sunday afternoon with nowhere to be, the grey of contentment
  that knows it might be foolishness but does not care. A <ansi fg="itemname">figure</ansi>
  sits in the grass at the meadow's center, legs crossed, face turned up to the <ansi fg="itemname">sky</ansi>, smiling at absolutely nothing. A cello plays
  from somewhere beyond the treeline -- warm, round notes that roll across the
  meadow like gentle weather. The sun tries to break through the overcast but
  never quite manages it, remaining a pale disc behind gauze, close and
  unreachable. This is the quiet, sad heart of the album. The eye of the
  hurricane. The happiest sad song ever written, or the saddest happy one.
