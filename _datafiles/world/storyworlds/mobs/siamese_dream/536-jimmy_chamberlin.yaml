character:
  name: Jimmy Chamberlin
  description: >-
    The best drummer in the band, possibly the best drummer in rock in 1993.
    Jazz-trained, playing at the intersection of jazz technique and punk fury.
    His fills land in places that should not exist. His snare is cracked dry
    and precise. Behind the kit he is perfectly focused, the only member of
    the band who is reliably and completely present. His demons are not in
    the studio with him. They are waiting outside. He plays like he knows that.
