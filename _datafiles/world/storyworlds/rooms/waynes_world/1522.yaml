zone: Waynes World
title: Wayne's Kitchen
description: >-
  Upstairs from the basement, the <ansi fg="itemname">kitchen</ansi> is a testament
  to suburban Aurora living. A <ansi fg="itemname">linoleum floor</ansi> in a pattern
  that was fashionable in 1974. A <ansi fg="itemname">refrigerator</ansi> covered in
  alphabet magnets spelling nothing in particular. The <ansi fg="itemname">counter</ansi>
  hosts a coffee maker, a toaster, and an unusual number of <ansi fg="itemname">Little Debbie snacks</ansi>. This is Wayne's parents' territory — everything slightly
  too cheerful, slightly too beige. A <ansi fg="itemname">window</ansi> looks out
  over the backyard and the antenna tower. <ansi fg="exit">Down</ansi> the stairs
  leads back to the basement. To the <ansi fg="exit">east</ansi> is the suburban street.
