nouns:
  staircase: >-
    The staircase is solid oak with a carved banister. Halfway up, the wallpaper
    changes abruptly from floral to Delia's stark geometric pattern. The two
    styles meet in an ugly seam, like two realities stitched together.
  coatrack: >-
    Adam's tweed jacket and Barbara's cardigan hang here, undisturbed. They
    still smell faintly of their owners -- sawdust and lavender. Dust has begun
    to settle on the shoulders.
idlemessages:
- The old radiator clanks and hisses, pushing warmth into the hallway.
- A creak from the staircase -- footsteps? But no one is there.
- The contrast between the stripped wallpaper and what remains creates an unsettling patchwork.
- A draft from somewhere makes the coats on the rack sway slightly.
- From upstairs, the faint sound of someone humming a tune.
