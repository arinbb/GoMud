  message: The tenor man leans into his saxophone and blows a phrase that hangs in the smoky air.
  container: ''
idlemessages:
- The tenor man plays a run of notes that sound like someone falling and being caught at the same time.
- The couple in the corner sways slowly, eyes closed, anchored to each other and the music.
- The bartender wipes the bar with a cloth. The cloth is clean. He wipes it anyway.
- 'A man near the wall closes his eyes, tilts his head back, and breathes out. Just breathes out. The music does that.'
- The saxophone plays something in the space between two beats that should not fit there but does.
- Sal watches from near the bar, his warm beer forgotten, his notebook in his jacket but not out.
- The piano player runs a chord that should be wrong but the tenor man hears it and plays into it and suddenly it is right.
