roomid: 2325
zone: Siamese Dream
title: Rocket
description: >-
  Zero gravity. The room has let go of down. A child's <ansi fg="itemname">bedroom</ansi> floats in deep space -- a twin bed with a
  rocket-ship comforter, a desk with a small lamp that sends its light
  sideways, toy <ansi fg="itemname">models</ansi> drifting in slow
  rotation, a <ansi fg="itemname">window</ansi> opening onto stars. The stars
  are the ones from the window of a childhood bedroom in a suburb somewhere,
  the exact stars seen through nine-year-old eyes before the world became
  complicated. The air smells of Elmer's glue and model cement and the
  plastic of action figures. Everything is slightly too large, the way rooms
  are large when you are small. The <ansi fg="exit">studio</ansi> is back to
  the north. You are free.
mapsymbol: '5'
maplegend: Rocket
biome: house
exits:
  north:
    roomid: 2320
nouns:
  bedroom: >-
    A child's bedroom suspended in space, every object still drifting slightly
    from the last time someone moved through it. The rocket-ship comforter is
    rumpled, thrown back. The pillow has an impression in it. Whoever slept
    here left in a hurry -- or maybe they became the rocket. The desk has
    homework on it. The homework will never be finished. There is somewhere
    better to be.
  models: >-
    Plastic model rockets and spacecraft, assembled with varying degrees of
    care. Some are painted with precise detail -- engine bells in silver,
    mission patches on capsule sides. Others are just gray plastic with
    fingerprints in the glue. All of them drifting slowly, their noses pointed
    in different directions, their trajectories the trajectories of everything
    a nine-year-old imagined was possible.
  window: >-
    The window opens onto the exact stars visible from a specific suburb on a
    specific childhood night. The Big Dipper. Orion. The smear of light that
    might be the Milky Way. The glass is cold on this side and warm on the
    outside, where the stars are. Written on the glass in fingertip condensation,
    faded almost to nothing: I SHALL BE FREE.
  comforter: >-
    The rocket-ship comforter -- primary colors, stylized spacecraft, the kind
    of design that was on every nine-year-old's bed in 1979. It has been thrown
    back in a hurry, the sheet beneath it twisted. Someone got up fast or flew
    away. The comforter drifts toward the window now, very slowly, as if it
    plans to follow. You do not stop it. You know where it is going.
  notebook: >-
    A composition notebook open to a page of lyrics in a teenager's handwriting.
    The words are dense, lined through and reconsidered, some circled, some
    underlined twice. On the last page a single line sits isolated, underlined
    once, not crossed out: TONIGHT THE SKY ABOVE. Below it, in a different
    color pen, added later: I CANNOT COME BACK. Whether that is part of the
    song or outside the song is not specified. Both are true.
idlemessages:
- A model rocket drifts past your shoulder, rotating slowly, its nose always pointing slightly upward.
- The lamp sends its light sideways through the zero gravity, illuminating nothing and everything.
- 'The stars outside the window are the specific stars of a specific childhood night, perfectly remembered.'
- The rocket-ship comforter drifts away from the bed, slowly, as if someone just got up to go somewhere important.
- Elmer's glue and model cement -- the smell of something being built with the absolute certainty that it will fly.
- 'The homework on the desk lifts a corner in a nonexistent breeze, rustles once, and settles back down.'
