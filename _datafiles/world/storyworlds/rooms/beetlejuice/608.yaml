roomid: 608
zone: Beetlejuice
title: Maitland House - Master Bedroom
description: >-
  The master bedroom sits at the top of the stairs, caught between its original
  charm and the Deetz renovation. A large four-poster <ansi fg="itemname">bed</ansi>
  with a patchwork quilt dominates the room -- Barbara's handiwork, still on the
  bed despite Delia's protests. A <ansi fg="itemname">vanity mirror</ansi> stands
  in the corner, its surface slightly foggy. The <ansi fg="itemname">closet</ansi>
  door is slightly ajar, revealing a mix of Adam's flannel shirts and the
  Deetzes' designer clothes crammed together. A door to the south leads to
  <ansi fg="itemname">Lydia's room</ansi>.
mapsymbol: B
maplegend: Bedroom
biome: house
exits:
  up:
    roomid: 607
  down:
    roomid: 603
  south:
    roomid: 617
nouns:
  bed:
    description: >-
      The four-poster bed is solid maple, passed down through three generations
      of Maitlands. Barbara's patchwork quilt is a riot of autumn colors. The
      pillows still hold the impression of two heads, though no one living
      sleeps here.
  mirror:
    description: >-
      The vanity mirror is old and slightly warped. Your reflection looks normal
      at first, but if you stare long enough, you notice your reflection blinks
      a half-second after you do. And is your reflection's smile slightly wider
      than yours?
  closet:
    description: >-
      The closet is an archaeological dig of clothing -- Adam's flannel and
      Barbara's cardigans pushed to one side, Charles's suits and Delia's
      avant-garde outfits claiming the rest. A hatbox on the top shelf is
      labeled "WEDDING" in Barbara's handwriting.
idlemessages:
- The vanity mirror fogs up briefly, as if someone breathed on it from the other side.
- The closet door creaks open another inch. Then another.
- Barbara's quilt seems to ripple, as though someone invisible just pulled it up to their chin.
- A drawer in the nightstand slides open on its own, then slowly pushes closed.
- The floorboards creak in a pattern -- step, step, pause -- like someone pacing.
