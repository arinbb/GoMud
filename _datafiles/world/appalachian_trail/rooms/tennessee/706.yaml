roomid: 706
zone: Tennessee
title: Flint Mountain Shelter
description: "Flint Mountain Shelter sits on a narrow ridgeline, exposed to wind from both sides. The three-sided shelter is solidly built but the location is breezy\x97in winter, dangerously so. The sleeping platform holds eight. Chunks of flint and chert litter the ground around the shelter, the mountain's namesake stone surfacing through the thin soil. The water source is a long, steep descent down the mountainside to a spring that can be unreliable in dry weather. Tent sites are limited on the narrow ridge. A bear box and privy serve the site. A trail register hangs from the front post."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 37
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A solidly built three-sided shelter on an exposed ridgeline. The wind finds every gap in the logs."
  platform: "The sleeping platform holds eight. The wood is splintery in places from exposure to the elements."
  register: "A trail register hangs in a zip-lock bag, the pages fluttering in the constant ridge wind."
  flint: "Chunks of flint and chert push up through the thin soil around the shelter. The Cherokee and earlier peoples used this stone for tools and weapons. Sharp-edged pieces still turn up after every rain."
  spring: "The water source is a long, steep descent down the mountainside. The spring can slow to a trickle in dry weather. Carry water from below if the forecast is dry."
  privy: "A privy stands in a wind-battered spot near the ridge."
  bearbox: "A bear box sits at the edge of the clearing, secured against the wind."
idlemessages:
- Wind gusts across the exposed ridge, making the shelter creak and groan.
- Flint chips crunch underfoot as you walk around the shelter clearing.
- The ridgeline view stretches in both directions, the trail visible as a faint line through the forest.
- A raven rides the updraft along the ridge, barely moving its wings.
- The wind shifts direction, coming now from the south, carrying warmth and the smell of rain.
- Clouds scud across the ridge at eye level, trailing wisps of mist.
