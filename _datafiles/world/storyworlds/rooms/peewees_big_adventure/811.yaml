nouns:
  sets: >-
    The variety is staggering. A Roman forum made of plywood and paint. A
    1950s diner that is only a facade -- the "interior" is open to the sky
    behind it. A jungle set with plastic vines and a real parrot that has
    gone native. A courtroom, a hospital, a spaceship bridge, a haunted
    house, a beach with sand imported from somewhere. Every human story
    ever told has been filmed in some version of this place.
  pirate: >-
    A full-sized pirate galleon sits on hydraulic lifts that make it rock
    gently back and forth. The sails are canvas, the hull is fiberglass
    painted to look like wood, and the cannons are foam rubber. A Jolly
    Roger flies from the mainmast. It is simultaneously completely fake
    and deeply impressive.
  spaceship: >-
    A spaceship interior set built on scaffolding, all brushed aluminum
    panels and blinking console lights. The command chair swivels. The
    viewscreen shows a starfield that is actually a painted backdrop.
    Through the fake airlock, you can see the Christmas village set
    next door, which somewhat undermines the illusion.
idlemessages:
- A stuntman in a Santa Claus suit runs past being chased by someone in a dinosaur costume. Nobody bats an eye.
- The pirate ship rocks on its hydraulics, creaking like it's on actual waves.
- Fake snow from the Christmas village drifts over the fence onto the Japanese garden set.
- 'A PA system crackles: "We need more fog on Stage 9. MORE FOG."'
- Two actors in medieval armor sit on folding chairs, eating lunch from styrofoam containers.
- The spaceship console blinks and beeps, even though no one is filming right now.
