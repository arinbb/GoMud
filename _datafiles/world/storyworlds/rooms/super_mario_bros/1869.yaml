nouns:
  clouds: >-
    The clouds in World 5 are white and solid-looking against the cooler sky,
    the same pixel-art clouds as World 1 but set against a blue that reads as
    later in the day, or later in the journey. They are static, decorative,
    part of the background layer that you can see but never reach. From here
    they look like they might offer rest. They do not.
  bricks: >-
    Brick blocks line the elevated platforms here, more numerous than in the
    earlier worlds, requiring more navigation and less straightforward running.
    Each one can be broken if you are Super Mario. Each one is solid if you are
    not. The bricks here are slightly darker than World 1 bricks. This is
    deliberate. The game is talking to you through color.
  gap: >-
    The gaps between platforms here are wider -- not impossible, but requiring
    commitment. You must leave the solid ground and trust your momentum. The
    gaps are not bottomless in the literal sense; the screen scrolls and
    eventually so would you. But they feel bottomless, which amounts to the
    same thing at speed.
  palette: >-
    The colors here are subtly different -- same world, different hues.
    The sky is cooler, the ground lighter, the trees a gray-tinged green.
    It is not dramatic; someone who had never played the game might not
    notice immediately. But you notice. The game communicates difficulty
    through color, a visual shorthand for the subconscious. The cheerful
    palette of World 1 is gone. The world is the same world. It is harder
    now.
  pipes: >-
    The pipes here are taller -- the standard green cylinders, but stretched,
    their openings higher overhead. Piranha Plants emerge from the taller
    ones, requiring a jump to clear rather than a duck. The pipes are the
    game's recurring environmental grammar: obstacles, portals, spawn
    points for enemies, vertical punctuation in the horizontal scroll of
    the world.
spawninfo: []
idlemessages:
- The sky is the same blue but cooler now, a shade that reads as twilight even at noon.
- 'The trees here are gray-green rather than bright: same shape, different feeling.'
- The question-mark blocks glow with the same gold they always have. There are fewer of them.
- 'A pipe bubbles quietly to the south. Something moves inside: faint, rhythmic, waiting.'
- The gaps between platforms are wider here. You measure them with your eyes before you jump.
- 'You are more than halfway through the eight worlds. The palette says what the game will not: harder now.'
- The ground underfoot has the same solid chunky feel but a different color. Small thing. Important thing.
