nouns:
  path: >-
    A narrow dirt path winds through the rose beds, just wide enough for one
    person walking carefully. It has been walked by the Little Prince, who lay
    down beside it and wept when he understood what he was looking at. The
    path continues in both directions among the rows, identical roses on either
    side, and does not lead anywhere that resolves the question the garden asks.
  thorns: >-
    Each rose has four thorns, the same four thorns his rose has. The thorns
    are not decorative. They are part of the rose's character, part of the
    difficulty of loving something that can hurt you simply by being what it is.
    His rose, on B-612, is proud of her thorns. She believes they protect her.
    They do not protect her. He protects her. That is what tending means.
  roses: >-
    Five thousand roses, each one identical to the next, each one identical
    to the rose in the glass dome on B-612. They are beautiful and they are
    everywhere and that is the problem and also, eventually, the solution.
    Because his rose is not one of these. His rose knows him. These roses
    know no one. Beauty without a relationship is just beauty. His rose,
    difficult and demanding and fragile and beloved, is something else.
  tended: >-
    Tended: watered, sheltered under a glass dome each night, listened to
    when she complained, protected from the wind, admired when she opened.
    That is what tending is. It is time. It is attention. It is the specific
    weight of caring about one thing among all the similar things that exist.
    It does not make the thing more beautiful. It makes it more yours.
idlemessages:
- The roses sway all at once, a single motion, in a wind that passes through without stopping.
- 'The scent is enormous: rose and rose and rose, each petal releasing the same fragrance, together becoming something almost unbearable.'
- A bee moves through the rows, indifferent to the question of uniqueness. The bee has its own concerns.
- 'Five thousand roses, each one saying nothing. Each one saying: I am here. I am beautiful. I am like all the others.'
- You count the rows. You stop counting. You sit down. You think about something you have tended.
- The light falls on the petals and each one catches it the same way. The sameness is peaceful and devastating at once.
- 'A single petal falls: indistinguishable from a thousand other fallen petals. It was, nonetheless, from one specific rose.'
