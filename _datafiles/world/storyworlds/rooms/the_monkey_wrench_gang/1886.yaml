roomid: 1886
zone: The Monkey Wrench Gang
title: The Strip Mine
description: >-
  The earth has been <ansi fg="8">terraced and opened</ansi> in a series of enormous
  concentric steps, each one fifty feet below the last, descending into the ground like
  a wound. <ansi fg="8">Dragline cranes</ansi> stand at the upper rim, their booms
  pointing at the sky like accusations. The smell is of blasted rock and diesel and
  coal dust, a smell that belongs to another world entirely from the canyon country
  outside the fence. <ansi fg="red">The red rock has been ripped away</ansi> to expose
  the grey coal seam beneath, and the grey has spread outward from the mine like a
  bruise. <ansi fg="8">Haul roads</ansi> zigzag down to the pit floor where trucks
  the size of houses crawl back and forth. A chain-link fence marks the perimeter.
  A <ansi fg="8">hard-hatted operator</ansi> watches the equipment from a platform,
  eating a sandwich, not looking up. To the <ansi fg="exit">north</ansi>, the desert
  road leads back toward the highway. To the <ansi fg="exit">east</ansi>, or through
  the fence to the <ansi fg="exit">bulldozer yard</ansi>, the heavy equipment is parked
  in rows.
mapsymbol: S
