character:
  name: Eric Gordon
  description: >-
    A man in an expensive suit who has the face of someone who has always won by
    the rules he wrote himself. His hair is perfect. His smile is the kind that
    does not reach his eyes because his eyes are doing something else entirely --
    calculating, assessing, finding angles. He carries a briefcase that has never
    contained anything except paperwork designed to take something from someone
    else. He is not a monster. He is something worse: a man who is completely
    convinced he is reasonable.
