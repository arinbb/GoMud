title: The Festivus Room
description: >-
  Frank Costanzas basement, which he has converted into the home of Festivus --
  a holiday for the rest of us. The room is spare, undecorated, which is appropriate
  because the <ansi fg="yellow">philosophy</ansi> of Festivus rejects decoration.
  At the center of the room stands the <ansi fg="itemname">Festivus pole</ansi> --
  aluminum, unadorned, selected for its high strength-to-weight ratio. Against
  the wall, a <ansi fg="itemname">folding table</ansi> holds a modest Festivus dinner,
  prepared with conviction if not with joy. The <ansi fg="itemname">card table</ansi>
  in the corner is where the Airing of Grievances is conducted. The basement walls
  hold none of the decorative impulses of the living room above -- this is Frank
  Costanzas space, designed by Frank Costanza for the holiday he invented, and it
  reflects his values: aluminum, practicality, and the frank acknowledgment that
  the holidays have gotten out of hand and something needed to be done. The stairs
  lead <ansi fg="exit">up</ansi> to the living room.
