roomid: 500
zone: North Carolina
title: Standing Indian Shelter
description: "A sturdy three-sided shelter sits at 4,760 feet on the flank of Standing Indian Mountain, the highest point on the AT south of the Smokies. The shelter is set in a dense forest of northern hardwoods and rhododendron, the canopy so thick it feels like dusk even at midday. A reliable spring flows nearby, its water cold and clear from the mountain's granite heart. The sleeping platform holds a dozen comfortably. A trail register hangs in a zip-lock bag from a nail on the center post. The Cherokee name for this mountain meant something like the place where the warrior stands, and on quiet nights you can almost feel the weight of that old story in the silence between the trees."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 30
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A well-maintained three-sided lean-to built of dark-stained wood. The roof is solid metal, and the floor platform is smooth from years of sleeping bags. Carved initials and trail names cover the walls."
  platform: "The sleeping platform is dry and level, raised off the ground on sturdy log beams. Room for twelve. By evening, every space will be claimed."
  register: "The shelter register is in a gallon zip-lock bag, the notebook slightly warped from humidity. The entries are a mix of mileage logs, poetry, complaints about knees, and declarations of love for the trail."
  spring: "A spring flows from the mountainside about fifty yards downhill from the shelter. The water is cold and clear, running over moss-covered rocks. It has a faint mineral taste from the granite bedrock. TODO_RESEARCH: Water quality history, geological source of Standing Indian springs."
  privy: "The privy is uphill from the shelter, set back in the rhododendron. It has a door, which is more than some."
  bearbox: "A metal bear box sits at the edge of the clearing. Bears are active in this area, and the box has fresh claw marks along one edge."
  mountain: "Standing Indian Mountain rises above the shelter to 5,499 feet. The Cherokee warrior-turned-to-stone legend attaches to the summit. The peak is the highest point on the AT until the Smokies, still days away."
idlemessages:
- The spring gurgles steadily downhill, a sound that becomes the background rhythm of the shelter.
- A red squirrel scolds from a hemlock branch, outraged at your presence in its territory.
- Wind moves through the canopy high above, but the shelter clearing is still and calm.
- The smell of woodsmoke drifts from a thru-hiker's cook stove, mixing with the forest air.
- A mouse scurries along the shelter wall, checking for crumbs with professional efficiency.
- Standing Indian Mountain looms overhead, its summit hidden by the dense canopy.
