character:
  name: Donn Snotty
  description: >-
    A thin, sharp-featured man in a grey suit that has been pressed to a
    severity beyond mere tidiness. His grey trousers match his jacket
    precisely. His loafers are clean. His hair is orderly without being
    interesting. He carries himself with the certainty of a man who has
    decided what the world should be and built a machine to enforce it.
    His face, in repose, is the expression of someone who does not
    dislike people -- he simply believes they would be better if they were
    less. He was, the photographs suggest, someone else once. He does
    not appear to miss being that person.
