nouns:
  sanctuary: >-
    The First United Methodist Church sanctuary: white walls, dark pews, morning
    light through the stained glass doing something particular with the air. It
    is the kind of church that looks exactly like a church, which is to say it is
    exactly right. The acoustics are quiet in the way that church acoustics are
    quiet -- sounds travel differently here than outside. Voices carry. Silences
    carry more.
  program: >-
    The wedding program: 'The Wedding of Phyllis Lapin and Bob Vance of Vance
    Refrigeration.' The cover has two interlocking rings and a small photo of the
    couple. Inside: hymn selections, the order of service, a note from Phyllis
    thanking 'my Dunder Mifflin family' and mentioning specifically that everyone
    is invited to the reception but that there is a seating chart and 'please find
    your seat before the cocktail hour ends.' Someone has written in the margin,
    in Jim's handwriting: 'found our seat. also, wow.'
  flowers: >-
    The altar arrangement: white lilies, white roses, green fern, tied with a white
    ribbon. They are fresh. The church smells like them. Phyllis chose them herself
    and she chose well -- they are exactly the right flowers for a wedding in a
    Pennsylvania church in late February or early April, whichever it is.
  pews: >-
    Dark oak pews, polished, the kneelers down from the last service. The cushions
    are needle-pointed by various members of the congregation over the years, each
    one different, each one an act of labor and patience. The pew where Jim sat at
    the wedding is three rows back on the left. You can tell which one it is.
