nouns:
  apartment: >-
    Modest but real. The furniture is actual furniture bought together, not
    handed down, not temporary. The lease is in both names. This is a home
    that two people have made. David has never had a home that was his own
    before. He is still getting used to what that means.
  equipment: >-
    Keith's weights and a pull-up bar. He uses them in the early morning
    before David is up. The equipment is kept clean and ordered -- Keith's
    version of the discipline he brought from fifteen years as a cop.
    The physical world is something Keith can manage. He respects it.
  books: >-
    Alphabetical by author. Mostly history, some theology, some fiction.
    David was raised in a family business surrounded by death and he has
    needed other things to think about. The books are that. They are not
    for show. He has read all of them.
  table: >-
    Two chairs at a kitchen table. This is where David and Keith have their
    real conversations -- the ones that matter, the ones that are difficult,
    the ones where they say things they have been carrying for a while.
    The table holds those conversations steadily.
  wall: >-
    A few photographs: David and Keith at a friend's wedding, clearly happy.
    A photo at a beach somewhere. One at the funeral home in front of the
    sign, formal, a good day. They exist in photographs. This is not nothing.
