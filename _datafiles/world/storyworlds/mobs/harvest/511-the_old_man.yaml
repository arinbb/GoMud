character:
  name: The Old Man
  description: >-
    A weathered man in his seventies, lean and sun-darkened, sitting in a
    rocking chair on his cottage porch. His hands are large and calloused,
    the hands of someone who has worked this land for decades. His eyes are
    pale blue and steady, the kind of eyes that have watched the same view
    change through forty seasons and found something different in it every
    time. He does not say much. When he does, it tends to be worth hearing.
    He is the old man Neil wrote the song about — twenty-four and so much
    more, live alone in a paradise that makes me think of two.
