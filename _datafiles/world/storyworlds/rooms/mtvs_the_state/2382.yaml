roomid: 2382
zone: MTVs The State
title: The Barrel
description: >-
  The interior of a very large wooden <ansi fg="itemname">barrel</ansi> — surprisingly
  spacious, surprisingly livable. Barry and Levon have arranged it with care. There is
  a small <ansi fg="itemname">shelf</ansi> with books on it. There is a <ansi fg="itemname">rug</ansi>
  that does not fit but has been made to fit. Two <ansi fg="itemname">chairs</ansi>
  face each other at the angle of two people who have had every conversation with
  each other and are ready to have them all again. A <ansi fg="itemname">candle</ansi>
  provides warm light. The curved walls give the space a quality of enclosure that
  feels chosen rather than imposed. This is a home. The fact that it is a barrel is
  secondary. To the <ansi fg="exit">west</ansi> is the MTV Studio. To the
  <ansi fg="exit">south</ansi> is the Ball Pit.
mapsymbol: B
maplegend: The Barrel
