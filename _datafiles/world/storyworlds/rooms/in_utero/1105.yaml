roomid: 1105
zone: In Utero
title: Frances Farmer Will Have Her Revenge on Seattle
description: >-
  A psychiatric ward from 1943, sterile white tile and institutional green paint
  flaking from the walls. The smell of antiseptic burns your nostrils, layered
  over something older and sadder -- lost potential, forgotten talent, the chemical
  residue of treatments that were never meant to cure. Old movie <ansi fg="itemname">posters</ansi>
  peel from the corridor walls, water-damaged and fading. A <ansi fg="itemname">wheelchair</ansi>
  sits empty in the center of the room, its leather seat still indented, still
  warm. Through barred <ansi fg="itemname">windows</ansi>, Seattle sprawls
  grey and rain-soaked, a city that chewed up its daughter and forgot her name.
  Fluorescent lights buzz overhead in a frequency that gets inside your teeth.
  The ward stretches in both directions, identical doors with identical locks,
  and behind each one a person who was once extraordinary.
