idlecommands:
  - "emote shouts something about page one at a reporter who is already working on page one."
  - "say This is the biggest story in Tonetown history! Bigger! It is history happening to Tonetown!"
  - "emote reads a page of copy, grimaces at the third paragraph, and starts marking it up."
  - "emote waves aggressively at the printing press, as if encouraging it."
  - "say We need photographs. We need sources. We need someone to go south and come back alive with a story."
  - "emote stands in the middle of the newsroom looking like a person who is simultaneously five places."
