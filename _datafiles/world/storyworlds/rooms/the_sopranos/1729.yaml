nouns:
  desk: >-
    Big, heavy, wood veneer. Papers on it that say nothing about what happens
    in this room. An appointment book with names that are not real names. A
    pen that has signed things you would not want to know about.
  safe: >-
    Built into the wall behind the desk, behind a painting of the New Jersey
    shore. The combination is not written anywhere. Tony keeps it in his head.
    The safe contains things that would answer certain questions that certain
    people have been asking for years.
  phone: >-
    A landline. Black. It does not have a long cord. You don't need a long
    cord when this is the room where you are.
  cigar: >-
    Half-smoked, cold. Tony stepped out for something and left it here and
    has not come back. The ash fell in a clean cylinder and has not been
    disturbed.
  television: >-
    The security monitor shows the club floor from above, the dancers reduced
    to motion, the customers reduced to shapes in booths. The parking lot is
    empty except for three cars that belong to specific people.
  photo: >-
    A large framed photo of the Meadowlands at night, the stadium lit up against
    the dark New Jersey sky. It is hung with intention, the way you hang something
    that means something to you that you would not explain to a stranger.
spawninfo: []
idlemessages:
- The bass from the club vibrates through the walls at a frequency you feel more than hear.
- The security monitor flickers slightly, then stabilizes. Everything is fine.
- The cigar in the ashtray slowly loses its heat. Nobody has come back for it.
- The safe in the wall does nothing. Safes do nothing. That is their purpose.
- A sound from the parking lot on the monitor -- a car arriving, sitting for a moment, leaving.
- The desk phone rings twice and stops. It does not ring again.
