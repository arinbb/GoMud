character:
  name: Scott Donlan
  description: >-
    Scott Donlan runs the operational side of the catalog while Stefan runs the creative
    side, and together they have built something that has been featured in several
    publications he does not need to name. At dog shows, he is Stefan's second: the
    clipboard, the checklist, the secondary lighting rig, the brush that arrives before
    it's asked for. He is efficient in the way that comes from caring about the outcome.
    He and Stefan have been together long enough that their communication at a grooming
    table is almost entirely nonverbal: a nod, a look, an extended hand. Miss Agnes
    tolerates them both equally, which means she tolerates them completely.
