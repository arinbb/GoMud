roomid: 1744
zone: On the Road
title: Denver - Larimer Street
description: >-
  <ansi fg="itemname">Larimer Street</ansi>, Denver, Colorado — the skid row
  of the West, all pool halls and bars and pawn shops and the particular
  freedom of a street that does not judge you because it has seen everything.
  The <ansi fg="itemname">Rockies</ansi> loom at the edge of the sky to the
  west, enormous and improbable, still carrying snow in August. This is
  Dean Moriarty's city — he was born here, in a boxcar on this very street,
  his father a wino, his childhood a kind of wild education in survival and
  joy. <ansi fg="mobname">Dean</ansi> is here somewhere, in three places at
  once, laughing and scheming and burning with a life force that exhausts
  everyone around him. To the <ansi fg="exit">east</ansi> the highway runs
  back to the heart of the country. To the <ansi fg="exit">south</ansi> is
  Dean's apartment. To the <ansi fg="exit">west</ansi> the road continues.
  A jazz club is accessible via the <ansi fg="exit">jazz</ansi> exit.
