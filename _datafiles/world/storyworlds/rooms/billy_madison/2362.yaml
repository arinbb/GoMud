roomid: 2362
zone: Billy Madison
title: Elementary School Hallway
description: >-
  A hallway that smells of crayons, industrial floor wax, and the very specific
  anxiety of being eight years old. <ansi fg="itemname">Lockers</ansi> painted that
  particular shade of institutional green line both walls. <ansi fg="itemname">Artwork</ansi>
  from students is taped to every surface -- turkeys made from hand outlines, houses
  with doors too big for the walls, suns in the corners of every page. A <ansi fg="itemname">bulletin board</ansi>
  near the entrance displays the lunch menu and a motivational poster featuring a
  <ansi fg="itemname">kitten</ansi> hanging from a branch that says "Hang in there!"
  One of the locker handles has been licked recently. You don't want to know by whom.
  To the <ansi fg="exit">west</ansi> is the mansion. To the <ansi fg="exit">north</ansi>
  is Miss Lippy's classroom. To the <ansi fg="exit">east</ansi> is Veronica's classroom.
  To the <ansi fg="exit">south</ansi> is the playground.
