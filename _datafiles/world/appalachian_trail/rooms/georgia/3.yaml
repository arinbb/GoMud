roomid: 3
zone: Georgia
title: Stover Creek / Three Forks Area
description: "The trail descends from Springer Mountain through towering hardwoods, the white blazes leading you down into a lush creek valley. At Three Forks, three streams converge in a tumble of mossy rocks and clear water\x97Stover Creek, Chester Creek, and Long Creek meeting beneath a canopy of hemlocks. A rough log bridge spans the main crossing. Rhododendron tunnels close in along the creek banks, their dark evergreen leaves forming living archways over the path. The air is cool and damp here, rich with the smell of wet earth and decaying leaves. Ferns carpet every available surface."
biome: forest
mapsymbol: T
maplegend: Three Forks
exits:
  south:
    roomid: 2
  north:
    roomid: 4
  shelter:
    roomid: 10
    exitmessage: A blue-blazed side trail leads 0.2 miles down to Stover Creek Shelter.
    mapdirection: west
nouns:
  creek: "Three streams converge here\x97Stover Creek, Chester Creek, and Long Creek\x97tumbling over mossy rocks and pooling in clear basins. The water is cold and clean, straight from the mountain."
  blazes: "White paint rectangles mark the trunks of trees every hundred yards or so. Two inches wide, six inches tall. The language of the trail, simple and universal\x97follow the white blazes north to Maine."
  bridge: "A rough log bridge spans the creek crossing\x97two thick logs laid side by side with a few crosspieces for stability. It is slippery when wet, and most hikers end up rock-hopping anyway."
idlemessages:
- The creek rushes over smooth stones, a constant murmur that fills the hollow.
- A water thrush bobs along the creek bank, dipping its tail with every step.
- Rhododendron branches arch overhead, filtering the sunlight into a green-gold haze.
- Something splashes in one of the deeper pools where the creeks converge.
- A breeze stirs the hemlock boughs, releasing the sharp clean scent of resin.
- The trail is muddy near the crossing, pocked with boot prints from a dozen hikers before you.
