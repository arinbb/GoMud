nouns:
  cars: >-
    Several cars are parked outside at angles that suggest speed rather
    than parking. A '47 Buick. A Ford coupe. A Hudson with a cracked
    windshield. Their ownership histories, if written down, would constitute
    a legal document of considerable complexity. Dean calls them "borrowed."
    This is technically inaccurate.
  mattress: >-
    The mattress on the floor is a map of Dean's recent history, which
    is to say it is complicated. It is also where he sleeps, where he
    makes plans, where he conducts long philosophical conversations at
    3am about time and God and the void. The mattress is patient with this.
  walls: >-
    The walls of the apartment are so thin they are practically theoretical.
    Through them you can hear radio programs, arguments, lovemaking, snoring,
    the sound of someone frying eggs in the apartment above. All of this is
    Dean's neighborhood, his community, his evidence that life is everywhere
    and all of it is worth paying attention to.
  crate: >-
    A wooden crate serving as a table, a surface, a catch-all. On it there
    is a Bible that Dean reads with genuine intensity — not for its religion
    but for its language, its speed, its absolute confidence in what it
    is saying. Dean underlines things. He underlines everything.
spawninfo:
- mobid: 300
  message: Dean Moriarty paces the small room, too much energy for the space, already talking.
  container: ''
idlemessages:
- 'Dean is talking and moving simultaneously, his hands describing shapes in the air that have no names.'
- The cars outside sit at strange angles, each one a small story about how it got here.
- Someone in the next apartment turns up their radio. Dean turns up his voice.
- 'The mattress on the floor is the center of the universe, and Dean knows it, and cannot stop moving anyway.'
- A wine bottle rolls across the floor in the draft from under the door.
- 'Through the thin walls, a baby cries, a woman sings something to it, it stops. The city holds its breath.'
- Dean pauses in his pacing, stares at nothing, says "Yes!" and starts moving again.
