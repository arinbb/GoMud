- mobid: 511
  message: The Old Man rocks slowly on his porch across the fence line, watching the light change.
- mobid: 512
  message: The Stray Gators are set up in the barn, tuning and waiting for the evening session.
- mobid: 513
  message: Danny Whitten leans against the fence at the far end of the property, guitar case at his feet, looking at nothing.
idlemessages:
- An acoustic guitar drifts from the porch, unhurried, a man playing for no one in particular.
- The wheat shifts in the evening wind, a long golden wave moving from east to west and gone.
- The pedal steel bends a note from inside the barn, the sound carrying clean across the property.
- A hawk turns slow circles above the field, riding something invisible, in no hurry to land.
- The golden light thickens. Everything on the ranch looks permanent and temporary at once.
- A screen door creaks open and bangs shut, the sound carrying across the still afternoon air.
- The harmonica on the fence post catches the late light, a thin line of silver on weathered wood.
- The old man's rocker creaks in a slow rhythm across the fence, steady as a metronome.
- The smell of warm earth and cut grass drifts across the ranch, the particular sweetness of a harvest almost ready.
- Someone tunes a guitar inside the barn, the same string over and over, getting it right.
