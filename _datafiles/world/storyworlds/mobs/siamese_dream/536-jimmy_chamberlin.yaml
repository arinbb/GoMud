character:
  name: Jimmy Chamberlin
  description: >-
    The best drummer in the band, possibly the best drummer in rock in 1993.
    Jazz-trained, playing at the intersection of jazz technique and punk fury.
    Out here on the curb he looks smaller than he does behind the kit. A
    cigarette between his fingers, drumsticks across his knees, sweat on his
    forehead from the Atlanta heat. His demons are not abstract -- they are
    specific and chemical and he is fighting them in real time, between takes,
    between songs, between the moments when the music makes everything make
    sense and the moments when it does not. He is honest about it in a way
    that is both brave and heartbreaking.
