roomid: 811
zone: Peewees Big Adventure
title: Studio Backlot
description: >-
  Total, magnificent chaos. The Warner Bros. backlot is a surreal collision of
  every possible movie <ansi fg="itemname">set</ansi> crammed together -- a
  <ansi fg="itemname">pirate ship</ansi> sits next to a suburban house sits next
  to a Wild West saloon sits next to a medieval castle. A Japanese garden shares
  a fence with a Christmas village covered in fake snow. A <ansi fg="itemname">spaceship</ansi>
  mock-up perches on scaffolding beside a New York City brownstone. Crew members
  dash between sets carrying props, lights, and improbable costumes. This is where
  the great chase scene happened -- Pee-wee on his bike, weaving through every
  genre of film simultaneously. The studio gate is <ansi fg="exit">north</ansi>
  and the drive-in is <ansi fg="exit">east</ansi>.
mapsymbol: S
maplegend: Studio Backlot
biome: city
