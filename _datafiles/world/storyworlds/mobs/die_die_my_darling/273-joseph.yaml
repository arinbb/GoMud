character:
  name: Joseph
  description: >-
    A pale young man of considerable height and a certain careful, deliberate
    quality in all his movements, as though he has learned to move slowly to
    avoid breaking things. His face is broad and open and might be called
    simple, though 'patient' is closer. He speaks little, works steadily,
    and has the particular self-containment of someone for whom the external
    world is mostly noise. He tends the garden with the tin-can targets on
    the fence posts as though both tasks are of equivalent importance.
