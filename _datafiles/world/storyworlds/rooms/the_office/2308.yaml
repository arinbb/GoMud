zone: The Office
title: The Parking Lot
description: >-
  The Scranton Business Park parking lot, a modest expanse of cracked asphalt
  surrounded by the specific Pennsylvania sky that the opening credits show every
  week -- usually overcast, occasionally bright, always more beautiful than a parking
  lot has any right to be. The <ansi fg="itemname">Dunder Mifflin reserved spot</ansi>
  near the entrance has a hand-painted sign that reads 'MICHAEL SCOTT - REGIONAL
  MANAGER' in letters that suggest Michael painted it himself. A <ansi fg="itemname">dumpster</ansi>
  sits in the far corner, useful on multiple occasions over the years. The <ansi fg="itemname">Scranton
  skyline</ansi> is visible to the north -- the bridges, the hills, the grey and green
  of a mid-size Pennsylvania city that the show has taught you to love. The air smells
  like car exhaust and early spring or late fall, whichever is more melancholy.
  The <ansi fg="exit">lobby</ansi> is to the west. <ansi fg="exit">Schrute Farms</ansi>
  is to the south. <ansi fg="exit">Michael's car</ansi> is parked to the east.
