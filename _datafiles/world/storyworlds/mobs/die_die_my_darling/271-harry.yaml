character:
  name: Harry
  description: >-
    A large man, broad across the shoulders, with a face that has absorbed
    some hard use over the years and emerged from the experience without
    much softening. His nose has been broken and not set particularly well.
    His hands are enormous. He wears work clothes in dark colours — a heavy
    jacket, canvas trousers tucked into boots. He does not speak unnecessarily.
    He watches a great deal. There is a quality to his attention that is
    difficult to distinguish from threat. He works for Mrs. Trefoile, which
    covers a considerable range of tasks.
  raceid: 1
  level: 8
