character:
  name: Ignatius J. Reilly
  description: >-
    An enormous man — well over six feet and immensely fat — wearing a green
    hunting cap with earflaps, a flannel shirt straining at its buttons, baggy
    tweed trousers, and scuffed desert boots. He carries a plastic cutlass from
    a costume shop and a Big Chief tablet. His moustache is unkempt, his eyes
    bulge with outrage at the modern world, and his pyloric valve is in a
    constant state of agitation. He is the most magnificent failure in American
    literature.
