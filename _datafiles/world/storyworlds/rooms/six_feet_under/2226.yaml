nouns:
  couch: >-
    A long couch with three cushions, slightly sunken in the middle where
    everyone always sits. The upholstery has been replaced once. The frame is
    original. It holds the shape of years of family watching television and not
    watching television and sitting next to each other without talking and talking
    without saying anything.
  chair: >-
    Nathaniel Sr's armchair. Brown leather, a little cracked at the armrests.
    The indentation of him is still there, or seems to be. Nobody sits in it.
    Nobody has suggested getting rid of it. It sits in its corner doing the
    work of being present, which is its only remaining function, and it does
    it thoroughly.
  photographs: >-
    A wall of photographs, years of family life in frames of different sizes.
    School portraits in sequence. A Halloween where Claire was a witch and
    Nate was something he chose himself and David was something appropriate.
    A Christmas with snow that seems improbable for LA. Nathaniel Sr. in several
    of them, looking like the center of gravity that he was.
  bookshelf: >-
    Paperbacks, mostly. Some of Nathaniels old woodworking books. A few of
    Ruths self-help books from different decades, each representing a period
    of her searching. Claires art books, taken down and put back wrong.
    Nates Moleskines from college that he never throws away.
  television: >-
    On, but nobody is watching it. Something with a laugh track. The sound
    is turned low enough that it becomes ambient noise, the television equivalent
    of white noise, a way of not being alone in a room without having to
    acknowledge the company.
spawninfo: []
idlemessages:
- The television is on. Nobody is watching it. The sound is too low to make out the words.
- The empty armchair in the corner holds its shape, patient, occupying space.
- Someone has left a half-empty mug on the coffee table. It has been there since this morning.
- The photographs on the wall go back decades. The ones with Nathaniel Sr. are distributed throughout, his presence woven in.
- A floorboard creaks upstairs. Someone moving around in the night, unable to sleep.
- Ruth has rearranged the bookshelf again. Nobody will notice. She will feel slightly better for having done it.
- The living room light is warm and low. This time of evening, the house feels almost like itself.