roomid: 1715
zone: Blonde on Blonde
title: The Chelsea Hotel Room
description: >-
  <ansi fg="cyan">Room 211</ansi> (or 311, or 511 -- the number shifts), Chelsea
  Hotel, West 23rd Street, Manhattan, 1966. The <ansi fg="itemname">bed</ansi>
  is made with a precision that suggests it was made by the hotel and unmade
  and made again by someone who could not sleep. A <ansi fg="itemname">typewriter</ansi>
  sits on the writing desk, a sheet of paper in the carriage with three lines
  of something that stops mid-sentence. The window faces the street, and the
  street sounds -- traffic, a radio from somewhere, heels on pavement -- come
  up in the proportions that New York streets produce at whatever hour this is.
  The <ansi fg="itemname">mirror</ansi> above the dresser shows the room.
  It is the room where the album cover photograph was taken, or nearly taken,
  or imagined as taken. It is a room where Dylan slept and wrote and became
  the person who could write <ansi fg="itemname">Visions of Johanna</ansi>.
  You found this room. You were not supposed to. The hotel does not advertise
  it. You found it through a door in a loft that should not have led here.
  That is the correct way to find it. The loft is back through the
  <ansi fg="exit">secret passage</ansi>.
