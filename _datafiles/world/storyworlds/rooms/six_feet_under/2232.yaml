idlemessages:
- Keith is working out in the corner, methodical and quiet, not performing the exercise.
- David has arranged the bookshelf again. It was already alphabetical. The order is now also thematic within the alphabetical.
- The apartment is clean in a way that is not compulsive but is considered. Someone here cares about the space.
- Two coffee cups on the table. One finished, one half. This is a Wednesday morning.
- A photograph on the wall catches the light -- David and Keith, clearly happy, caught at a good moment.
- Keith comes out of the kitchen with two plates and sets them on the table without announcement. Dinner is ready.