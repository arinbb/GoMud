nouns:
  fields: >-
    The beet fields of Schrute Farms, tended with precision. The rows are perfectly
    spaced. The soil has been amended with nutrients that Dwight has researched
    extensively. Beet farming is not easy work and Dwight has never wanted easy work.
    He has wanted this work, specifically, on this land, which is his family's land,
    which is his. The beets are coming along beautifully.
  farmhouse: >-
    The Schrute farmhouse: 1800s construction, stone foundation, wood frame,
    a porch that wraps around the front with two rocking chairs that are positioned
    for observation rather than relaxation. The interior, visible through the front
    window, is furnished with things that have been here for generations. The
    bedroom available for B&B guests has been described in online reviews as
    'interesting,' 'unforgettable,' and 'smelling strongly of beet.'
  sign: >-
    'SCHRUTE FARMS -- BED AND BREAKFAST -- RATED BEST AGRITOURISM EXPERIENCE IN
    PENNSYLVANIA.' There are no asterisks. There is no citation. The parenthetical
    'self-designated' is Dwight's own addition, included not as a disclaimer but
    as a point of pride: he made this designation himself because he believed it
    to be accurate, and he sees no reason to pretend otherwise.
spawninfo:
- mobid: 522
  message: '<ansi fg="8">Dwight Schrute is in the beet fields, moving between the rows with the focused purpose of a man conducting an inspection that will reveal everything he needs to know about how the farm is doing, which is well.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- The beet fields run in perfect rows to the tree line at the edge of the property.
- From the farmhouse comes the smell of something cooking -- something with beet in it.
- A crow lands in the field, looks at the crops, and decides against them. Dwight has prepared for crows.
- The farm implements in the barn shed -- plows, irrigation tools, things with handles -- are perfectly maintained.
- The Scranton air out here is cleaner. The hills are closer. Pennsylvania is doing its best.
- A Schrute Farms brochure is tacked to the gatepost. 'AGRITOURISM AT ITS FINEST.' The brochure has a beet on it.
- From somewhere on the property, a crow alarm goes off -- a recorded crow distress call Dwight installed to deter actual crows. It is working.
- The beet greens in the nearest row are dark and healthy. Dwight knows each plant by its approximate position.
