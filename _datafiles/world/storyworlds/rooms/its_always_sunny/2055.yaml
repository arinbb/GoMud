nouns:
  attention: >-
    The focused attention of the Gang is a powerful thing. It has been deployed
    against Dee in this room and it is not comfortable to witness. They are not
    bad people, exactly. They are people who have found each other and formed a
    closed system that reinforces every impulse. Dee is part of the system.
    That is also the tragedy. She built this with them.
  dee: >-
    Dee Reynolds, aspiring actress, bird — she hates that — and the most
    resilient person in the bar, in the way that things that bend without
    breaking are more resilient than things that do not bend at all. She is
    being broken in this room. She will reassemble. She will be here tomorrow.
    The Gang will never quite understand what that means about her, or about
    them, or about all of it.
idlemessages:
- 'The Gang has deployed several routines in this room. They have favorites. They cycle through them with the ease of a practiced ensemble.'
- Dee attempts a counter-joke. It is not bad. The Gang does not acknowledge this. The room goes on.
- 'A moment of something — almost genuine, almost connection — and then Dennis says something and it closes again.'
- 'Mac has a karate bit he does when roasting Dee. It is exactly as effective as his other karate.'
- Frank produces the egg. Even in this room, even now, the egg. It cannot be explained. It is simply part of the furniture.
- 'Dee laughs. For a moment, she is in on the joke. For a moment, she is one of them. The moment passes. The room continues.'
