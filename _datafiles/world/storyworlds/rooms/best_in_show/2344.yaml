roomid: 2344
zone: Best in Show
title: Grooming Area
description: >-
  The grooming area is organized bedlam. <ansi fg="itemname">Grooming tables</ansi>
  line the walls, each occupied by a dog being primped, blown out, sprayed, combed,
  or otherwise prepared with an intensity of focus that most surgeons would find
  excessive. The sound is: blow-dryers, dogs, the intermittent snap of a slicker
  brush, someone's radio playing something nobody asked for. The
  <ansi fg="itemname">smell</ansi> is forty conditioning sprays combining into a
  single, specific olfactory signature. Harlan Pepper works at one station with the
  unhurried ease of a man who is comfortable everywhere, his Bloodhound sitting
  beside the table with the gravity of a monument. At the far station,
  <ansi fg="itemname">Harlan's ventriloquist dummy</ansi> is propped in a folding
  chair, its painted expression fixed in permanent mild surprise. A
  <ansi fg="itemname">bag of mixed nuts</ansi> sits open on the counter. The
  <ansi fg="exit">registration hall</ansi> is west.
mapsymbol: G
maplegend: Grooming Area
biome: house
exits:
  west:
    roomid: 2341
nouns:
  tables: >-
    The grooming tables are professional-grade: non-slip surface, adjustable
    height, the arm with the loop. Each one is a personal territory. You can read
    a handler's entire philosophy of dog showing in how they have laid out their
    equipment. Some are clinical. Some are loving. Some are both.
  smell: >-
    The smell is genuinely impressive in its complexity. A high note of something
    floral. Below it, something cedar-adjacent from a tack shop in North Carolina.
    In the middle, a broad warm note that is just dog. The whole thing is not
    unpleasant. It is very, very specific.
  dummy: >-
    The ventriloquist dummy has the expression they all have: that fixed, slightly
    startled look, painted eyebrows raised forever in the mild surprise of someone
    who has just heard unexpected news. Harlan is a ventriloquist. He is better at
    it than you might expect. The dummy's name is not mentioned, which is somehow
    more unsettling than if it had one.
  nuts: >-
    A small bag of mixed nuts, open. Harlan has opinions about nuts. Extensive,
    specific, unprompted opinions. He knows the name of every kind of nut. He will
    share them if you give him the opening. He will share them freely and at length
    and with the warmth of a man who is glad someone is finally asking.
spawninfo:
- mobid: 542
  message: '<ansi fg="8">Harlan Pepper looks up from the grooming table with the unhurried friendliness of a man who has never once been in a rush. His Bloodhound, Hubert, sits beside the table in a magnificent sprawl of ears and loose skin. Harlan reaches into a bag of mixed nuts without looking at it.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- A blow-dryer roars to life at a nearby station and a Labrador briefly becomes twice its normal size.
- Harlan reaches into the bag and produces a nut. He holds it up to the light and nods with quiet satisfaction.
- Hubert lifts his enormous nose and samples the air with the focused intensity of a professional. Then he goes back to being still.
- Someone's scissors click -- snip snip snip -- with deliberate precision. Every cut matters.
- Harlan looks at the ventriloquist dummy across the room. The dummy does not move. It does not need to.
- A handler at the next station sprays conditioning product and it drifts in a fine mist that catches the light.
- Hubert shifts and his ears redistribute across the floor in a new configuration that is somehow more dramatic.
- The grooming area lights are supplemented by portable rigs. Everyone looks slightly theatrical. The dogs look better than the people.
