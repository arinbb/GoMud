roomid: 2241
zone: Harvest
title: Out on the Weekend
description: >-
  A two-lane highway at dusk, the sky a band of deep orange above the ridge.
  A single <ansi fg="itemname">car</ansi> idles on the shoulder, engine
  ticking, headlights not yet on. The radio inside plays something you almost
  recognize. The <ansi fg="itemname">road</ansi> runs straight to the horizon
  in both directions -- north toward nothing in particular, south back toward
  the ranch. An empty <ansi fg="itemname">coffee cup</ansi> rolls against the
  curb in the wind. The light is the color of loneliness, which is to say it is
  beautiful. There is no one else on the highway. There may not be for miles.
  The sense of going somewhere -- or packing it in and going back -- hangs in
  the air like the last light of the day.
mapsymbol: '1'
maplegend: Out on the Weekend
biome: road
exits:
  ranch:
    roomid: 2240
    mapdirection: south
    exitmessage: You turn the car around and head back to the ranch.
nouns:
  car: >-
    An old pickup, rust at the wheel wells, a sleeping bag in the bed. The
    driver door is open. On the seat: a road atlas, a cassette tape with no
    label, and a harmonica case. The engine is warm. Someone was just here,
    or someone is about to be.
  road: >-
    Two lanes, blacktop, the paint faded to barely-there white. The road goes
    in both directions, equally far, equally nowhere in particular. The feel
    of it is specific: the particular freedom of being between places, when
    you have left but not yet arrived and all the failures that made you leave
    are already getting smaller in the mirror.
  cup: >-
    A paper coffee cup, the kind from a diner, rolling gently back and forth
    in the wind against the asphalt. Lipstick on the rim, or maybe just a
    stain. Someone drove this far and kept going or stopped and got out. The
    cup does not know which.
  radio: >-
    The radio in the idling truck plays a station from somewhere over the ridge.
    Country music, mostly -- the signal drifts, and other voices move in and out
    at the edges. A love song. Weather in another county. A man reading livestock
    prices in a voice like a dial tone. The radio does not discriminate. It
    receives what is there and plays it. That is its whole function.
  ridge: >-
    The ridge runs north-south, dark against the deepening orange of the sky,
    the hills close enough to make the highway feel like it is in a valley rather
    than on a plain. A water tower stands on the highest point, white and specific,
    the name of a town painted on it in letters too small to read from here. The
    ridge is the edge of this world. Beyond it is the world that made you want
    to leave in the first place.
idlemessages:
- The highway is empty in both directions, the kind of empty that feels earned.
- The radio in the parked car plays a song you almost know, fading in and out with the signal.
- The sky deepens from orange to purple at the horizon, stars appearing one at a time.
- Wind moves through the roadside grass in a long sigh.
- Headlights appear far to the north, then disappear around a curve before they ever arrive.
- The engine ticks as it cools, the sound of a car that has been going somewhere for a long time.
- A jackrabbit sits very still at the road edge, watching, deciding.
