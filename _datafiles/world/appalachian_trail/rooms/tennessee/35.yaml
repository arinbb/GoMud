title: Hot Springs, NC Area
description: "The trail descends from the high Smokies border into the French Broad River valley and the tiny town of Hot Springs, North Carolina\x97one of the few places where the Appalachian Trail passes directly through the center of a community. The main street is barely two blocks long, lined with hostels, an outfitter, and a couple of restaurants that cater to hikers. Below town, the French Broad River slides wide and slow past bluffs of exposed rock. Natural hot springs bubble up along the riverbank, their mineral-rich waters steaming in the cool mountain air. The Cherokee knew these springs long before Europeans arrived. During the First World War, the grand Mountain Park Hotel that stood here was converted into an internment camp for German merchant sailors\x97an unlikely prison in these remote mountains."
