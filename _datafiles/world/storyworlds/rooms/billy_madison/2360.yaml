roomid: 2360
zone: Billy Madison
title: Madison Mansion
description: >-
  The Madison family estate sprawls across a manicured New Jersey hillside in
  the aggressively tasteful way that only old money achieves. The <ansi fg="itemname">foyer</ansi>
  is enormous — marble floors, a winding <ansi fg="itemname">staircase</ansi> you could
  film a movie on, and more rooms than anyone actually needs. <ansi fg="itemname">Trophies</ansi>
  and <ansi fg="itemname">plaques</ansi> commemorating the Madison Hotel chain cover the
  walls with the modest pride of a man who is not modest. The whole house smells of
  cleaning products and inherited comfort. To the <ansi fg="exit">north</ansi> is the
  pool. To the <ansi fg="exit">east</ansi> is the elementary school hallway. To the
  <ansi fg="exit">south</ansi> is the kitchen. To the <ansi fg="exit">west</ansi> is
  Frank's office.
