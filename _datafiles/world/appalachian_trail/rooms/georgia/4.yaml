roomid: 4
zone: Georgia
title: Hawk Mountain
description: "The trail climbs steeply through mixed hardwoods toward the summit of Hawk Mountain. The switchbacks grow tighter, the footing rockier, as you gain elevation through oak, hickory, and scattered pine. Rocky outcroppings jut from the mountainside, their gray faces streaked with lichen. Through breaks in the canopy, views begin to open\x97ridgeline after ridgeline rolling southward toward Springer, northward toward the higher peaks ahead. The trail here is narrow and rooty, demanding attention with every step. Hawks ride the thermals above the ridge, giving this mountain its name."
biome: mountains
mapsymbol: H
maplegend: Hawk Mtn
exits:
  south:
