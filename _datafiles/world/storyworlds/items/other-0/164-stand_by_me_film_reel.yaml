name: Stand By Me film reel
namesimple: reel
displayname: a film reel labeled <ansi fg="itemname">Stand By Me</ansi>
description: >-
  A round aluminum canister, worn at the edges, the kind that has traveled.
  The label is handwritten in careful block letters: STAND BY ME -- 1986.
  There is a small photograph taped under the title: four boys walking a
  railroad track into the trees, seen from behind, going south into the
  summer. If you hold the canister to your ear you hear the sound of cicadas
  and the distant horn of a freight train and the crunch of gravel under
  sneakers and something that might be boys laughing, far off, going somewhere
  they cannot come back from. The canister smells of pine resin and hot steel
  and 1959.
