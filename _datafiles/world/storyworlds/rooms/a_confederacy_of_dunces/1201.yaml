nouns:
  streetcar: >-
    A rattling green streetcar with CANAL displayed on its destination sign. It
    sways and clangs its way down the neutral ground with the unhurried authority
    of something that has been doing this longer than anyone can remember and
    intends to continue until the heat death of the universe.
  signs: >-
    Neon signs line Canal Street in gaudy profusion. Jax Beer. Werlein's Music.
    Maison Blanche. Each one buzzing and flickering, turning the sidewalk into a
    carnival of colored light even in daylight. At night they must be magnificent
    and slightly terrifying.
  neutral: >-
    The wide median strip that New Orleanians call the neutral ground, with
    ancient live oaks and iron benches where old men sit in judgment of the
    passing world. The term dates to the early 1800s, when the median on Canal
    Street was the boundary between the French and American sectors of the city.
    Neutral territory. The oaks have outlived everyone who planted them.
spawninfo:
- mobid: 203
  message: 'A patrolman in a ridiculous costume attempts to look inconspicuous, which is impossible.'
  container: ''
idlemessages:
- A streetcar clangs its bell twice and rumbles past, swaying on the rails like a drunk trying to walk a straight line.
- 'A patrolman in what appears to be a matador outfit sidles along the storefronts, trying to arrest someone suspicious and finding only himself.'
- Two nuns pass by, their habits fluttering in the hot breeze from a storm drain.
- 'A man selling pralines from a cart calls out his prices in a musical baritone that could sell anything to anyone.'
- 'The neon signs buzz and flicker, advertising pleasures both refined and otherwise.'
- An old man on a neutral ground bench shakes his head slowly at the state of the world.
