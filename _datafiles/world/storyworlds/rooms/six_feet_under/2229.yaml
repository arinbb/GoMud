title: The Garage
description: >-
  The business end of Fisher and Sons. A long black <ansi fg="itemname">hearse</ansi>
  occupies most of the space -- a late-model Cadillac, polished to a deep shine,
  impeccable. Along the walls, <ansi fg="itemname">flower arrangements</ansi> in
  various states of preparation wait in buckets of water and on shelves, ordered
  from florists and assembled here for services. A <ansi fg="itemname">pegboard</ansi>
  of tools along one wall -- not for the car, for the other work: stretchers,
  gurneys, transfer equipment. The garage smells of floral and car wax and
  underneath that something practical and cold. This is where the machinery
  of death-as-a-business operates, unglamorously and necessarily. The <ansi fg="exit">entrance</ansi> is to the east.
