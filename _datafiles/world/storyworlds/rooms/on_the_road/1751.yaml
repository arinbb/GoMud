roomid: 1751
zone: On the Road
title: The Mexican Border Town
description: >-
  A Mexican border town in 1950 — <ansi fg="itemname">tequila</ansi> for
  fifteen cents a shot, <ansi fg="itemname">girls</ansi> in doorways,
  the smell of dust and cooking meat and something sweet and fermented
  that might be pulque. The streets are unpaved and the buildings are
  low and the <ansi fg="itemname">sky</ansi> above is a blue so deep
  and absolute it looks painted. Dean Moriarty is dissolving here the
  way he always eventually dissolves — the speed turning to fever, the
  joy shading into something less stable, the vast appetite of the man
  turning to consume him from the inside. He has been awake for three
  days. He stands in the street with his shirt open, laughing at nothing,
  and Sal watches him with love and terror in equal measure. This is the
  furthest point. This is where the road bottoms out and the return begins.
  The heat is absolute. To the <ansi fg="exit">north</ansi> the road runs
  back through everything.
