roomid: 1921
zone: Ghostbusters
title: The Street Outside
description: >-
  North Moore Street in Tribeca, Manhattan. The sidewalk outside the firehouse
  is cracked and littered with the detritus of the city: a crushed coffee cup, a
  discarded newspaper whose headline reads "GHOSTS WALK AMONG US -- SCIENTISTS OR
  CHARLATANS?" A <ansi fg="itemname">Ghostbusters sign</ansi> hangs over the bay doors,
  the NO GHOST logo already scratched and weathered as if it has been there for decades.
  Yellow cabs barrel past. A pretzel vendor on the corner seems deeply unbothered by
  everything. To the north you can see the wide steps of the <ansi fg="itemname">New York Public Library</ansi>. The Sedgewick Hotel towers to the east. The art deco spire of <ansi fg="itemname">55 Central Park West</ansi> is visible to the south.
