name: North Carolina
roomid: 30
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: forest
idlemessages:
- The Nantahala mountains roll on in every direction, their flanks cloaked in ancient hardwood and rhododendron so thick it blocks the sky.
- Somewhere below the ridgeline, a stream carves through a gorge so deep the Cherokee called this land Nantahala — the place where the sun only reaches at noon.
- A raven calls from a dead hemlock snag, its voice carrying across the hollow like a pronouncement.
- The smell of galax and rich earth rises from the forest floor, sweet and slightly medicinal.
- Flame azaleas bloom in impossible orange along the trailside, bright against the dark green understory.
- Wind moves through the canopy in long waves, and for a moment you hear what the Cherokee heard — a forest that has been speaking for ten thousand years.
