roomid: 1894
zone: The Monkey Wrench Gang
title: Seldom Seens Houseboat
description: >-
  A <ansi fg="itemname">houseboat</ansi> is moored in a side canyon of <ansi fg="cyan">Lake Powell</ansi>, its hull riding the flat blue water between canyon walls of red and
  orange sandstone. The boat is comfortable rather than luxurious — a canvas awning
  over the rear deck, folding chairs, a battered outboard, fishing rods stowed along
  the rail. In the cabin, the table is set for three with three different styles of
  plate, three different coffee mugs, a vase of artificial flowers. Three place settings
  because <ansi fg="mobname">Seldom Seen Smith</ansi> has three wives — <ansi fg="itemname">Kathy</ansi>
  in Salt Lake City, <ansi fg="itemname">Lola</ansi> in Green River, <ansi fg="itemname">Sheila</ansi>
  in Page — and he loves all of them, and the houseboat belongs to all of them, and
  the table is set for all of them even when none of them is present. The <ansi fg="cyan">lake</ansi>
  around the boat is perfectly still, mirroring the canyon walls. If you look carefully,
  you can see the high-water line on the walls — the old tidemark of the full reservoir,
  above which the rock is clean and red. Below it, the rock is stained. The canyon walls
  remember everything. To the <ansi fg="exit">shore</ansi> to the <ansi fg="exit">west</ansi>,
  the dock leads back to the dam overlook road.
