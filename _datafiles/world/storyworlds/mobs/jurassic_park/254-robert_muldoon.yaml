character:
  name: Robert Muldoon
  description: >-
    A compact, muscular man in his fifties, khaki from head to boot, with
    a game warden's bush hat and a SPAS-12 shotgun loaded with sabot rounds.
    He was the best game warden in Kenya before Hammond recruited him.
    He does not believe in Jurassic Park. He believes in the raptors.
    He is professionally frightened of them, which is the correct response,
    and he never lets the fear show, which is also the correct response.
    He moves the way predators move: economically, without wasted gesture,
    always aware of the nearest exit.
