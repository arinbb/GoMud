nouns:
  border: "A modest brown sign marks the Georgia-North Carolina state line. It is nailed to a white oak at chest height. Below the official marker, thru-hikers have tacked dozens of mementos\x97trail name cards, small flags, photographs sealed in zip-lock bags. One state down."
  mountain: "Standing Indian Mountain rises to the northeast, its summit at 5,499 feet cloaked in spruce and fir. The Cherokee name was Yunwi-tsunsdi, and the warrior-turned-to-stone legend is one of the oldest stories in these mountains. TODO_RESEARCH: Full Cherokee legend of Standing Indian, original Cherokee place names for surrounding peaks."
  forest: "The Nantahala National Forest stretches in every direction, 531,000 acres of Appalachian hardwood, hemlock, and rhododendron. The canopy is dense and layered\x97tulip poplars tower overhead, red oaks fill the middle story, and rhododendron forms an almost impenetrable understory."
  nantahala: "Nantahala is Cherokee for Land of the Noonday Sun. The name refers to the Nantahala Gorge to the north, where the walls are so steep and the forest so thick that direct sunlight only reaches the river at midday. The name has been applied to the entire national forest. TODO_RESEARCH: Cherokee linguistic origins of the word, other Cherokee place names in the area."
  warrior: "According to Cherokee legend, a great winged monster called Ulagu terrorized the mountain villages. A warrior was posted atop the highest peak to keep watch. When the Great Spirit sent lightning to destroy the creature, the bolt also struck the warrior, turning him to stone forever. His silhouette is said to be visible on the summit of Standing Indian Mountain."
  blazes: "The white blazes continue north into the Nantahala range. A fresh blaze on a red oak gleams against the dark bark."
idlemessages:
- A painted trillium nods beside the trail, its three white petals streaked with pink.
- The forest canopy is so thick here that the trail exists in a permanent green twilight.
- A pileated woodpecker hammers a dead hemlock somewhere upslope, the sound echoing through the hollow.
- The air smells of galax and rotting leaves and the faint sweetness of rhododendron.
- A spring seeps from the hillside, crossing the trail in a thin sheet of water over exposed rock.
- Standing Indian Mountain looms to the northeast, its summit hidden in low clouds.
- 'You hear a barred owl calling from the Nantahala forest -- who-cooks-for-you, who-cooks-for-you-all.'
