roomid: 2453
zone: Tass Times in Tonetown
title: The Tonetown Times
description: >-
  The newsroom of the Tonetown Times is organized chaos wearing a press badge.
  <ansi fg="itemname">Reporters</ansi> type furiously at angular workstations,
  their screens showing copy in fonts that have opinions. The <ansi fg="itemname">printing
  press</ansi> at the back wall clatters continuously, ejecting fresh pages with
  mechanical authority. Headlines on a <ansi fg="itemname">pinboard</ansi> behind
  the Editor's desk track the ongoing Snotty crisis in block type: UNTASS SPREADS
  SOUTH. JAM SESSION ATTENDANCE DOWN. EDITOR FURIOUS (CONT. FROM P. 1). The
  <ansi fg="yellow">Editor</ansi> stands at the center of it all, wearing a visor
  and an expression of permanent urgent displeasure. The smell of ink and hot
  paper and deadline fills the air. Downtown is back to the <ansi fg="exit">west</ansi>.
