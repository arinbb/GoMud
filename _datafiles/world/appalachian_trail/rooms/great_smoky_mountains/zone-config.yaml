name: Great Smoky Mountains
roomid: 60
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: mountains
idlemessages:
- The blue haze that gives these mountains their name drifts through the valleys, softening every ridge into watercolor.
- A raven croaks somewhere above the canopy, its call echoing off the ridgeline.
- The smell of balsam fir and damp earth fills your lungs with each breath.
- Wind moves through the spruce trees with a sound like distant water.
- Clouds slide across the ridge, engulfing you briefly in cool white mist before passing on.
- The trail is soft underfoot, a carpet of needles and dark humus built up over centuries.
