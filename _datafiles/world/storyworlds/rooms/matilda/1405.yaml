nouns:
  hedgerows: >-
    Thick, unruly hedgerows border both sides of the road. Birds nest in them
    and occasionally peer out at passing children with what might be sympathy.
    Wild blackberries grow in the tangles, but they taste of something bitter
    this close to the school.
  road: >-
    Cracked and poorly maintained, this road has carried generations of reluctant
    children to Crunchem Hall. The cracks seem to form patterns, and if you look
    closely, someone has chalked tiny encouraging words in some of them.
  school: >-
    Crunchem Hall looms at the road's end, visible even from here -- its dark
    brickwork, its iron fencing, its general atmosphere of organized misery.
    The gates are wide open. They do not need to be locked. Children come
    because the law says they must, and the law has never been countermanded
    by the gate. Miss Trunchbull designed the building herself. It shows.
idlemessages:
- A crow watches from the hedgerow with knowing black eyes, then flies toward the school.
- 'The road ahead seems to grow longer the more you walk. Crunchem Hall draws nearer anyway.'
- 'Chalked words on the pavement read: "Almost there. Be brave."'
- A child's lunchbox lies abandoned in the hedge, as if its owner fled in a hurry.
- 'The wind carries a sound from the direction of the school — it might be a whistle, or a scream.'
