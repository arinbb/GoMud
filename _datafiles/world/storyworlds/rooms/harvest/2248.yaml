roomid: 2248
zone: Harvest
title: Alabama
description: >-
  A Southern landscape, broad and complex. <ansi fg="8">Red clay dirt</ansi>
  under your feet, the road cutting through pine and kudzu. A <ansi fg="itemname">
  courthouse square</ansi> in the distance, white columns in the afternoon
  heat. A <ansi fg="itemname">banjo</ansi> plays from somewhere -- the real
  thing, the instrument that came up from the earth of this place and carries
  all of it, the sweetness and the wound. The air is heavy and humid and
  smells of magnolia and diesel and something older than both. This is not
  simple country. This is the South as <ansi fg="itemname">critique</ansi> --
  Neil Young from Canada looking at America from the outside, which is also
  from inside, because the outside of America is still America. The song is
  angry and beautiful and complicated. The place is angry and beautiful and
  complicated. They are the same song. Lynyrd Skynyrd will answer back. Both
  of them are right.
