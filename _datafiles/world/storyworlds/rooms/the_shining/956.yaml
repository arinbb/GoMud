roomid: 956
zone: The Shining
title: Staff Wing
description: >-
  The grandeur of the hotel drops away behind you as you enter the staff
  corridor. Institutional green <ansi fg="itemname">walls</ansi> line a narrow
  hallway lit by harsh fluorescent <ansi fg="itemname">lights</ansi>, one of
  which flickers in a slow, rhythmic pulse. Supply <ansi fg="itemname">closets</ansi>
  line both sides — cleaning materials, linens, maintenance tools. The floor is
  bare linoleum, scuffed and yellowed. This is the working skeleton of the
  Overlook, stripped of all pretense. The staff quarters feel abandoned
  mid-shift — a mop stands in a bucket of gray water, a uniform hangs from a
  hook, a clipboard with a half-completed checklist lies on a shelf. Exits lead
  <ansi fg="exit">north</ansi> to the lobby, <ansi fg="exit">south</ansi> to the
  Colorado Lounge, and <ansi fg="exit">east</ansi> to the kitchen.
mapsymbol: S
maplegend: Staff Wing
biome: house
