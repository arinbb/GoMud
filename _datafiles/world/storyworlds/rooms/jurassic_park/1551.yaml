nouns:
  gates: >-
    Thirty feet of tropical hardwood banded with iron. The engineering is
    medieval in spirit — massive, blunt, designed to hold back something that
    does not negotiate. You notice the hinges are on the outside. Whatever
    these gates were designed to contain, it was designed to push outward.
  torches: >-
    Iron wall brackets holding torches that burn even in daylight. Hammond's
    idea, you imagine — everything theatrical, everything designed to evoke
    wonder and awe. The flames gutter in the wet jungle breeze.
  platform: >-
    A wooden viewing platform built into the gate structure, with a ladder
    and a safety railing. From up here, visitors could look down at the road
    and the arriving jeeps. The railing is already weathering in the humidity.
  sign: >-
    The carved letters are enormous, each one a foot deep in the hardwood.
    JURASSIC PARK. Below it, smaller: "Where the Mesozoic Era Lives Again."
    Below that, an amber InGen logo. The whole thing radiates Hammond's gift
    for spectacle.
spawninfo:
