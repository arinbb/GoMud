nouns:
  stove: >-
    A gas stove with six burners, older than the renovation around it, kept
    because Ruth will not replace it. She knows every quirk of it -- which
    burner runs hot, how long the oven takes to come up. Something is on it
    right now. The smell of it fills the kitchen and goes upstairs.
  table: >-
    Six chairs around a long wooden table. The surface is worn smooth from
    decades of use. There are rings from cups and marks from where Nate used
    to drum his fingers. The grain of the wood has absorbed years of this family.
    Everything important that has ever happened in this house has happened
    at this table.
  window: >-
    The window above the sink looks out on the back yard -- the flower beds Ruth
    keeps, the old swing set that nobody has taken down, a lemon tree that
    produces more lemons than the family can ever use. Ruth stands at this window
    sometimes and looks at it for a long time.
  refrigerator: >-
    A refrigerator covered in a twenty-year accumulation of magnets -- from
    national parks and airport gift shops and the backs of cereal boxes.
    Photographs held by them: school pictures, Christmas cards, a photo of
    Nathaniel Sr. at a barbecue, laughing, not knowing. Notes in various
    handwritings. A grocery list, half-completed.
