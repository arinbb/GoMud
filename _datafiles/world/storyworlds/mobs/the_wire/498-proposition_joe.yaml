character:
  name: Proposition Joe
  description: >-
    A large, deliberate Black man from the East Side, owner of a TV repair
    shop which is not primarily a TV repair shop. He runs the East Side supply
    chain with diplomatic patience and founded the co-op -- the cooperative
    arrangement between the major drug organizations of Baltimore -- as a
    business solution to violence. He is not a man of violence by preference.
    He is a man of negotiation and supply chains and the proposition, which is
    his preferred form of human interaction. He has survived in this city
    because he understands that the most dangerous thing in any organization
    is being the sole source of something someone else needs.
