roomid: 2320
zone: Siamese Dream
title: Triclops Sound Studios
description: >-
  Atlanta, Georgia. Summer 1993. The air conditioning has been broken for three
  days. The <ansi fg="itemname">control room</ansi> is a cathedral of tape
  machines and outboard gear, every rack unit blinking in the semi-darkness. A
  massive <ansi fg="itemname">mixing board</ansi> stretches the length of the
  room, its faders set to positions that should not work but somehow do. Behind
  the glass, the <ansi fg="itemname">live room</ansi> is a tangle of guitar
  cables, empty coffee cups, and amplifiers arranged in a semicircle like a jury
  deliberating. Reels of two-inch <ansi fg="itemname">tape</ansi> stack against
  the wall in cardboard boxes, each one labeled in Sharpie. The red light is on.
  It is always on here. The <ansi fg="exit">north</ansi> wall shimmers like
  Cherub Rock. <ansi fg="exit">Northeast</ansi> breathes quiet and loud. To the
  <ansi fg="exit">east</ansi>, impossible sunshine. <ansi fg="exit">Southeast</ansi>
  drones and stretches. <ansi fg="exit">South</ansi> floats in zero gravity. <ansi fg="exit">Southwest</ansi> rings with acoustic wood. <ansi fg="exit">West</ansi>
  builds from nothing. <ansi fg="exit">Northwest</ansi> burns with speed. <ansi fg="exit">Up</ansi>, clouds of guitar. <ansi fg="exit">Down</ansi>, a boy and
  the stars.
