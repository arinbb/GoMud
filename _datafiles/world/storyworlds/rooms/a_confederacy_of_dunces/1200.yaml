  message: 'A large man in a green hunting cap glares at the passing crowd with magnificent disdain.'
  container: ''
idlemessages:
- A shoe-shine boy works the sidewalk, his rag snapping rhythmically against leather.
- 'The large man in the green hunting cap consults his Big Chief tablet, mutters something about Fortuna, and adjusts his earflaps.'
- A Lucky Dog vendor pushes his cart past, the smell of processed meat trailing behind him like a guilty conscience.
- 'The D.H. Holmes clock ticks steadily overhead, marking time in a city that has never been in any particular hurry.'
- 'A woman in a floral dress emerges from the department store carrying hat boxes, her heels clicking sharply on the sidewalk.'
- The air shimmers above the pavement. Everything looks slightly unreal in the heat haze.
