nouns:
  armchair: >-
    Every armchair in the lobby has a dog in it or evidence of a recent dog.
    The hotel staff made peace with this arrangement sometime last year. The
    armchairs are not damaged. The dogs have excellent manners. This is a
    dog-show hotel. Everyone knew what they were signing up for.
  desk: >-
    Dale at the front desk has worked here eleven years and has never before
    experienced a weekend like this one. His face shows professional composure
    doing a significant amount of work. Behind him the key rack is full. Every
    room is occupied by someone with a dog.
  crate: >-
    The travel crate is custom-fitted, ventilated, and lined with what appears
    to be memory foam. Inside, a Standard Poodle called Rhapsody in White sits
    in perfect stillness, not sleeping, simply waiting. She is ready. She has
    been ready for two weeks. She is waiting for everyone else to catch up.
spawninfo:
- mobid: 545
  message: '<ansi fg="8">Scott Donlan arrives in the lobby carrying a clipboard and an expression of complete professional focus. He finds the corner table, sets down the clipboard, and begins organizing tomorrow''s timeline with the thoroughness of a man for whom nothing is left to chance.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- A Norwich Terrier trots across the lobby tile and disappears under an armchair.
- Dale at the front desk answers the phone and says, without being asked, 'Yes, we do allow dogs.'
- A woman in a trim blazer walks past carrying a poodle under one arm and a grooming case under the other.
- Two handlers compare conditioning spray recommendations in low, serious voices. Nobody else uses this much spray.
- A Bloodhound lumbers through the lobby with solemn purpose. Where it is going, it is not saying.
- The elevator opens. A man steps out carrying a show lead, a grooming box, and an expression of controlled determination.
- Scott Donlan makes a small notation on the clipboard. He was already ready. This note confirms it.
- A dog being walked to the elevator turns its head and makes eye contact with you. This dog has competed before. This dog knows things.
