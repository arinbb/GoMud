roomid: 7
zone: Georgia
title: Blood Mountain Summit
description: "You stand at the summit of Blood Mountain\x974,461 feet above sea level, the highest point on the Appalachian Trail in Georgia. The rocky summit opens into a panoramic wilderness amphitheater, the Blue Ridge stretching in every direction in wave after wave of blue-green ridgeline. The CCC-built stone shelter, constructed in the 1930s by Civilian Conservation Corps workers, hunkers against the wind\x97a squat, rugged structure of native stone with a heavy wooden door. A bronze plaque commemorates the trail builders. Scattered cairns mark the path across the exposed rock. The name Blood Mountain comes from a legendary battle between the Cherokee and Creek nations, fought on these very slopes. Wind rakes across the summit, and in winter, ice and rime coat every surface. This is wild, exposed country\x97beautiful and unforgiving."
