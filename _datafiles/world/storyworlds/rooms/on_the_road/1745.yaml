roomid: 1745
zone: On the Road
title: Dean's Denver Apartment
description: >-
  Dean Moriarty's Denver apartment, and "apartment" is generous. It is a
  room with a <ansi fg="itemname">mattress</ansi> on the floor, a <ansi fg="itemname">crate</ansi>
  serving as a table, two empty wine bottles, and the residue of more
  human activity than the space can reasonably contain. The <ansi fg="itemname">walls</ansi>
  are so thin you can hear the next-door neighbor's radio and his
  arguments and his silences. Outside the window, several <ansi fg="itemname">cars</ansi>
  are parked whose ownership is ambiguous at best. Dean has been here for
  six weeks and has already lived a novel's worth of life in this room.
  He conducts his relationships with the focused attention of someone who
  believes that human experience, all of it, is holy, and he does not
  have time to be careful because there is too much of it and it is all
  happening right now. To the <ansi fg="exit">north</ansi> is Larimer Street.
mapsymbol: d
