roomid: 618
zone: Beetlejuice
title: The Graveyard
description: >-
  An old New England cemetery stretches behind the Maitland house, enclosed by
  a rusted iron <ansi fg="itemname">gate</ansi> draped in dead ivy. Weathered <ansi fg="itemname">headstones</ansi> lean at drunken angles among overgrown
  grass and ancient <ansi fg="itemname">trees</ansi> -- oaks and elms whose
  branches interlock overhead like skeletal fingers, filtering the light into
  pale shafts. <ansi fg="itemname">Moss</ansi> covers everything in a soft green
  shroud. Fog clings to the ground in patches, pooling around the bases of
  stones and filling the low spots between graves. Near the back of the cemetery,
  one headstone stands apart from the rest -- larger, slightly crooked, carved
  from dark granite. The name on it is hard to read from here, but it seems to
  pull at your attention like a whisper. The cemetery is quiet in the way that
  only places full of the dead can be quiet -- not silent, but holding its breath.
mapsymbol: +
maplegend: Graveyard
biome: forest
exits:
  west:
    roomid: 602
    exitmessage: You follow the path back around the house to the front yard.
  south:
    roomid: 601
    exitmessage: You pass through the iron gate and head downhill toward Main Street.
nouns:
  headstones: >-
    The headstones span two centuries of Winter River's dead. Names and dates
    worn smooth by weather and time. Beloved wives, departed husbands, children
    taken too soon. Some stones have fresh flowers; most have only moss and
    lichen. The larger stone in the back bears a name you have to lean close to
    read: BETELGEUSE. No dates. No epitaph. Just the name, carved deep into dark
    granite, as if the stone itself is afraid to forget it.
  betelgeuse: >-
    The Betelgeuse headstone is wrong. Not just the name -- everything about it.
    The granite is darker than the other stones, almost black. The letters are
    carved deep, as if clawed rather than chiseled. There are no dates, no
    "beloved" or "rest in peace." Just the name: BETELGEUSE. The grass around
    the base is dead in a perfect circle. Flies buzz around it even when there
    are none elsewhere. And if you listen closely -- very closely -- you can
    hear something underneath the stone. Breathing. Or laughing. It's hard to
    tell the difference.
  gate: >-
    The cemetery gate is wrought iron, rusted to a deep orange-brown. It hangs
    slightly open on one hinge, swaying in breezes that don't seem to exist. The
    ironwork at the top is shaped into a pattern -- crosses and hourglasses, the
    traditional symbols of mortality. One of the hourglasses appears to have
    actual sand running through it, though that's impossible. Isn't it?
  trees: >-
    The cemetery trees are ancient New England hardwoods -- oaks and elms that
    were old when the first stones were planted here. Their roots push up
    through the soil and over grave markers, as if the trees are slowly
    reclaiming the dead. Knotholes in the bark look unsettlingly like faces. One
    tree has a low branch from which a frayed rope hangs, swaying.
  moss: >-
    Thick green moss blankets the headstones, the ground, the base of the trees.
    It softens every edge and muffles every footstep. The moss is cool to the
    touch and slightly damp even on dry days. In some places, it grows in
    patterns that look almost deliberate -- spirals and whorls that suggest
    something growing according to a plan that isn't nature's.
idlemessages:
- Fog rolls between the headstones, thickening and thinning like breathing.
- A crow lands on the Betelgeuse headstone, cocks its head, and stares at you with one bright eye before flying away.
- The iron gate creaks on its hinge, swinging open slightly wider. Nobody pushed it.
- You hear a sound from beneath the Betelgeuse stone. It could be the wind in a hollow space. It could be giggling.
- A leaf falls from one of the old oaks and lands on a headstone, perfectly centered, like an offering.
- The fog near the back of the cemetery glows faintly green for a moment, then fades to grey.
