character:
  name: the Narrator
  description: >-
    A man in his thirties, wearing a corduroy jacket over a dark shirt,
    loafers, the look of someone who has been sitting at this desk for
    a long time. He is writing something. Or he has finished writing
    something and is sitting with it. He has the face of the boy in the
    treehouse, older, the same eyes, the same quality of watching and
    taking in more than he shows. He is looking back, which is the only
    direction that does not lie.
