character:
  name: Frank Reynolds
  description: >-
    A short, round man of late middle age with the face of someone who has
    chosen chaos as a lifestyle and never looked back. He is dressed in a
    way that suggests he owns excellent suits but rarely bothers with them.
    His eyes have the bright, calculating gleam of a man who has made and
    lost several fortunes and regards both experiences as equally entertaining.
    He is worth many millions of dollars. He lives in a one-room apartment
    with Charlie Kelly and sleeps on a pullout couch by choice. He has an egg
    somewhere on his person at all times. The egg is not to be questioned.
