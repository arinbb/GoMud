roomid: 36
zone: Tennessee
title: Max Patch / Spring Mountain Area
description: "North of Hot Springs, the trail climbs steadily through hardwood forest and emerges onto Max Patch\x97a high grassy bald that is one of the most iconic spots on the entire Appalachian Trail. The summit is a broad dome of grass at 4,629 feet, treeless and wind-swept, offering unobstructed views in every direction: the Great Smokies to the south, the Black Mountains to the east, wave after wave of Appalachian ridges fading into blue distance. The grass is close-cropped and soft underfoot, rippling in the wind like a green ocean. This was once farmland\x97cattle grazed here for generations\x97and the Forest Service maintains the bald by periodic mowing. Overuse has forced the closure of camping on the summit; day-use only now, a victim of its own beauty. Beyond Max Patch, the trail descends through dense forest toward the remote valleys of western North Carolina."
