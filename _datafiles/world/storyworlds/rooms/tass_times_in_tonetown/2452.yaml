roomid: 2452
zone: Tass Times in Tonetown
title: Downtown Tonetown
description: >-
  Tonetown's downtown is an argument between every visual idea that ever existed,
  and every visual idea is winning. <ansi fg="magenta">Neon signs</ansi> stack
  six deep on buildings that have no right angles -- each facade a different
  color, each window a different shape, every surface competing for the title
  of Most Deliberately Itself. Citizens move through the streets in <ansi
  fg="itemname">outfits</ansi> assembled from fashion's most extreme experiments:
  angular shoulders, asymmetric hemlines, hair sculpted into shapes that defy
  gravity and good sense. They walk with the purposeful stride of people who
  know they are being watched and approve. A <ansi fg="itemname">newsstand</ansi>
  displays the <ansi fg="yellow">Tonetown Times</ansi> in fresh stacks. The air
  hums with synthesizer music and social judgment. To the north is the hoop
  passage. East leads to the newspaper. West leads to Ennios. South opens onto
  <ansi fg="magenta">Tass Avenue</ansi>.
