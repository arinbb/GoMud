roomid: 1201
zone: A Confederacy of Dunces
title: Canal Street
description: >-
  Canal Street stretches wide and loud in both directions, the grandest
  boulevard in New Orleans and possibly the most chaotic. <ansi fg="itemname">Streetcars</ansi>
  rattle down the center on iron rails, their bells clanging at pedestrians who
  cross with the serene fatalism of people who have accepted that fate, not
  traffic lights, determines survival. <ansi fg="itemname">Neon signs</ansi>
  advertise Jax Beer, Werlein's Music, and Maison Blanche. The wide <ansi fg="itemname">neutral ground</ansi> -- what the rest of the world calls
  a median -- divides the street with live oaks and iron benches where old men
  sit and watch the world fail to improve. Businessmen, tourists, musicians,
  nuns, and at least one patrolman in a ridiculous costume hurry past in every
  direction. <ansi fg="exit">West</ansi> leads back to D.H. Holmes. <ansi fg="exit">East</ansi> leads toward the French Quarter. <ansi fg="exit">North</ansi> leads to the Prytania Theater.
