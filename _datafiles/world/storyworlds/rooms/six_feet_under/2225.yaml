idlemessages:
- Ruth moves between the stove and the counter with the efficiency of someone who has done this ten thousand times. She is not thinking about what she is doing.
- Something on the stove smells extraordinary -- garlic, something browning, something slow.
- Nate sits at the table with a cup of coffee going cold in front of him and stares at the window.
- The refrigerator hums. The magnets hold. The photographs are still there.
- A chair scrapes back from the table. Someone stands up and goes somewhere. The argument is not over.
- The kitchen is warm when the rest of the house is not. Ruth keeps it warm. This is not an accident.
- Sunlight comes through the window above the sink and falls across the table in a yellow stripe.
- Someone opens the refrigerator and closes it without taking anything. They were not looking for food.