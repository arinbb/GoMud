roomid: 64
zone: Great Smoky Mountains
title: Newfound Gap / Charlie's Bunion
description: "The trail descends from Kuwohi to Newfound Gap, where US 441 crosses the Smokies ridge at 5,046 feet\x97the only road through the park. A stone terrace marks the spot where President Franklin Roosevelt dedicated Great Smoky Mountains National Park on September 2, 1940, and the Rockefeller Memorial honors the five million dollar donation from the Laura Spelman Rockefeller Memorial Fund that helped purchase the land from logging companies and private owners. Unlike the great western parks carved from federal land, every acre of the Smokies was bought. North of the gap, the trail climbs through magnificent spruce forest to Charlie's Bunion, a spectacular rocky outcrop named in one of the AT's best stories: in the 1920s, hiker Charlie Conner showed his sore foot to Horace Kephart, the writer and park advocate, who declared it looked just like a bunion on the rock formation above. Kephart vowed to get the name on a government map. He did."
