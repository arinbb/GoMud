description: >-
  A compact carrying case containing five lightweight AR visors, each
  with a different colored tint. Together they form a complete interpretive
  system for the Appalachian Trail. Use 'visor' to see status, 'visor all'
  to enable all overlays, 'visor none' to disable all. Individual visors
  can be toggled with 'visor history', 'visor plants', 'visor animals',
  'visor trail', or 'visor geology'.
