roomid: 2346
zone: Best in Show
title: The Flecks Station Wagon
description: >-
  The interior of a station wagon from Shakey Hills, Ohio. The rear seat is
  folded down and a <ansi fg="itemname">travel crate</ansi> is strapped in where
  it belongs, lined with a familiar-smelling blanket. In the crate,
  <ansi fg="itemname">Winky</ansi> the Norwich Terrier sits with his ears fully
  deployed, watching the parking lot through the window with the focused attention
  of a dog that knows something is happening and is ready for whatever it is. The
  front seat holds a <ansi fg="itemname">fly-fishing catalog</ansi> open to a page
  with three circled photographs, a thermos with a sticker of a trout on it, and a
  pair of <ansi fg="itemname">left shoes</ansi> -- both of them left, both of them
  for the left foot -- tucked under the passenger seat. The car smells like dog
  shampoo and something warm and midwestern and fine. The <ansi fg="exit">parking lot</ansi>
  is south.
