    - ["#1 say Sir -- or madam -- will you permit me to address you? I am a Titular Councillor. Or I was. These things change."]
    - ["#1 say My name is Marmeladov. Semyon Zakharovich Marmeladov. I was in the civil service. I had a coat with all its buttons.", "#1 emote straightens with the dignity of a remembered self."]
    - ["#1 say I drink. I admit this freely. Not because it is pleasant -- although it is -- but because I have already fallen and have nothing further to lose by it."]
    - ["#1 emote weeps briefly and theatrically, then recovers.", "#1 say My daughter -- my Sonya -- she works. You understand what I mean by works. She does this so that we may eat."]
    - ["#1 say And I take her money. I take it and I drink it. Is that not magnificent? Is that not the purest expression of human wretchedness available?"]
