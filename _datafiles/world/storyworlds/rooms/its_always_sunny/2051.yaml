spawninfo:
- mobid: 446
  message: 'The Lawyer enters carrying a briefcase and the weight of his choices, looks around, and takes his seat.'
  respawnrate: 6 real minutes
nouns:
  judge: >-
    The judge has been on the bench for twenty-two years and has seen most
    of what Philadelphia has to offer. What the Gang has added to his
    professional experience is something he does not discuss at bar association
    dinners. He has developed a twitch. The twitch appeared after the Gang's
    third appearance in his courtroom. He is aware of the origin. He cannot
    stop the twitch.
  benches: >-
    The gallery benches hold the audience of justice — people waiting their
    turn, people with nothing better to do, people who have wandered in from
    the street because courtrooms are free entertainment. The bench in the
    second row has something scratched into it: 'GANG WONT WIN.' Below it,
    in different scratching: 'GANG ALWAYS WINS (TECHNICALLY).'
  papers: >-
    The Lawyer's stack of papers at the counsel table is several inches thick.
    The top document appears to be a motion. The motion's title contains the
    phrase "which is not how any of this works." He has filed this before. He
    will file it again. The court has become familiar with it.
idlemessages:
- The Lawyer opens his briefcase, looks inside, closes it again without taking anything out. He is gathering himself.
- 'The bailiff announces the next case. There is a pause. From somewhere behind the gallery doors: the sound of an argument about whether this counts as self-representation.'
- 'The judge rubs his eyes briefly. The twitch fires once. He continues. This is his life now.'
- A legal brief falls off The Lawyer's stack and spreads across the floor. He picks it up page by page. His face shows nothing. He has learned not to show anything.
- 'From the hallway outside: the unmistakable sound of someone explaining their own legal theory loudly and incorrectly. The bailiff does not move. He knows.'
- The court stenographer types with the blank professionalism of someone who has signed several forms about confidentiality and intends to honor them all.
