title: Nantahala Outdoor Center / Wesser
description: "The trail descends steeply from the ridgeline into the Nantahala Gorge, dropping nearly 3,000 feet to the river at Wesser, North Carolina. The Nantahala Outdoor Center sits at the confluence of the Nantahala River and the AT, a sprawling outfitter complex that has served paddlers and hikers since 1972. The whitewater here is some of the best in the Southeast\x97the river drops through Class III rapids in a gorge so deep the Cherokee named it for the noonday sun. But the NOC sits on ground that carries heavier history. This is where the Trail of Tears crossed the mountains. In 1838, Cherokee families were forced through this gorge on the march to Oklahoma. A commemorative plaque near the river marks the crossing point where two American trails\x97one of recreation, one of removal\x97intersect."
