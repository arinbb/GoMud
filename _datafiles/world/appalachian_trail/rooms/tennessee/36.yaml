nouns:
  bald: "Max Patch is a grassy bald\x97a treeless mountaintop covered in grass and wildflowers. No one is entirely certain why the Appalachian balds exist. Some were cleared for grazing, but others predate European settlement. They are slowly being reclaimed by the forest and require active maintenance to keep open."
  views: "The 360-degree panorama from the summit is staggering. To the south, the dark mass of the Great Smokies. To the east, the Black Mountains including Mount Mitchell, the highest peak east of the Mississippi. North and west, ridge after ridge of the southern Appalachians, blue and hazy and seemingly infinite."
  grass: "The grass on Max Patch is close-cropped and soft, rippling in the constant summit wind. Wildflowers dot the slopes in season\x97flame azalea, hawkweed, buttercup. In autumn, the surrounding forest blazes with color while the bald remains a quiet green dome above it all."
  sign: "A Forest Service sign at the summit reads: DAY USE ONLY. NO CAMPING. The closure came after years of overuse\x97too many hikers, too many campfires, too much erosion on the fragile bald."
  blazes: "White blazes cross the open bald, painted on short wooden posts driven into the ground where there are no trees to mark."
idlemessages:
- Wind sweeps across the open bald, bending the grass in long silver waves.
- A hawk rides a thermal above Max Patch, circling higher and higher until it is just a speck.
- The views from the summit are almost overwhelming\x97mountains in every direction, fading to blue.
- A group of day-hikers sits in the grass near the summit, eating lunch and pointing at distant peaks.
- Butterflies drift across the bald, carried on the constant breeze.
- The grass rustles softly underfoot, dry and warm in the mountain sun.
