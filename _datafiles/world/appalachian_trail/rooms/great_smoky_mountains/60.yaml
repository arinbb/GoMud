roomid: 60
zone: Great Smoky Mountains
title: Entering the Smokies / Fontana Dam North
description: "You cross the top of Fontana Dam\x97480 feet of concrete holding back the Little Tennessee River\x97and step into the Great Smoky Mountains National Park. A sign marks the boundary, weathered but legible. Beyond it the trail climbs steeply through a hardwood forest that feels older and wilder than anything you have walked through before. The air changes immediately\x97cooler, damper, heavy with the smell of moss and decaying wood. This is the most visited national park in America, but the AT corridor through it feels remote and primal. The famous blue haze drifts through the hollows, a natural fog the Cherokee called Shaconage\x97place of blue smoke. You will need a permit and reservations for the shelters ahead. There is no stealth camping in the Smokies."
biome: mountains
mapsymbol: F
maplegend: Fontana/Park Entry
