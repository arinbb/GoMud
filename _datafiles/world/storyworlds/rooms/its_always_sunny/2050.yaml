roomid: 2050
zone: its_always_sunny
title: The Waitress Apartment
description: >-
  The Waitress's apartment is not fancy but it is hers, which is precisely
  what makes its condition so alarming. She is not home. She has not been
  home for a while, judging by the mail under the door. And yet things are
  slightly off — a window that should be locked is not locked, a refrigerator
  magnet in a slightly different position than the indent in the fridge door
  suggests, a faint smell of cat food that the Waitress does not own a cat. <ansi fg="itemname">Extra locks</ansi> have been installed on the door,
  too many of them, in a hardware pattern that suggests escalation over time.
  A <ansi fg="itemname">notepad</ansi> near the phone has the top sheet torn off.
  The impressions of the last writing remain. Someone has been here. Someone
  is always somehow here. To the <ansi fg="exit">south</ansi> is the street.
