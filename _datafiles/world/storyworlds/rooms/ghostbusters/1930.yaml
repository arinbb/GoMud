idlemessages:
- Lightning splits the sky and the building absorbs it without flinching, channeling it down into the iron lattice.
- The wind up here is wrong -- it blows in multiple directions simultaneously, as if the air can't decide which dimension it belongs to.
- The dimensional membrane overhead ripples like water touched by a stone dropped from very high up.
- Gozer regards the city below with the expression of someone looking at a menu.
- The stone of the altar hums with accumulated energy. It is hot enough now to be uncomfortable near.
- From somewhere in the building far below, the Ghostbusters' proton packs are charging. You can feel it in your back teeth.
- The orange light in the sky intensifies. Something very large is forming on the other side of the membrane.
