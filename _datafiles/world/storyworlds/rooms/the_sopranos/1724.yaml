roomid: 1724
zone: The Sopranos
title: The Backyard Pool
description: >-
  A generous <ansi fg="12">in-ground pool</ansi> glitters in the New Jersey sun,
  surrounded by <ansi fg="itemname">flagstone</ansi> and a neat row of <ansi fg="itemname">deck chairs</ansi>. The <ansi fg="itemname">water</ansi> is
  immaculate, chemically perfect, a maintained blue that does not occur in nature.
  The yard is beautiful in a way that feels <ansi fg="8">melancholy</ansi> — too
  quiet, too still, too carefully maintained. There are no ducks here now. But
  something in the quality of the light over the water, the particular stillness
  of the yard, suggests they were here once. That this was once a different kind
  of morning. The <ansi fg="exit">kitchen</ansi> is through the back door.
