roomid: 5
zone: The Grand Library
title: The Mezzanine Reading Lounge
description: >-
  A warm, elevated alcove overlooking the Grand Atrium below. Overstuffed leather
  armchairs and reading lamps surround low tables stacked with curiosities -- a
  brass <ansi fg="itemname">orrery</ansi> that slowly rotates, a crystal <ansi fg="itemname">snow globe</ansi> containing a tiny castle, and a <ansi fg="itemname">compass</ansi> whose needle spins lazily, never quite
  settling on north. The wrought-iron railing offers a view down into the atrium
  where visitors come and go. A crackling <ansi fg="itemname">fireplace</ansi>
  warms the space, and a shelf of <ansi fg="itemname">curiosities</ansi> holds
  strange objects collected from the worlds within.
mapsymbol: M
maplegend: Mezzanine
biome: house
exits:
  down:
    roomid: 1
nouns:
  orrery: >-
    A beautiful brass orrery depicting not our solar system but something else
    entirely -- worlds orbit a central light, each one etched with tiny scenes.
    You recognize some of them from famous stories.
  globe: >-
    The crystal snow globe contains a perfect miniature castle atop a hill. When
    you shake it, snow swirls inside, and you swear you can hear faint music
    playing from within.
  compass: >-
    The compass is made of dark iron and its face is etched with words instead
    of cardinal directions: "Wonder," "Danger," "Mystery," and "Home." The
    needle drifts between them as if sensing what you seek.
  fireplace: >-
    The fireplace burns with a warm, steady flame that never seems to need
    tending. The fire crackles contentedly, and occasionally you see shapes in
    the flames -- a ship, a dragon, a city skyline.
  curiosities: >-
    The curiosity shelf holds objects that have found their way back from the
    story worlds: a golden ring, a battered leather hat, a glass slipper, a
    small blue police box (how did that fit on a shelf?), a lightsaber hilt.
    Each one hums with residual narrative energy.
idlemessages:
- The orrery clicks softly as its tiny worlds continue their slow orbit.
- Flames in the fireplace momentarily take the shape of a galloping horse before collapsing into embers.
- The compass needle swings toward "Wonder" and holds for a long moment before drifting again.
- From the atrium below, you hear the Librarian greeting a new visitor.
- The snow globe on the table shimmers, and for a moment you hear tiny bells ringing inside it.
