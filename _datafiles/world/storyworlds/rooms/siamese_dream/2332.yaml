idlemessages:
- A guitar harmonic shimmers and fades, the next one arriving before the memory of the last one is gone.
- Moonlight on the floor, cool and silver, the light of the last track on the last record you needed this badly.
- The air after the storm -- clean, everything washed, the particular peace of having come through something.
- This is where the album ends. Not with a bang, not with resolution. With moonlight. With quiet. With this.
- 'A harmonic rises from somewhere in the floor -- not played, just present, like a thought you cannot place.'
- The moon is the same moon that was there during all the sessions, all the dysfunction, all the beauty. It stayed.
nouns:
  moon: >-
    Full and close, filling the window with silver light. The moon does not
    know or care about the dysfunction in the Atlanta studio, the broken air
    conditioning, the nearly destroyed band, the record that almost did not
    happen. The moon was there for all of it and is here now at the end. The
    moon is the perspective that makes the whole record make sense: from
    sufficient distance, all of it -- the pain, the beauty, the genius, the
    cost -- resolves into something luminous.
  harmonics: >-
    Guitar harmonics in the air at ground level, shimmering like bioluminescence,
    each one the overtone of a chord played elsewhere. You can walk through
    them. They part for you and close again behind you, the frequencies
    recombining. These are the highest partials of the Big Muff sound, the
    part that would be lost in louder rooms. Here, in the quiet, they are
    everything.
  floor: >-
    The floor reflects moonlight. It is slightly luminous on its own --
    a residual glow from the harmonics collected at ground level. Cool and
    smooth. You could lie down here. Some people do. The album is over.
    There is no hurry now.
