idlemessages:
- The pub fire crackles and shifts, sending a brief shower of sparks up the flue.
- Someone at the bar laughs at something the barman says — a full, uncomplicated laugh.
- The smell of woodsmoke and beer and warm bodies is almost disorienting after the Trefoile house.
- The waitress moves between tables, touching the brooch at her collar absently as she passes.
- Alan Glentower sits at his corner table, watching the door with the focused attention of a man expecting someone.
- The darts thud into the board on the far wall. Someone shouts something encouraging.
- Everything here has colour. Red barstools. Amber beer. Warm yellow light. It feels extraordinary.
