nouns:
  sign: "A small brown sign nailed to a tulip poplar reads GA/NC in faded white letters. Below it, someone has scratched the mileage into the wood with a pocket knife. It is an unceremonious marker for such a meaningful boundary."
  gap: "Bly Gap is a saddle between two ridges, the trail dipping into a shallow depression before climbing again. The forest is thick on both sides, closing in around the narrow path. An old stone wall, remnant of a long-gone homestead, runs perpendicular to the trail."
  blazes: "The white blazes continue northward, steady and reliable, leading toward North Carolina and the higher mountains beyond."
  ridge: "The final Georgia ridgelines roll away to the south, blue-green and hazy in the distance. Ahead, the mountains grow taller and more rugged as the trail enters the Nantahala range."
idlemessages:
- The trail rolls through one last gap, the terrain easing slightly before the border.
- A spring peeper calls from a wet hollow beside the trail, its voice impossibly loud for its size.
- Mountain laurel crowds the trailside, its twisted branches reaching across the path.
- The forest feels different here, somehow wilder, as if it knows the border is near.
- A faded blaze on a gnarled oak points the way north toward North Carolina.
- Wind moves through the canopy in long, slow waves, carrying the smell of fresh earth and green things growing.
- You catch a glimpse of higher peaks to the north through a gap in the trees, the mountains of North Carolina rising blue and distant.
