roomid: 1566
zone: Jurassic Park
title: The Raptor Pen
description: >-
  The exterior viewing area of the Velociraptor paddock is a raised platform
  of treated timber, overlooking the pen through a heavy chainlink barrier.
  The pen itself is not impressive to look at — a concrete-floored enclosure,
  trees trimmed back from the fence line, the ground churned by heavy use.
  The raptors are not visible. They are almost never visible. This is the thing
  Muldoon knows that the others don't fully understand: the raptors are always
  there, always watching, always thinking several steps ahead. The <ansi fg="itemname">fence</ansi>
  hums with ten thousand volts. The <ansi fg="itemname">feeding door</antml>
  at the far end of the pen is a reinforced steel hatch with a hydraulic
  mechanism — the one the raptors have been systematically studying. <ansi fg="red">Three
  of them.</ansi> There are three of them. The <ansi fg="exit">path</ansi>
  leads back east toward the main gates.
mapsymbol: R
maplegend: Raptor Pen
biome: land
