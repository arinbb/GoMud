roomid: 709
zone: Tennessee
title: No Business Knob Shelter
description: "No Business Knob Shelter sits in a remote hollow on the flanks of No Business Knob\x97known to the Cherokee as Nonahala, a place where people were not meant to go. The three-sided shelter sleeps six and feels every bit as remote as its name suggests. Dense spruce and rhododendron press in on all sides, and the nearest road access is miles away. A small spring seeps from the mountainside below the shelter, sometimes reliable, sometimes not. The forest is dark and old here, the spruce trunks thick with moss and lichen. Sound carries strangely in these hollows\x97sometimes you hear voices or footsteps that belong to no one. A bear box and privy serve the site. A trail register hangs from the front post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 37
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A small, remote shelter surrounded by dark spruce forest. The logs are green with moss. It feels like the edge of the world."
  platform: "The sleeping platform holds six. The wood is perpetually damp in this shaded hollow."
  register: "A trail register hangs in its bag, the pages wrinkled with moisture. The entries here have a contemplative quality\x97this place makes people think."
  spring: "A seep spring oozes from the mountainside below the shelter. In wet weather it flows; in dry weather it barely drips. Carry water from the last reliable source."
  nonahala: "Nonahala\x97the Cherokee name for this place. Not Business. A place where people were not meant to go. Whether this was about the terrain, the spirits, or the sheer remoteness, no one knows. The forest agrees with the sentiment."
  privy: "A privy barely visible in the dark spruce forest."
  bearbox: "A bear box sitting in a small gap between spruce trunks."
idlemessages:
- The spruce forest is unnervingly quiet. No birdsong, no wind. Just silence.
- Moss hangs from the spruce branches like green curtains, dripping with moisture.
- A sound like footsteps comes from the forest. But no one is there.
- The hollow amplifies small sounds\x97a dripping spring, a creaking branch\x97into something larger.
- No Business Knob looms above, its summit lost in cloud and dark timber.
- The remoteness here is palpable. The nearest road feels like it belongs to another world.
