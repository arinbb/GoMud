nouns:
  plaque: >-
    A carved wooden plaque, the lettering deep and emphatic: WATCH AND PRAY.
    The wood is old and dark with handling. This has been in this house a very
    long time. Watching and praying is what happens here. Whatever the opposite
    is, it does not happen here.
  cards: >-
    A row of small devotional cards pinned to the plasterwork — reproductions of
    religious paintings, each one featuring a scene of suffering or supplication.
    They form a kind of gallery. No one has dusted them recently.
  doors: >-
    Three doors open off the landing. The one to the south is closed, its handle
    fitted with a key lock. The others stand slightly ajar — just enough to see
    that the rooms beyond are dim.
spawninfo: []
idlemessages:
- The floorboards creak under your weight with a sound that carries in all directions.
- The WATCH AND PRAY plaque catches the dim light with wooden authority.
- A draught from under one of the doors moves the devotional cards on the plasterwork.
- The sound from the chapel below rises, muffled but insistent, through the floorboards.
- The landing is very narrow. Two people could not pass here without one pressing against the wall.
- One of the doors to the south is fitted with a key lock. The key is not on the outside.
- The smell of old wood and lavender is very strong up here. Someone has placed sachets in every room.
