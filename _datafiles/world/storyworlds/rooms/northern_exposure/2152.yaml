roomid: 2152
zone: Northern Exposure
title: Joels Cabin
description: >-
  Dr. Joel Fleischman lives in a one-room <ansi fg="8">log cabin</ansi> that he
  considers an injustice and has made, without noticing, into a home. <ansi fg="itemname">New York</ansi>
  posters on the log walls: the Met, the Village, a subway map with certain
  lines highlighted that Joel has looked at so many times he can walk them in
  his sleep. A <ansi fg="itemname">bookshelf</ansi> holds both medical texts
  and a growing collection of Alaska natural history that he did not intend
  to acquire. A <ansi fg="itemname">desk</ansi> holds letters to New York
  people who are receding, slowly, into the medium distance of his life.
  A <ansi fg="itemname">coat hook</ansi> bears a parka that fits him now,
  after two winters, in the way a parka has to fit -- worn in, adapted to.
  The <ansi fg="itemname">window</ansi> looks toward the mountains and the
  spruce line and not Manhattan, which is the point. To the <ansi fg="exit">east</ansi>,
  Joels office.
