roomid: 1703
zone: Blonde on Blonde
title: The Chelsea Hotel
description: >-
  A hotel room whose number keeps shifting -- 211, 311, 511, the digits
  rearranging themselves on the brass plate whenever you look away. The
  Chelsea Hotel, West 23rd Street, Manhattan, 1966. The <ansi fg="itemname">bed</ansi> is
  simultaneously made and unmade, the sheets crisp and tangled at once, as
  if two versions of the room are occupying the same space. A
  <ansi fg="itemname">typewriter</ansi> sits on the desk, a sheet of paper rolled into the
  platen with an unfinished lyric. The <ansi fg="itemname">window</ansi> faces east and the
  light coming through it is the light of a dawn that takes eleven minutes
  to arrive. A blurred <ansi fg="itemname">photograph</ansi> leans against the wall -- the
  album cover, shot by Jerry Schatzberg, Dylan's face softened past
  recognition into pure color and motion. The Sad Eyed Lady stands at
  the window, backlit, radiant, silent. The organ chord that has been
  sustaining since the first room still holds here, barely audible, like
  a memory of sound.
  A <ansi fg="exit">door</ansi> leads back to the loft.
mapsymbol: C
maplegend: The Chelsea Hotel
biome: house
