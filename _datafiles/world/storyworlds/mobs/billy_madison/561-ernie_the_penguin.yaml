character:
  name: Ernie the Penguin
  description: >-
    A penguin of indeterminate realness. He stands about two feet tall and wears
    what appears to be a tuxedo, which penguins technically always do, but Ernie
    seems to wear his with particular intention. His eyes are dark and warm and
    they track you with an attention that seems more than animal. Whether he is
    real or imaginary is a philosophical question that Billy Madison has never
    entertained because it is a stupid question. Ernie is real. Ernie is here.
    Ernie is your friend.
