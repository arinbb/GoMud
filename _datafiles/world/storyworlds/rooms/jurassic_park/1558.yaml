roomid: 1558
zone: Jurassic Park
title: The Gallimimus Flats
description: >-
  The jungle opens into a wide, grassy plain — an unexpected expanse of open
  land in the island's interior. The <ansi fg="10">Gallimimus flats</ansi> are
  named for the ostrich-mimic dinosaurs that run here in loose groupings, their
  long necks extended, their legs a blur of motion. They move like water —
  individual animals cohering into a flock, shifting direction as one body with
  an instinct older than thought. A hundred of them crossing the plain creates
  a sound like distant thunder, the earth trembling under their collective
  weight. When the <ansi fg="red">Tyrannosaurus</ansi> enters the flats to
  hunt, the Gallimimus explode apart in every direction, and the predator makes
  its choice, and something dies in the tall grass. You can hear it from here.
  The Visitor Center complex rises to the <ansi fg="exit">east</ansi>. The
  paddock is back to the <ansi fg="exit">south</ansi>. The fence section is
  to the <ansi fg="exit">north</ansi>.
mapsymbol: G
