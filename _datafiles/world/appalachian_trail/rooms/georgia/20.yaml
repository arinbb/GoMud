nouns:
  ridge: "A long spine of exposed rock runs along the crest of Tray Mountain. The granite is pale gray, fractured by frost into jagged edges and flat shelves. Lichen clings to every surface in pale green splotches."
  view: "From the higher points along this section, the views are immense\x97ridge after ridge rolling northward into North Carolina, southward toward Springer. The valleys between are filled with forest, dark green and unbroken."
  rocks: "The trail is more rock than dirt here. Angular granite chunks litter the path, some loose enough to shift underfoot. The steep grades turn every step into a careful negotiation with gravity."
  blazes: "White blazes are painted on rock faces where trees are sparse. Some are faded by weather and altitude, barely visible against the pale granite."
idlemessages:
- Wind gusts hard across the exposed ridgeline, flattening the scrubby vegetation against the rocks.
- A raven croaks overhead, riding the updraft along Tray Mountain's western face.
- The rocky trail crunches and shifts beneath your boots with every step upward.
- Cloud shadows race across the distant ridgelines, darkening whole valleys in an instant.
- The air smells of spruce and cold stone, sharp and clean at this elevation.
- Your breathing comes harder on the steep grade, lungs working against the thin mountain air.
- A distant rumble of thunder rolls across the peaks, though the sky above is still clear.
