activitylevel: 15
character:
  name: Dr Theodore Millbank
  description: >-
    Dr. Theodore Millbank has been judging the Mayflower Kennel Club Dog Show for
    eleven years. He was born in Kent, educated at Cambridge, and has been in dogs
    his entire adult life. He does not chat. He does not speculate. He does not say
    things on the basis of anything other than the standard and his own informed
    judgment, both of which he trusts completely and applies without hesitation. He
    is the kind of man who makes rooms feel more organized just by being in them.
    He knows exactly what the best dog in this show looks like. He will know it when
    he sees it. He sees it once a year, and once a year it is different, and he is
    never surprised and never bored.
