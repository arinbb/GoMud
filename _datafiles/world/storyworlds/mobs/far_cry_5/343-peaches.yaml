character:
  name: Peaches
  description: >-
    A mountain lion, female, large even for her species, her coat the warm
    tawny gold of dried grass with darker markings along the spine. Her eyes
    are amber and contain the specific quality of attention that means she
    has already run every scenario and found them all in her favor. She moves
    with the fluid confidence of something that has no predators. She has
    been in these mountains long enough to have opinions about them. She is
    tameable by someone patient and persuasive. She is not tameable by force.
    These are not the same thing.
