character:
  name: Stringer Bell
  description: >-
    A tall, composed Black man who carries himself like someone who made a decision
    early about what he was going to be and has been executing that decision
    ever since. He takes economics classes at the community college. He runs
    the Barksdale Organization like a supply chain, applying the vocabulary
    of legitimate business to illegitimate operations with such fluency that
    the categories seem arbitrary. He is brilliant and ruthless and fundamentally
    mistaken about which world he actually lives in, which is the central tragedy
    of his arc.
