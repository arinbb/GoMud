roomid: 2472
zone: Idiocracy
title: The Street
description: >-
  This is America in 2505 and the first thing you notice is the <ansi fg="itemname">signage</ansi>.
  Every surface is a billboard. Every billboard is either a Brawndo advertisement or a Carls Jr
  advertisement or a Brawndo-Carls Jr co-branded advertisement. The <ansi fg="itemname">road</ansi>
  beneath your feet is cracked and unrepaired, the cracks themselves filled in with flattened fast
  food containers. A <ansi fg="yellow">Brawndo vending machine</ansi> on the corner cycles
  through its jingle on an infinite loop. Citizens in various states of
  <ansi fg="itemname">athletic wear</ansi> shuffle past with the relaxed gait of people who
  have nowhere to be and no concept of urgency. Every screen you can see -- and you can see
  many screens -- is showing OW MY BALLS. The horizon is brown.
