  minimum: 1
  maximum: 5
defaultbiome: land
mutators:
- mutatorid: valley-seasons
idlemessages:
- A rooster crows somewhere beyond the treeline. The valley stirs to life in the early morning.
- 'The seasons here have a weight to them: you can almost taste the change coming on the wind.'
- Distant cowbells ring from Marnies Ranch, a sound of warmth and ordinary life.
- The river that runs through the valley catches the light like hammered silver.
- 'Something in this place hums with quiet magic -- not loud, not dramatic, just present, like roots underground.'
- The smell of baked goods drifts from somewhere in Pelican Town. Someone is always baking.
