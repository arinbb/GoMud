character:
  name: Ruth Fisher
  description: >-
    A woman in her late fifties who has spent decades being the center of
    this family's gravity while believing she was peripheral to it. She
    is small and precise in her movements, with hands that are always doing
    something -- cooking, gardening, adjusting, cleaning. Her face holds
    grief in the way that soil holds water: thoroughly, without display.
    She raised three children in a funeral home and managed the books and
    made every meal and now her husband is gone and she is discovering, with
    some anxiety and some relief, that she does not know who she is when
    she is not managing someone else's life. She is in the process of
    finding out.
