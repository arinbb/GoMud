roomid: 2323
zone: Siamese Dream
title: Today
description: >-
  Impossible sunshine. The kind of light that comes after the worst day of
  your life, when the world insists on being beautiful anyway. The room is
  drenched in it -- warm gold falling through <ansi fg="itemname">windows</ansi>
  that open onto nothing and everything, the light source indeterminate, the
  brightness almost violent. The <ansi fg="itemname">walls</ansi> are painted
  in ice cream colors -- mint and pink and the pale yellow of old vanilla. A
  <ansi fg="itemname">radio</ansi> plays from somewhere and the song coming
  from it is the greatest day. There is a <ansi fg="itemname">note</ansi> on
  the table in handwriting that is careful and deliberate, the handwriting of
  someone who needs to get something exactly right. The <ansi fg="exit">studio</ansi>
  is back to the west. A <ansi fg="itemname">figure</ansi> sits near the window.
mapsymbol: '3'
maplegend: Today
biome: house
exits:
  west:
    roomid: 2320
nouns:
  windows: >-
    The windows open onto a sky that is impossibly blue -- the blue of a day
    chosen to be perfect regardless of what the person looking at it has been
    through. The light pours in without shadow. This song was written during
    suicidal depression, and the light in it is not ironic. The light is real.
    That is the impossible thing about it.
  walls: >-
    Ice cream colors: mint green, pale pink, vanilla yellow. The colors of
    summer in a small American city, the colors of ordinary happiness available
    to ordinary people. The paint is slightly too bright. The room is slightly
    too warm. This is what the greatest day looks like from the inside of the
    worst one.
  radio: >-
    A small transistor radio on a shelf, playing something you recognize before
    you can name it. The opening guitar figure. The drum fill coming in. And
    then the voice -- nasal, raw, entirely human -- singing about the greatest
    day. The radio has no visible power source. It plays anyway.
  note: >-
    Written in careful, deliberate handwriting on a sheet of notebook paper:
    "Today is the greatest day I have ever known." The pen pressed hard into
    the paper. Underneath, lighter, almost erased: "I mean it. I have to mean
    it." The paper is worn at the folds, as if it has been carried for a while.
  figure: >-
    Someone sitting by the window with the light on their face and their eyes
    closed. They are very still. The light makes them look peaceful in the way
    that comes after having made a decision -- any decision, even the wrong one,
    because decisions end uncertainty. They are listening to the song. So are you.
spawninfo:
- mobid: 538
  message: 'A barely-there presence settles near the window, half in the light, half not.'
idlemessages:
- The radio plays the opening bars again. The light brightens slightly. The day insists on being great.
- 'Ice cream colors in winter light -- the walls glow with the particular warmth of hope maintained by effort.'
- The figure by the window does not move. The light moves, slowly, as if time is passing at a different rate in here.
- The song builds to the chorus and the room brightens with it, the ice cream colors deepening.
- 'A window opens, just slightly, and a warm breeze moves through -- the smell of cut grass and somewhere else.'
- The radio crackles once and finds the signal again, the song resuming from exactly where it left off.
