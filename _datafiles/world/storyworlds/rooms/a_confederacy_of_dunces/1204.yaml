  message: 'A small, worried woman fusses with the curtains and mutters about what the neighbors must think.'
  container: ''
idlemessages:
- 'The television emits a tinny laugh track. Somewhere in the house, a valve closes in protest.'
- 'A Dr. Nut bottle rolls off a stack of tablets and clinks against three other bottles on the floor.'
- 'The bed creaks ominously under the weight of its absent occupant''s legacy.'
- 'A page of Big Chief tablet paper, covered in cramped handwriting about the decline of Western civilization, drifts to the floor.'
- 'The smell of mothballs and stale cake asserts itself, the signature perfume of intellectual stagnation.'
- 'From somewhere in the house comes the sound of a woman sighing with the practiced despair of decades.'
