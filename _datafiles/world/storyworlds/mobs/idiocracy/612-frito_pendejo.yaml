character:
  name: Frito Pendejo
  description: >-
    Joes lawyer, court-appointed, Costco-educated. Frito is a man who has achieved
    a perfect equilibrium between the minimum effort required to exist and the
    maximum satisfaction available for that effort. He wears a stained shirt with
    the comfortable authority of a man who has not been cold in years. His Costco
    law degree is framed, laminated, and the most important thing he owns. He
    believes in the time machine in the alley. He believes in it completely. He
    was there when it was built. He built it. He knows it works because he
    believes it works, which in 2505 is the same thing as knowing.
