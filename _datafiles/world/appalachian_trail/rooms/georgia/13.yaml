roomid: 13
zone: Georgia
title: Blood Mountain Shelter
description: "A rough stone shelter stands on the summit of Blood Mountain at 4,450 feet\x97the highest point on the AT in Georgia. Built by the Civilian Conservation Corps in the 1930s, this is no ordinary trail lean-to. Thick stone walls rise to a low peaked roof. A narrow doorway opens to the south, barely wide enough for a hiker with a full pack. Inside, the space is cave-like and dim, the ceiling blackened by decades of illegal campfires. The wind howls across the exposed summit, finding every crack in the ancient mortar. There is no water here\x97the nearest source is a steep, rocky descent to a creek at the Slaughter Creek trail junction. This shelter has stood on this mountain for nearly a century, weathering ice storms, lightning strikes, and the passage of tens of thousands of hikers. Names and dates are carved into every available surface of stone."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 7
    exitmessage: You duck through the low doorway and step back onto the exposed summit.
    mapdirection: east
nouns:
  shelter: "Unlike every other shelter on the Georgia AT, this one is built of stone\x97rough-cut blocks fitted together by CCC workers during the Depression. The walls are thick, the interior dark. It feels more like a mountain hut than a trail shelter. The structure has weathered nearly a century of Appalachian winters."
  stonework: "The stonework is rough but solid\x97blocks of local granite and gneiss fitted together with mortar that has cracked and been repaired countless times. You can see where different generations of stone and mortar meet, a geological record of maintenance stretching back to the 1930s. Lichen creeps across the exterior walls in pale green patches."
  doorway: "The doorway is low and narrow\x97you have to duck and turn sideways with a full pack. It faces south, offering some protection from the prevailing northwest wind. The stone lintel is worn smooth by ninety years of hands bracing against it."
  graffiti: "Names, dates, and trail names cover every available surface of stone inside the shelter. Some are carved deep, others scratched faintly. The oldest legible date you can find is 1947. Decades of hikers have left their marks here\x97\"Slim '52\", \"Mountain Man '68\", \"Sunshine '03\", and hundreds more layered over each other like geological strata."
  ceiling: "The ceiling is low enough to touch from the sleeping platform. It is blackened by decades of illegal campfires\x97the soot is layered thick in places, giving the interior the look and smell of a cave. Despite regulations, hikers keep building fires inside, adding another layer of carbon to the history."
  platform: "The sleeping platform is stone and wood, raised off the rough floor. It is cold to the touch even in summer. Space for maybe eight hikers, though the CCC probably did not design it with modern backpacking gear in mind."
  register: "The trail register here is in a heavy-duty waterproof box bolted to the wall\x97a nod to the shelter's exposed location. The notebook inside is thick with entries, many about the wind, the cold, and the lack of water."
  water: "There is no water at Blood Mountain Shelter. The nearest source is a creek at the Slaughter Creek trail junction, a steep and rocky descent. In dry weather, even that can be unreliable. Carry water up."
  wind: "The wind is relentless at 4,450 feet. It finds every crack in the mortar, every gap around the doorway. On bad days it sounds like the mountain itself is howling."
  views: "Through the trees and from the rocks around the shelter, you can see the Blue Ridge mountains rolling in every direction\x97wave after wave of ridgeline fading to blue in the distance. On clear days the view stretches into three states."
idlemessages:
- The wind howls across the exposed summit, rattling through cracks in the ancient stone walls.
- A raven croaks from the rocky outcrop above the shelter, its voice carrying on the wind.
- Cold air seeps through the stone walls. Even in summer, Blood Mountain shelter holds a chill.
- The low ceiling seems to press down in the dim interior, blackened by decades of smoke.
- A gust of wind moans through the narrow doorway, stirring dust on the stone floor.
- Names carved in stone catch the light\x97decades of hikers, layered like geological strata.
- The mortar between stones has cracked and been repaired so many times it tells its own history.
- Far below, through gaps in the wind-stunted trees, the valleys of Georgia spread in blue-green haze.
