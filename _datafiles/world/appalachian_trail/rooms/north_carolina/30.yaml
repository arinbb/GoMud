roomid: 30
zone: North Carolina
title: NC Border / Standing Indian Area
description: "You cross into North Carolina and the mountains immediately feel different\x97bigger, wilder, more ancient. The trail enters the Nantahala National Forest, over half a million acres of some of the most rugged terrain on the eastern seaboard. The Cherokee called this Nantahala, the Land of the Noonday Sun, because the gorges here cut so deep that sunlight only reaches the valley floor at midday. To the north, Standing Indian Mountain rises to 5,499 feet, the highest point on the AT south of the Smokies. Cherokee legend holds that a great warrior was stationed atop the peak to watch for a winged monster terrorizing the villages below. When lightning struck the mountain, the warrior was turned to stone, and his silhouette remains on the summit to this day."
