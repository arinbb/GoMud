nouns:
  sign: >-
    The Ghostbusters sign features the NO GHOST logo: a cartoon ghost in a red
    circle with a diagonal slash. Below it, a phone number. The sign already has a
    long scratch through one corner, as if a ghost clawed at it and missed. The paint
    is barely dry. This business is brand new and the city has no idea what to make
    of it yet.
  newspaper: >-
    The New York Post. The cover shows a blurry photograph of something green and
    translucent hovering in a hotel ballroom. "GHOST BUSTED AT SEDGEWICK -- HOTEL
    DENIES INCIDENT." Below the fold: "3 PROFESSORS CLAIM TO HAVE WORLD'S FIRST
    GHOST TRAP. EXPERTS SKEPTICAL. GHOSTS UNAVAILABLE FOR COMMENT."
  vendor: >-
    The pretzel vendor on the corner has been here for twenty years. He has seen
    everything New York can offer. Ghosts, Ghostbusters, slimed hotel corridors --
    it all registers as mildly interesting at most. He watches the firehouse with
    the philosophical serenity of a man who has sold pretzels through stranger times.
idlemessages:
- A yellow cab nearly clips a bicycle messenger, who yells something spectacular in response.
- The Ghostbusters phone on the firehouse wall rings four times. The bored Brooklyn voice answers it. A pause. "We'll be there in forty minutes. Maybe thirty. Depends on the FDR." Click.
- A pigeon lands on the Ghostbusters sign, looks directly at you, and leaves.
- The pretzel vendor makes eye contact with you. He nods once. He has seen things.
- Somewhere north, toward the Library, a woman screams once and then stops. Probably nothing.
- A businesswoman in a power suit strides past, briefcase in one hand, coffee in the other, completely unaware of the green slime trail she is leaving behind her.
- The NO GHOST logo on the firehouse seems to flicker for just a moment in the afternoon light.
