roomid: 2340
zone: Best in Show
title: Mayflower Kennel Club Entrance
description: >-
  The entrance hall of the <ansi fg="yellow">Mayflower Kennel Club Dog Show</ansi>,
  Philadelphia. Banners in hunter green and gold hang from the rafters. A pair of
  <ansi fg="itemname">registration tables</ansi> staffed by volunteers in matching
  blazers check in handlers and their dogs. The <ansi fg="itemname">schedule board</ansi>
  lists today's groups in clean serif type -- the final line reads BEST IN SHOW,
  7 PM, Main Ring, in a typeface slightly larger than the rest. The composite smell
  of forty different conditioning sprays fills the air. Dogs move through in every
  direction, each one aware at some level that something important is about to happen.
  Their owners are more visibly aware. The <ansi fg="exit">registration hall</ansi>
  is north. The <ansi fg="exit">parking lot</ansi> is east.
mapsymbol: E
maplegend: Kennel Club Entrance
biome: city
exits:
  north:
    roomid: 2341
  east:
    roomid: 2342
nouns:
  registration: >-
    The registration table has two clipboards, a laminator, name tags, and the
    focused energy of people who have memorized the rule book. One volunteer handles
    a dispute about an AKC number with the calm certainty of someone who has been
    right about this seventeen times before and knows she is right again.
  board: >-
    The schedule board: Sporting Group 9 AM, Hound Group 11 AM, Working Group 1 PM,
    Terrier Group 2 PM, Non-Sporting Group 3 PM, Toy Group 4 PM, Herding Group 5 PM.
    Then, below all of that, a gold star beside the words BEST IN SHOW, 7 PM, Main Ring.
    The star seems entirely sincere.
  banners: >-
    Mayflower Kennel Club banners in hunter green and gold. The club seal shows a
    dog in show stance. The words read EXCELLENCE IN BREEDING SINCE 1903. The banners
    are pressed. Everything here is pressed.
spawninfo:
idlemessages:
- A Terrier on a show lead nearly pulls its handler off their feet. The handler recovers. The Terrier is unrepentant.
- Someone checks in at the registration table, gets a number pinned to their lapel, and walks toward the venue with new bearing.
- Two dogs pass each other at the entrance and perform the full protocol of sniffing and assessment in about four seconds.
- 'An announcement crackles over the PA system: "Hound Group to Ring Two. Hound Group to Ring Two." Several people move faster.'
- A woman with a clipboard walks in, reads the schedule board, and adjusts her watch by one minute.
- The doors open and close and each opening brings a brief rush of cold November Philadelphia air and another person with a dog.
- One registration volunteer says something to the other. They laugh briefly. Then they go back to checking names.
- A Shih Tzu passes through at ankle height, magnificent, impeccably groomed, entirely unaware of its own improbability.
