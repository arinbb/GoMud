nouns:
  sign: >-
    The Dunder Mifflin logo: a stylized tree, navy blue on white, beneath which the
    full company name in a font that communicates reliability without excitement.
    'Dunder Mifflin Paper Company.' Below that, in smaller text: 'Infinite Diversity
    in Infinite Combinations.' This is actually their real slogan. Nobody who works
    here has ever thought about what it means.
  camera: >-
    A small security camera mounted in the upper corner of the lobby. The little red
    light blinks steadily. At some point someone decided this office needed a security
    camera. The camera has witnessed eleven years of birthday cakes, disciplinary
    meetings, Pretzel Day, and at least one flaming car in the parking lot. It has
    recorded all of it with total neutrality.
  elevator: >-
    Standard corporate elevator, doors the same beige as everything else. The button
    panel is worn smooth from years of hands pressing 'two' and 'warehouse.' Someone
    has put a small sticker of a cat near the 'door open' button. Nobody knows who.
    Nobody has asked.
spawninfo: []
idlemessages:
- The elevator dings, the doors open, and nobody gets off. The doors close again.
- A visitor signs the guest log at the reception window, their handwriting too careful.
- The fluorescent tube above flickers for precisely one second and then recovers.
- The Dunder Mifflin sign seems slightly crooked. It has seemed slightly crooked for years.
- The intercom crackles once. Nothing comes out of it. It crackles again. Still nothing.
- A fire drill alarm briefly tests itself and falls silent. No one moves.
- From somewhere above comes the distant sound of a meeting beginning. The tone is already resigned.
- The security camera's red light blinks steadily, recording nothing of consequence.
