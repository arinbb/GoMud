roomid: 1928
zone: Ghostbusters
title: 55 Central Park West
description: >-
  The art deco apartment building at 55 Central Park West looms over its neighbors
  with the specific arrogance of 1920s New York architecture. <ansi fg="itemname">Gargoyles</ansi>
  that are not quite gargoyles line the upper cornices -- stone figures that might
  be dogs, or might be something else entirely, carved with more anatomical detail
  than decorative gargoyles usually receive. The building's <ansi fg="itemname">facade</ansi>
  is black granite with gold accents. The <ansi fg="itemname">lobby door</ansi> leads
  to an elevator bank. On the pavement outside, <ansi fg="itemname">Louis Tully</ansi>
  is attempting various keys in the door and failing all of them while narrating
  his experience to nobody in particular. A broad staircase winds upward through
  the building to Dana Barrett's apartment on the upper floors.
