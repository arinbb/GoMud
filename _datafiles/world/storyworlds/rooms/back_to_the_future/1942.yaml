roomid: 1942
zone: Back to the Future
title: Lous Cafe
description: >-
  A gleaming 1950s lunch counter along the south wall, chrome stools
  bolted to the floor, a rotating pie display, and a Coca-Cola machine
  humming in the corner. The <ansi fg="itemname">soda fountain</ansi>
  runs the full length of the counter; behind it, Lou Caruthers moves
  fast, filling glasses and cracking wise. Booths line the north wall,
  upholstered in cracked red vinyl. A jukebox in the corner cycles
  through <ansi fg="itemname">rock and roll</ansi> 45s. The whole place
  smells of bacon grease, coffee, and vanilla milkshake. On a stool near
  the end of the counter, George McFly stares dreamily at the window,
  pen tapping his notebook.
