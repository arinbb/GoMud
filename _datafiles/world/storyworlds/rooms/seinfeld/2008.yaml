roomid: 2008
zone: Seinfeld
title: NBC Studios
description: >-
  The <ansi fg="yellow">offices of NBC</ansi>, 30 Rockefeller Plaza, somewhere in the
  warren of development floors. The <ansi fg="itemname">conference table</ansi> is long,
  chrome and glass, the kind of table that communicates power to people who communicate
  power through tables. <ansi fg="itemname">Russell Dalrymple</ansi> and <ansi fg="itemname">NBC executives</ansi> have sat on one side of this table and Jerry Seinfeld and George
  Costanza have sat on the other side and someone said the words <ansi fg="8">"a show about nothing"</ansi> and somehow this turned into nine seasons of television. The <ansi fg="itemname">pitch documents</ansi> are on the table. The <ansi fg="itemname">view</ansi>
  through the window shows Rockefeller Plaza below and the skating rink that is only
  a skating rink in the winter and something else entirely in the summer. The exit to
  the <ansi fg="exit">street</ansi> is to the south.
mapsymbol: N
