roomid: 2053
zone: its_always_sunny
title: The Water Park
description: >-
  The water park is closed. This is immediately apparent from the <ansi fg="8">silent
  slides</ansi> — dry, their surfaces faded by sun and years of no use —
  and the <ansi fg="itemname">drained wave pool</ansi> at the center, its
  concrete basin bone-white in the sun. <ansi fg="itemname">Signs</ansi>
  on poles advertise attractions that are not currently available and have
  not been available for some time. The concession stands are shuttered.
  The lifeguard towers are empty. On a raft in the middle of the drained pool,
  inexplicably, sits a <ansi fg="itemname">ham</ansi> in sunglasses. This
  is Frank's AIDS raft. This is the float from the Gang's AIDS benefit run,
  which did not go as planned, in ways that it would take some time to explain.
  The ham has been here for days. The ham is doing fine. To the
  <ansi fg="exit">street</ansi> is the way back.
