zone: Best in Show
title: The Parking Lot
description: >-
  The Mayflower Kennel Club parking lot at November dusk. Sodium
  <ansi fg="itemname">lights</ansi> cast everything amber. The cars are a
  cross-section of people who spend significant money on dogs -- some new, some
  old, all with crates in the back and the specific interior configuration of a
  vehicle owned by someone who competes with a large animal. A few
  <ansi fg="itemname">station wagons</ansi> near the east wall are packed for a
  multi-day run: grooming cases, garment bags, a case of water, a bag of premium
  kibble. The <ansi fg="itemname">Flecks station wagon</ansi> is north -- you can
  see the Ohio plates from here and what appears to be a Norwich Terrier through
  the rear window, very alert. The <ansi fg="exit">entrance</ansi> is west. The
  <ansi fg="exit">wagon</ansi> is north.
