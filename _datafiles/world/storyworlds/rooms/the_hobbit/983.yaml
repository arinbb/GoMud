nouns:
  platforms: >-
    Wooden platforms on massive wooden stilts driven deep into the lake
    bed. The planks are weathered grey and creak with every step. The
    water laps at the stilts below. The whole town sways slightly in a
    strong wind. It is built for defense against attack from the shore,
    and from a certain dragon who destroyed the old town of Dale.
  market: >-
    Market stalls selling lake-fish (fresh and smoked), rope, lamp oil,
    warm woolen cloaks, waterproof boots, and barrel-shaped loaves of
    bread. The merchants shout their wares and argue over prices. Trade
    comes down the Forest River from the Wood-elves and up from the south.
  mountain: >-
    Visible to the east across the lake and the desolation -- the Lonely
    Mountain, Erebor. A single peak rising above the surrounding wasteland,
    its summit wreathed in cloud. Once the greatest dwarf kingdom in the
    north. Now the lair of Smaug the dragon. The people of Lake-town eye
    it with a mixture of dread and desperate hope.
  master: >-
    The Master of Lake-town's hall rises above the neighboring buildings, its
    windows lit and its banner flying. The Master is a fat, clever man who
    got where he is by knowing which way the wind blows and which songs the
    people want to hear. He is singing the old songs about Thorin right now.
    He has not thought past that.
  lake: >-
    The Long Lake stretches in every direction, dark and cold, its surface
    ruffled by the wind off the Lonely Mountain. Fish dart in the shallows
    under the stilts. Kingfishers skim the surface. The water is clean and
    cold and has been here since before men came to this land, and will be
    here after they are gone.
idlemessages:
- A fisherman hauls in a net of silver lake-fish, grunting with the weight.
- 'The wooden platforms creak and sway beneath your feet. The lake laps at the stilts below.'
- 'An old man hums a song about the King under the Mountain, then catches himself and falls silent.'
- Smoke from the chimneys mingles with lake mist, giving the town a dreamlike quality.
- 'A child points eastward at the Lonely Mountain and asks: is the dragon really in there? No one answers.'
- 'The market is noisy with the sound of trade: coins clinking, fish slapping, voices haggling.'
