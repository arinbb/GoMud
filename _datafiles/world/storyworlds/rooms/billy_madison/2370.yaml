roomid: 2370
zone: Billy Madison
title: The Cafeteria
description: >-
  The school cafeteria at peak Thursday energy. <ansi fg="itemname">Long tables</ansi>
  with attached seats stretch in rows, filling and emptying with the tidal rhythm
  of lunch periods. The <ansi fg="itemname">lunch line</ansi> stretches along one
  wall, staffed by the lunch ladies behind a sneeze guard with the focused energy of
  professionals who have served ten thousand kids and remain unshakeable. The <ansi fg="itemname">menu
  board</ansi> lists today's special in hand-lettered chalk: SLOPPY JOE. CORN.
  CHOCOLATE MILK. The smell of sloppy joe fills the entire building and possibly
  the parking lot. <ansi fg="itemname">Lunch trays</ansi> clatter and slide in a
  rhythm that is its own kind of music. Someone at table four is building a tower
  out of chocolate milk cartons. This will end poorly but not yet. <ansi fg="exit">West</ansi>
  returns to the hallway. <ansi fg="exit">North</ansi> leads to the stage.
