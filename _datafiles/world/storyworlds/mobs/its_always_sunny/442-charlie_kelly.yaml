character:
  name: Charlie Kelly
  description: >-
    A wiry, frenetic man in a green jacket who moves with the anxious energy
    of someone who has huffed paint and eaten cat food and is not sure which
    one is affecting his cognition more. He carries a mop or a broom or
    some other implement of janitorial labor that he uses with enormous
    dedication and zero effect. His handwriting, visible on various scrawled
    notes around the bar, suggests either childhood trauma or a deeply personal
    relationship with letters as decorative rather than functional objects.
    He is the only one of the Gang who does actual work. The bar would collapse
    without him. He gets no credit.
