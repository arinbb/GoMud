character:
  name: Avon Barksdale
  description: >-
    A compact, muscular Black man in his forties, dressed well but practically --
    this is not a man who wears suits to feel like he wears suits. He has run
    the West Baltimore drug trade since his twenties and the authority of that
    history is present in the way he occupies space. Not loud. Not announcing.
    Simply there in the way of something that has been there for a very long
    time. He values loyalty above profit, which is his strength and, according
    to Stringer Bell, his only weakness.
