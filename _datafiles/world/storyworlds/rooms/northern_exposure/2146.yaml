roomid: 2146
zone: Northern Exposure
title: Maggies Cabin
description: >-
  <ansi fg="yellow">Maggies cabin</ansi> is the home of someone who does not
  require rescue and would like that noted. It is <ansi fg="10">tidy</ansi>
  and purposeful, every object earning its place. <ansi fg="itemname">Aviation charts</ansi>
  cover the kitchen table -- she navigates in the air and on the ground by the
  same precision. A <ansi fg="itemname">flight jacket</ansi> hangs by the door,
  worn to a particular softness that only years of use produces. <ansi fg="itemname">Photographs</ansi>
  on the mantle include a floatplane, some mountains, and several people who are
  no longer alive, which is its own story that Maggie does not tell and is always
  present. A <ansi fg="itemname">bookshelf</ansi> holds paperbacks with cracked
  spines. The <ansi fg="itemname">window</ansi> faces north and on clear nights
  the northern lights fill the glass entirely. To the <ansi fg="exit">south</ansi>,
  Main Street.
mapsymbol: M
maplegend: Maggies Cabin
