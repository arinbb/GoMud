nouns:
  containers: >-
    Corrugated steel, twelve meters, stenciled with codes and destinations.
    Rotterdam. Busan. Baltimore. Some of them have been here longer than they
    should. One of them, season two will tell you, contained something that
    was not listed on the manifest. The containers do not know what is inside
    them. Or they do not say.
  cranes: >-
    Italian-built gantry cranes, sixty feet high, designed for a port at full
    capacity. At full capacity these cranes processed twelve thousand containers
    a week. They do not process twelve thousand containers a week anymore.
    They stand over the dock like monuments to what the dock used to be.
  bulletin: >-
    Job postings: work calls for Monday, Wednesday, Friday. Fewer calls than
    last year. Fewer than the year before that. A flyer for the union hall
    picnic in June. A photograph of Frank Sobotka at a dock workers rally,
    maybe ten years ago, when there was something to rally around.
spawninfo: []
idlemessages:
- A crane moves, slowly, across the dock. One container shifted. The crane stops.
- The harbor is grey and wide and does not care about the problems of the port.
- A seagull lands on a container, regards the dock, and goes somewhere with more fish.
- The sound of men arguing somewhere in the rows of containers, then silence.
- Diesel smoke from a loader. The smell of fuel and salt water and rust.
- A work call goes out. A dozen men stand up. More men stay seated. The ratio is wrong.
- The port is dying and everyone here knows it and nobody says it because saying it does not help.
