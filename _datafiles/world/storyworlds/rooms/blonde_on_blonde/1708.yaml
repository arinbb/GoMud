roomid: 1708
zone: Blonde on Blonde
title: Just Like a Woman
description: >-
  A <ansi fg="8">dressing room</ansi>, intimate and dim. <ansi fg="itemname">Pearls</ansi>
  on the floor, scattered from a broken strand. <ansi fg="itemname">Ribbons</ansi>
  in a tangle on the vanity, broken or cut or simply done. The mirror holds a
  reflection that seems to have more presence than you, more history. Rain
  <ansi fg="itemname">on the window</ansi>, steady and gray, making everything
  softer and smaller. She takes just like a woman, she makes love just like a
  woman, and she aches just like a woman, and she breaks -- and that is the
  whole architecture of the room, that sentence, the way it turns. The dressing
  table holds a <ansi fg="itemname">fog</ansi>, perfume and powder, the kind
  of feminine camouflage that Dylan understood to be both armor and wound. She
  is not here. The room holds her shape. Fog. Ribbons. Pearls. Rain. The
  <ansi fg="exit">studio</ansi> is back to the southeast.
mapsymbol: 8
maplegend: Just Like a Woman
biome: house
exits:
  studio:
    roomid: 1700
    mapdirection: southeast
    exitmessage: You leave the dressing room. The pearls stay on the floor.
nouns:
  pearls: >-
    A strand of pearls, broken, scattered across the floor in an arc that
    marks where the strand gave way. A few are under the vanity. A few have
    rolled to the wall. They are real pearls, each one slightly different
    from the others in luster and weight. The strand cannot be repaired
    without finding all of them. You do not find all of them.
  ribbons: >-
    Hair ribbons on the vanity, some intact, some snapped, one tied in a
    knot that seems angry. They are the colors of other decades -- cream,
    powder blue, a dusty rose. The breaking of a little girl: not violence,
    something more like truth arriving.
  mirror: >-
    The dressing table mirror, silver and slightly foxed at the edges, the
    kind that makes you look like yourself from thirty years ago. The
    reflection shows everything in the room including you, but the you in
    the mirror seems to understand something you do not.
  fog: >-
    The dressing table is hazed with the accumulated fog of perfume and
    face powder, a stratum of femininity as archaeological as anything.
    The scents -- floral, musky, something like rain already -- mix into
    something that is its own emotion.
  rain: >-
    The rain on the window makes the world outside the dressing room
    theoretical. Just shapes and lights through the wet glass. In here
    is the only real. In here: pearls, ribbons, the mirror, the ache.
idlemessages:
- A pearl rolls an inch across the floor on some imperceptible tilt and stops.
- The rain against the window sounds like something trying to say something.
- 'The ribbons stir in a draft from nowhere -- still and then not still and then still again.'
- The mirror holds the room and everything in it and waits.
- 'The fog of perfume shifts when you move, parts, closes behind you.'
- 'She breaks just like a little girl. The room holds that fact without commentary.'
