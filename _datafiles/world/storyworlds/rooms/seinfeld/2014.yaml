roomid: 2014
zone: Seinfeld
title: The Laundromat
description: >-
  A <ansi fg="8">laundromat</ansi> on the Upper West Side, fluorescent-lit, smelling
  of detergent and warm air and the faint human residue of a hundred loads of laundry.
  The <ansi fg="itemname">machines</ansi> line both walls -- washers on one side,
  dryers on the other. A row of <ansi fg="itemname">plastic chairs</ansi> faces the
  dryers, occupied by people reading things or staring at their clothes as they tumble.
  A <ansi fg="itemname">folding table</ansi> runs down the center. The <ansi fg="itemname">change machine</ansi> takes dollars and produces quarters with the reliability of an
  institution that has never once surprised anyone. This is where the social
  negotiations happen -- the conversation that happens when two people sit next to
  each other for forty-five minutes with nowhere to go is the raw material of
  everything. The <ansi fg="exit">street</ansi> is to the north.
