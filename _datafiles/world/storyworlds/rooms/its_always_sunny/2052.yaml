title: The Sewer
description: >-
  Frank Reynolds's sewer is not a sewer in the crisis-management sense but
  in the residential sense, and that distinction is important and also
  very strange. The <ansi fg="itemname">brick walls</ansi> are old and damp
  and the <ansi fg="itemname">water</ansi> runs slow along the channel in the
  center. There is a <ansi fg="itemname">rum ham</ansi> sitting on a ledge
  above the waterline, wrapped in butcher paper with FRANK written on it
  in black marker. Around it, evidence of occupation: a lawn chair, a battery-powered
  radio playing something faint and country, a cooler. Frank has been here.
  Frank lives here sometimes. Frank considers this an acceptable living arrangement.
  Frank has money. The smell is sewer. Above, through an access hatch, is
  the <ansi fg="exit">basement</ansi> of Paddys Pub.
