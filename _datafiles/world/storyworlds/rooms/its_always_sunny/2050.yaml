spawninfo:
- mobid: 445
  message: 'The Waitress comes home, stops in the doorway, surveys the apartment, and sighs with the practiced exhalation of someone who has done this before.'
  respawnrate: 8 real minutes
nouns:
  locks: >-
    The door has six different locks on it: two deadbolts, a chain, a sliding
    bar, a padlock hasp, and a new knob lock still in the packaging, half-installed.
    The progression is documented. The first deadbolt is old. The chain came
    after that. Each subsequent lock represents a specific incident that the
    Waitress has chosen not to think about too carefully. There are more coming.
    She knows there are more coming.
  notepad: >-
    A notepad near the phone. The top sheet has been torn off. The impression
    of the writing from the previous page is visible if you hold it at an angle
    to the light. It says, in the impression of writing: "Charlie — NO. Stop.
    Please stop. I am asking you as a human person to stop. I have a lawyer."
    Below it, the impression of a heart. Then the impression of the heart being
    crossed out. Then, after a space, the impression of the heart again.
  fridge: >-
    The Waitress's refrigerator has normal contents — actual food, for an actual
    person. A magnet on the side is slightly misaligned from the dent it usually
    sits in, suggesting it was moved recently and replaced imprecisely. There
    is a can of cat food behind the milk. She does not own a cat. She has never
    owned a cat. She knows exactly how the cat food got there.
idlemessages:
- The extra locks on the door sit in a line. From inside, the apartment feels more secure than it is.
- 'The notepad near the phone holds the impression of old writing. The heart, the crossed-out heart, the heart again: a palimpsest of Charlie Kelly''s feelings.'
- Someone has left a small bouquet of wildflowers on the windowsill. They are wilted. They have been there a few days. No card.
- The fridge hums in the quiet apartment. The cat food behind the milk does not move. It is just there. Like Charlie, in a way.
- 'Something small has been scratched into the paint near the door: a shape that might be a bird, small and crooked. It is definitely a bird. Charlie Kelly was here.'
- The apartment holds the organized stillness of someone who keeps control of their space because several other things in their life are outside their control.
