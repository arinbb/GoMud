nouns:
  vendors: >-
    The vendors of the Haymarket sell everything that the rest of the city
    has discarded. Here boots with holes. There a pile of books with their
    covers torn off. A woman with a basket of eggs that may or may not still
    be eggs. A man with a cart of watermelons who is conducting a vigorous
    personal argument no one else is part of.
  beggars: >-
    The beggars of the Haymarket are professionals in misery, their suffering
    worn like a uniform. They have learned what expressions move coins from
    pockets. Some have forgotten there was ever a time before this.
  voices: >-
    The voices of the square overlap and tangle. Arguments, bargaining,
    greetings, curses. Each voice is a whole life, a whole history, a whole
    set of reasons why today is like this and not like something better.
  fiddle: >-
    Somewhere in the square, a fiddle player is working through something
    slow and minor. The melody rises and disappears into the noise and comes
    back in pieces.
  bucket: >-
    The woman with the bucket is selling kvass — fermented bread water,
    dark and sour. For a kopek she fills a tin cup. It is cold. It is the
    closest thing to relief the square offers.
spawninfo:
- mobid: 313
  message: 'A man in a worn civil service coat lurches through the crowd, bottle in hand, seeking an audience for his confession.'
  respawnrate: 10 real minutes
idlemessages:
- The press of bodies in the Haymarket generates its own heat, separate from and worse than the summer.
- A dispute between two vendors reaches some climax of volume and then subsides without resolution.
- 'The fiddle player switches to something faster, and for a moment the square seems almost festive, almost alive.'
- A child darts through the crowd with something grabbed from a stall. The vendor shouts. The child is already gone.
- The smell of the Haymarket is like the smell of the city concentrated and offered to you directly.
- 'Pigeons work the cobblestones methodically, indifferent to the feet around them, eating whatever the market leaves behind.'
