roomid: 1880
zone: The Monkey Wrench Gang
title: The Lonely Dell
description: >-
  You stand at <ansi fg="itemname">Lees Ferry</ansi>, the ancient crossing point of the
  <ansi fg="cyan">Colorado River</ansi> in the far north of Arizona, just below the Utah
  line. The river here is still green and cold, running swift and clear from the depths
  of Glen Canyon before the dam stole its heart. Red sandstone walls rise on both sides,
  vertical and absolute, their faces streaked with <ansi fg="red">desert varnish</ansi>
  — millennia of manganese and iron oxide painted by wind and water. A <ansi fg="itemname">cottonwood
  grove</ansi> offers dappled shade near the bank. The ferryman is long gone. An old stone
  house moulders at the edge of the clearing. The air smells of sage and cold water and
  the particular ancient silence of the canyon country. To the <ansi fg="exit">east</ansi>,
  a rough trail leads down to the river itself. To the <ansi fg="exit">south</ansi>,
  a two-lane blacktop disappears into the heat haze of the open desert.
