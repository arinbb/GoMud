idlemessages:
- The Festivus pole stands at the center of the room, silver and unadorned and perfectly correct.
- The dinner on the table waits for the Airing of Grievances to conclude. The grievances are not concluding.
- From upstairs comes the sound of Frank Costanza preparing an opinion about something.
- 'The basement is quiet in the particular way that basements in Queens are quiet: not peacefully.'
- The card table sits ready for the Airing of Grievances. The grievances are significant this year. They are always significant.
- A Festivus tradition, the Feats of Strength, requires that Frank Costanza be pinned to the floor. This has not yet happened.
- The aluminum pole catches the basement light and holds it. This is sufficient.
- 'Frank Costanza''s voice drifts down the stairs: something about tinsel and how he does not understand why anyone ever wanted tinsel.'
