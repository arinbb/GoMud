roomid: 2320
zone: Siamese Dream
title: The Control Room
description: >-
  Triclops Sound Studios, Atlanta, Georgia. Summer 1993. The <ansi
  fg="itemname">control room</ansi> is a cathedral of tape machines and
  outboard gear, every rack unit blinking behind a massive <ansi
  fg="itemname">Neve mixing board</ansi> that stretches the width of the room,
  hundreds of faders set to positions only Butch Vig understands. <ansi
  fg="itemname">Tape reels</ansi> stack in cardboard boxes along the wall,
  each labeled in Billy's careful handwriting. The red recording light has been
  on for what feels like weeks. A <ansi fg="itemname">note</ansi> is taped to
  the wall beside the board. Through the <ansi fg="itemname">glass</ansi>
  window you can see the <ansi fg="exit">live room</ansi> to the east, where
  amplifiers stand in a circle. The air conditioning has been broken for eleven
  days. The <ansi fg="exit">parking lot</ansi> is visible through the door to
  the south. The air smells of solder, coffee, and overdriven tubes.
