character:
  name: J. Peterman
  description: >-
    A tall man, silver-haired, wearing a coat of some kind -- it is always
    some kind of coat, and it always has a story. He speaks in catalog copy,
    elevated and sincere, seeing every object as the distillation of a human
    experience worth describing. He has been everywhere. He will tell you
    about everywhere. The adventures are real in the way that the catalog
    is real: not literally true, but true in intent, which is perhaps more
    important. His mustache is the mustache of a man who has made decisions.
