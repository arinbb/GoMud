idlemessages:
- The turntable platter rotates slowly, waiting for a record to play.
- The tape deck's VU meters flicker, picking up a ghost signal from somewhere.
- A faint hiss of static comes from the headphones hanging on the wall.
- The smell of warm vacuum tubes and old vinyl fills the room.
- The CD player's blue display pulses gently in the dim light.
- Somewhere in the stacks of records, a sleeve shifts and falls with a soft thwap.
