roomid: 7
zone: The Grand Library
title: The Listening Room
description: >-
  A warm, wood-paneled room suffused with the hum of music waiting to be played.
  Three listening stations occupy the space, each from a different era. A vintage <ansi fg="itemname">turntable</ansi> sits on a mahogany cabinet, its tonearm
  resting beside a stack of <ansi fg="itemname">vinyl records</ansi> in paper
  sleeves. A brushed-aluminum <ansi fg="itemname">tape deck</ansi> with glowing
  VU meters sits on a shelf beside rows of <ansi fg="itemname">cassette tapes</ansi>
  in plastic cases. A sleek <ansi fg="itemname">CD player</ansi> with a blue
  display occupies a modern stand, surrounded by <ansi fg="itemname">jewel cases</ansi>.
  A pair of massive <ansi fg="itemname">headphones</ansi> hangs from a hook on the
  wall. The room smells of warm vacuum tubes and old vinyl. The <ansi fg="exit">atrium</ansi> is back to the north.
mapsymbol: L
maplegend: Listening Room
biome: house
exits:
  north:
    roomid: 1
    exitmessage: You step back out into the Grand Atrium.
nouns:
  turntable: >-
    A beautiful vintage turntable with a walnut plinth and a polished
    tonearm. The platter spins silently when you touch it, as if eager
    to play. A small placard reads "FOR VINYL RECORDS — Place your
    record on the platter, drop the needle, and listen." The cabinet
    beneath holds a tube amplifier that glows amber.
  records: >-
    Stacks of vinyl records in paper and cardboard sleeves, organized
    by genre. Jazz, rock, classical, blues, soul, punk, electronic.
    Some covers are pristine, others worn soft from years of loving
    use. Each one is a world compressed into grooves.
  deck: >-
    A brushed-aluminum cassette deck with two tape wells, glowing
    green VU meters, and chrome transport buttons. A placard reads
    "FOR CASSETTE TAPES — Insert your tape and press play." The
    rewind and fast-forward buttons have a satisfying mechanical click.
  tapes: >-
    Rows of cassette tapes in clear plastic cases, their spines labeled
    in pen or printed in tiny type. Mix tapes with handwritten track
    lists sit beside commercial releases. The magnetic ribbon inside
    each one holds music in a fragile, analog embrace.
  player: >-
    A sleek CD player with a motorized tray and a blue LCD display.
    A placard reads "FOR COMPACT DISCS — Place your disc in the tray
    and press play." The display currently reads "NO DISC" in patient
    blue letters.
  cases: >-
    Jewel cases arranged on a shelf, their plastic covers catching the
    light. Each one holds a silver disc etched with microscopic data —
    music encoded as ones and zeros, cold and precise and perfect.
    Some cases are cracked from use. Some have liner notes thick as
    novellas.
  headphones: >-
    Massive over-ear headphones, the kind that seal out the world and
    let only the music in. The ear cups are padded with worn leather.
    Putting them on would be like stepping inside the sound itself.
