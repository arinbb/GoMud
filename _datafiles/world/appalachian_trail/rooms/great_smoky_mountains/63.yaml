roomid: 63
zone: Great Smoky Mountains
title: Kuwohi Summit
description: "You stand at the highest point on the entire Appalachian Trail. Kuwohi\x976,643 feet above sea level\x97towers above every other peak the AT touches in its 2,190-mile journey from Georgia to Maine. The Cherokee called this mountain Kuwahi, the mulberry place, and believed it was the home of the White Bear chief, a powerful spirit who dwelled in the enchanted lake on the summit. The name was officially restored from its colonial-era name in September 2024, reclaiming a connection to the people who knew these mountains for thousands of years before European contact. A concrete observation tower spirals upward from the summit, its ramp climbing to a 360-degree platform above the treetops. The forest up here is a ghost forest\x97Fraser fir killed by the balsam woolly adelgid stand in dense ranks of silver-gray trunks, their bark stripped away by decades of wind and ice. Young firs grow between the dead, bright green against the gray, racing to reach maturity before the adelgid finds them too. The air is thin and cold, even in summer. Clouds form and dissolve at eye level."
