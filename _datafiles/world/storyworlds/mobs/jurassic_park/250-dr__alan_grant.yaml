character:
  name: Dr. Alan Grant
  description: >-
    A compact, weathered man in his late forties, dressed practically in khaki
    work shirt and trousers, a wide-brimmed hat pulled low. He looks like what
    he is: a man who spends most of his time on his knees in the Montana dirt.
    His expression is habitually focused, reserved, occasionally lit from
    within by the pure intellectual pleasure of understanding something new.
    He does not like computers. He does not especially like children. He is
    very good in a crisis, which surprises him most of all.
  raceid: 1
  level: 8
