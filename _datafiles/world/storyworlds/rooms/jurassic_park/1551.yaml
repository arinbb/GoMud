roomid: 1551
zone: Jurassic Park
title: The Main Gates
description: >-
  The road ends at a pair of <ansi fg="itemname">massive wooden gates</ansi>,
  thirty feet tall, fashioned from rough-hewn tropical hardwood and bound with
  iron. <ansi fg="10">JURASSIC PARK</ansi> is carved into the crossbeam in
  enormous letters, and torches flicker in iron brackets on either side despite
  the daylight — a theatrical touch, deliberately primordial. The gates stand
  open just now, though their sheer scale makes clear they could crush whatever
  passed through them. Beyond the gates, the <ansi fg="exit">tour road</ansi>
  curves north into the park interior, flanked by jungle so dense it forms a
  green wall. A <ansi fg="itemname">viewing platform</ansi> stands to one side,
  and a path leads <ansi fg="exit">west</ansi> along the perimeter toward the
  raptor pens. The torches hiss and gutter in a breeze that carries the smell of
  wet earth and something enormous living not far away.
