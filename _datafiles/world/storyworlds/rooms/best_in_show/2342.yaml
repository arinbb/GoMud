nouns:
  weimaraner: >-
    Beatrice the Weimaraner occupies the center of the king bed with the regal
    certainty of an animal that has never once been told no. Her grey eyes track
    movement in the room with the focus of a creature who is monitoring the
    emotional climate of her owners and finding it, as usual, unstable. She is
    magnificent. She is also, technically, the most functional individual in
    this room.
  coffee: >-
    Two Starbucks cups. Both are cold. The argument that caused them to go cold
    began when one of them said something about the appointment with Dr. Millbank,
    and then the other one said something about the thing that happened at the
    Starbucks last Tuesday, and then both of them were talking simultaneously in
    the precise, careful, therapy-fluent language of two people who have been told
    by a professional exactly how to fight.
  book: >-
    A copy of "Feel the Feelings and Also Be Fine: A Journey." The spine is cracked
    at the chapter on "Communicating Your Needs Without Making It About You." There
    are margin notes in two different handwriting styles. One is neat. One is emphatic.
  mirror: >-
    The sticky note on the bathroom mirror reads: "I am worthy of love and I also
    believe in Beatrice." Below it, in a different pen: "We are a team. We are a
    team. WE ARE A TEAM." It is unclear which of the Swans wrote which part, but
    both parts were clearly written during separate moments of necessity.
spawninfo:
- mobid: 542
  message: "<ansi fg=\"8\">Hamilton Swan stands near the window, holding a cold Starbucks, looking out at Philadelphia with the expression of a man who is composing his feelings into the precise vocabulary his therapist recommended and finding the vocabulary insufficient.</ansi>"
  respawnrate: 5 real minutes
- mobid: 543
  message: "<ansi fg=\"8\">Meg Swan sits on the edge of the bed beside Beatrice, one hand on the Weimaraner's flank, practicing slow breathing. The breathing is not working. She switches to a different breathing pattern. That one is also not working.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- Beatrice shifts on the bed and both Swans look at her simultaneously with identical expressions of concern.
- Hamilton opens his mouth, composes something, closes his mouth, opens it again, says nothing.
- Meg picks up the self-help book, reads a paragraph, sets it down, picks up the Starbucks cup, discovers it is cold.
- The room is very quiet in the way rooms get quiet when two people are saying nothing very loudly.
- Beatrice yawns. In the context of this room, this yawn carries significant emotional weight.
- Hamilton checks his watch. Meg notices him checking his watch. He notices her noticing. They both look at Beatrice.
- The heating unit cycles on. The sound of it is briefly a relief from the silence.
- Somewhere in the suite, a phone buzzes. Neither of them picks it up.
