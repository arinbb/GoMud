idlemessages:
- The console hums quietly, its power light a steady green eye in the dim room.
- 'A faint chiptune melody plays from one of the dormant arcade cabinets — just a few notes, then silence.'
- The CRT monitor in the corner displays a screensaver of slowly drifting stars.
- The beanbag chair exhales slightly as the room settles, as if remembering the last person who sat in it.
- 'You hear a distant sound effect: a coin dropping into a slot. But none of the cabinets are on.'
- The smell of warm electronics and old carpet fills the room with a specific nostalgia.
