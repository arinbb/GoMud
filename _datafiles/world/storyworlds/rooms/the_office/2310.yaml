roomid: 2310
zone: The Office
title: The Stairwell
description: >-
  The internal stairwell of the Scranton Business Park building -- concrete steps,
  painted cinder block walls, a railing that is stable but not elegant. The stairwell
  is not a destination; it is a transition space, which makes it the perfect place for
  conversations that cannot happen at desks. The <ansi fg="itemname">walls</ansi> are
  marked with years of passage -- a scuff here, a handprint there, something written
  in Sharpie near the second-floor landing that says 'JIM + PAM' inside a heart, which
  was written by neither Jim nor Pam but which has been here long enough that everyone
  has decided it is canonical. The <ansi fg="itemname">fluorescent fixture</ansi> on
  the landing flickers on a three-second cycle, a pattern so consistent that it has
  become ambient. Private conversations happen here. Real things are said here. The
  stairwell has heard more truth than the conference room ever will. The <ansi fg="exit">break room</ansi> is to the south. The <ansi fg="exit">rooftop</ansi> is up.
