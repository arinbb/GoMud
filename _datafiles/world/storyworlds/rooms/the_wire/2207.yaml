roomid: 2207
zone: The Wire
title: The Detail Office
description: >-
  A basement room under the <ansi fg="8">courthouse</ansi>, not an office so much
  as a repurposed storage space that has been equipped with the minimum: folding
  tables, mismatched <ansi fg="itemname">chairs</ansi>, a whiteboard covered in
  <ansi fg="yellow">names and connections</ansi> drawn in dry-erase marker that
  will not fully erase. <ansi fg="yellow">Fluorescent lights</ansi> hum at a
  frequency that suggests they were installed in 1987 and never serviced.
  <ansi fg="itemname">Wiretap equipment</ansi> occupies one end of a folding table
  -- reel-to-reel recorders, headphones, a phone junction box. <ansi fg="itemname">Lester
  Freamon</ansi> sits at a desk in the corner building something small from wood
  with the patience of a man who has understood the long game for decades.
  The board on the wall is the whole case: money, names, arrows connecting them.
  West Baltimore is to the <ansi fg="exit">south</ansi>, the courthouse is to the
  <ansi fg="exit">east</ansi>, and <ansi fg="exit">City Hall</ansi> is north from
  the courthouse.
