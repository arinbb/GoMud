roomid: 1893
zone: The Monkey Wrench Gang
title: The Train Bridge
description: >-
  A <ansi fg="8">railroad bridge</ansi> spans a deep gorge here, its steel truss
  construction rising forty feet above the canyon floor, the tracks running straight
  across on a tie-and-rail deck. The gorge below is <ansi fg="red">red sandstone</ansi>,
  narrow and sheer, dropping sixty feet to a dry wash choked with salt cedar. The
  bridge carries coal trains from the strip mines of the Navajo Nation to the power
  plants of southern Arizona — a hundred-car trains of loaded coal cars, sixty tons
  per car, crossing this bridge twice a day. The steel girders are hot from the desert
  sun. The smell is metal and creosote from the railroad ties. A <ansi fg="itemname">maintenance walkway</ansi> runs the length of the bridge on the downstream side, its safety
  railing spotted with rust. The most ambitious operation the gang has considered
  involves this bridge, a specific point in the truss where the stress concentration
  factor is highest, and a quantity of cutting charges. They have not done it yet.
  They are still planning. To the <ansi fg="exit">road</ansi> to the <ansi fg="exit">south</ansi>,
  the highway leads back toward the junction.
