roomid: 1559
zone: Jurassic Park
title: The Visitor Center Entrance
description: >-
  The Visitor Center looms before you — an enormous structure of glass and
  concrete designed to awe, its vast <ansi fg="itemname">atrium</ansi> windows
  reflecting the sky. It is an architectural statement about human ambition,
  which is perhaps not the statement it was intended to make. Above the main
  entrance, a vast fabric <ansi fg="itemname">banner</ansi> reads <ansi fg="10">WHEN DINOSAURS RULED THE EARTH</ansi> in bold yellow letters — though it hangs
  at a slight angle now, one corner torn loose in the storm. The lobby doors
  stand open. The building is unfinished in places; scaffolding still stands
  on the south wing, and extension cords run along the floor. John Hammond
  wanted it open before it was ready. The <ansi fg="exit">north</ansi> entrance
  leads to the main hall. The <ansi fg="exit">east</ansi> takes you to the
  kitchen. The DNA lab is to the <ansi fg="exit">south</ansi>. A <ansi fg="exit">corridor</ansi>
  leads northwest to the control room.
