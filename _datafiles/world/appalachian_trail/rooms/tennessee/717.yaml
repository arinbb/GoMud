roomid: 717
zone: Tennessee
title: Watauga Lake Shelter
description: "Watauga Lake Shelter sits on a wooded hillside above Watauga Lake, a TVA reservoir that fills a drowned mountain valley with deep blue water. The three-sided shelter sleeps eight on a raised platform. A stream provides water nearby. Through the trees, the lake is visible\x97its surface calm and blue, reflecting the forested mountains that ring it. The old town of Butler lies somewhere beneath that water, flooded when the dam went in. The shelter is a popular stop, both for thru-hikers and for weekend visitors who come for the lake. A bear box and privy serve the site. A trail register hangs from the front post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 39
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A popular three-sided shelter above the lakeshore. The wood is worn from heavy use."
  platform: "The sleeping platform holds eight. Signs of heavy use are visible\x97the wood is worn smooth."
  register: "A well-thumbed trail register, thicker with entries than most."
  lake: "Watauga Lake is a TVA reservoir, deep blue and cold, ringed by forested mountains. The old town of Butler was flooded when the Watauga Dam was built in 1948. Sometimes, when the water is low, the foundations of old buildings appear along the shore."
  stream: "A reliable stream runs down the hillside near the shelter, providing water."
  privy: "A privy uphill from the shelter."
  bearbox: "A large bear box, reflecting the shelter's heavy use."
idlemessages:
- Watauga Lake gleams blue through the trees, impossibly still on a calm day.
- A bass jumps in the lake, the splash carrying clearly up the hillside.
- Somewhere beneath the blue water, the streets of old Butler lie silent and drowned.
- A canoe traces a slow line across the lake, its wake spreading in a widening V.
- The smell of lake water and pine drifts up the hillside on a warm breeze.
- A loon calls across the lake, its eerie wail echoing off the surrounding mountains.
