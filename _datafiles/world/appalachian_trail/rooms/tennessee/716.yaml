roomid: 716
zone: Tennessee
title: Laurel Fork Shelter
description: "Laurel Fork Shelter sits at the edge of Laurel Fork Gorge, one of the most scenic sections of the AT in Tennessee. The gorge cuts through ancient rock, its creek tumbling over waterfalls and cascades. The three-sided shelter sleeps eight on a raised platform. Laurel Fork provides the water source\x97a beautiful, wild creek that runs clear over smooth stones and drops over ledges into dark pools. Hemlock and rhododendron line the banks, their roots gripping the exposed rock. The sound of moving water is everywhere. A bear box and privy serve the site. A trail register hangs from the front post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 39
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A three-sided shelter at the edge of the spectacular Laurel Fork Gorge."
  platform: "The sleeping platform holds eight. The wood is worn and slightly damp from the gorge humidity."
  register: "A trail register in its zip-lock bag."
  gorge: "Laurel Fork Gorge is a deep cut through ancient rock, the creek falling over waterfalls and cascading through narrow channels. Hemlock and rhododendron crowd the banks. It is one of the most beautiful stretches of trail in Tennessee."
  falls: "Several waterfalls drop along Laurel Fork, the largest falling about twenty feet into a dark pool. The rock is smooth and ancient, sculpted by millennia of water."
  privy: "A privy perched above the gorge."
  bearbox: "A bear box near the shelter."
idlemessages:
- Laurel Fork tumbles through the gorge, its cascades echoing off the rock walls.
- A waterfall thunders in the distance, hidden behind a curtain of rhododendron.
- Hemlock roots grip the exposed rock along the gorge, twisted and tenacious.
- Mist rises from the cascades, cooling the air and dampening everything.
- A kingfisher rattles along the creek, darting between pools.
- The ancient gneiss of the gorge walls is striped and folded, a geological textbook.
