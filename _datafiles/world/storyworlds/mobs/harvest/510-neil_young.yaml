  - emote strums a G chord and lets it decay into the afternoon.
character:
  name: Neil Young
  description: >-
    A tall young man in flannel and denim, an acoustic guitar slung across his
    back, a harmonica in a neck rack at his chest. Twenty-four years old and
    already writing songs that will outlast him. There is a quiet intensity
    about him, the look of someone who is always slightly somewhere else --
    inside a lyric, inside a chord change, inside a question he has been
    asking for years. The ranch is his, or will be. He sits on the fence rail
    with the comfort of a man who already knows where home is.
  raceid: 1
  level: 10
