roomid: 12
zone: Georgia
title: Gooch Mountain Shelter
description: "A well-maintained three-sided shelter sits in a gap on Gooch Mountain at 2,772 feet. This is a popular first-night stop for hikers who started late from Springer, and the clearing shows it\x97the tent sites are well-worn, the fire ring blackened from heavy use, and the bear box has seen better days. An excellent spring flows nearby, one of the best water sources in the first twenty miles. The sleeping platform is standard AT fare\x97rough planks, room for a dozen. The privy is up the hill. A trail register hangs from the shelter post in its customary zip-lock bag."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 5
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A standard three-sided wooden lean-to in good condition. The sleeping platform is smooth from use. Someone has left a broom in the corner\x97a rare luxury."
  platform: "Room for about twelve on the wooden platform. The planks are worn smooth. A broom in the corner suggests someone cares about this place."
  register: "The shelter register is thick with entries\x97this is a popular stop. The zip-lock bag is relatively new, the notebook less so."
  water: "An excellent spring flows nearby, piped into a rough wooden trough. The water is cold and plentiful year-round\x97one of the best sources in the first twenty miles of Georgia."
  spring: "The spring is piped to a wooden trough near the shelter. Clear, cold water flows steadily. You still need to filter it, but the flow is reliable."
  privy: "The privy sits uphill from the shelter. It is in decent shape, which hikers learn to appreciate quickly on a thru-hike."
  bearbox: "A steel bear box, well-used and dented. The latch still works. Food bags of various sizes crowd the interior."
  tentsites: "Several flat tent sites surround the shelter clearing. The ground is packed hard from heavy use, especially in March and April when the bubble of NOBO thru-hikers passes through."
  firering: "A blackened fire ring sits in front of the shelter. The stones are scorched dark from years of campfires."
idlemessages:
- The spring gurgles steadily into its wooden trough, a comforting sound in the quiet forest.
- A wood thrush sings its spiraling flute-song from the canopy overhead.
- The fire ring is cold, but the smell of old ash lingers.
- Tent stakes clink against rocks as a hiker sets up camp in the clearing.
- A salamander crawls across the shelter floor, bright orange against the dark wood.
- The gap funnels a steady breeze through the clearing, keeping the bugs at bay.
