title: Erwin, TN / Unaka Mountains
description: "The trail drops into the Nolichucky River gorge and the town of Erwin, Tennessee\x97a railroad town wedged into a narrow valley between steep mountains. Erwin is a complicated place. The people are generous to hikers, the restaurants are good, and Uncle Johnny's hostel is legendary. But the town carries a dark piece of history: in 1916, a circus elephant named Mary was hanged here from a railroad crane after she killed a handler. It is a story the town has never quite escaped. North of Erwin, the trail climbs into the Unaka Mountains, passing through dense spruce-fir forest and across exposed ridges. The Cherokee called one of these peaks Nonahala\x97roughly translated as Not Business Knob\x97a place where people were not meant to go. The trail goes there anyway."
