nouns:
  table: >-
    Formica table, exactly the right size for four people to sit around and
    discuss whether a particular behavior is socially acceptable. The table
    is clean except for a faint syrup ring near one edge. The syrup ring
    belongs to George. It always has.
  window: >-
    The window faces Broadway. You can see the newsstand, the crosswalk,
    the general traffic of the Upper West Side proceeding with its business.
    The window is where Jerry looks when he has an observation brewing.
    The window is raw material.
  napkin: >-
    The napkin dispenser. Chrome, cylindrical, holding maybe twenty napkins
    at a time. George has pulled napkins from this dispenser while making a
    point. Elaine has made a napkin airplane at this table. The napkins
    have been here the whole time, neutral and available.
spawninfo: []
idlemessages:
- The booth holds the memory of a thousand conversations, none of them resolved, all of them important.
- The view through the window shows Broadway doing exactly what Broadway always does.
- The table is sticky near George's usual spot. Some things are permanent.
- Someone left a napkin on the table that has a phone number written on it. Whose number. What for. Unknown.
- The back booth is quieter than the front of the diner. This is by design. Important nonsense requires some distance from the door.
- A refill arrives without being requested. This is good diner service. This is always how it works here.
