idlemessages:
- A book near the top shelf slides out an inch on its own, then slowly pushes itself back in.
- The brass ladder rolls a few inches along its rail with a soft metallic whisper.
- You catch the faint sound of whispering, but it seems to come from the books themselves.
- A page turns somewhere in the stacks, though no one else seems to be nearby.
- The glow along certain book spines brightens for a moment, then fades.
