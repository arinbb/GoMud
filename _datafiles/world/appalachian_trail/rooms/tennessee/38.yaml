nouns:
  rhododendron: "The Catawba rhododendron gardens of Roan Mountain are famous throughout the southern Appalachians. In June, acres of the mountainside erupt in pink and purple bloom. The display has been drawing visitors since at least the 1870s, when General John Wilder built a hotel on the summit."
  balds: "The grassy balds of the Roan Highlands are some of the largest on the AT. Round Bald, Jane Bald, and Grassy Ridge Bald roll one after another along the ridgeline, treeless and windswept, offering views that seem to encompass the entire world."
  spruce: "Fraser fir and red spruce dominate the highest elevations, their dark spires standing against the sky like a northern forest transplanted to the South. Many of the firs are dead or dying\x97killed by the balsam woolly adelgid, an invasive insect. The standing dead trees are gray and skeletal."
  summit: "Roan High Knob rises to 6,285 feet, the highest point on the AT between Clingmans Dome in the Smokies and Mount Washington in New Hampshire. The summit is forested\x97no views from the top\x97but the surrounding balds offer panoramas in every direction."
  blazes: "White blazes are painted on rocks and short posts across the open balds, and on the dark trunks of spruce trees through the forested sections."
idlemessages:
- Wind roars across the open bald, flattening the grass and making conversation impossible.
- Rhododendron thickets press against the trail, their gnarled trunks twisted by decades of mountain wind.
- A cloud rolls across the ridgeline, engulfing the trail in cold gray mist, then passing just as suddenly.
- The smell of balsam fir fills the air\x97sharp, clean, like Christmas in the middle of summer.
- Dead Fraser firs stand like gray ghosts along the ridge, killed by the balsam woolly adelgid.
- The view from the bald is staggering\x97ridge after ridge rolling north toward Virginia, south toward the Smokies.
