roomid: 2322
zone: Siamese Dream
title: Quiet
description: >-
  A room of two weathers. Right now, it is whispering. The <ansi fg="itemname">walls</ansi> are pale and close, the air thin and still, the
  kind of stillness that presses against your ears. A single <ansi fg="itemname">candle</ansi> burns on a low table, its flame barely moving in
  air this quiet. The <ansi fg="itemname">threshold</ansi> at the far end is a
  line you can see -- on this side, silence; on that side, everything. The room
  holds its breath. You hold yours. Something in the architecture is coiled,
  compressed, waiting to be released. The silence is not peace. The silence is
  potential. The <ansi fg="exit">studio</ansi> is back to the southwest.
mapsymbol: '2'
maplegend: Quiet
biome: house
exits:
  southwest:
    roomid: 2320
nouns:
  walls: >-
    The walls on the quiet side are white, slightly damp, covered in a layer
    of acoustic foam that absorbs everything. No reverb. No reflection. Pure
    dead air. On the loud side -- and you can see it from here, past the
    threshold -- the walls are shredded, blown outward, the acoustic foam
    hanging in ribbons from the violence of the transition. The loud side has
    been loud for a long time.
  candle: >-
    A single white candle on a low table, its flame so still in the absolute
    quiet that you could mistake it for a painting. The wax has melted just
    enough to show it has been burning a while. When the loud side ignites,
    this candle will be extinguished in an instant. Until then, it burns with
    the patience of something that knows it is temporary.
  threshold: >-
    The line between whisper and scream. On this side: white walls, dead air,
    the candle. On that side: nothing recognizable, just a blurred impression
    of maximum volume, walls that gave up being walls, sound that gave up being
    sound. The threshold is a single step. You could cross it at any moment.
    But right now, you wait in the quiet, and the quiet waits with you.
idlemessages:
- The candle flame does not move. The air in this half of the room does not move.
- 'On the far side of the threshold, something shifts -- a sound so large it is felt before it is heard.'
- You become aware of the sound of your own breathing. In this much silence, everything becomes loud.
- The acoustic foam absorbs even the ghost of sound, the memory of sound, the idea of sound.
- The threshold glimmers. Just for a moment, the loud side shows you something enormous and then it is quiet again.
- 'A single guitar harmonic floats through -- thin and pure and already fading -- and then nothing.'
