roomid: 33
zone: North Carolina
title: Cheoah Bald / Stecoah Gap
description: "The trail between the Nantahala Outdoor Center and Fontana Dam is considered by many thru-hikers to be the most physically punishing section south of New Hampshire's White Mountains. From the river at Wesser, the trail climbs nearly 3,000 feet in five miles to Cheoah Bald at 5,062 feet, a relentless grind up rocky switchbacks. Cheoah Bald itself is a grassy summit with sweeping views of the Smokies to the north and the Nantahala range to the south\x97a reward earned through suffering. The descent is equally brutal, dropping into Stecoah Gap before climbing again. The terrain rolls in a punishing rhythm of ascent and descent, gap and bald, up and down, with no flat ground anywhere. Sassafras Gap and Cable Gap shelters offer respite in the hollows between climbs."
