nouns:
  counter: >-
    A long Formica counter with spinning stools. Every stool is occupied by
    someone with a story. The counter has heard everything. The counter judges
    no one.
  donuts: >-
    Classic ring donuts, glazed, chocolate, and the sprinkle variety. Plus crullers,
    bear claws, and the occasional jelly-filled that sits alone with quiet dignity.
    These are excellent donuts. Wayne knows this. Aurora knows this.
  coffee: >-
    Dark, strong, and served without ceremony. This coffee will not change your
    life. It will, however, make your life feel manageable, which is better.
  mug: >-
    A heavy ceramic diner mug. It has been washed ten thousand times. It will
    be washed ten thousand more. It is indestructible.
  sign: >-
    Stan Mikita, hockey legend, gazes from the wall in full gear. His name
    above the door is both homage and business decision. Aurora is proud.
spawninfo:
- mobid: 244
  message: "<ansi fg=\"yellow\">Stan Mikita wipes down the counter with the authority of a man who owns the place.</ansi>"
  respawnrate: 5 real minutes
- mobid: 248
  message: "<ansi fg=\"yellow\">A regular customer settles onto a stool with the ease of a man who belongs here.</ansi>"
  respawnrate: 8 real minutes
idlemessages:
- The coffee urn gurgles and everyone in the shop unconsciously relaxes.
- A donut rolls slightly on its display stand. Another day, another glazed.
- Stan wipes the counter even though the counter is already clean. It is a zen practice.
- The door opens and someone comes in, nodding at everyone they know, which is everyone.
- The overhead light hums a note that harmonizes, somehow, with the cash register.
- Someone dunks a cruller into their coffee and achieves, briefly, perfection.
- The conversation in the back booth is about everything and nothing and Aurora.
