roomid: 712
zone: Tennessee
title: Clyde Smith Shelter
description: "Clyde Smith Shelter sits on the approach to the Roan Highlands, in transitional forest where hardwoods give way to spruce and fir. The three-sided shelter sleeps six and is well-maintained. A piped spring provides water about a hundred yards below the shelter. The elevation here is gaining\x97you can feel the temperature drop and see the forest changing around you. Birch and beech give way to spruce. The understory shifts from rhododendron to ferns and moss. The air smells different up here\x97thinner, colder, with the sharp scent of conifers. A bear box and privy serve the site. A trail register hangs from the front post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 38
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A well-maintained three-sided shelter at the forest transition zone. The logs smell of spruce resin."
  platform: "The sleeping platform holds six. Cozy and clean."
  register: "A trail register in a bag. The pages feel slightly damp from the high-elevation moisture."
  spring: "A piped spring about a hundred yards below the shelter. Reliable and cold\x97very cold at this elevation."
  forest: "The forest is changing here. Hardwoods thin out and spruce-fir forest takes over. The transition happens over just a few hundred vertical feet, a visible ecological boundary."
  privy: "A privy in the spruce behind the shelter."
  bearbox: "A bear box at the clearing edge."
idlemessages:
- The forest transitions around you\x97birch and beech below, dark spruce above.
- A red squirrel chatters from a spruce bough, its territory clearly defined.
- The air has a sharp conifer edge to it, noticeably different from the hardwoods below.
- Moss covers every surface that stays still long enough\x97logs, rocks, the privy.
- The temperature drops noticeably as a cloud passes over the ridgeline above.
- A winter wren sings from somewhere in the spruce, its song impossibly long and complex.
