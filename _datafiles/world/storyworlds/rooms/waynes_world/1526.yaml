roomid: 1526
zone: Waynes World
title: The Gasworks
description: >-
  Aurora's premier live music venue. The <ansi fg="itemname">Gasworks</ansi> is
  dark, loud, and smells of spilled beer, dry ice, and human ambition. A proper <ansi fg="itemname">stage</ansi> occupies the far end, elevated above the crowd,
  bristling with <ansi fg="itemname">equipment</ansi> — amps, monitors, mic stands.
  The <ansi fg="itemname">bar</ansi> runs the length of the right wall, its bottles
  lit from below in amber and green. The <ansi fg="itemname">crowd</ansi> tonight
  is the crowd every night — the faithful, the curious, and Tiny the bouncer
  at the door. <ansi fg="exit">North</ansi> leads back to the street. Access to <ansi fg="exit">backstage</ansi> requires knowing someone.
mapsymbol: G
