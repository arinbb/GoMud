roomid: 2150
zone: Northern Exposure
title: Maurices Lodge
description: >-
  <ansi fg="yellow">Maurices Lodge</ansi> is the largest and most intentional
  building in Cicely, which is saying something about Maurice Minnifield and
  something about Cicely. The <ansi fg="itemname">main room</ansi> is hunting
  lodge and command center -- <ansi fg="itemname">trophy heads</ansi> on the
  walls alongside <ansi fg="itemname">framed photographs</ansi> of Maurice with
  various dignitaries, several U.S. presidents, and the Apollo program. At the
  center of the mantle, lit from above: a <ansi fg="cyan">moon rock</ansi> in
  a small display case, the actual moon, brought back personally, the centerpiece
  of Maurice's biography. A large <ansi fg="itemname">American flag</ansi>
  stands beside the fireplace. Maps of Cicely and the surrounding region, with
  Maurice's development plans marked in red, cover the <ansi fg="itemname">table</ansi>.
  This man came to Alaska and decided to improve it. The improvement is ongoing.
  To the <ansi fg="exit">east</ansi>, Main Street.
