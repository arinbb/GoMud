roomid: 1909
zone: The Little Prince
title: The Rose Garden
description: >-
  Five thousand roses. They bloom in every direction, row upon row, each
  one the same shade of red as the rose on B-612. Each with four petals.
  Each with four thorns. Each demanding, beautiful, slightly vain, fragrant.
  Each exactly like the others. From here, the <ansi fg="itemname">roses</ansi>
  stretch to the garden walls and beyond -- there are so many that the air
  is thick with their scent, almost solid with it, a presence rather than
  a smell. When the Little Prince first saw this garden, he felt very
  unhappy. He had thought he owned the only rose in the universe. He had
  thought his rose was unique. He lay in the grass among five thousand roses
  and wept. It was only later, when the Fox explained, that he understood:
  his rose was not unique because she was rare. She was unique because he
  had <ansi fg="itemname">tended</ansi> her. Time given is what makes
  something yours. The <ansi fg="exit">desert</ansi> is south.
