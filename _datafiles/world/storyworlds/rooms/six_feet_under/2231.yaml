roomid: 2231
zone: six_feet_under
title: The Cemetery
description: >-
  Green <ansi fg="10">grass</ansi> between the <ansi fg="itemname">graves</ansi>,
  the green that only cemeteries maintain because they have the budget and the
  obligation and the time. A Los Angeles <ansi fg="itemname">sky</ansi> above,
  blue and unhurried. The <ansi fg="itemname">headstones</ansi> are in rows that
  are not quite rows -- slight variations in age and height that give the cemetery
  its real character. Near the center, a <ansi fg="itemname">grave</ansi> with
  fresh flowers: <ansi fg="itemname">Nathaniel Fisher Sr.</ansi>, dates, a brief
  inscription. The family comes here. They come separately, usually. They stand
  at the grave and have the conversation that cannot happen across a kitchen table.
  It is quieter here than anywhere else in the show. Things can be said here that
  cannot be said anywhere else. The <ansi fg="exit">entrance</ansi> is to the north.
mapsymbol: Y
