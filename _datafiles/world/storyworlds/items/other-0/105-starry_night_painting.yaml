description: >-
  A reproduction of Van Gogh's Starry Night in a simple wooden frame. The
  swirling blues and yellows seem impossibly vivid, more alive than any print
  should be. The thick brushstrokes catch the light and appear to move -- the
  cypress tree sways, the stars pulse, the village sleeps beneath a sky that
  churns with cosmic energy.
