roomid: 2348
zone: Best in Show
title: The Show Ring
description: >-
  The main ring of the Mayflower Kennel Club Dog Show is a green rectangle of
  competition-grade <ansi fg="itemname">carpet</ansi> under a cathedral of lights.
  <ansi fg="itemname">Bleachers</ansi> rise on three sides, occupied by the kind of
  audience that knows exactly what they are watching and reacts accordingly. At the
  center, a <ansi fg="itemname">judging table</ansi> with a silver cup on it and a blue
  <ansi fg="itemname">ribbon</ansi> that has not yet been given to anyone. The
  <ansi fg="exit">entrance</ansi> is north. The <ansi fg="exit">commentary booth</ansi>
  is east. The <ansi fg="exit">winners circle</ansi> is south.
mapsymbol: R
maplegend: The Show Ring
biome: city
