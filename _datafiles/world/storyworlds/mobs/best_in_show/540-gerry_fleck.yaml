character:
  name: Gerry Fleck
  description: >-
    A middle-aged man from Shakey Hills, Ohio -- the kind of town that sounds made
    up until you go there and find it is exactly what you expected and you feel fine
    about that. He sells fly-fishing equipment for a company called Dogfish Tackle
    and Supply. He is the nicest person in any room he enters. Not naively nice --
    genuinely nice, with the quiet competence of a man who has decided to go through
    life being easy to be around and has been succeeding at this for approximately
    forty-five years. He wears a cardigan. It is the correct cardigan. Behind him, at
    the end of a show lead, a Norwich Terrier named Winky regards the world with an
    expression that mirrors Gerry's exactly.
