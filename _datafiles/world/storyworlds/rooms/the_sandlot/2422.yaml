roomid: 2422
zone: The Sandlot
title: The Sandlot
description: >-
  The <ansi fg="yellow">sandlot</ansi> is a roughly diamond-shaped clearing at
  the end of the street -- packed red dirt worn smooth by ten thousand games,
  four <ansi fg="itemname">base bags</ansi> laid out in the eternal geometry of
  baseball. The <ansi fg="10">outfield</ansi> is ragged grass that fades into
  weeds before it reaches the tall wooden <ansi fg="8">fence</ansi> at the
  south end. Beyond the fence, nothing good has ever come back. The <ansi fg="itemname">dugout</ansi>
  is a dip in the earth on the east side, cool and shaded. A <ansi fg="itemname">bat</ansi>
  leans against a chain-link backstop. This is the whole world. Everything
  that matters happens here.
mapsymbol: S
maplegend: The Sandlot
biome: land
