character:
  name: Mr. Wormwood
  description: >-
    A small, ratty man with a thin moustache and beady eyes full of cunning.
    He wears a spectacularly ugly checked jacket in clashing colors and a
    wide, garish tie. His hair is slicked back with too much oil. He is a
    second-hand car dealer who puts sawdust in gearboxes and spins back
    odometers, and he considers himself a genius for it. He has no interest
    in books, no interest in his daughter's extraordinary abilities, and
    total confidence in his own brilliance. He smells of hair oil and
    dishonesty.
