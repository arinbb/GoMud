nouns:
  rockytop: "Rocky Top is the western summit of Thunderhead Mountain\x97a craggy, wind-blasted overlook with views that sweep across the Tennessee Valley to the Cumberland Plateau. It is the real place that inspired the famous University of Tennessee fight song, though the song's lyrics paint a more pastoral picture than this rugged summit. The rocks are warm in the sun and cold in the shade, and the wind never stops."
  thunderhead: "Thunderhead Mountain rises to 5,527 feet, one of the highest peaks in the western Smokies. The summit area is a mix of rocky outcrops, heath balds, and wind-stunted spruce. It earns its name\x97storms build fast and violent up here, and lightning is a genuine danger on the exposed rock."
  ghosttrees: "The standing dead Fraser firs are everywhere at this elevation\x97gray trunks stripped of bark and bleached by weather, their branches snapped to jagged points. The balsam woolly adelgid, an invasive insect from Europe, has killed most of the mature firs in the southern Appalachians since the 1960s. Young firs grow up beneath the dead, but they too will be killed when they reach maturity. It is a slow-motion ecological catastrophe."
  spruce: "Red spruce and Fraser fir dominate the forest above 5,000 feet in the Smokies. These are relict species\x97survivors of the last ice age, stranded on southern mountain peaks as the glaciers retreated north. The forest they form is more like Maine or southern Canada than Tennessee. It smells of resin and cold air."
  silersbald: "Silers Bald has been slowly growing over with shrubs and young trees since the National Park Service stopped maintaining it as an open grassland. What was once a sweeping bald is now a mix of heath, brambles, and encroaching forest. The views are still there if you push through the growth."
  adelgid: "The balsam woolly adelgid is a tiny insect, barely visible to the naked eye, that feeds on the sap of Fraser fir trees. Introduced from Europe in the early twentieth century, it has killed more than ninety percent of the mature Fraser firs in the southern Appalachians. The dead trees stand like gray monuments across every high ridge."
idlemessages:
- A standing dead fir creaks in the wind, its gray trunk swaying like a metronome.
- The smell of balsam resin rises from crushed needles underfoot, sharp and clean.
- Cloud wraps the summit of Thunderhead, then lifts, then wraps it again.
- A winter wren sings from somewhere in the spruce tangle, its song absurdly long and complex for such a small bird.
- The wind carries a faint smell of woodsmoke from somewhere far below in the Tennessee valley.
- Drops of condensation fall from the spruce boughs like slow rain, even when the sky is clear.
- A red squirrel chatters furiously from a spruce branch, defending its territory from your intrusion.
