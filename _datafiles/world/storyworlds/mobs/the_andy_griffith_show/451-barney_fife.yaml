idlecommands:
  - 'emote adjusts his holster with the practiced urgency of a man who has adjusted his holster ten thousand times and would adjust it ten thousand more.'
  - 'say Nip it. Nip it in the bud. That is the ONLY way to handle a situation before it becomes a situation.'
  - 'emote paces the length of the office with his hands clasped behind his back, surveying the room for criminal activity.'
  - 'emote reaches for his bullet, checks that it is still in his shirt pocket, finds it, is reassured.'
  - 'say I got it under control. I have everything completely under control.'
  - 'emote straightens up very tall and gives the room a look of maximum official authority.'
  - 'say A deputy has to be ready at all times. ALL times. You never know when something is going to happen.'
  - 'emote consults his notebook with the focused energy of a man who has many contingency plans and values all of them.'
