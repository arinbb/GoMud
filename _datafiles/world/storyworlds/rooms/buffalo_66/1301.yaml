title: Buffalo Streets
description: >-
  A wide, desolate <ansi fg="8">street</ansi> lined with brick buildings whose
  windows are dark or boarded. The <ansi fg="itemname">sidewalk</ansi> is cracked
  and salt-stained, and patches of grey <ansi fg="15">snow</ansi> cling to the curbs
  like something that refuses to die. A <ansi fg="12">phone booth</ansi> stands on
  the corner, its glass cracked. Power lines sag overhead, swaying in the wind.
  The street runs <ansi fg="exit">east</ansi> toward a dance studio and <ansi fg="exit">west</ansi>
  back to the prison lot. A side street leads <ansi fg="exit">north</ansi> to a gas
  station. To the <ansi fg="exit">south</ansi>, a residential block. A rusted <ansi fg="exit">car</ansi> idles at the curb.
