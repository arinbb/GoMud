nouns:
  gates: >-
    Heavy wrought-iron gates with spikes along the top, as if designed less to
    keep intruders out than to keep children in. The iron is cold to the touch
    even on warm days. Rust weeps from the hinges like dried tears.
  windows: >-
    The school windows are narrow and set high in the walls, as if natural light
    were a privilege rather than a right. Several panes are cracked. One has been
    replaced with cardboard.
  sign: >-
    A brass sign, tarnished green with age, bolted to the stone pillar. It reads:
    CRUNCHEM HALL PRIMARY SCHOOL — HEADMISTRESS: MISS A. TRUNCHBULL. Someone has
    scratched tiny letters beneath it that read: abandon hope.
idlemessages:
- 'The iron gates creak in the wind, a sound like a slow, rusty groan of warning.'
- A child hurries through the gates with their head down, not making eye contact with anyone.
- 'The school building looms ahead, its dark windows watching your approach.'
- 'A distant whistle blast echoes across the grounds — sharp, military, furious.'
- 'The temperature drops noticeably as you pass through the gates. The school generates its own weather.'
