title: Suburban Aurora Street
description: >-
  The <ansi fg="itemname">streets</ansi> of Aurora, Illinois spread out in every
  direction — a grid of <ansi fg="itemname">split-level houses</ansi>, basketball
  hoops in driveways, and the occasional spectacular mullet visible through a
  living room window. The <ansi fg="itemname">sky</ansi> is big and midwestern
  and holding its own. This is where dreams are born and where cable access
  television thrives. <ansi fg="exit">North</ansi> leads to Stan Mikita's Donuts. <ansi fg="exit">South</ansi> takes you toward the Gasworks. <ansi fg="exit">East</ansi>
  is the music store. Benjamin Kane's building is accessible via <ansi fg="exit">elevator</ansi>
  to the north. To the <ansi fg="exit">west</ansi> is Wayne's kitchen.
