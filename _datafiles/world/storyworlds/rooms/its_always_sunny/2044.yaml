title: The Street
description: >-
  The South Philly street outside <ansi fg="itemname">Paddys Pub</ansi> bakes
  in the afternoon heat. <ansi fg="itemname">Row houses</ansi> line both sides
  in the tight, brick-faced style of this neighborhood — every block the same,
  every block different. The <ansi fg="itemname">Paddys Pub sign</ansi> above
  the door is missing several letters, currently reading something like <ansi fg="stat">P DY S P B</ansi>. No one has fixed it. No one will fix it.
  A fire hydrant has been opened down the block and children are running
  through the water with complete disregard for adulthood. The bar's front
  door is to the <ansi fg="exit">south</ansi>. The street runs <ansi fg="exit">east</ansi>
  toward the apartment block, <ansi fg="exit">west</ansi> to Dennis and Macs
  apartment, and <ansi fg="exit">north</ansi> toward the Waitress's place.
  The courthouse is accessible from here too — they end up there a lot.
