character:
  name: Bunk Moreland
  description: >-
    A large, well-dressed Black man in a three-piece suit and a fedora, a
    cigar permanently in or near his mouth. He is McNultys partner and best
    friend and the voice of practical wisdom in a department full of people
    who confuse activity with effectiveness. He is a genuine murder detective --
    methodical, experienced, good at his job in the unglamorous way that real
    expertise looks when it is not being performed for an audience. He has
    made peace with what this city is. The peace is ongoing work.
