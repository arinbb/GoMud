spawninfo:
- mobid: 251
  message: Dr. Ian Malcolm is propped against a wall near the entrance, injured, still talking.
  idlecommands:
  - emote shifts his weight with a wince, one leg stretched out before him, wrapped in makeshift bandaging.
  - say Life, uh... finds a way.
  - emote makes a vague gesture at the surrounding chaos that somehow encompasses everything.
  - say You see, the problem with this park — and I predicted this, I want that on the record — is entropy.
  - ""
  - say Chaos theory isn't just academic. It's what happens when you think you control things you don't control.
  respawnrate: 5 real minutes
nouns:
  banner: >-
    A massive fabric banner depicting a Brachiosaurus skeleton against a sunset.
    WHEN DINOSAURS RULED THE EARTH. One corner has torn loose in the storm
    and the banner hangs diagonal, swaying. Under the circumstances, the slogan
    has acquired a different resonance.
  atrium: >-
    The atrium windows are floor-to-ceiling glass, two stories high, framing
    a view of jungle that is now actively pressing against the building.
    Vines have already begun exploring the seams of the glass.
  scaffolding: >-
    Steel scaffolding still in place on the south facade. The construction was
    never quite finished. This was supposed to be a detail, a minor delay.
    It feels more significant now.
idlemessages:
- The banner above the entrance sways in no wind, its edges fraying where the corner has torn.
- Extension cords snake across the lobby floor to temporary power banks. Half of them are no longer connected to anything.
- The automatic doors to the main hall open and close on their own cycle, responding to motion sensors that have been triggered by something.
- Rain has begun pooling on the lobby floor through a cracked atrium window, spreading slowly.
- Dr. Malcolm mutters something under his breath that sounds like a mathematical formula.
- From the kitchen corridor, a sound — metallic and deliberate — echoes through the building.
