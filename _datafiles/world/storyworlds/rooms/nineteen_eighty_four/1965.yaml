roomid: 1965
zone: Nineteen Eighty Four
title: The Canteen
description: >-
  A long low-ceilinged room that smells of <ansi fg="itemname">sour stew</ansi> and the sharp chemical sweetness of <ansi fg="itemname">saccharin</ansi>. Grey trays move along a metal
  counter. The food is brown, mostly. The Victory Gin comes in
  teacups. The noise of <ansi fg="itemname">telescreens</ansi> on both
  walls fills the space between conversations that are not quite
  conversations — words spoken at the right volume and temperature to
  communicate nothing incriminating. At one end of the canteen, <ansi fg="itemname">Syme</ansi> is sitting at his usual <ansi fg="exit">table</ansi> with a dictionary and an expression of
  genuine intellectual excitement. Ministry workers move through in
  overalls, grey trays, grey faces, grey food. The Records Department
  is back to the <ansi fg="exit">west</ansi>.
