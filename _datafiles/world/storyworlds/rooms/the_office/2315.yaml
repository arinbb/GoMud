idlemessages:
- The stained glass light moves slowly across the pews as the sun tracks across the Pennsylvania sky.
- The flowers on the altar are still fresh. Someone brought them recently or they last a very long time.
- A hymnal is open on one of the pews, left mid-page by someone who had to go.
- The church is quiet in the way churches are quiet -- a sound that has its own texture.
- 'From outside the front doors, the muffled sound of Pennsylvania: cars passing, birds, a distant train.'
- The program on the pew rustles slightly in the air from the heating vent. 'Bob Vance of Vance Refrigeration.'
- Light moves across the floor at the rate that light moves, which is patient and inevitable.
- In the back of the church, someone has forgotten their coat on a pew. It is a sensible coat.
