character:
  name: Travis Henderson
  description: >-
    A gaunt man in dusty clothes and a red baseball cap. His face is
    weathered to the color of old wood, every line deep. His eyes are
    dark and patient in the way of someone who has learned to wait for
    nothing in particular. He carries himself with a stillness that is
    not calm — it is the stillness of a person who has used up most of
    their forward motion. He is Harry Dean Stanton. He is the loneliest
    man in the American West. He is also, somewhere under all that silence,
    a father.
