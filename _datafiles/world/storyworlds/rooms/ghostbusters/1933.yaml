idlemessages:
- The ground shakes. Stay Puft takes another step. Neon signs sway on their mounts.
- A chunk of marshmallow the size of a sofa lands on the sidewalk nearby, perfectly fluffy.
- The smile on the Stay Puft Marshmallow Man's face does not waver. If anything, it widens.
- Car alarms go off in a cascade from north to south as each footfall passes through their range.
- Someone in a second-floor window is filming this. Someone at ground level is filming this. Everyone is filming this. It will not come out well on film. It never does.
- The power grid in this district flickers, browns out, and returns. Two blocks north, it does not return.
- Stay Puft pauses at the intersection of Broadway and 45th and appears to be considering which way to go. He chooses south. Toward you.
