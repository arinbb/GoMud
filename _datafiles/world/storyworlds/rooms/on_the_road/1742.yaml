roomid: 1742
zone: On the Road
title: The George Washington Bridge
description: >-
  You stand at the edge of the <ansi fg="itemname">George Washington Bridge</ansi>,
  the great steel span arching over the <ansi fg="itemname">Hudson River</ansi>
  into New Jersey and the continent beyond. Behind you is New York, the city
  that made you, the city you are leaving. Ahead is America — not the map
  version but the real one, the enormous dark breathing version, three thousand
  miles of it, full of strangers and highways and jazz and the particular
  American darkness that Dean Moriarty drives into every night with his foot
  on the floor. The <ansi fg="itemname">river</ansi> below moves south to sea.
  The bridge cables hum in the wind. This is the moment. Everything that comes
  next begins here. To the <ansi fg="exit">north</ansi> is the city. To the
  <ansi fg="exit">west</ansi> is the road.
mapsymbol: G
maplegend: GW Bridge
biome: road
