title: Crunchem Hall Gates
description: >-
  Massive <ansi fg="itemname">iron gates</ansi> set between pillars of blackened
  stone mark the entrance to <ansi fg="8">Crunchem Hall Primary School</ansi>. The
  gates are spiked along the top and streaked with rust. Beyond them, the school
  building hunches against the sky like something ashamed of itself — a grim
  Victorian pile of dark brick and narrow <ansi fg="itemname">windows</ansi>. A
  weathered <ansi fg="itemname">sign</ansi> bolted to one pillar reads the school
  name. The atmosphere changes the moment you pass through — the air grows colder,
  the light greyer. The road leads back <ansi fg="exit">north</ansi>. The school
  corridor is to the <ansi fg="exit">east</ansi>. The <ansi fg="exit">playground</ansi>
  is visible to the south.
