character:
  name: Frank Madison
  description: >-
    A man in his sixties who built a hotel empire from nothing and is now facing
    the question of what he built it for. He is broad-shouldered and patrician in
    a New Jersey way -- the money is earned, not inherited. His suit is the same
    cut as the one he bought when the first hotel turned a profit. He stands like
    a man who has been making decisions for forty years and still finds it tiring.
    He loves his son more than he can easily say, which is why he usually doesn't
    say it, which is something he has started to understand about himself too late
    and also just in time.
