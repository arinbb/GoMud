roomid: 2429
zone: The Sandlot
title: The Carnival
description: >-
  The summer carnival occupies the fairgrounds at the edge of town --
  a field that spends the rest of the year as a parking lot and in July
  becomes something else entirely. The <ansi fg="itemname">Ferris wheel</ansi>
  turns against the twilight sky. A <ansi fg="yellow">midway</ansi> of games
  and concessions runs down the center, smelling of fried dough and spun
  sugar. A <ansi fg="itemname">chew tobacco stand</ansi> at the near end
  of the midway has already sold to several kids who are regretting it.
  At night, the carnival lights make everything look golden and possible.
  Even the kids who have been here a hundred times feel the pull of it.
mapsymbol: C
maplegend: The Carnival
biome: land
exits:
  west:
    roomid: 2423
  south:
    roomid: 2433
nouns:
  rides: >-
    The carnival rides hum and spin and swing in the warm summer evening --
    the Tilt-A-Whirl, the Scrambler, a kiddie roller coaster that the older
    kids have to fold themselves into. The rides smell of grease and hot metal
    and something sweet. Each one has a line. Each line has a kid counting
    the people ahead of them with the specific focus of someone for whom
    waiting is the hardest thing they have ever done.
  lights: >-
    String lights and neon and the rotating colored spots on the Ferris wheel
    gondolas turn the fairground golden as the sun goes down. In the dark the
    carnival looks like it is on fire in the best possible way. Everything looks
    better in carnival lights. The chewing tobacco looks worse, but everything
    else looks better.
  'cotton candy': >-
    Pink spun sugar on a paper cone, weightless and immediately necessary.
    It costs twenty-five cents and is worth every penny and is gone before
    you have made three steps. Your fingers are sticky for the rest of the
    evening, which is fine because the rest of the evening is also the best
    evening you can currently imagine.
  'ferris wheel': >-
    The Ferris wheel turns slowly against the sky, each gondola swaying.
    At the top you can see the whole neighborhood -- the sandlot, the
    pool, the rooftops. From up there the fence at the south end of
    the sandlot doesn't look as tall as it does from the outfield. Everything
    is smaller from high up.
  midway: >-
    Ring toss, dunk tank, the one with the rubber ducks and the squirt
    gun. Prizes hanging from the top of each booth in impossible profusion.
    Ham Porter has won three times at the baseball pitch booth and he
    refuses to stop telling people about it.
  tobacco: >-
    A dark ball of chewing tobacco sits in Ham Porter's cheek at this
    very moment, and the experience is not going the way he told everyone
    it would go. Several other kids are learning the same lesson at
    various points along the midway. Nobody comes out of this story ahead.
idlemessages:
- The Ferris wheel turns and turns against the summer sky, all lights and slow motion.
- The midway barker calls out with cheerful aggression toward everyone who passes.
- The smell of fried dough and spun sugar and something chemical is almost too much at once.
- Somewhere near the ring toss, Ham Porter is disputing a ruling with great authority.
- The carnival lights make everyone look golden and young.
- A kid comes out of the chew tobacco experience considerably paler than he went in.
- Music from the carousel bleeds into music from the midway until it becomes one sound.
