roomid: 1101
zone: In Utero
title: Serve the Servants
description: >-
  A burned-out courtroom. The judge's <ansi fg="itemname">bench</ansi> is cracked
  down the middle as if struck by lightning. Newspaper <ansi fg="itemname">headlines</ansi>
  paper every wall -- tabloid ink bleeding in the humidity. A broken <ansi fg="itemname">television</ansi> in the corner cycles through footage of a
  band on a stage too big for them, the crowd a faceless ocean of outstretched
  hands. The witness stand is occupied by the defendant, who is also the
  plaintiff, who is also the judge. Exhibit A is a platinum record. Exhibit B is
  a syringe. Exhibit C is a love letter. The jury box is empty. The verdict was
  decided before the trial began. Scrawled across the wall behind the bench in
  black marker, barely legible but impossible to ignore, two lines that explain
  everything and nothing.
mapsymbol: '1'
maplegend: Serve the Servants
biome: city
