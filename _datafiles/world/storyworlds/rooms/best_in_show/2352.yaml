roomid: 2352
zone: Best in Show
title: Behind the Bleachers
description: >-
  The space behind the bleachers is where people come to be nervous in private. A
  narrow corridor of concrete and fluorescent light, <ansi fg="itemname">gear bags</ansi>
  stacked along one wall, a <ansi fg="itemname">water station</ansi> with paper cups
  for dogs and handlers alike. The sound of the ring comes through clearly from
  the other side of the bleachers -- announcements, audience murmurs, the muffled
  voice of the ring steward. A <ansi fg="itemname">bench</ansi> runs along the
  far wall where someone has scratched Good Luck into the wood without specifying
  to whom. Handlers pace through. Some carry dogs. Some are alone with the particular
  focus of people who have done everything they can do and are waiting for it to be
  enough. The <ansi fg="exit">show ring</ansi> is west.
