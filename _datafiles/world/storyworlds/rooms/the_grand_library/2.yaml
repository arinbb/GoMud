roomid: 2
zone: The Grand Library
title: The Book Stacks
description: >-
  Towering shelves of dark wood stretch from floor to ceiling, creating narrow aisles
  that seem to go on forever. The spines of thousands of books line every surface --
  leather-bound volumes, cloth-covered paperbacks, gilded folios, and crumbling
  manuscripts. Small brass ladders on rails allow access to the highest shelves. Each
  section is marked with ornate wooden placards: <ansi fg="itemname">Fiction</ansi>,
  <ansi fg="itemname">Fantasy</ansi>, <ansi fg="itemname">Science Fiction</ansi>,
  <ansi fg="itemname">Classics</ansi>, <ansi fg="itemname">Mystery</ansi>,
  <ansi fg="itemname">Poetry</ansi>.
  Certain books seem to glow faintly along their spines, as if calling to be read.
mapsymbol: B
maplegend: Book Stacks
biome: house
exits:
  south:
    roomid: 1
  north:
    roomid: 6
nouns:
  fiction: >-
    The Fiction section holds novels from every era and tradition. Some spines
    are cracked and well-loved, others pristine and untouched.
  fantasy: >-
    Dragons, wizards, enchanted swords -- the Fantasy shelves practically hum
    with barely-contained magic. A few books tremble slightly as you look at
    them.
  classics: >-
    The Classics section smells of age and wisdom. These are the foundational
    stories, the tales that all others echo and answer.
  mystery: >-
    The Mystery section is dimly lit compared to the others, as if the shadows
    themselves are keeping secrets.
  poetry: >-
    The Poetry section is smaller than the others but no less potent. Slim
    volumes line the shelves — Hayden, Dickinson, Neruda, Rumi, Hughes.
    The spines are worn from many hands. A particular volume of Robert
    Hayden's collected poems seems to radiate a faint cold, as if winter
    lives between its pages.
  shelves: >-
    The shelves are made of rich mahogany, each one hand-carved with scenes from
    famous stories. Running your fingers along the wood, you feel tiny figures
    of heroes, monsters, and ships beneath your touch.
