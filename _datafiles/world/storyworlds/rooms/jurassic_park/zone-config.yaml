idlemessages:
- Something enormous moves through the jungle. You feel it in your bones before you hear it.
- A distant roar rolls across the island like thunder, deep enough to rattle your teeth.
- The trees sway far above, disturbed by something passing on the other side of the canopy.
- Insects fill the humid air with constant, layered sound that stops abruptly — then resumes.
- The smell of tropical vegetation and wet earth is overwhelming and ancient.
- Somewhere in the distance, something screams — it might have been a bird.
