character:
  name: Christy Cummings
  description: >-
    Christy Cummings is a professional dog handler, which means she is the person
    who actually takes Rhapsody in White into the ring while Sherri Ann watches from
    the bleachers. She has credentials, certifications, a track record in the sport,
    and the focused competence of someone who has turned a passion into a profession
    and has not lost the passion in the process. She is efficient at all times. She
    has a legal pad. The legal pad has notes. The notes are comprehensive. She does not
    waste words or movements or effort. She says of Sherri Ann that she is a "wonderful
    owner." The statement is true and complete. The relationship between them is
    professional and warm and has, perhaps, extra dimensions, but Christy is not the
    kind of person who discusses extra dimensions. She is the kind of person with a
    legal pad.
