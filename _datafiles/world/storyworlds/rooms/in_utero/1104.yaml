roomid: 1104
zone: In Utero
title: Rape Me
description: >-
  A bare room. Concrete floor, concrete walls, concrete ceiling. A single
  <ansi fg="itemname">microphone</ansi> stands in the exact center under a harsh
  white spotlight that turns everything it touches into overexposure. Every wall
  is covered in <ansi fg="itemname">graffiti</ansi> -- layer upon layer, years of
  fury compressed into spray paint and marker and scratched plaster. Protest
  slogans. Feminist symbols. Middle fingers aimed at cameras, at record labels,
  at the very concept of ownership. A full-length <ansi fg="itemname">mirror</ansi>
  hangs on the far wall, but your reflection in it is wrong -- stretched,
  compressed, not quite you, a funhouse version of whoever you thought you were.
  The room is defiant. The room is a fist. The room does not care what you think
  of it. That is the entire point.
mapsymbol: '4'
maplegend: Rape Me
biome: city
exits:
  west:
    roomid: 1103
  east:
    roomid: 1105
nouns:
  microphone: >-
    A single vocal microphone on a battered stand, positioned under a spotlight so
    bright it bleaches the color from everything it touches. The mic is dented,
    scratched, held together with tape. It waits. It does not care who steps up to
    it. It will amplify whatever truth you bring.
  graffiti: >-
    Every surface screams. MY FAVORITE INSIDE SOURCE in red. APPRECIATE YOUR
    CONCERN in black. Corporate logos crossed out. Record contract clauses circled
    and annotated with profanity. Someone has written I AM NOT A COMMODITY in
    letters three feet tall. Someone else has written YES YOU ARE underneath it
    in smaller letters.
  mirror: >-
    A full-length mirror, cracked in a web pattern from a single impact point at
    its center -- a fist, probably. Your reflection is distorted by the cracks,
    split into fragments that do not quite align. You are taller in one shard,
    shorter in another. In one fragment you are smiling. In another you are not
    there at all.
idlemessages:
- The spotlight flickers, plunging the room into darkness for a heartbeat before slamming back on, harsher than before.
- A new line of graffiti appears on the wall. You did not see anyone write it. The paint is still wet.
- Your reflection in the cracked mirror moves a half-second after you do, as if deciding whether to follow.
- 'The microphone hums with potential energy -- the sound a throat makes before a scream.'
- Dust motes hang motionless in the spotlight beam, suspended, refusing to settle.
- The concrete walls vibrate with a low power chord that has no source and no end.
