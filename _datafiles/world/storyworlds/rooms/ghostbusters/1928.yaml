  - "say I am locked out. Again. This is like my accountant says, a recurring liability."
  - "emote looks around nervously, as though something is following him. Something is following him."
  - "emote shuffles from foot to foot with the anxious energy of a man who has recently been chased by a supernatural dog."
  - ""
  - ""
idlemessages:
- Louis drops his keys, gathers them, tries the smallest one with unwarranted optimism.
- One of the upper-floor gargoyles catches the streetlight at a particular angle. Its shadow is wrong.
- A woman walking a small dog passes the building. The dog stops, looks up at the gargoyles, refuses to move forward, and has to be carried past.
- From far above -- from the very top of the building -- a light flickers that is not any ordinary light.
- Louis mutters something about personal liability waivers and trying the super's number again.
- The building hums. It is very faint. It is below the range of conscious hearing. Your teeth know it, though.
- A cab pulls up. The driver looks at the building, looks at his map, looks at the building again, and drives away.
