character:
  name: Billy Corgan
  description: >-
    A shaved head and a Zero t-shirt and the absolute certainty of someone who
    knows exactly what the record should sound like and is willing to play every
    guitar part himself to get it there. He is thin and intense and his fingers
    are always moving, finding chord shapes in the air, working through
    something. The dysfunction around him is real -- the band barely held
    together, Jimmy fighting his addiction, the album nearly collapsing -- and
    he is making something beautiful anyway. Maybe because of it. Maybe in spite
    of it. He has already played all the guitar parts himself. He is about to
    play them again.
