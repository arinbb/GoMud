roomid: 1747
zone: On the Road
title: The Road West (Nevada Desert)
description: >-
  This is the West that the East always dreamed about and the West
  delivered. The <ansi fg="itemname">desert</ansi> runs from horizon to
  horizon — red rock, sage, the enormous silence of a landscape that
  existed before humans and will exist after. The highway is a straight
  line scratched into the earth by people who could not wait to get
  somewhere else. The car they are driving is a <ansi fg="itemname">Hudson</ansi>
  and <ansi fg="mobname">Dean</ansi> is driving it at speeds that are
  not legal in any state, his foot on the floor, one hand on the wheel,
  one hand conducting the radio, leaning into the windshield as if he
  could lean his way faster. The speedometer reads ninety. Ninety-five.
  He is shouting something about <ansi fg="itemname">time</ansi> —
  about how time is something you move through and if you move through
  it fast enough something on the other side becomes visible. The desert
  does not comment. To the <ansi fg="exit">east</ansi> is Denver.
  To the <ansi fg="exit">west</ansi> is the coast.
