roomid: 2351
zone: Best in Show
title: Sherri Anns Suite
description: >-
  Sherri Ann Cabot's suite is the nicest room in the hotel, because Sherri Ann Cabot
  can afford the nicest room in the hotel and does not see a reason to apologize for this.
  The furniture is tasteful. The <ansi fg="itemname">flowers</ansi> in the vase are fresh.
  A <ansi fg="itemname">Standard Poodle</ansi> called Rhapsody in White occupies a custom
  <ansi fg="itemname">cushion</ansi> beside the window in the specific posture of a dog who
  has always had a very nice cushion. A framed <ansi fg="itemname">photograph</ansi> on the
  dresser shows Sherri Ann and Rhapsody at last year's Westminster show -- not quite first,
  but the photograph is framed in silver, which says something about how she remembers it.
  A <ansi fg="itemname">pamphlet</ansi> for Christy Cummings's dog-handling services is on
  the nightstand beside a bottle of still water and a phone that has been ringing. The
  <ansi fg="exit">Swan suite corridor</ansi> is west.
mapsymbol: S
maplegend: Sherri Anns Suite
biome: house
exits:
  west:
    roomid: 2342
nouns:
  flowers: >-
    The flowers are white calla lilies in a clear glass vase with cut stems and
    fresh water. Someone arranged them this morning. The someone was probably
    Sherri Ann, because Sherri Ann has opinions about flowers that are quiet but
    firm.
  poodle: >-
    Rhapsody in White is a Standard Poodle of championship bearing. In the suite
    she is relaxed, her show clip slightly softened, her enormous eyes at rest.
    She knows Sherri Ann. She knows Christy. She knows the ring. She does not
    know you, which she demonstrates by acknowledging you with precisely the
    amount of attention you have earned.
  cushion: >-
    The custom cushion is sized for a Standard Poodle, padded generously, upholstered
    in ivory fabric. There is a small embroidered name on one corner: "RHAPSODY."
    This cushion was made for this dog. The dog knows this. The cushion knows this.
  photograph: >-
    The silver-framed photograph from Westminster last year. Sherri Ann, immaculate
    in her best blazer. Rhapsody, at perfect stance. The judge is in the background,
    looking at another dog. This year, Sherri Ann has noted, things will be different.
    The photograph is angled on the dresser so that it's the first thing visible from
    the door.
  pamphlet: >-
    Christy Cummings Professional Dog Handling Services. The pamphlet lists credentials,
    show wins, and client testimonials. One of the testimonials is from Sherri Ann Cabot.
    It says, in its entirety: "Christy is dedicated." This is accurate. It is also,
    somehow, the most comprehensive thing you can say about Christy Cummings.
spawninfo:
- mobid: 547
  message: "<ansi fg=\"8\">Sherri Ann Cabot looks up from the phone with the polished warmth of a woman who has been trained by circumstance to be pleasant at all times. She sets the phone down. It rings again immediately. She looks at it, then at you, with an expression that is not entirely readable.</ansi>"
  respawnrate: 5 real minutes
- mobid: 550
  message: "<ansi fg=\"8\">Christy Cummings is going over tomorrow's showing notes on a legal pad. Her handwriting is precise and the notes are thorough. She looks up briefly, nods, and goes back to her notes. Christy is dedicated.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- Rhapsody lifts her head from the cushion, surveys the suite, finds it satisfactory, and lays her head back down.
- Sherri Ann checks her reflection in the mirror with the quick, practiced evaluation of someone for whom appearance is a professional standard.
- The phone on the nightstand buzzes. Sherri Ann glances at it with an expression of informed neutrality.
- Christy makes a note on the legal pad. The note is probably about Rhapsody. Everything Christy writes is probably about Rhapsody.
- Sherri Ann strokes Rhapsody's ear with the absent tenderness of a woman who, whatever else is true, genuinely loves this dog.
- The suite is very quiet in the way suites are when two people in them have an arrangement that works.
- Christy stretches, reviews her notes from the top, makes one small addition, and nods. Tomorrow is covered.
- Sherri Ann looks at the silver-framed photograph for a moment. Then she looks at Rhapsody. She smiles.
