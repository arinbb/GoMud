roomid: 2006
zone: Seinfeld
title: The Back Booth
description: >-
  This is the inner sanctum. The back <ansi fg="yellow">booth</ansi> at Monks Cafe,
  tucked against the wall, the one where the real conversations happen. The vinyl is
  worn here in exactly the right places -- the edge where George always sits, the spot
  where Jerry rests his elbow. The <ansi fg="itemname">table</ansi> is slightly sticky
  near George's usual position, from the syrup of a thousand pancakes eaten while
  complaining. The <ansi fg="itemname">window</ansi> looks out onto Broadway. The <ansi fg="itemname">napkin dispenser</ansi> is always one-third full. This is where
  the plans were made. This is where the plans fell apart. This is where the post-mortem
  of the falling-apart was conducted. Four people, one booth, the world reduced to
  something manageable enough to have opinions about. Back to the <ansi fg="exit">counter</ansi>
  is to the north.
mapsymbol: b
maplegend: Back Booth
biome: house
exits:
  counter:
