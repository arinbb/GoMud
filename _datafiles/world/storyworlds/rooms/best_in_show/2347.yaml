roomid: 2347
zone: Best in Show
title: The Judges Table
description: >-
  The judges table sits at the north end of the main ring, slightly elevated, with
  a clear sight line to the entire competition carpet. A simple white-draped
  <ansi fg="itemname">table</ansi> holds a clipboard, two pens, a glass of water
  untouched since this morning, and a printed copy of the breed standards for all
  seven groups competing tonight. Dr. Theodore Millbank III stands here with the
  composed authority of a man who has occupied this position eleven times and found
  it, each time, completely satisfactory. His <ansi fg="itemname">clipboard</ansi>
  holds notes in a handwriting that is precise and legible and entirely his own. A
  printed <ansi fg="itemname">program</ansi> lists the evening's Best in Show
  entrants. The <ansi fg="exit">show ring</ansi> is west.
mapsymbol: J
maplegend: The Judges Table
biome: city
exits:
  west:
    roomid: 2343
nouns:
  table: >-
    The judges table is set with the authority of a place where decisions are
    made. The breed standards document is well-worn at the edges -- this is not
    a prop. The glass of water has been here since morning. Dr. Millbank does not
    require water during judging. He requires clarity, which he has.
  clipboard: >-
    The clipboard holds Dr. Millbank's notes. The handwriting is small, precise,
    and in a shorthand he developed over thirty years of judging. The entries
    cover structure, movement, temperament, and coat -- each rated on a scale that
    exists only in his mind and is, by all evidence, entirely accurate.
  program: >-
    The Best in Show program lists tonight's entrants: Ch. Fairfield Galaxy of
    Stars (Vizsla, Sporting), Ch. Hubert the Elder (Bloodhound, Hound), Ch. Iron
    Duke of Stansfield (Standard Schnauzer, Working), Ch. Winky of Shakey Hills
    (Norwich Terrier, Terrier), Ch. Rhapsody in White (Standard Poodle,
    Non-Sporting), Ch. Miss Agnes of Vanderhoof (Shih Tzu, Toy), Ch. Galway
    Mist (Border Collie, Herding). Seven dogs. One judge. One decision.
spawninfo:
- mobid: 548
  message: '<ansi fg="8">Dr. Theodore Millbank III takes his position at the judges table. He surveys the ring with the practiced eye of a man who has judged this show eleven times and found it, each time, exactly what it should be. The room adjusts to his presence.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- Dr. Millbank makes a small notation on his clipboard. The notation is precise. It was considered.
- He circles a dog slowly, examining structure, then steps back and makes another notation.
- Dr. Millbank nods once at something he sees. This is the highest visible expression of approval he offers.
- He checks his watch. Everything is on schedule. It is always on schedule.
- A handler positions their dog for examination. Dr. Millbank observes with the focused calm of a man who has seen exactly this many times and finds it, still, worth seeing carefully.
- He turns a page in the breed standards. He already knows what it says. He turns it anyway.
- Dr. Millbank looks up from the clipboard at the ring. Something has caught his attention. He watches. He makes a note.
- The judge is quiet for a moment. Nobody in the room makes a sound.
