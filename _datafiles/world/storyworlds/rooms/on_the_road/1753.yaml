nouns:
  bench: >-
    A hard plastic bench bolted to the floor, designed to prevent sleep,
    which is to say designed by someone who understood that the bus
    station at 3am is not a place you should stay. And yet here you are.
    The plastic holds the cold. Your back will ache in the morning. You
    sit anyway because there is nowhere else to be and the road is dark
    and the next bus is not until six.
  lights: >-
    Fluorescent lights, the standard American light of institutions —
    schools, hospitals, government offices, bus stations. They do not
    flatter anything. Under them everyone looks slightly unwell and
    slightly lost, which at 3am in a bus station is accurate. The hum
    they make is the sound of electricity trying to be light and not
    quite making it.
  vending: >-
    A vending machine offering Nabs (peanut butter crackers in a sleeve),
    candy bars, and a package of stale cookies that has been in the machine
    since last Tuesday. The coins clang in the slot. The machine thinks.
    The machine delivers. For a dime you have a snack and for another dime
    you have company, in the form of the sound of eating in an empty room.
  janitor: >-
    The janitor has been pushing his mop through the bus station since
    midnight and will push it until the morning shift arrives. He has
    heard everything there is to hear in a bus station and has no more
    opinions about it. He mops. The floor gets clean. People arrive.
    People leave. The floor gets dirty. He mops.
  clock: >-
    The clock on the wall says 3:15am in letters of black and white with
    a red second hand that sweeps around and around. It is the loneliest
    clock Sal has ever seen, keeping time in a room where no one wants
    to think about time.
idlemessages:
- The fluorescent lights buzz at their exact 3am frequency. The sound is the sound of being awake when you should not be.
- The janitor pushes his mop in slow arcs, tracing the same path for the hundredth time.
- A bus arrives outside. Its headlights sweep across the ceiling. Its passengers come in, cold and blinking.
- 'Sal checks his pocket. Sixteen dollars. He counts it again. Still sixteen.'
- The vending machine hums in the corner. Someone feeds it a dime and gets crackers.
- 'The clock on the wall says 3:15 and then 3:16 and the minute is endless and the night is endless and somewhere Dean is driving.'
- 'A woman across the waiting room falls asleep on her bag. Her face in sleep is very young. Everyone is young at 3am.'
