zone: The Sopranos
title: The Soprano Kitchen
description: >-
  A large, well-appointed <ansi fg="yellow">kitchen</ansi> that smells of garlic
  and fresh bread and the faint ghost of last night's gravy. The <ansi fg="itemname">granite counters</ansi> are immaculate except for a scatter of <ansi fg="itemname">cookbooks</ansi>
  and a glass of <ansi fg="itemname">white wine</ansi> already poured at ten in the
  morning. A <ansi fg="itemname">television</ansi> on the counter plays the news at
  low volume. <ansi fg="itemname">AJ's backpack</ansi> has been dumped by the table,
  homework half-completed and abandoned. The kitchen is the center of this house,
  where everything that matters and everything that doesn't gets processed and served.
  The driveway is <ansi fg="exit">south</ansi>, the living room is <ansi fg="exit">east</ansi>,
  and the <ansi fg="exit">pool</ansi> is through the back door.
