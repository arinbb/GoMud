nouns:
  basement: >-
    This basement is a monument to rock and roll and the belief that cable access
    television is a legitimate medium. It is both of these things simultaneously.
  posters: >-
    Every square inch of fake wood paneling hosts a rock poster. Alice Cooper glares
    from above the drum kit. Aerosmith's lips stretch across the back wall. Led
    Zeppelin's zeppelin floats serenely over the couch. These are sacred objects.
  couch: >-
    An enormous brown sectional sofa that has absorbed seventeen years of Wayne's
    enthusiasm. It sags in all the right places. It is the most comfortable couch
    in the world. Wayne knows this.
  cameras: >-
    Two camcorders on tripods aimed at the broadcast zone. The red recording light
    blinks steadily. Wayne's World is always broadcasting. Always. Party time.
  drum: >-
    Garth's drum kit is installed with the precision of someone who takes their
    art seriously. Which Garth absolutely does. The skins are worn smooth in the
    center from hours of dedicated practice.
  carpet: >-
    Shag carpet in a color that was probably brown when it was installed. Now it
    is the color of a thousand footsteps and spilled sodas and rock and roll dreams.
