nouns:
  carpet: >-
    The show carpet is hunter green, regulation weight, freshly laid. It gives dogs
    the grip to move at their best gaiting speed without slipping. Handlers train
    on carpet like this. A dog's gait looks different on carpet than on hard floor,
    and the judge knows exactly what to look for on each surface.
  bleachers: >-
    The audience in the bleachers has the focused quiet of people who understand
    what they are watching. This is not a casual crowd. The applause, when it comes,
    is the applause of connoisseurs -- they clap for a dog's movement the way other
    audiences clap for a perfect note.
  table: >-
    The judging table is a simple rectangle draped in white. Dr. Theodore Millbank III
    will stand here. He will watch. He will make the decision. The silver cup sits to
    one side, polished and patient. Beside it, the blue-and-gold Best in Show ribbon,
    larger than it needs to be, entirely correct in its size.
spawninfo:
- mobid: 546
  message: '<ansi fg="8">Christy Cummings moves through the ring with Rhapsody in White at perfect heel. Her focus is absolute. She sees you, nods once, and moves on. Rhapsody does not look at you. Rhapsody is working.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- A dog and handler enter the ring and begin the down-and-back. The dog is textbook. The handler is invisible.
- The audience responds to a particularly good gaiting pattern with a murmur of genuine appreciation.
- Between groups the ring is briefly empty. The carpet gleams. The trophy waits.
- A handler repositions for the free-stack. The dog stands perfectly still. The judge circles. Nobody breathes.
- The ring announcer says a breed name and registered name in a voice that makes even ordinary things sound official.
- 'The lights overhead are theatrical: bright white on the green carpet, picking up the sheen of every coat.'
- Christy Cummings runs through the gaiting pattern once more from memory. Her lips move slightly. She is counting steps.
- Dr. Millbank circles a dog slowly, examining structure, then steps back and makes a notation. He nods once.
