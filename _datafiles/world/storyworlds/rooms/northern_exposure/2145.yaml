nouns:
  microphone: >-
    The microphone is a vintage ribbon mic, warm-sounding and forgiving. Chris
    speaks into it every morning and whatever comes out is not radio in the
    commercial sense -- it is philosophy, poetry, confession, invitation. The
    whole valley receives it. Most of the valley listens. Some of the valley
    has been changed by it without knowing exactly when.
  vinyl: >-
    Crates and stacks of vinyl, organized by a system that is partly genre,
    partly mood, partly the logic of a man who believes music is argument.
    Coltrane next to Hank Williams. Beethoven next to the Ramones. Chris plays
    what the morning requires, and the morning always requires something specific.
  books: >-
    The books at KBHR are working documents -- spines broken, pages dog-eared,
    passages underlined in three different colors. Whitman gets the most
    annotation. Thoreau is second. The Jung volumes have marginalia that run
    into the margins and then onto sticky notes glued to the pages.
  antenna: >-
    The KBHR antenna on the roof catches the wind and sways, but it has never
    fallen. It broadcasts into a vast silence and the silence receives it.
    On clear days the signal reaches fifty miles. On days when conditions are
    right, further. Chris believes the signal reaches wherever it needs to.
  headset: >-
    The headset hangs on a nail beside the microphone, waiting for the next
    broadcast. Chris puts it on and becomes something -- not different exactly,
    but more himself. The voice that comes through the headset is the voice
    of someone who has thought very hard about what it means to speak into
    the air and have strangers receive it.
spawninfo:
- mobid: 482
  message: '<ansi fg="cyan">Chris Stevens swivels in his broadcast chair, reaching over to lower the fader on a song that is fading out anyway, his eyes already going somewhere philosophical.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- Chris reads something aloud very quietly to himself, testing the sound of the words before the air takes them.
- A record turns on the turntable -- something slow and searching, filling the small station with sound.
- The ON AIR light pulses once, a red heartbeat in the warm room.
- Chris makes a note in the margin of a book, then a second note connecting it to something else, then leans back and looks at the ceiling.
- The crackle of the transmitter is a constant here, a low hum that means the signal is going out, the signal is always going out.
- Outside the smudged window, a cloud shadow crosses the spruce line, and Chris watches it move with the attention of a man who finds everything interesting.
- A song ends and there is a moment of silence before Chris reaches for the microphone, and in that moment the whole station breathes.
- Books everywhere. This is a man who believes that thinking clearly requires reading continuously.
