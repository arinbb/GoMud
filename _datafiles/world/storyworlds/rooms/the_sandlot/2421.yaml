roomid: 2421
zone: The Sandlot
title: The Neighborhood Street
description: >-
  The main residential street of the neighborhood, lined with <ansi fg="10">elm trees</ansi>
  that arch overhead in a long green tunnel. <ansi fg="itemname">Ranch houses</ansi>
  sit behind neat lawns with sprinklers ticking in the afternoon heat. A
  <ansi fg="itemname">bicycle</ansi> leans against a mailbox, no lock, the way
  things were in 1962. The sandlot is at the south end of the street -- you can
  hear the distant crack of a bat from here. A <ansi fg="itemname">drugstore</ansi>
  sits at the east corner. North, the glint of a chain-link fence marks the
  public pool.
