  respawnrate: 5 real minutes
- mobid: 428
  message: '<ansi fg="8">Estelle Costanza enters from the bedroom, her expression conveying that something has happened and she is going to tell you what it is whether or not you are ready.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- The television plays something nobody is watching. Nobody turns it off. Nobody will ever turn it off.
- The argument from this morning has paused but is not over. It is never over. It is just between rounds.
- The Festivus pole stands in the corner with the gravity of something invented to prove a point that has since been forgotten.
- A chair scrapes. Someone has stood up to make a point more effectively from a standing position.
- The fruit bowl has the same fruit in it that it always has. The fruit is ceramic. This is fine.
- A sound from upstairs suggests that the house contains more opinions than people, which is mathematically impressive.
- Frank Costanzas voice carries from the kitchen, saying something definitive about something.
- The dining table holds the weight of forty years of meals that became arguments that became traditions.
