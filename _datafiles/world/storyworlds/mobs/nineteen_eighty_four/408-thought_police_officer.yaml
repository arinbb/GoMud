character:
  name: Thought Police Officer
  description: >-
    A figure in black overalls with a rubber truncheon at the belt. The face
    is trained to complete expressionlessness: no anger, no satisfaction, no
    distaste, no nothing. The eyes, behind this expressionlessness, observe
    everything. The Thought Police do not need to threaten. Their presence
    is the threat. The black uniform and the rubber truncheon are
    redundant. You already know what they are for.
