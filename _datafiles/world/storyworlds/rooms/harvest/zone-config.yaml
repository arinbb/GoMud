name: Harvest
roomid: 2240
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: farmland
mutators:
- mutatorid: harvest-gold
idlemessages:
- An acoustic guitar drifts through the air from somewhere on the ranch, unhurried, finding its shape.
- The pedal steel bends a note and holds it, the sound of something that has almost been said.
- Wind moves through the wheat in long slow waves, the whole field breathing.
- A harmonica phrase rises and falls, searching for something it cannot quite name.
- The afternoon light thickens toward gold. The shadows stretch. The day is ending, slowly, beautifully.
- Somewhere a screen door bangs shut, the sound carrying across the dry California air.
