description: >-
  A small oval mirror with a plain pewter frame, its handle worn smooth
  from use. It came from a cellar where dozens of mirrors were hidden away
  from a house that had forbidden them. There is something in the glass —
  it shows you clearly. Not flatteringly, not unkindly. Just clearly. You
  look like yourself. That is, it turns out, enough.
