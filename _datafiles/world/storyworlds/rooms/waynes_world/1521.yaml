roomid: 1521
zone: Waynes World
title: The Mirthmobile
description: >-
  The 1976 <ansi fg="itemname">AMC Pacer</ansi> sits in the driveway like a piece of
  performance art. Sky blue, built like a rolling fishbowl, and somehow magnificent.
  The <ansi fg="itemname">radio</ansi> is always on and always too loud. The
  <ansi fg="itemname">back seat</ansi> is a nest of cassette tapes and fast food
  wrappers, each one a chapter in the ongoing saga of Aurora's greatest adventure
  mobile. Fuzzy dice hang from the <ansi fg="itemname">mirror</ansi>. A pine tree
  air freshener that stopped working in 1989 sways from the visor. The engine runs
  with a sound like destiny. To the <ansi fg="exit">west</ansi> is Wayne's basement.
  You can <ansi fg="exit">drive</ansi> east into Aurora.
mapsymbol: M
maplegend: Mirthmobile
biome: city
exits:
  west:
    roomid: 1520
  drive:
    roomid: 1523
    mapdirection: east
nouns:
  pacer: >-
    The AMC Pacer is objectively one of the ugliest cars ever manufactured and yet
    in Wayne's hands it has become something transcendent. The Mirthmobile is not
    a car. It is a state of mind.
  radio: >-
    A cassette deck with a volume knob that goes up but never comes down. The
    tape currently loaded is unlabeled. You have a feeling you know what's on it.
  backseat: >-
    A archaeological dig of Aurora's fast food scene. Taco Bell wrappers, a Big
    Gulp cup from 1991, seventeen cassette tapes labeled things like "RUSH - FAREWELL
    TO KINGS" and "DO NOT PLAY - THIS MEANS YOU GARTH."
  mirror: >-
    Fuzzy dice, perfectly executed. They are the dice of someone who has given
    the concept of fuzzy dice serious and sustained thought.
  cassettes: >-
    A collection of tapes that represents a complete education in classic rock.
    Led Zeppelin, Aerosmith, Queen, Alice Cooper, Rush, Black Sabbath. All present,
    all accounted for, all slightly warped from being left in a hot car.
idlemessages:
- The radio hums with something that might be Queen. Or might be about to be Queen.
- The fuzzy dice twist in a phantom breeze from the air vent.
- One of the cassette tapes ejects itself slightly, as if volunteering for duty.
- The engine ticks over with a sound like a metronome in a very good mood.
- A Taco Bell wrapper rolls across the back seat with quiet dignity.
- The pine tree air freshener is a ghost of its former self but it tries.
- The Mirthmobile waits. The Mirthmobile is always ready. The Mirthmobile was born ready.
