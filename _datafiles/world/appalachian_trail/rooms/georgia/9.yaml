roomid: 9
zone: Georgia
title: Tesnatee Gap to Hogpen Gap
description: "The trail rolls along the ridgeline through a series of mountain gaps, each one a brief descent to a road crossing followed by another grinding climb. Tesnatee Gap and Hogpen Gap both offer paved road crossings on Richard Russell Scenic Highway. Between the gaps, the trail undulates over minor peaks and through saddles, the hardwood forest opening occasionally to reveal long views through winter-bare trees. The walking is steady\x97not as steep as Blood Mountain, but relentless in its rhythm of climb and descend. White blazes mark the way through oak, hickory, and tulip poplar. The ridgeline trail has the feel of a long hallway through the sky, the forest a green wall on either side."
