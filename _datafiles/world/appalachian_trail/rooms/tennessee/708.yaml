roomid: 708
zone: Tennessee
title: Bald Mountain Shelter
description: "Bald Mountain Shelter sits in a saddle just below the treeless summit of Bald Mountain, where the forest gives way to open grass. The three-sided shelter sleeps ten\x97one of the larger shelters in this section. A spring emerges from the mountainside about three hundred yards below the shelter. The location offers views both east and west through the saddle, and a short scramble up to the bald summit provides a 360-degree panorama. The grass on the bald ripples in the wind, dotted with wildflowers in season. Tent sites are excellent in the saddle and on the edges of the bald. A bear box and privy serve the site. A trail register hangs from a nail on the shelter post."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 37
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A large three-sided shelter, well-built and well-maintained. The sleeping platform is spacious and the roof is sound."
  platform: "The sleeping platform is generous\x97room for ten without too much crowding. The wood is in good condition."
  register: "A trail register in a zip-lock bag, its pages filled with entries from hikers marveling at the views."
  spring: "A reliable spring emerges from the mountainside about three hundred yards below the shelter. The descent and return is a regular water run."
  bald: "The summit of Bald Mountain is a classic Appalachian grassy bald\x97treeless, wind-swept, covered in grass and wildflowers. The views from the top are expansive."
  privy: "A privy sits downhill from the shelter, in the treeline."
  bearbox: "A large bear box stands near the shelter, capable of holding food for a crowd."
  views: "The saddle offers views east and west. The summit bald above provides the full panorama\x97ridge after ridge of the southern Appalachians."
idlemessages:
- Wind pours through the saddle, carrying the sweet smell of grass from the bald above.
- The summit bald is visible just above, its grassy dome golden in the evening light.
- A hawk circles above the bald summit, riding the thermals that rise from the warm grass.
- Wildflowers nod in the breeze at the edge of the saddle\x97goldenrod, aster, hawkweed.
- The view through the saddle stretches for miles, ridge after ridge fading into haze.
- The piped spring trickles below, a thin dependable sound against the wind.
