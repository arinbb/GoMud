roomid: 1705
zone: Blonde on Blonde
title: I Want You
description: >-
  A <ansi fg="yellow">doorstep</ansi> in the evening, the door itself warm
  with light leaking under it. A <ansi fg="itemname">doorbell</ansi> mounted
  to the frame rings at intervals that correspond to nothing -- not a hand
  pressing it, not a timer, just desire expressing itself in the only mechanism
  available. The <ansi fg="itemname">guilty undertaker</ansi> lurks at the
  edge of the step, hatted and formal, sighing into the evening air with the
  professional sorrow of a man who has buried too many feelings and keeps
  finding them alive again. The desire here is not subtle. It is not
  metaphorical. It is the way the door glows, the way the bell rings, the way
  your hand keeps not quite reaching the knob. She waits on the other side of
  the door -- the drunken politician, the weeping mother, the guilty undertaker's
  entire clientele. But you only want her. You only want her. That's the whole
  lyric, the whole song, the whole sad and simple fact. The <ansi fg="exit">studio</ansi>
  is back to the north.
mapsymbol: 5
maplegend: I Want You
biome: house
exits:
  studio:
    roomid: 1700
    mapdirection: north
    exitmessage: You leave the doorstep. The doorbell keeps ringing behind you.
nouns:
  doorbell: >-
    Brass, mounted to the frame at a slight angle, the kind that makes a
    sound between a buzz and a chime. It rings again. It has been ringing
    since the beginning of the song. It will ring until the door opens or
    the song ends and neither of those things has happened yet.
  door: >-
    A solid door, painted dark red, warm with light from within. You have
    been standing outside it for the entire song. The knob is right there.
    You know she's in. She knows you're out. This is the whole situation,
    stated simply, which does not make it simple.
  light: >-
    The light under the door is yellow and warm and constant. Someone in
    there is awake. Someone in there knows you're standing here. The light
    has not changed. Nothing has been resolved by the light.
spawninfo:
- mobid: 284
  message: The guilty undertaker materializes at the edge of the step, hat in hand.
idlemessages:
- 'The doorbell rings once more -- unprompted, unavoidable, the sound of wanting something.'
- The guilty undertaker checks his pocket watch and sighs with professional resignation.
- The light under the door brightens for a moment, then steadies.
- 'Your hand rises toward the knob. Your hand does not reach the knob. This keeps happening.'
- 'The undertaker adjusts his hat, satisfied with nothing, mourning everything.'
- The evening cools around the doorstep and you do not move.
- 'The drunken politician stumbles past on the sidewalk below, muttering about the broken flag. He does not notice you.'
