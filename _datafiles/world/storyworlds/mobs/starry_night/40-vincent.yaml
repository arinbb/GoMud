  description: >-
    A thin, intense man with a close-cropped red beard and piercing blue eyes
    that seem to see the world in colors no one else can perceive. He wears
    a rumpled blue smock stained with every color of the palette, a battered
    straw hat, and heavy boots caked with Provencal dust. A bandage is wrapped
    around his left ear. He carries a portable easel and a box of paints,
    and his fingers are permanently stained with cadmium yellow and prussian
    blue. Despite his ragged appearance, there is a fierce, burning energy
    about him — a man consumed by his vision.
