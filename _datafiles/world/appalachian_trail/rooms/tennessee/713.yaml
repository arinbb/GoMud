roomid: 713
zone: Tennessee
title: Roan High Knob Shelter
description: "Roan High Knob Shelter is the highest shelter on the entire Appalachian Trail, sitting at 6,275 feet near the summit of Roan High Knob. Unlike every other shelter on the AT, this one is an enclosed log cabin with a real door, real windows, and a real roof overhead. It was built in 1933 as a fire warden's cabin by the Civilian Conservation Corps, and it has the solid, handcrafted feel of Depression-era mountain construction\x97hand-hewn logs fitted tight, the chinking still sound after ninety years. The cabin sleeps fifteen on wooden bunks arranged around the interior walls. A heavy wooden door swings shut against the wind, and glass windows let in pale light filtered through the surrounding balsam fir forest. The air up here smells like Christmas\x97a sharp, clean scent of Fraser fir and balsam that saturates everything. Dense clouds roll through at eye level. A piped spring provides water about a hundred yards below the cabin. A bear box and privy serve the site. A trail register sits on a shelf inside the cabin."
biome: mountains
