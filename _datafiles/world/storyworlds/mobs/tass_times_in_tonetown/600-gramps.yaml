character:
  name: Gramps
  description: >-
    An older man in a corduroy jacket that has seen better decades, his
    dark trousers creased from too long sitting, his loafers worn at the
    heels in the way of a man who walks while thinking. His eyes are the
    brightest thing in the dungeon -- quick, curious, the eyes of someone
    who has not stopped inventing just because he is a prisoner. His white
    hair has the organized disorder of a scientist between discoveries.
    He looks like someone who built something remarkable and would do
    it again, is possibly doing it right now in some sense you cannot see.
