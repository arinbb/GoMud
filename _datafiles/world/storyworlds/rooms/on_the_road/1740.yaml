zone: On the Road
title: Sal's Apartment, New York
description: >-
  A cold-water flat somewhere in <ansi fg="itemname">Manhattan</ansi>, 1947.
  The radiator hisses and clanks but gives no heat. The walls are thin enough
  that you can hear the couple upstairs arguing about money. A <ansi fg="itemname">typewriter</ansi>
  sits on the kitchen table next to an empty coffee cup and a stack of papers
  covered in dense, breathless prose. The window looks out on a street of
  fire escapes and pigeons and the permanent grey New York sky. A <ansi fg="itemname">letter</ansi>
  lies on the table — it is from <ansi fg="mobname">Dean Moriarty</ansi> in Denver,
  written in the urgent looping handwriting of a man who has something enormous
  to tell you and not enough paper to tell it on. To the <ansi fg="exit">west</ansi>
  the city waits, loud and electric and full of people going somewhere fast.
