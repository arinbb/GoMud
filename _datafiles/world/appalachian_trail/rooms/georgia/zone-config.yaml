name: Georgia
roomid: 3
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: forest
idlemessages:
- The Georgia mountains roll endlessly in every direction, blue-green waves of ridge and hollow.
- A turkey vulture circles lazily on a thermal, tilting its wings against the updraft.
- 'Rhododendron crowds the trail, glossy leaves brushing your shoulders as you pass.'
- The crunch of leaves underfoot is the only sound for miles.
- 'A box turtle crosses the trail ahead, ancient and unhurried, oblivious to your schedule.'
- The smell of pine sap and warm earth rises from the forest floor.
