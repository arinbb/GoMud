roomid: 1552
zone: Jurassic Park
title: The Tour Road
description: >-
  You are on the main <ansi fg="itemname">tour road</ansi> through Jurassic
  Park, a paved track embedded with the <ansi fg="itemname">electric rail</ansi>
  that guides the Ford Explorer tour vehicles on their automated circuit. The
  jungle rises on both sides in dense green walls, thirty feet high, alive with
  unseen movement and layered sound. The Explorers — bright yellow and green,
  numbered and sleek — sit parked and waiting in a row, their automated tour
  guide systems chirping softly to themselves. The road curves <ansi fg="exit">south</ansi>
  toward the main gates and <ansi fg="exit">east</ansi> to the Brachiosaurus
  meadow. Another branch curves <ansi fg="exit">north</ansi> into the deeper
  park. A muddy track disappears into the trees to the northwest — the
  <ansi fg="exit">dilophosaurus paddock</ansi> road.
