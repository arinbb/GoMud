nouns:
  cot: >-
    A narrow iron cot with a thin mattress and a grey blanket. The mattress is
    old enough to have developed a permanent impression of whoever last slept on
    it. The blanket is clean and cold.
  window: >-
    A single small window set high in the wall. The glass is filthy on the outside,
    admitting light but no view. The window is too small for a person to climb
    through. It does not open. This was not an oversight.
  bible: >-
    A Bible on the chair, open. The passage is from Leviticus, the same passage
    underlined in the drawing room Bible. It has been underlined here too, in the
    same red ink, by the same hand. The book was placed here for specific reading
    in specific conditions.
  door: >-
    The door is solid wood, fitted with a heavy lock on the exterior. From in here,
    the lock cannot be reached. The keyhole is on your side but the key is not. This
    room has kept people in it before.
  plaster: >-
    The plaster walls are bare and patched, with stains spreading from the corners
    where damp has worked through. Someone has scratched at the plaster near the cot —
    not writing, just lines, made with a fingernail or a coin. Counting, perhaps.
    Or just something to do with the hands.
spawninfo: []
idlemessages:
- The grey light from the high window moves as the clouds outside shift.
- The scratches in the plaster near the cot are very numerous. Someone was here for a long time.
- The Bible on the chair falls open to its underlined passage as though used to being read there.
- The door handle on the inside rattles slightly in a draught. The lock does not move.
- The cot springs creak at the lightest touch.
- The room smells of damp plaster and old wool and the particular staleness of a space that is rarely aired.
- The blanket on the cot has been folded with the same military precision as the guest room bed.
