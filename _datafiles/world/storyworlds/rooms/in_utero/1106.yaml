nouns:
  meadow: >-
    Grey-green grass stretching in every direction to a treeline that never gets
    closer no matter how far you walk. Wildflowers grow here and there, muted
    colors -- pale blue, faded yellow, dusty pink. The ground is soft and gives
    slightly underfoot. It would be easy to lie down here. It would be easy to
    never get up.
  figure: >-
    Someone sitting in the grass, legs crossed, face tilted up to the overcast
    sky, smiling. Not grinning -- smiling, softly, genuinely, at nothing in
    particular. The figure looks happy in the way that only people who have stopped
    trying to be happy can look happy. You cannot tell if the figure is you.
  sky: >-
    Overcast, the sun a pale disc behind layers of cloud, trying and failing to
    shine through. The clouds move slowly, rearranging themselves into shapes that
    almost mean something before dissolving. It might rain. It might clear. It does
    neither. It just is.
  grass: >-
    Soft, damp, the particular green that only exists under overcast skies. The
    kind of grass you lie in when you have given up trying to be anywhere else.
    It smells of earth and recent rain and the specific peace that comes from
    having no expectations whatsoever.
spawninfo:
- mobid: 197
  message: "A very tall figure sits cross-legged in the grey-green grass, reading a newspaper, his bass resting beside him."
idlemessages:
- The cello from beyond the treeline swells, a single sustained note that feels like being held.
- The figure in the grass shifts slightly, smiles wider at something invisible, and settles back.
- 'A breeze moves through the meadow, bending the grass in slow waves -- the earth breathing in its sleep.'
- The sun almost breaks through. Almost. The light brightens for a moment, warm on your face, then fades back to grey.
- 'A bird sings three notes from the treeline, waits, and sings them again -- the same three notes, patient and unhurried.'
- The grass is so soft. You could lie down. You could close your eyes. You could stay here. You could.
