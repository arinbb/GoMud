roomid: 1535
zone: Waynes World
title: Alice Cooper's Concert
description: >-
  The <ansi fg="itemname">concert</ansi> is in full roar. The stage blazes with
  light, the crowd surges in waves, and somewhere up there Alice Cooper moves
  through the show with the confident authority of a man who has been doing this
  since before most of the audience was born. <ansi fg="itemname">Smoke</ansi>
  pours from machines at stage level, lit blue and green. The <ansi fg="itemname">sound</ansi>
  is a physical wall. <ansi fg="itemname">Stage props</ansi> — a guillotine,
  a straight jacket, a boa constrictor nowhere in particular — surround the
  performance space. The <ansi fg="itemname">crowd</ansi> around you moves as one
  organism, unified in the kind of joyful surrender that only great rock concerts
  produce. This is where "We're not worthy!" makes perfect sense. Through the
  <ansi fg="exit">crowd</ansi> below is the Gasworks main floor.
mapsymbol: c
maplegend: Concert
