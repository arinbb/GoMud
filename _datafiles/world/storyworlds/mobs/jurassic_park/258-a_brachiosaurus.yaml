character:
  name: a Brachiosaurus
  description: >-
    Eighty feet from nose to tail, forty feet to the top of its upstretched
    neck, weighing somewhere between fifty and eighty tons. Its coloration is
    blue-grey with subtle patterning, the skin rough and dry despite the
    tropical air. It moves with the slow certainty of something that has no
    natural predators in this meadow and knows it — each step deliberate,
    each swing of the neck graceful in the way that cranes are graceful, the
    grace of scale and counterbalance. When it regards you with its eye —
    dark, warm, the size of a dinner plate — there is no aggression and no
    recognition, only a vast, calm presence. You are very small. The world,
    in this moment, is very old.
  raceid: 5
  level: 1
