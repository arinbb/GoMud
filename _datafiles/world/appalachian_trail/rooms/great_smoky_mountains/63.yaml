nouns:
  tower: "The observation tower is a concrete spiral ramp that climbs fifty-four feet above the summit to a circular platform. On clear days the view extends a hundred miles in every direction\x97row upon row of blue mountains fading into the haze. On cloudy days, which is most days, you stand inside a cloud. The tower was built in 1959 and draws half a million visitors a year via the road from Newfound Gap."
  ghosttrees: "The dead Fraser firs surround the summit like a silver army. Stripped of bark and bleached by weather, their trunks are smooth as driftwood. Many still stand forty or fifty feet tall, their broken branches catching the wind. Between them, young firs push upward, bright green and defiant, though they too will be killed when they grow large enough to attract the adelgid."
  plaque: "A bronze plaque marks the summit elevation: 6,643 feet. Beside it, a newer interpretive sign tells the story of the name restoration\x97how Kuwohi, the Cherokee name meaning mulberry place, was officially restored in September 2024, replacing the name given by a nineteenth-century surveyor. The mountain is sacred in Cherokee mythology as the dwelling place of the White Bear chief."
  fir: "The living Fraser firs are young and bright green, their needles dense and fragrant with balsam resin. They smell like Christmas. These trees are relicts of the last ice age, surviving only on the highest peaks of the southern Appalachians. They are genetically distinct from balsam fir further north and exist nowhere else on earth."
  cloud: "Clouds form and dissolve around the summit continuously. One moment you have a hundred-mile view; the next you are inside a white void. The moisture beads on every surface\x97your pack, your hair, the metal railing of the observation tower. This is not fog rising from below. You are standing inside the sky."
  lake: "According to Cherokee oral tradition, an enchanted lake once existed on the summit of Kuwohi, home to the White Bear chief, Yonah. The lake was said to be invisible to all but the most powerful medicine people. Some Cherokee elders say the lake is still there, hidden by the clouds that perpetually shroud the summit."
idlemessages:
- Cloud engulfs the summit, reducing the world to a gray sphere twenty feet across, then lifts to reveal mountains stretching to the horizon.
- The wind moans through the dead fir trunks, each one singing a slightly different note.
- Condensation drips from the observation tower railing in a steady patter, like rain from a clear sky.
- A raven rides the updraft past the tower, close enough to hear its wingbeats, and is swallowed by cloud.
- The smell of balsam fir is overwhelming up here, released by the young trees crushed against the trail edges.
- Tourists from the parking lot crowd the observation tower, their voices bright and startling after days of solitude on the trail.
- The dead fir forest creaks and groans in the wind like a ship at sea.
- For a moment the clouds part completely and you can see mountains in five states, fading from green to blue to gray to nothing.
