roomid: 2141
zone: Northern Exposure
title: The Brick
description: >-
  The warmest place in <ansi fg="cyan">Cicely</ansi>. The Brick is bar, diner,
  community center, and confessional booth rolled into one long, low-ceilinged
  room. <ansi fg="yellow">Wood paneling</ansi> absorbs the light from the bar
  fixtures and gives it back warm and amber. A massive <ansi fg="itemname">moose head</ansi>
  watches proceedings from above the bar with the patient authority of a minor
  god. The <ansi fg="itemname">pool table</ansi> is green felt and slightly
  warped, which everyone knows and no one mentions. Booths line one wall, each
  one bearing years of carved initials. Behind the bar, every bottle is in its
  place -- <ansi fg="yellow">Holling</ansi> knows where each one lives and
  reaches for them without looking. The smell is <ansi fg="itemname">coffee</ansi>
  and something roasting and old wood and decades of good talk. This is where
  Cicely happens. Back through the door to the <ansi fg="exit">north</ansi>
  is the back room. To the <ansi fg="exit">west</ansi>, Main Street.
