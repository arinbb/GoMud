roomid: 1500
zone: Goodnight Moon
title: The Great Green Room
description: >-
  The walls are <ansi fg="10">green</ansi> — a deep, warm, dreaming green, the
  color of moss, of sleep, of the underside of leaves. A <ansi
  fg="itemname">fireplace</ansi> glows on the south wall, its light amber and
  low, casting everything in the soft amber of almost-asleep. A great <ansi fg="itemname">window</ansi> faces west, and through it the moon hangs
  enormous and white, rising. On the <ansi fg="itemname">mantel</ansi> sits a
  telephone, a little toy house, a comb and brush and a bowl full of mush. A
  red <ansi fg="itemname">balloon</ansi> floats on its string near the
  ceiling, turning slowly. In the rocking chair by the fire, barely visible —
  or perhaps only barely there — the <ansi fg="mobname">quiet old lady</ansi>
  sits, her knitting needles moving, her lips forming a word too soft to hear.
  Kittens slip behind the furniture. Somewhere in the room's periphery, a
  small mouse watches from the baseboard. The room is very warm. The room
  is very still. The room is saying goodnight to everything.
