idlemessages:
- The dam hums with the weight of all that water pressing against seven hundred feet of concrete.
- 'Lake Powell glitters in the afternoon sun, beautiful and wrong: blue water in a drowned canyon.'
- A tourist takes a photograph of the dam, then takes another one. It is the kind of thing that requires multiple photographs.
- The power lines vibrate in the desert wind with a low electrical sound like a distant choir.
- 'Somewhere below the waterline, buried under two hundred feet of lake, are canyon walls that took a hundred million years to make.'
- 'Hayduke''s voice, imagined: we are going to need a lot more dynamite.'
- The red canyon walls above the waterline rise clean and vertical, showing where the flood stopped.
