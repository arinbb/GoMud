roomid: 1202
zone: A Confederacy of Dunces
title: The French Quarter
description: >-
  The streets narrow and the buildings crowd in close, iron-lace <ansi fg="itemname">balconies</ansi> dripping with ferns and flower boxes
  overhead. The smell of beignets and powdered sugar drifts from the direction
  of Cafe Du Monde on thick, humid air that seems to have weight and texture.
  Street <ansi fg="itemname">musicians</ansi> play jazz on the corner -- trumpet,
  clarinet, upright bass -- something slow and mournful and perfect. A Paradise
  Vendors hot dog <ansi fg="itemname">cart</ansi> shaped like a giant wiener on
  wheels is parked at the curb, its umbrella faded and stained with mustard. The
  architecture is beautiful and crumbling in equal measure, every surface showing
  the slow patient work of humidity on plaster and wood. <ansi fg="exit">West</ansi>
  returns to Canal Street. <ansi fg="exit">South</ansi> leads deeper into the
  Quarter toward Bourbon Street. <ansi fg="exit">East</ansi> leads toward the
  Night of Joy bar.
