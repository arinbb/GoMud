character:
  name: Chris Stevens
  description: >-
    The voice of KBHR, Cicely's radio station, Chris Stevens is a philosopher,
    artist, ex-convict, and ordained minister who arrived in Alaska by a route
    that makes complete sense if you understand that some people are assembled
    from a wider-than-average set of influences. He is tall and unhurried, with
    the look of someone who has spent serious time outdoors and equally serious
    time with books. He quotes Whitman and Thoreau and Jung with equal fluency.
    He is currently building a trebuchet to launch a piano into the air over
    Cicely because he believes this is art, which it is. He is never not thinking.
    He is never not broadcasting. The boundary between the two is permeable.
