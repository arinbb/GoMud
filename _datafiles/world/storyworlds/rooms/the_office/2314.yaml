roomid: 2314
zone: The Office
title: Schrute Farms
description: >-
  You have arrived at Schrute Farms, a 60-acre beet farm and bed-and-breakfast in
  Honesdale, Pennsylvania, owned and operated by Dwight K. Schrute. The <ansi fg="10">beet
  fields</ansi> stretch in all directions -- row after row of beet greens in the
  Pennsylvania soil, their leaves catching the morning light, their roots dark in
  the earth below. The smell is clean and earthy: soil and green things and the
  particular richness of a working farm. A <ansi fg="itemname">farmhouse</ansi> sits
  at the center of the property, built in the 1800s by the Schrute family, which has
  owned this land without interruption since and intends to continue doing so. A
  hand-painted <ansi fg="itemname">sign</ansi> at the entrance reads: 'SCHRUTE FARMS
  -- BED AND BREAKFAST -- RATED BEST AGRITOURISM EXPERIENCE IN PENNSYLVANIA (self-
  designated).' The property is clearly productive and clearly lived-in and clearly
  presided over by someone who takes all of this with complete seriousness. The
  <ansi fg="exit">parking lot</ansi> / warehouse is to the north. <ansi fg="exit">The
  church</ansi> is to the west.
mapsymbol: SF
