character:
  name: Altaira
  description: >-
    A young woman of perhaps twenty, raised entirely on an alien world by a
    single parent and a robot. She is startlingly beautiful in the way of
    someone who has never been told she is beautiful and does not know what
    to do with attention. Her manner is direct and naive in equal measure --
    she knows everything from books and nothing from experience. She moves
    among the alien flowers and tame animals of her garden with the ease of
    someone entirely at home in a world that should be impossible.
