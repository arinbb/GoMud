roomid: 2340
zone: Best in Show
title: Taft Hotel Lobby
description: >-
  The lobby of the <ansi fg="yellow">Taft Hotel</ansi>, Philadelphia, the night before the
  Mayflower Kennel Club Dog Show. The word "chaos" does not quite cover it. Every
  <ansi fg="itemname">armchair</ansi> has a dog on it. The <ansi fg="itemname">front desk</ansi>
  is staffed by a man doing his level best to maintain professionalism in the face of a
  <ansi fg="itemname">Weimaraner</ansi> that has been staring at him for twenty minutes without
  blinking. A Standard Poodle in a <ansi fg="itemname">travel crate</ansi> beside the luggage
  cart has been groomed to a standard of beauty that makes most humans feel inadequate.
  The <ansi fg="itemname">elevator</ansi> door opens periodically to release another owner with
  a rolling bag, a show lead, and the focused energy of someone who has been preparing for
  this for a very long time. The <ansi fg="exit">bar</ansi> beckons to the north. The
  <ansi fg="exit">Swan suite</ansi> is east. The <ansi fg="exit">Fleck room</ansi> is west.
  The <ansi fg="exit">venue</ansi> is south.
