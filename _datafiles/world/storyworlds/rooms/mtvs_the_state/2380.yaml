roomid: 2380
zone: MTVs The State
title: MTV Studio
description: >-
  The main stage of an MTV television studio, circa 1994. The <ansi fg="itemname">set</ansi>
  is deliberately cheap — painted plywood flats, mismatched <ansi fg="itemname">furniture</ansi>
  dragged in from somewhere, bright overhead <ansi fg="itemname">lights</ansi> on aluminum
  rigs that make everything look a little washed out and a little too real. A camera
  on a rolling dolly points at a taped mark on the floor. The <ansi fg="itemname">MTV logo</ansi>
  is everywhere: on the walls, on a coffee mug, on a baseball cap someone left on a
  stool. Eleven young people from NYU have converted this space through sheer force
  of will and an extremely limited budget. The air smells like gel and electricity
  and the specific ambition of people in their mid-twenties who believe — correctly —
  that what they are doing matters. To the <ansi fg="exit">north</ansi> is the Pudding Room.
  To the <ansi fg="exit">east</ansi> is The Barrel. To the <ansi fg="exit">south</ansi> is
  Captain Monterey Jack's Ship. To the <ansi fg="exit">west</ansi> is the Porcupine
  Racetrack. <ansi fg="exit">Up</ansi> leads to the Awards Show stage. <ansi fg="exit">Down</ansi>
  to The Street.
