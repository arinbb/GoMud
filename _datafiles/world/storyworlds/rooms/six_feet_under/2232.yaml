title: Davids Apartment
description: >-
  The life David has built with Keith, separate from the funeral home though
  not far from it. An <ansi fg="itemname">apartment</ansi> that is genuinely
  domestic -- not decorated to impress but arranged to be lived in. Keith's <ansi fg="itemname">workout equipment</ansi> in one corner, maintained and
  used. David's <ansi fg="itemname">books</ansi> on a shelf in alphabetical
  order, which he knows is something people tease him about and which he
  does not plan to change. A <ansi fg="itemname">kitchen table</ansi> with
  two chairs where they eat dinner and talk about their days, or do not talk
  about their days but are present while the other one talks. Photographs
  of Keith and David on the <ansi fg="itemname">wall</ansi> -- not a lot,
  but there. The apartment is evidence of a life that David built on purpose
  after years of not knowing if he could have it. It is hard-won and real.
  The <ansi fg="exit">entrance</ansi> leads back to the funeral home.
