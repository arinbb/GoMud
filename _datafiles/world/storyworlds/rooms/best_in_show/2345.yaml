roomid: 2345
zone: Best in Show
title: Mayflower Kennel Club Entrance
description: >-
  The entrance to the <ansi fg="yellow">Mayflower Kennel Club Dog Show</ansi> is
  everything a dog show entrance should be: banners in the Mayflower colors hanging from
  the rafters, a <ansi fg="itemname">registration table</ansi> staffed by two volunteers
  in matching blazers who have been here since six this morning and will be here until
  midnight, a <ansi fg="itemname">board</ansi> listing the day's schedule in clean serif
  type, and the overwhelming composite smell of forty different dog shampoos combining
  into something that is not unpleasant but is extremely specific. Handlers move through
  with dogs on leads, all of the dogs visibly aware that something important is about to
  happen, all of the humans either very calm or not calm at all. The <ansi fg="exit">hotel</ansi>
  is north. The <ansi fg="exit">grooming area</ansi> is east. <ansi fg="exit">The Show Ring</ansi>
  is south. The <ansi fg="exit">vendor hall</ansi> is west.
