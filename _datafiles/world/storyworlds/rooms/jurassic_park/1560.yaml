roomid: 1560
zone: Jurassic Park
title: The Main Hall
description: >-
  The main hall of the Visitor Center is a cathedral to ambition. The <ansi fg="cyan">rotunda</ansi>
  soars above you, its ceiling sixty feet overhead painted with a mural of
  prehistoric life — Cretaceous seas, Jurassic forests, Triassic deserts, all
  rendered in rich earth tones. At the center of the rotunda, two enormous
  <ansi fg="itemname">T. Rex skeletons</ansi> rear up in dramatic combat postures
  — the original fossils Hammond commissioned, before he had living ones — their
  bones wired into impossible drama, jaws wide, locked in a battle that never
  happened. The <ansi fg="itemname">WHEN DINOSAURS RULED THE EARTH</ansi> banner
  hangs from the upper level, trailing nearly to the floor now, torn in places.
  Natural light pours through the atrium, casting long shadows through the fossil
  ribs. This is where the tour began. This is where it ends. <ansi fg="exit">South</ansi>
  leads back to the entrance. <ansi fg="exit">East</ansi> to the dining room.
