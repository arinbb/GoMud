zone: On the Road
title: San Francisco
description: >-
  <ansi fg="itemname">San Francisco</ansi>, the end of the continent —
  the city that fell off the edge of America into the <ansi fg="itemname">bay</ansi>
  and stayed there. The fog comes in from the Pacific in the evening,
  slow and deliberate, filling the valleys between the hills the way
  a thought fills a silence. <ansi fg="itemname">Chinatown</ansi> is
  two blocks east, its restaurants full of steam and the smell of
  something frying in oil. The <ansi fg="itemname">bay</ansi> glitters
  at the end of the street, and beyond it the green hills of Marin,
  and beyond those more hills, and eventually the sea. There is no more
  west. The road ends here, and in the ending discovers that it was
  never about getting to the place — it was about going. Sal stands
  at the end of the continent and feels it all the way down. To the <ansi fg="exit">east</ansi> the road runs back the way you came.
  To the <ansi fg="exit">south</ansi> is a jazz club where something
  is happening.
