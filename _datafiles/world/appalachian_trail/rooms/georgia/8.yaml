roomid: 8
zone: Georgia
title: Neel Gap / Mountain Crossings
description: "The trail descends steeply from Blood Mountain and arrives at something utterly unexpected\x97a building straddling the trail itself. The Appalachian Trail passes directly through the stone breezeway of Mountain Crossings, a hiker outfitter built in 1937 of native stone and heavy timber. This is the only place on the entire 2,190-mile trail where it passes through a man-made structure. The breezeway is cool and shaded, the stone walls thick and solid on either side. Through the arched opening, you can see the outfitter's entrance, shelves of gear and food visible through the windows. Outside, US-19/129 crosses at Neel Gap, and a lone tree near the parking lot is draped with pairs of hiking boots\x97boots abandoned by thru-hikers who quit the trail here, dangling by their laces like strange fruit. The boot tree is a memorial and a warning."
