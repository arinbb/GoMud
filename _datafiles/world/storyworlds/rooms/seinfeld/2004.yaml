nouns:
  mailboxes: >-
    Standard New York apartment mailboxes. Several of them have names that
    you recognize: Seinfeld, Kramer, various other tenants who are never
    named but are always implied. The mail is mostly catalogs. There is one
    pink slip indicating a package that was not delivered.
  door: >-
    The lobby door is heavy glass with a brass handle that has been polished
    by ten thousand hands. It opens onto West 81st Street. Beyond it: the
    city, indifferent and enormous, ready to provide material.
  newsstand: >-
    A newsstand on the corner run by a man who has been there longer than
    some buildings. He sells the Post, the Daily News, the Times, and
    various magazines. He knows which regulars buy which paper and has
    zero interest in discussing it.
  broadway: >-
    Broadway, the avenue, running diagonally through the Upper West Side's
    grid like a street that has been here since before the grid and is not
    going to adjust. Traffic on Broadway is always moderate and always feels
    like more than it is.
spawninfo: []
idlemessages:
- A cab goes by without stopping for the person who flagged it. This is New York.
- Two people walk past having a conversation that is clearly about nothing and is clearly very important.
- The newsstand guy changes out the front-page display. Another day in the city.
- Somewhere nearby, a truck is backing up and beeping with the persistence of something that will not stop.
- A woman walks past with a very small dog. The dog is wearing a coat. The coat is more expensive than most human coats.
- The crosswalk signal counts down. A man jaywalk regardless. This is correct.
- Three pigeons hold a meeting in the gutter and then disperse without resolving anything.
- The smell of a hot dog cart drifts over from Broadway. It is ten in the morning. Nobody cares.
