roomid: 1700
zone: Blonde on Blonde
title: Columbia Studio A, Nashville
description: >-
  February 1966. Nashville, Tennessee. The studio is a controlled chaos of
  <ansi fg="itemname">microphone stands</ansi> and tangled <ansi fg="itemname">cables</ansi>,
  cigarette-scarred music stands stacked with <ansi fg="itemname">lyric sheets</ansi>
  in Dylan's cramped hand. A <ansi fg="itemname">grand piano</ansi> sits open,
  its bench scattered with chord charts. Through the control room glass, a
  <ansi fg="itemname">mixing board</ansi> of chrome and bakelite catches the
  fluorescent light. This is where fourteen songs were recorded, sometimes three
  or four in a single night, musicians following chord changes they had never
  heard, finding the groove by instinct and coffee and whiskey. The Nashville
  session players -- the best in the world -- are somewhere nearby, tuning
  instruments, waiting for the next take. The air carries the weight of
  something great being made without anyone entirely knowing it.
