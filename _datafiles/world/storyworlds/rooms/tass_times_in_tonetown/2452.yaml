nouns:
  signs: >-
    The neon signs of Downtown Tonetown are a civic text. TASS OR PASS. BE
    YOURSELF (BUT CORRECTLY). UNTASS IS ILLEGAL (NOT REALLY) (KIND OF). The
    signs cycle through colors at different speeds, creating a visual rhythm
    that the citizens seem to navigate by instinct. The one over the intersection
    reads WELCOME TO TONETOWN -- CONFORM TO NONCONFORMITY.
  outfits: >-
    Every citizen on this street is dressed as if they competed in a sport
    where points are awarded for commitment. Jumpsuits in colors that name
    themselves. Boots that add four inches and say something about the wearer's
    philosophy. Hair that communicates via geometry. Sunglasses with frames
    shaped like lightning bolts. You feel immediately, acutely, like you are
    wearing the wrong thing.
  newsstand: >-
    A newsstand at the corner holds fresh stacks of the Tonetown Times, their
    headlines in bold angular fonts: SNOTTY EXPANDS UNTASS ZONE SOUTH OF AVENUE.
    TASS LEVELS DROP FOR THIRD CONSECUTIVE MONTH. EDITOR FURIOUS. A smaller
    headline at the bottom reads: NEWCOMER IN TOWN -- TASS OR NOT? (POLL INSIDE).
  architecture: >-
    The buildings of downtown are an ongoing architectural rebellion. Nothing
    here was built without a strong opinion. Doorways are rhomboids. Windows
    are irregular hexagons. Walls lean outward at angles that suggest confidence
    rather than structural failure. The overall effect is of a city that decided
    to be interesting and followed through completely.
  citizens: >-
    Tonetown citizens move through their streets with the bearing of people who
    have already been judged and found excellent. They assess each other -- and
    you -- with a quick, practiced eye. A glance that measures your outfit, your
    posture, your willingness to be angular. They do not seem cruel about it.
    They seem sincere. To them, tassness is a value, like kindness or courage.
spawninfo:
- itemid: 54
  message: A neon glow stick pulses on the sidewalk.
  respawnrate: 5 real minutes
idlemessages:
- A citizen in a geometric jumpsuit pauses mid-stride to evaluate your outfit and does not hide their conclusion.
- The neon signs cycle through their colors in an irregular sequence that somehow still feels like a beat.
- The Tonetown Times headline today reads SNOTTY PUSHES SOUTH and nobody looks pleased about it.
- Two citizens compare the angles of their respective hairstyles with the seriousness of architects.
- 'A synthesizer sting plays from somewhere above -- three notes ascending, like a question about your style.'
- Somebody walks past in boots so platform-elevated they must have rehearsed the gait.
- The smell of neon and hair product and something faintly electric fills the downtown air.
