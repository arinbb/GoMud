character:
  name: The Waitress
  description: >-
    A woman of Charlie Kelly's approximate age who has somehow never been given
    a proper name by the universe, which feels representative of everything
    that has happened to her. She is reasonably attractive in the way that
    people are attractive when you look past the expression of bone-deep
    exhaustion they wear at all times. She has been stalked by Charlie Kelly
    for years with a dedication that she finds neither flattering nor
    interesting. She does not work at Paddys Pub. She does not want to be
    here. She is not entirely sure how she ended up here. This is also
    representative of everything that has happened to her.
