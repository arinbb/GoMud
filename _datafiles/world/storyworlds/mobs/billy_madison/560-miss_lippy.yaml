character:
  name: Miss Lippy
  description: >-
    A first and second grade teacher who has been teaching for many years and has
    developed some habits along the way. She is warm and organized and genuine and
    she is very attached to the supply closet in a way that she does not examine
    too closely. Her cardigan has chalk on it. Her smile is real. She keeps a
    very large jar of paste on the supply table and the paste levels do fluctuate
    in ways that cannot be entirely explained by student use. She is a good teacher.
    She is also a little bit of a mystery.
