nouns:
  lockers: >-
    Taller than the elementary school lockers but bearing the same accumulated
    scars of adolescence. Phone numbers (to what?), band logos, the word
    "WHATEVER" in bubble letters. One locker has a sticker of a skull. It
    belonged to someone who was going through something, probably.
  board: >-
    Student council election! Vote for Melissa or vote for Derek. Melissa
    promises to "fix the pizza situation." Derek promises "more pep." There
    are posters in both their handwriting. Neither poster mentions the other.
    This is already political.
  cases: >-
    Glass cases display football trophies, basketball trophies, a tennis trophy
    for 1991 that no one saw coming, and three science fair ribbons for projects
    on "Potato Electricity," "Does Music Affect Plant Growth?" (answer: yes), and
    a project simply titled "THE FUTURE." The future project won second place.
  pressure: >-
    You can feel it. The invisible force field of middle school social dynamics.
    Who is popular. Who is not. Who was popular last week and is not now. The whole
    hallway vibrates at the frequency of twelve-year-olds trying to figure out
    who they are, which is the highest-stress frequency in the known universe.
idlemessages:
- Two students argue near the lockers about something that will matter for exactly two more weeks.
- A locker slams with a sound that echoes down the hall like a small explosion.
- The trophy case catches the fluorescent light and throws it around in small triumphant rectangles.
- Someone walks past very quickly, clearly in the middle of a social emergency.
- The school PA system crackles but says nothing, as if reconsidering whatever it was about to say.
- A backpack that has been dropped sits against a locker like a small abandoned monument.
- The lunch bell is not yet ringing. The waiting is its own kind of tension.
