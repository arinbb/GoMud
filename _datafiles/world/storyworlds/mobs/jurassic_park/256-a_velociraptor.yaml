character:
  name: a Velociraptor
  description: >-
    Six feet at the hip, one hundred sixty pounds of compressed speed and
    intention. Its coloration is olive and amber, patterned to suggest but not
    quite achieve camouflage. It moves with the fluid, minimalist precision
    of something that has never made an unnecessary movement in its life.
    The large curved claw on the second toe of each foot is held retracted
    while walking, which makes a specific quiet click on the tile floor.
    Its eye is amber and vertical-pupiled and full of calculation. It is
    looking at you the way a chess player looks at the board three moves
    before the inevitable.
  raceid: 5
  level: 20
