  - say 'Do you understand what I am implying? No, but you will think about it later. That is the implication.'
character:
  name: Dennis Reynolds
  description: >-
    A handsome man in his thirties with carefully styled hair and an expression
    of such utter self-satisfaction that it borders on disturbing. He is dressed
    well for a bar that does not deserve it. He carries himself with the unshakeable
    confidence of someone who has decided he is exceptional and has never once
    entertained an alternative theory. His eyes are slightly too still when he
    looks at you, like a predator who has learned to mimic social behavior. He
    is the most dangerous person in Paddys Pub, which is saying something
    considering Frank is also here.
