roomid: 3
zone: The Grand Library
title: The Screening Room
description: >-
  A cozy chamber lined with deep burgundy velvet curtains. In the center sits an
  antique <ansi fg="itemname">projector</ansi> of polished brass and glass, its lens
  pointed at a shimmering white screen on the far wall. Shelves along the walls hold
  rows of <ansi fg="itemname">film reels</ansi> in round metal canisters, each one
  labeled with a handwritten title. Plush armchairs are arranged in a semicircle
  facing the screen. A small table holds a <ansi fg="itemname">film catalog</ansi>
  listing available titles.
mapsymbol: S
maplegend: Screening Room
biome: house
exits:
  west:
    roomid: 1
nouns:
  projector: >-
    The projector is a magnificent device of brass gears and crystal lenses. A
    small slot is designed to accept film reels. When a reel is loaded, the
    projector hums to life and the screen shimmers with light that seems to pull
    you forward.
  reels: >-
    Dozens of film reels sit in their canisters on the shelves. Each is labeled
    by hand in careful script. Some canisters are dented and well-used, others
    gleam like new.
  screen: >-
    The projection screen has an unusual quality -- it isn't flat white fabric
    but something more like still water, reflecting the room with a slight
    shimmer. When the projector runs, the images seem to have depth, as if you
    could step right into them.
  catalog: >-
    A leather-bound catalog lists available films by genre. Each entry includes
    a brief description and a shelf location for the reel.
  curtains: >-
    Heavy burgundy velvet curtains frame the room, muffling sound and creating
    an intimate atmosphere. They smell faintly of popcorn and old celluloid.
