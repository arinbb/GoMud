character:
  name: Jerry Seinfeld
  description: >-
    A trim man in his late thirties, neat jeans, white sneakers, a plain shirt.
    Clean-shaven, hair controlled, the overall presentation of a man who has
    simplified everything nonessential so that all available attention can go
    toward noticing things. His expression cycles through amusement, mild
    bafflement, and the particular satisfaction of a man who has just identified
    something absurd. He will not be serious if he can avoid it. He will turn
    anything into an observation. He has a Superman magnet on his refrigerator
    and no explanation of why is necessary.
