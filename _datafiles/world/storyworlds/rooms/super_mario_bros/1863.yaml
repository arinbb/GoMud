roomid: 1863
zone: Super Mario Bros
title: World 1-4 Castle
description: >-
  The first castle. Stone corridors lit by <ansi fg="red">lava</ansi> that
  glows up through gaps in the floor, casting everything in hellish orange. <ansi fg="itemname">Fire bars</ansi> rotate slowly from iron posts set into
  the walls -- spinning chains of fire, impassable unless you time your
  crossing with exact precision. The stone is hot to the touch. The ceiling
  drips with reflected lava-light. This is not a friendly place. At the far
  end of the chamber, a wide <ansi fg="itemname">bridge</ansi> of wooden
  planks spans a lava pit, and on the other side, an enormous silhouette
  waits in front of an axe. South leads <ansi fg="exit">back</ansi>; the <ansi fg="exit">bridge</ansi> leads east to the boss.
mapsymbol: C
maplegend: Castle
biome: dungeon
exits:
  south:
    roomid: 1862
  bridge:
    roomid: 1864
    mapdirection: east
nouns:
  lava: >-
    Lava fills the floor gaps and churns in the pit beyond the bridge, a
    slow-moving orange-red liquid that is very obviously lethal. It makes
    a low bubbling sound, regular and almost hypnotic. A single touch
    means you start the level over. The lava does not care. The lava has
    always been here. The lava will always be here. It is the permanent
    resident of every castle in the Mushroom Kingdom.
  firebars: >-
    Iron posts set at intervals into the stone walls, from which chains of
    fire extend and rotate like clock hands. Four or five balls of flame
    on each, spinning at a steady speed. There is a rhythm to them. You
    can learn the rhythm. You must learn the rhythm or you will not pass.
    The fire makes a faint hiss as it rotates through the hot air.
  bridge: >-
    A wooden bridge of broad planks spanning a lava pit. It looks utterly
    unreliable. Beneath it, orange lava churns. On the far side, the boss
    waits. There is an axe on a post at the far end of the bridge. Hit the
    axe and the bridge disappears. The boss falls into the lava. This is
    how every castle ends. Hit the axe. The bridge disappears. Roll credits.
spawninfo: []
idlemessages:
- 'The lava in the pit bubbles and churns, its heat washing over you in steady waves.'
- A fire bar sweeps past overhead, trailing heat and light in a slow arc.
- 'The stone walls radiate warmth: this castle has been on fire, metaphorically, for forty years.'
- Something enormous shifts on the bridge ahead. The planks creak.
- 'A Bowser roar reverberates through the stone corridors: deep, terrible, and slightly theatrical.'
- The axe at the far end of the bridge gleams, waiting. It is always there. It always works.
- 'The heat is intense: the air shimmers above the lava pits, making the far wall ripple.'
