roomid: 2209
zone: The Wire
title: City Hall
description: >-
  The <ansi fg="8">mayors office</ansi> in Baltimore City Hall, a room of <ansi fg="itemname">dark wood</ansi> and <ansi fg="8">flags</ansi> and a view
  of the Inner Harbor that has been used in so many press conferences it has
  become a backdrop prop. The <ansi fg="itemname">desk</ansi> is enormous and
  paperless, because the paper is handled by people who are not the mayor. <ansi fg="8">Tommy Carcetti</ansi> is here, or the idea of him: a white
  councilman from a city that is majority Black, climbing through a system
  that is eating the people it was built to serve, driven partly by genuine
  reform impulse and partly by the ambition that is indistinguishable from it.
  The <ansi fg="itemname">phones</ansi> are always ringing. The calls are from
  people who want things that cannot be given and from people who want to give
  things that should not be taken. The <ansi fg="exit">courthouse</ansi> is to the
  south via the <ansi fg="exit">detail</ansi>.
