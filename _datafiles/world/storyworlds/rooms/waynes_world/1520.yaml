  message: "<ansi fg=\"yellow\">Wayne Campbell materializes by the cameras, doing a silent air guitar riff.</ansi>"
  respawnrate: 5 real minutes
- mobid: 241
  message: "<ansi fg=\"yellow\">Garth Algar emerges from behind the drum kit, adjusting his glasses.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- The recording light on the camera blinks red. Everything here is potentially being broadcast.
- A guitar pick falls off the amp and skitters across the carpet.
- The drum kit shimmers in the fluorescent light, waiting.
- The posters seem to watch you with the benevolent approval of rock legends.
- A cassette tape labeled "AWESOME MIX - DO NOT ERASE" sits on top of the amp.
- The phone rings upstairs. Wayne ignores it. He's in the zone.
- The couch emits a long, satisfied creak, as if settling in for another excellent session.
