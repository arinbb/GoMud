roomid: 2350
zone: Best in Show
title: Hotel Room - The Flecks
description: >-
  The Flecks' hotel room has the cheerful disorder of two nice people comfortable
  with each other's chaos. <ansi fg="itemname">Winky</ansi> the Norwich Terrier is
  asleep on one of the pillows in the boneless abandon of a dog with complete trust
  in the universe -- ears still upright even in sleep. The
  <ansi fg="itemname">dresser</ansi> holds a framed photo of Winky at a previous show,
  a tube of conditioning spray, and a postcard of Sheboygan, Wisconsin that has been
  in Gerry's wallet since 2001. A <ansi fg="itemname">fly-fishing catalog</ansi> is
  open on the nightstand. Cookie's <ansi fg="itemname">shoes</ansi> -- two left shoes,
  both for the left foot -- are by the door. The room smells like dog shampoo and
  something warm and midwestern. Gerry is in the armchair with the catalog, pleased.
  Cookie is organizing Winky's show supplies with methodical calm. Everything in this
  room is fine. The <ansi fg="exit">hotel lobby</ansi> is east.
mapsymbol: F
maplegend: Hotel Room - The Flecks
biome: house
exits:
  east:
    roomid: 2345
nouns:
  winky: >-
    Winky the Norwich Terrier is asleep on the pillow in the absolute boneless
    surrender of a dog that trusts the universe entirely. His ears stand straight
    up even in sleep. He is small, tan, wire-haired, and according to Gerry and
    Cookie Fleck, the best dog in the world. In a field of excellent dogs, this
    claim requires defense. They are prepared to provide it. They have been providing
    it, lovingly, for four years.
  dresser: >-
    The framed photo shows Winky at the Greater Binghamton show last spring -- third
    in group -- but the ribbon is missing because Cookie stepped on it and then Gerry
    stepped on Cookie's foot and then they both laughed for a minute and a half. The
    photo is still up because it is a good photo of Winky and also because the story
    of the ribbon is worth keeping.
  catalog: >-
    A fly-fishing equipment catalog, open to a page of hand-tied flies. Three are
    circled in pencil. These are the best flies for Beaver Creek next spring. The
    decision is essentially made. There may be a fourth fly. Gerry is considering.
  shoes: >-
    Two left shoes, both for the left foot. Cookie Fleck has two left feet -- a real
    medical condition, not a metaphor -- and she walks just fine in shoes correctly
    made for feet shaped like hers. Gerry found a catalog from Vermont. He drove
    there. He will not characterize this as exceptional. It was exceptional.
spawninfo:
- mobid: 540
  message: '<ansi fg="8">Gerry Fleck looks up from the fly-fishing catalog with a smile of uncomplicated welcome. Winky lifts his head from the pillow, ears rotating toward the door, and decides you are fine.</ansi>'
  respawnrate: 5 real minutes
- mobid: 541
  message: '<ansi fg="8">Cookie Fleck is organizing Winky''s show supplies with the methodical calm of a woman who has done this many times and enjoys it. She glances over and gives you the warm, direct smile of someone who assumes you are good until proven otherwise.</ansi>'
  respawnrate: 5 real minutes
- mobid: 549
  message: '<ansi fg="8">Winky the Norwich Terrier lifts his head from the pillow, confirms everything is fine, and goes back to sleep. His ears stay up. They are always up.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- Winky lifts his head, blinks, confirms everything is fine, and goes back to sleep.
- Gerry turns a page in the catalog, taps a photo of a dry fly, and makes a satisfied sound.
- Cookie checks Winky's show lead, unclips it, checks it again, hangs it on the door handle.
- The two of them have a brief comfortable conversation in the shorthand of people married a long time.
- Gerry looks at Winky and then at Cookie with the expression of a man who has exactly what he needs and knows it.
- Cookie opens her show bag, takes out a brush, brushes Winky twice, puts the brush back. This was not necessary. She just wanted to.
- Winky relocates from the pillow to Gerry's feet and makes himself into a small determined lump.
- A television in another room can be heard faintly. The Flecks do not turn theirs on.
