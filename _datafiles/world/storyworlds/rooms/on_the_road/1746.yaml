roomid: 1746
zone: On the Road
title: A Jazz Club, Denver
description: >-
  A basement jazz club on a Denver side street, the air so thick with
  cigarette smoke and sweat and music that you can barely see the stage
  from the back of the room. And on the stage, the <ansi fg="mobname">tenor man</ansi>
  — a big, Black man in a rumpled suit who has been playing for three
  hours and shows no sign of stopping. He is not playing music anymore.
  He is playing past music, past himself, past the room, going somewhere
  no one in the audience can follow but everyone can feel. The <ansi fg="itemname">saxophone</ansi>
  makes a sound like a human voice asking a question that has no answer
  and not minding. The crowd stands still, which is the greatest tribute
  anyone can pay. Dean Moriarty is at the back of the room, sweating,
  shouting "Go! Go! Go!" The <ansi fg="exit">street</ansi> exit leads
  back to Larimer Street.
