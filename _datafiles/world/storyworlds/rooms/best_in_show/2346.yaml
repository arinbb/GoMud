roomid: 2346
zone: Best in Show
title: Grooming Area
description: >-
  The grooming area is organized bedlam. <ansi fg="itemname">Grooming tables</ansi> line
  the walls, each one occupied by a dog being primped, blown out, sprayed, combed, or
  otherwise prepared for the ring with an intensity of focus that most surgeons would find
  excessive. The sound is: blow-dryers, dogs, the intermittent snap of a slicker brush,
  someone's radio playing something that nobody asked for. The <ansi fg="itemname">smell</ansi>
  is forty different conditioning sprays blending into a single, specific olfactory
  signature. Stefan and Scott have the most elaborate setup in the room: their station
  has three <ansi fg="itemname">lighting rigs</ansi>, two mirrors, and a garment bag
  containing Miss Agnes's show coat in a shade of white that Stefan has described as
  "not white, luminous." Against the far wall, Christy Cummings works on Rhapsody in
  White in focused silence. The <ansi fg="exit">entrance</ansi> is west. <ansi fg="exit">Backstage</ansi>
  is south.
mapsymbol: G
maplegend: Grooming Area
biome: house
exits:
