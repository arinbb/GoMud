roomid: 2240
zone: Harvest
title: Broken Arrow Ranch
description: >-
  Northern California, 1972. A working ranch in the golden hour, the light the
  color of the album cover. A weathered <ansi fg="itemname">barn</ansi> stands
  with its doors open to the <ansi fg="itemname">fields</ansi>, hay bales pushed
  aside for amplifiers and mic stands -- the Stray Gators set up inside, pedal
  steel bending somewhere in the warm air. Wheat rolls east to the ridge, heavy
  and gold and almost ready. Neil Young sits on the porch with an acoustic
  <ansi fg="itemname">guitar</ansi> across his knees, a harmonica in a neck
  rack catching the late light. A dirt <ansi fg="itemname">road</ansi>
  disappears into the California hills. The old man's <ansi fg="itemname">cottage</ansi>
  is visible across the <ansi fg="itemname">fence</ansi> line, a rocking chair
  on its porch. A small bare <ansi fg="itemname">stage</ansi> stands by the barn
  with a single stool and a spotlight waiting for dark. The <ansi fg="itemname">sky</ansi>
  is vast and unhurried, a hawk turning circles above the field, the kind of sky
  that makes you think about time.
mapsymbol: R
maplegend: Broken Arrow Ranch
biome: farmland
nouns:
  barn: >-
    The barn has been converted to a recording studio without losing the barn.
    Hay bales pushed to the walls, lanterns strung from the rafters on extension
    cords. The Stray Gators are set up inside -- drums, bass, pedal steel, piano.
    The smell of horses and old wood and hot vacuum tubes. The doors stay open so
    the fields are part of the sound.
  fields: >-
    Wheat fields rolling east in the late light, golden and heavy and almost ready.
    You run your hand along the tops of the stalks and they bend and spring back.
    The harvest is coming. You can feel it in the weight of the air, the way the
    light thickens toward the ridge. This is what the whole album sounds like --
    something ripe, something about to be gathered.
  guitar: >-
    Neil's acoustic Martin, worn at the frets where his fingers have lived for
    years. A harmonica sits in a neck rack, ready to be played without putting the
    guitar down. The sound that defined a generation -- not because it was loud or
    complicated, but because it was honest. A flannel shirt draped over the back of
    the chair. A glass of water on the porch rail.
  cottage: >-
    The old man's place across the fence line. A small white cottage with a
    weathered rocking chair on the front porch, tools hung in order along the
    wall. He has been here for decades. The land knows his name. Through the
    window you can see a kitchen table, a radio, a life arranged with the kind
    of care that comes from having done everything once and knowing what matters.
  road: >-
    A dirt road disappearing into the California hills, tire tracks in the dry
    dust. A pickup truck sits at the edge of the property, a road atlas open on
    the seat to a page with no particular destination circled. The kind of road
    you drive when driving is the whole point. Nashville is two thousand miles
    east and the sessions there are still ringing in his ears.
  stage: >-
    A small bare stage by the barn, just boards on the dirt. A single spotlight
    on a pole, a wooden stool, a microphone. This is where Heart of Gold lives --
    stripped down to one man and one guitar and one truth. The stool is worn smooth.
    The spotlight will not come on until dark, but you can feel it waiting.
  sky: >-
    Vast California sky going gold at the edges. A hawk turns slow circles above
    the field, riding something invisible. Clouds stacked in the west like sheets
    of music. The kind of sky that makes you think about time -- how much has
    passed, how much is left, whether there is a difference. The light is so
    warm it feels like memory.
  fence: >-
    The fence line between Neil's land and the old man's, weathered posts and wire
    that has been mended more than once. This is where they talk at dusk -- two men
    leaning on opposite sides of the same fence, watching the same light go. A
    harmonica rests on the top rail, left there the way you leave something when
    you know you will come back for it.
