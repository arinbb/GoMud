roomid: 1407
zone: Matilda
title: School Corridor
description: >-
  A long, echoing <ansi fg="8">corridor</ansi> of scuffed linoleum and institutional
  green paint. <ansi fg="itemname">Fluorescent lights</ansi> buzz overhead, one of
  them flickering arrhythmically. Rows of small <ansi fg="itemname">coat hooks</ansi>
  line one wall at child height, each with a name label. The corridor smells of
  disinfectant, chalk dust, and fear. <ansi fg="itemname">Doors</ansi> lead off in
  every direction: Miss Honey's classroom to the <ansi fg="exit">north</ansi>,
  the dreaded Chokey to the <ansi fg="exit">east</ansi>, and the Trunchbull's
  office to the <ansi fg="exit">south</ansi>. The <ansi fg="exit">assembly</ansi>
  hall is through double doors to the west. The main gates are back to the
  <ansi fg="exit">west</ansi>.
mapsymbol: C
