nouns:
  road: "A paved two-lane road cuts across the trail at Woody Gap\x97GA-60, connecting Dahlonega to Suches. Cars pass every few minutes, their drivers oblivious to the hikers stepping across the asphalt."
  gap: "A mountain gap is a low point between peaks where the wind funnels through and roads find their easiest passage. Gooch Gap and Woody Gap are two of many along this section of the Blue Ridge."
  parking: "A small gravel parking lot at Woody Gap holds a few cars\x97day hikers, trail angels waiting with coolers, and the occasional hiker catching a ride to town."
idlemessages:
- A car hums past on GA-60, the sound fading quickly back into forest silence.
- Wind funnels through the gap, rustling the laurel and carrying the faint smell of exhaust.
- A trail angel has left a cooler of water bottles near the road crossing with a hand-written note.
- Boot prints in the mud tell the story of a dozen hikers who passed through today.
- A blue jay scolds from the treetops, offended by your presence in its territory.
- The sound of your own breathing is loud on the climb out of the gap.
