character:
  name: Mrs. Trefoile
  description: >-
    An elderly woman of erect and formidable bearing. Her grey hair is drawn
    back from her face with such severity that it pulls the skin of her
    temples smooth. No makeup of any kind. No jewellery except a plain gold
    ring worn on her right hand. She is dressed in grey from collar to hem —
    a high-necked blouse, a long skirt, low shoes of unpolished black leather.
    Her face is not unkind, which is the most disturbing thing about it. She
    looks at you with an expression of focused, patient attention, as though
    she is waiting for something that she is entirely certain will come. A
    large Bible is always in her hands, held open or closed with the same
    proprietorial ease.
  raceid: 1
  level: 10
