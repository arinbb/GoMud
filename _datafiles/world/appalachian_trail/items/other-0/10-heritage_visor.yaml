description: >-
  A lightweight AR visor with a warm amber tint. When activated, it overlays
  historical information onto the landscape — Cherokee place names, Civil War
  sites, CCC construction history, settlement stories, and Trail of Tears
  markers appear as glowing annotations in your field of vision. Toggle it
  on and off with 'use visor' or 'visor history'.
