character:
  name: George Costanza
  description: >-
    A short, stocky man, largely bald, who carries himself with the paradoxical
    confidence of someone who has been wrong so many times that correctness has
    ceased to be his metric. He wears clothes that were once carefully chosen
    and are now simply the clothes. His face is expressive in the way that
    faces are expressive when they are trying to sell something -- constantly
    slightly overselling, slightly underselling, searching for the angle. He
    is eating something. There is usually something he is eating.
