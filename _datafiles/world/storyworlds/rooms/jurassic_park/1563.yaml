roomid: 1563
zone: Jurassic Park
title: The DNA Lab
description: >-
  The genetics lab smells of cold air and ethanol and the faint sweetness of
  culture medium. Workbenches line the walls, covered in <ansi fg="cyan">microscopes</ansi>,
  centrifuges, and the amber glow of <ansi fg="cyan">sequencing equipment</ansi>
  still running its cycles — the park's power systems haven't failed here yet.
  A presentation screen on the far wall shows the automated <ansi fg="itemname">Mr. DNA</ansi> presentation on loop: the cheerful cartoon strand of DNA explaining
  how InGen extracted dinosaur blood from mosquitoes preserved in amber, filled
  the gaps with frog DNA, and reconstituted life from a forty-million-year-old
  blueprint. The explanation makes it sound reasonable. The reality is not
  reasonable. Along one wall, a row of <ansi fg="cyan">amber specimens</ansi>
  lines a display case — insects trapped in golden resin for millions of years,
  each one labeled. The hatchery is to the <ansi fg="exit">east</ansi>. The
  Visitor Center entrance is back to the <ansi fg="exit">north</ansi>.
