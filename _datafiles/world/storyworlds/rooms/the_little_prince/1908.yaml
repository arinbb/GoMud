nouns:
  books: >-
    Floor to ceiling, the most comprehensive geographic library in the
    region. Every mountain range, every river delta, every harbor and cape
    and plateau, recorded in the Geographer's precise hand. He has read
    all of the reports. He has verified all the measurements. He has
    never left this asteroid. He has never needed to. The books contain
    the world. The world contains things the books have not caught yet,
    but he is working on it.
  desk: >-
    A desk the size of a small room, covered in maps and charts and
    expedition reports and cross-references. The quill is always wet.
    The inkwell is always full. Something is always being recorded or
    corrected or noted for future recording. The desk is the center of
    the universe and also, entirely, of no use to anyone who wants to
    actually go somewhere.
  ephemeral: >-
    'We do not record ephemeral things.' The Geographer's voice is patient
    and certain. Flowers are ephemeral. They might be gone tomorrow. What
    good is a map with a flower on it if the flower is gone? Geographies
    record the eternal. Mountains. Oceans. Deserts. Not roses. When the
    Little Prince heard this, he thought of his rose for the first time
    not as a nuisance but as something that could be lost. Ephemeral.
    That was the word. He left quickly after that.
idlemessages:
- The Geographer adds a footnote to a map of a place he will never see.
- He opens a report, reads it carefully, adds a notation, closes it. The world is slightly better recorded.
- 'He mutters to himself: coordinates, elevations, distances. Everything that can be measured is being measured.'
- The books sigh slightly as the asteroid passes through a particularly dense region of space.
- He looks up, sees you, reaches for his quill. 'You are an explorer? What have you found?'
- A map slides from the desk. He retrieves it without looking, returns it to its place. He knows his desk by heart.
