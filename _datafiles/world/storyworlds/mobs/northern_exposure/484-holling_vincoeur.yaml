character:
  name: Holling Vincoeur
  description: >-
    A French-Canadian ex-trapper who opened The Brick and married a woman thirty
    years his junior and has spent the years since discovering that both decisions
    were the best he ever made. Holling is large in the way that comes from decades
    of physical work -- not imposing, just very present. His hands are enormous
    and gentle. He knows the wilderness around Cicely the way a book knows its own
    words, and he knows The Brick the same way. He is quieter than most bar owners,
    which is a kind of intelligence. He listens. He pours. He says exactly what he
    means, which is not always very much, and it is always enough.
