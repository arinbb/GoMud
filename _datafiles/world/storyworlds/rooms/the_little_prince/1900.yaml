roomid: 1900
zone: The Little Prince
title: The Sahara Desert
description: >-
  The desert spreads in every direction without end or mercy. Your small <ansi fg="itemname">plane</ansi> has crashed somewhere behind you, the engine
  crumpled against the sand, one propeller bent at an angle that means it will
  never fly again. The sky above is the colour of nothing — not blue, not
  black, but the particular shade that exists only at this hour, between day
  and the first <ansi fg="itemname">stars</ansi>. The sand is warm beneath
  your feet and cool an inch below the surface. A thousand miles from any
  human habitation, you are completely, profoundly alone. Then: a small
  voice. "If you please — draw me a sheep."
mapsymbol: S
maplegend: Sahara Desert
biome: desert
