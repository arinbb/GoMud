character:
  name: David Fisher
  description: >-
    A man in his mid-thirties with the contained, careful manner of someone
    who has been managing things since childhood and has become very good
    at it, at some cost. He is handsome in a way he does not use, and
    dressed with a precision that signals the importance of presentation
    -- a tie, always, even on weekends, even when nobody is coming. His
    face is controlled and expressive in turns; something in him is always
    working very hard to hold itself together, and occasionally the effort
    shows. He is the one who actually runs the funeral home. This is not
    adequately acknowledged.
