roomid: 2149
zone: Northern Exposure
title: Eds Video Store
description: >-
  <ansi fg="yellow">Eds Video Store</ansi> is the film school of Cicely.
  The shelves hold everything -- not a curated collection but an accumulation,
  organized by a system that Ed could explain but which would take longer
  than finding the film yourself. <ansi fg="itemname">Cassette cases</ansi>
  fill every available surface, handwritten labels on the ones Ed dubbed
  himself from television. A <ansi fg="itemname">television</ansi> on a
  high shelf plays continuously, sometimes something Ed is watching for
  research, sometimes something he fell asleep to and which has been
  running since. <ansi fg="itemname">Ed's camera</ansi> sits on the counter
  with a half-filled notebook beside it. The walls are covered in
  <ansi fg="itemname">movie posters</ansi> -- Kubrick and Kurosawa, Ford and
  Fellini, and several handmade posters for films Ed has made himself.
  The store is not just a business. It is where Ed is becoming what he is.
  To the <ansi fg="exit">south</ansi>, Main Street.
