roomid: 1
zone: Springer Mountain
title: Springer Mountain Summit
description: >-
  You stand atop <ansi fg="room-title">Springer Mountain</ansi>, elevation 3,782 feet,
  the southern terminus of the <ansi fg="yellow">Appalachian Trail</ansi>. A bronze
  <ansi fg="itemname">plaque</ansi> set into a boulder marks Mile 0 — the beginning of a
  2,190-mile journey north to Mount Katahdin in Maine. The summit is forested, a canopy
  of oak and hickory filtering the light. A <ansi fg="itemname">register</ansi> box is
  bolted to a post beside the plaque. White <ansi fg="itemname">blazes</ansi> mark trees
  to the north and south. The <ansi fg="exit">Approach Trail</ansi> descends south toward
  Amicalola Falls. The AT heads <ansi fg="exit">north</ansi> toward Springer Mountain
  Shelter and beyond.
mapsymbol: S
maplegend: Springer Summit
biome: mountains
exits:
  north:
    roomid: 2
    exitmessage: You follow the white blazes north, descending from the summit.
nouns:
  plaque: >-
    A bronze plaque set into a flat boulder reads: APPALACHIAN TRAIL - SPRINGER
    MOUNTAIN - SOUTHERN TERMINUS. The plaque bears the diamond AT logo and the words
    GEORGIA TO MAINE. Thousands of hands have rubbed the surface smooth.
  register: >-
    A weathered wooden box on a post contains a spiral-bound notebook and a stubby
    pencil. The pages are filled with names, dates, trail names, and hopes. Some
    entries are just a name and a date. Others are small essays about why they are
    here. A few simply read: See you at Katahdin.
  blazes: >-
    White rectangles of paint, about two inches wide and six inches tall, mark the
    trees along the trail. They are the Appalachian Trail's signature waymarkers,
    painted by volunteer trail maintainers. Two stacked blazes indicate a turn or
    junction. The blazes have guided hikers since 1930.
idlemessages:
- A cool breeze sweeps across the summit, rustling the register pages.
- 'A chipmunk darts across the plaque boulder, cheeks stuffed, utterly unimpressed by your journey.'
- Sunlight breaks through the canopy, spotlighting the bronze plaque.
- 'You hear voices on the Approach Trail below — someone else is coming up.'
- A blue jay screams from a high branch, announcing your presence to the forest.
- 'The plaque is cool under your fingertips. Mile 0. Everything starts here.'
