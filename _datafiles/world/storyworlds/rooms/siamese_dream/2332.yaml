roomid: 2332
zone: Siamese Dream
title: Luna
description: >-
  Moonlight. Quiet. Shimmering. After everything that came before -- the
  cathedral of feedback, the dark noise, the seven-minute drone -- this room
  is almost unbearably still. The <ansi fg="itemname">moon</ansi> fills the
  window, full and close and silver, the kind of moon you see at the end of
  things. <ansi fg="itemname">Guitar harmonics</ansi> hang in the air like
  stars at ground level, shimmering, barely sustained, each one fading before
  the next arrives. The <ansi fg="itemname">floor</ansi> is cool and smooth
  and slightly luminous, reflecting the moonlight back upward. The air here
  is the air after a storm -- clean, cold, everything washed. You have
  traveled through the whole record to arrive here, and here is peace.
  Brief, earned, real. The noise is back to the <ansi fg="exit">north</ansi>.
  The <ansi fg="exit">studio</ansi> is the way it began.
