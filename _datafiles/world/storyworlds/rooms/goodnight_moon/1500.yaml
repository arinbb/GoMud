nouns:
  fireplace: >-
    A low, open fireplace set in the south wall, its fire burned down to a bed
    of glowing coals and one shy flame. The light it throws is amber and
    wavering, warming everything it touches. A wire grate guards the coals.
    The mantelpiece above is painted white and holds the small household
    objects of a very orderly bedtime world.
  window: >-
    A tall window on the west wall. Through it the moon is clearly visible --
    impossibly large, impossibly white, rising with a slow dignity. Stars are
    becoming visible at the window's corners. The curtains are green, like the
    walls, and they move slightly even though no wind blows in here. The room
    is very warm. Outside looks very cold and very beautiful.
  mantel: >-
    The white-painted mantelpiece holds a curious collection: a green telephone,
    a little toy house no bigger than a shoebox, a red comb and a matching
    brush side by side, and a small bowl of something pale and steaming -- mush,
    warm and white, giving off a faint sweet smell. Each object sits in its
    exact place as though it has always been there and always will be.
  balloon: >-
    A red balloon on a long white string, tied to the mantelpiece. It floats
    near the ceiling, turning very slowly, as though it is thinking. The red
    is exactly the red of valentines, of fire engines, of the inside of eyelids
    pressed shut. It is a very red balloon. It seems content to be exactly
    where it is.
  clock: >-
    A round face on the wall near the fireplace. The hands point somewhere
    between seven and eight -- or perhaps between eight and nine. It is hard
    to say. The clock ticks with a soft, reassuring sound, each tick exactly
    like the last, each tock settling the room further into stillness.
