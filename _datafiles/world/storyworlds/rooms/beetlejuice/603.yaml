nouns:
  staircase: >-
    The staircase is solid oak with a carved banister. Halfway up, the wallpaper
    changes abruptly from floral to Delia's stark geometric pattern. The two
    styles meet in an ugly seam, like two realities stitched together.
  coatrack: >-
    Adam's tweed jacket and Barbara's cardigan hang here, undisturbed. They
    still smell faintly of their owners -- sawdust and lavender. Dust has begun
    to settle on the shoulders.
  stairs: >-
    Each step carries a small, personal history of the house. The wood is worn
    smooth in the center where generations of feet have climbed. The banister
    has a wobble at the third post that nobody ever got around to fixing.
    Going up feels like entering another version of the same argument.
  photos: >-
    A row of framed photographs along the staircase wall -- Barbara and Adam
    in better times, the house in summer light, someone's wedding. The Deetz
    renovation has not touched them. They hang at the same angle they always
    hung, slightly dusty now, watching the hallway with the patience of the
    recently deceased.
  wallpaper: >-
    Floral wallpaper, warm and old-fashioned, that the previous owners -- the
    Maitlands, who are still here -- chose with care. Half of it has been
    stripped away by Delia Deetz in pursuit of something modern and cold. The
    boundary between old and new runs unevenly down the wall like a wound
    that cannot decide how to close.
idlemessages:
- The old radiator clanks and hisses, pushing warmth into the hallway.
- A creak from the staircase -- footsteps? But no one is there.
- The contrast between the stripped wallpaper and what remains creates an unsettling patchwork.
- A draft from somewhere makes the coats on the rack sway slightly.
- From upstairs, the faint sound of someone humming a tune.
