nouns:
  desk: >-
    A large mahogany desk, bare except for a leather blotter and a phone
    with too many lines. The desk was chosen for the room. The room was chosen
    for the view. The view was chosen for what it says about the city to
    people who are not in the city.
  wood: >-
    Dark paneling, the kind that says this room is serious. The wood absorbs
    sound and mood both. Whatever is said in here sounds more official. It
    does not become more official. It sounds more official. This is not a
    small distinction.
  phones: >-
    Four lines, all of them important, all of them problems. The state delegation.
    The police commissioner. The head of the teachers union. The developer who
    is waiting on a permit. Pick one. They are all the same conversation.
  harbor: >-
    The window behind the desk frames the Inner Harbor. From here it looks
    like a functioning city. The cranes, the convention center, the restaurants
    along the water. Carcetti stands at this window when he needs to remember
    why he is doing this. He stands at it when he needs to remember that he is
    doing it wrong.
spawninfo: []
idlemessages:
- A staffer knocks, enters with a folder, gets a nod, exits. This is the rhythm of governance.
- One of the phone lines rings and then stops before anyone answers it.
- The view from the window catches the late afternoon light off the harbor. It is, objectively, beautiful.
- Someone is already preparing the talking points for the press conference nobody has decided to have yet.
- Carcetti would be at this window, if he were here, trying to feel something genuine. It is harder than it looks.
- The city budget sits on a credenza. Nobody is reading it. The deficit is in there, patient, waiting.
