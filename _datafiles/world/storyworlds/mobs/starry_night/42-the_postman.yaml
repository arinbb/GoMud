character:
  name: The Postman
  description: >-
    A sturdy, dignified man in a blue uniform with brass buttons, wearing a
    blue cap embroidered with the word POSTES. His most remarkable feature
    is his enormous beard — a flowing cascade of chestnut brown, almost
    as impressive as the swirling sky overhead. His eyes are kind and steady.
    This is Joseph Roulin, the postal worker of Arles and one of Vincent's
    closest friends in Provence. He carries a leather mail bag over one
    shoulder.
