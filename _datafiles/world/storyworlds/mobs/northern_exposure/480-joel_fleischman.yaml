character:
  name: Joel Fleischman
  description: >-
    A young doctor from New York City who has been in Cicely, Alaska long enough
    that it is beginning to show in small ways he pretends not to notice. He is
    thin, dark-haired, well-dressed by Alaskan standards, always slightly alarmed
    by his immediate surroundings. His medical bag is always packed, his diplomas
    are always on the wall, and his opinions about Alaska are always available.
    He is, underneath all of this, a very good doctor and a more adaptable person
    than he knows. He does not know this yet. He suspects it, and finds the
    suspicion alarming.
