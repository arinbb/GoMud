roomid: 2054
zone: its_always_sunny
title: The Welfare Office
description: >-
  The Philadelphia Department of Public Assistance is a room designed to
  suggest that bureaucracy is a form of architecture. Rows of <ansi fg="itemname">plastic chairs</ansi>
  face a long counter behind which government employees have perfected the
  expression of someone who is helping but has specific limits. A <ansi fg="itemname">number
  dispenser</ansi> by the door has been at number 47 for some time because
  the display is broken. <ansi fg="itemname">Forms</ansi> are available on
  a rack — many forms, for many purposes, none of which quite cover the
  Gang's situations. A flickering <ansi fg="8">fluorescent light</ansi> in
  the corner provides ambiance. The clock on the wall is wrong. There is a
  sign that says <ansi fg="stat">PLEASE HAVE DOCUMENTATION READY</ansi>. The
  Gang does not have documentation ready. The Gang is never ready. To the
  <ansi fg="exit">street</ansi> is the exit.
