nouns:
  sign: >-
    MERIDIAN. Pink and blue neon, one letter buzzing. Its reflection
    stretches down the wet parking lot in a shivering column of color.
    It is the kind of sign that has watched a lot of things happen
    in this parking lot and has never once commented.
  storefront: >-
    Dark windows. No sign except a small handwritten card in the door.
    People come here and sit in a booth and talk to a woman through
    glass. They think they are invisible. Everyone in this building
    knows exactly who they are.
  parking: >-
    Wet asphalt reflecting the neon. A few cars. One truck that has
    been here for hours. The man in the truck is sitting and looking
    at the storefront and not getting out.
  lot: >-
    Wet asphalt reflecting the neon. A few cars. One truck that has
    been here for hours. The man in the truck is sitting and looking
    at the storefront and not getting out.
  phone: >-
    A payphone on the corner. Travis used one like this to call Hunter.
    He put the receiver against his chest for a moment before he dialed,
    like he was steadying himself.
idlemessages:
- The neon sign buzzes. The bad letter flickers. The parking lot waits.
- A car pulls in, parks, and a man in a jacket gets out and goes to the storefront door.
- 'The truck has been there for a long time. The man inside it has not moved.'
- 'Rain that is almost rain: more like a very heavy mist that makes everything shine.'
- The phone booth light is on. No one is in it.
- The city sounds come from everywhere and belong to nowhere in particular.
- Someone comes out of the storefront, gets in a car, leaves. The parking lot does not notice.
