character:
  name: The Jailer
  description: >-
    A person whose uniform fits with the precision of someone who puts it
    on the same way every morning. Their khakis are the regulation khaki.
    Their combat boots lace to the regulation height. Their expression
    holds the practiced neutrality of someone who sees a great deal and
    records it all and reveals very little. They are good at their job.
    Whether their job is good is a separate question they have been sitting
    with for about three years now. There is a face-down photograph on their
    desk that is not, despite appearances, irrelevant to this question.
