idlecommands:
  - emote plays a jagged guitar fragment -- two chords, a bend, and a sudden stop -- then stares at the floor.
  - emote writes something in a spiral notebook, crosses most of it out, circles one word.
  - emote adjusts the strap on the battered Mustang, not looking at anything in particular.
  - emote lights a cigarette and lets it burn in his fingers without smoking it.
  - ''
