roomid: 2223
zone: six_feet_under
title: The Prep Room
description: >-
  The basement <ansi fg="8">preparation room</ansi> -- cool, clinical, lit by
  overhead fluorescents that turn everything the color of fact. A stainless steel <ansi fg="itemname">embalming table</ansi> occupies the center of the room,
  tilted slightly for drainage. Along one wall, a row of <ansi fg="itemname">cabinets</ansi>
  holds chemicals, instruments, cosmetics, wigs, thread. Against another wall,
  an <ansi fg="itemname">airbrush kit</ansi> and <ansi fg="itemname">reference photos</ansi>
  spread across a worktable -- Rico restores faces from photographs, giving back
  what illness or accident took away. The room smells of <ansi fg="itemname">formaldehyde</ansi>
  and cosmetics and underneath those, something cold and clean. This is where the
  art happens, the art nobody talks about at dinner parties. The <ansi fg="exit">entrance</ansi>
  is to the south. The <ansi fg="exit">body fridge</ansi> is to the east.
mapsymbol: P
maplegend: Prep Room
biome: house
