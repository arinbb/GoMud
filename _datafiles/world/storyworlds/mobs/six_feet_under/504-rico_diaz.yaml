character:
  name: Rico Diaz
  description: >-
    A man in his mid-thirties with the steady hands and focused eyes of a
    craftsman who has mastered a difficult art. He is compact and careful
    in his movements, speaks with a precision that matches the precision
    of his work. He is proud of what he does -- properly proud, the pride
    of someone who has earned a skill that matters and applies it with
    full attention. He grew up poor in East LA and built himself into
    something through discipline and craft. He considers the Fishers his
    family, though he will not say this directly. He shows it in the work.
