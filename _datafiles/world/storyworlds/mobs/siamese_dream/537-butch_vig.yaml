character:
  name: Butch Vig
  description: >-
    The producer, trying to hold the sessions together with the patience of
    someone who produced Nevermind nine months ago and knows what a difficult
    album can become. He has a session log that is becoming a diary of a band
    in crisis. He believes in the record. He believes in it enough to stay in
    Atlanta all summer with broken air conditioning and a band that is barely
    speaking to each other. The Neve board is his instrument. He plays it
    with the same care Billy plays the guitar.
