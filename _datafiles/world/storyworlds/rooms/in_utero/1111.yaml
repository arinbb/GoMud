roomid: 1111
zone: In Utero
title: Tourette's
description: >-
  RAW SENSORY OVERLOAD. The room is small -- too small -- and it is made entirely
  of <ansi fg="itemname">noise</ansi>. Feedback screams from the walls at a pitch
  that peels paint. <ansi fg="itemname">Lights</ansi> strobe in arrhythmic bursts
  that leave afterimages burned into your vision. The floor shakes with kick drum
  impacts that feel like detonations. <ansi fg="itemname">Words</ansi> appear on
  every surface -- walls, floor, ceiling -- and vanish before you can read them,
  fragments and syllables and the shrapnel of language blasted apart by volume.
  This is the shortest room on the album. This is the loudest room in the world.
  This is a scream compressed into architecture. It will be over before you
  process what it is, and you will stand in the aftermath with your ears ringing
  and your heart hammering and something inside you unclenched that you did not
  know was clenched. That is the point.
mapsymbol: B
maplegend: Tourette's
biome: dungeon
exits:
  west:
    roomid: 1110
  east:
    roomid: 1112
nouns:
  noise: >-
    Not a thing you see but a thing you feel. The air itself is vibrating at
    frequencies that bypass your ears and go straight to your chest cavity. It is
    not music. It is not not-music. It is the sound a guitar makes when you stop
    trying to control it and let it scream. It is beautiful in the way a car crash
    is beautiful -- total, committed, beyond the point of recovery.
  words: >-
    Appearing and vanishing on every surface faster than you can read. Fragments.
    Syllables. Half-words that might be profanity or might be prayer -- at this
    volume the distinction collapses. YOU. MEAN. HEART. SHARP. CUT. Some words
    appear backward. Some appear upside down. None of them stay long enough to
    form a sentence. Language as shrapnel.
  lights: >-
    Strobing in bursts that sync to nothing -- not to the noise, not to each other,
    not to any rhythm a human body could follow. White, then dark. White, then dark.
    The afterimages stack up behind your eyelids, a palimpsest of flash and shadow.
    The lights are not illuminating the room. The lights are attacking it.
idlemessages:
- A blast of feedback hits a frequency that makes your teeth resonate and your fillings hum.
- 'Words flash across the ceiling -- too fast, too broken, fragments of something that used to be language.'
- The strobe lights accelerate, the darkness between flashes shrinking, the room becoming a continuous seizure of white.
- The floor shakes with a kick drum hit so deep it registers as nausea rather than sound.
- 'NOISE. Just -- noise. Pure, cathartic, formless, free. The room screams because it can, because it must.'
- For a fraction of a second between strobe flashes, the room is perfectly silent and perfectly dark, and that silence is louder than everything.
