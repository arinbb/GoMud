roomid: 2456
zone: Tass Times in Tonetown
title: The Tass Market
description: >-
  If downtown is the exhibition of tassness and the Jam Session is its
  cathedral, the Tass Market is its factory. <ansi fg="magenta">Racks</ansi>
  of jumpsuits in every angle-defying cut line the walls, organized by
  chromatic intensity rather than size. A wall of <ansi fg="itemname">boots</ansi>
  displays footwear from practical to architectural. <ansi fg="itemname">Sunglasses</ansi>
  on a rotating display case offer lenses in shapes that suggest strong positions
  on geometry. A <ansi fg="itemname">fitting room</ansi> with a curtain printed
  in a dazzling geometric pattern promises transformation. The proprietor, a
  Tonetown citizen of legendary taste, watches from the counter with an
  assessment that is not unkind but is absolutely honest. A sign reads:
  <ansi fg="magenta">YOU CANNOT BE TASS IN WHAT YOU ARE WEARING NOW.</ansi>
  Tass Avenue is back to the <ansi fg="exit">west</ansi>.
mapsymbol: M
maplegend: The Tass Market
