character:
  name: Slimer
  description: >-
    A roughly spherical entity of vivid translucent green, approximately the size
    of a large man, with wide eyes and a mouth that takes up most of its face and
    is almost always open. Slimer is the ghost of a man who loved food more than
    anything in life and has continued this passion into death with the specific
    dedication of an entity that has nothing else to occupy its time. It trails
    slime constantly. Everything it touches becomes green and sticky. It is
    simultaneously repulsive and oddly endearing in the way of things that are
    very obviously enjoying themselves.
