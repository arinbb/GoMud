name: Tennessee
roomid: 35
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: forest
idlemessages:
- The NC/TN border ridge stretches endlessly, a dark spine of spruce and fir against the sky.
- Rhododendron thickets press close on both sides of the trail, their leathery leaves rattling in the wind.
- A raven croaks somewhere above the ridgeline, its voice echoing across the hollow.
- The air thins and cools as the trail climbs along the state line, carrying the scent of balsam.
- Grassy balds open unexpectedly between dark stands of forest, offering sudden panoramic views.
- The remoteness here is real. No roads, no cell service, just ridge after ridge fading into blue haze.
