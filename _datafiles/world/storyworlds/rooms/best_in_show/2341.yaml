roomid: 2341
zone: Best in Show
title: Registration Hall
description: >-
  The main registration and check-in hall of the Mayflower Kennel Club is the
  crossroads of the show. <ansi fg="itemname">Handlers</ansi> move through in
  all directions, dogs in tow, clipboards raised, numbers pinned. A long corridor
  of <ansi fg="itemname">bulletin boards</ansi> lines one wall with the day's
  judging schedule, breed ring assignments, and one handwritten note asking if
  anyone has seen a lost lead in black leather with a brass clip. The
  <ansi fg="itemname">announcer's board</ansi> at the far end shows live ring
  results updated in marker. The smell is institutional -- linoleum and fluorescent
  lights and the particular composite of forty dog shampoos. The
  <ansi fg="exit">entrance</ansi> is south. <ansi fg="exit">The Main Show Ring</ansi>
  is north. The <ansi fg="exit">grooming area</ansi> is east. The
  <ansi fg="exit">hotel</ansi> is west. The <ansi fg="exit">vendor hall</ansi>
  is through the vendors corridor.
