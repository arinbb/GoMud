roomid: 1602
zone: Die Die My Darling
title: The Entrance Hall
description: >-
  The entrance hall of the Trefoile house is all <ansi fg="8">dark wood</ansi> —
  panelled walls, a heavy balustrade on the <ansi fg="exit">stairs</ansi> going up,
  a flagstone floor covered by a runner of <ansi fg="8">faded carpet</ansi> in a
  pattern too dim to identify. <ansi fg="white">Religious icons</ansi> cover every
  vertical surface — a crucifix above the door, a framed scripture passage on the
  wall, a small <ansi fg="white">Madonna</ansi> in a niche beside the umbrella stand.
  The smell of the house arrives all at once: old wood, boiled food, and something
  that might be candle wax. There are no flowers. No photographs of living people.
  No <ansi fg="8">mirror</ansi> above the hall table — only a pale rectangle on the
  wallpaper where one used to hang. Exits lead <ansi fg="exit">south</ansi> to the
  garden, <ansi fg="exit">east</ansi> to the dining room, <ansi fg="exit">north</ansi>
  to the drawing room, <ansi fg="exit">west</ansi> to the kitchen, and <ansi fg="exit">stairs</ansi> rise to the upper landing. A heavy <ansi fg="8">curtain</ansi>
  hangs beneath the staircase, concealing the wall behind it.
