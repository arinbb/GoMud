roomid: 2484
zone: Idiocracy
title: The White House Lawn
description: >-
  The South Lawn of the White House in 2505 is partly the original grass,
  partly a motocross track, and partly a half-pipe for skateboarding that
  was added during the Camacho administration as a recreational initiative.
  The <ansi fg="itemname">monster trucks</ansi> parked near the Rose Garden
  are official government vehicles. The <ansi fg="itemname">presidential podium</ansi>
  stands near the center of the lawn, still there from this morning's press
  conference, or possibly last month's. The <ansi fg="itemname">White House</ansi>
  building itself is intact and largely original behind its rolling exterior
  of sponsor banners and the giant WWE title belt mounted over the north
  portico. A <ansi fg="itemname">flag</ansi> flies -- the Stars and Stripes,
  with the Brawndo logo in the canton, which replaced the fifty stars in 2308.
mapsymbol: W
maplegend: White House Lawn
biome: land
exits:
