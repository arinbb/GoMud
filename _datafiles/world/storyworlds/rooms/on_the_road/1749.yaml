roomid: 1749
zone: On the Road
title: A San Francisco Jazz Club
description: >-
  A Fillmore District jazz club in 1949, its walls dark with years of
  smoke and music. The <ansi fg="mobname">tenor man</ansi> onstage is
  playing something that sounds like <ansi fg="itemname">Charlie Parker</ansi>
  would sound if Charlie Parker had grown up on the ocean — the same
  speed, the same intelligence, but with something underneath it that
  is Pacific, coastal, the end of the world note. The <ansi fg="itemname">crowd</ansi>
  is loose and warm and the couple in the corner has been dancing
  slowly for the last hour, not dancing so much as holding each other
  upright while the music moves through them. Sal Paradise stands near
  the bar with a beer going warm in his hand, watching and remembering
  and trying to write it all in his head before it disappears, because
  everything like this disappears. The <ansi fg="exit">street</ansi>
  exit leads back to the city.
