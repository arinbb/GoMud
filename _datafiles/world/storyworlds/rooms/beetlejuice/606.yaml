  container: table
  respawnrate: 5 real minutes
idlemessages:
- The chandelier candles flicker in perfect unison, as if choreographed.
- You hear faint calypso music. Is it coming from the fruit bowl?
- A wine glass on the table hums briefly, as if someone ran a finger around its rim.
- The napkin swan twitches. You look again. It's still. Probably.
- The shrimp under the serving dish lid seem to have rearranged themselves.
