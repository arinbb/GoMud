nouns:
  handlers: >-
    The handlers in the registration hall have the bearing of people who have done
    this before. They know where to stand, what to sign, how to hold the lead so
    the dog looks its best even standing in a hallway. The ones doing it for the
    first time are distinguishable by how hard they are trying to look like the ones
    who have done it before.
  boards: >-
    The bulletin boards hold the day's complete schedule, ring maps, breed
    breakdowns, and the rules regarding prohibited grooming products in the
    ring. Several of the rules are underlined. Someone has added a question
    mark next to one of them. Below it, someone else has crossed out the
    question mark and written CORRECT.
  announcer: >-
    The live results board shows group winners as they are declared. Sporting
    Group: Vizsla. Hound Group: Bloodhound. The marker is still wet on the
    last entry. More will follow.
spawninfo:
idlemessages:
- A handler stops to check the ring assignment board, traces a finger across it, and nods.
- Two dogs pass in opposite directions. Both are impeccably groomed. Neither acknowledges the other.
- 'The PA system crackles: "Norwich Terrier Group to Ring Four. Norwich Terrier Group to Ring Four."'
- A man in a blazer hurries through carrying a tray of water bowls. The dogs he passes all look up.
- Someone pins a number to their lapel, straightens it, and stands slightly taller.
- The linoleum floor squeaks under a cart of grooming equipment moving toward the east corridor.
- A Bloodhound pauses in the middle of the hall and lifts its enormous nose. The crowd parts around it naturally.
- Two handlers who clearly know each other well exchange a brief nod that contains an entire conversation about yesterday.
