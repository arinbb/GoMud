roomid: 1556
zone: Jurassic Park
title: The Wrecked Explorer
description: >-
  The Ford Explorer sits on its side in the mud at the paddock's edge, thrown
  from the track and overturned. The roof is crushed, the windshield shattered
  in a pattern that tells a story you would rather not read too closely. A <ansi fg="itemname">large tree</ansi> has been pushed through the passenger
  compartment — its roots exposed, the whole trunk torn from the earth and used
  as a tool, or perhaps a toy. Rain pours through the broken windows and fills
  the footwell. The <ansi fg="itemname">electric fence</ansi> is down here in a
  tangle of wire, posts snapped at their bases and thrown aside. Whatever
  happened here was fast. The <ansi fg="itemname">night vision goggles</ansi>
  Tim was wearing are somewhere in the mud — you can see the broken strap.
  Inside the crumpled vehicle, a <ansi fg="itemname">tour narration screen</ansi>
  still plays, looping cheerfully: "T. Rex! The Tyrannosaurus Rex! The thunder
  lizard!" The west exit leads back to the paddock.
mapsymbol: X
maplegend: Wrecked Explorer
biome: land
exits:
  west:
    roomid: 1555
nouns:
  explorer: >-
    The Ford Explorer on its side, both rear axles in the air. The paint
    is scraped to bare metal on the roof. The doors are buckled outward.
    Something gripped the vehicle and lifted it — you can see finger impressions
    in the sheet metal, four parallel furrows, each one the width of your
    forearm.
  tree: >-
    A full-grown tropical hardwood tree, torn out by the roots and pushed
    through the Explorer's roof as though the vehicle were made of paper. The
    roots dangle ten feet in the air, trailing clumps of dark soil.
  goggles: >-
    Night vision goggles, military surplus, now half-buried in mud. The strap
    is broken. One lens is cracked. They belonged to Tim Murphy, who thought
    seeing in the dark would help. He was not entirely wrong about that.
  screen: >-
    A headrest video screen, still playing its programmed tour content despite
    the vehicle being upside down in the mud. A cartoon Mr. DNA bounces across
    the screen. "T. Rex! The Thunder Lizard! Weighing up to seven tons..."
    The cheerfulness is its own kind of horror.
idlemessages:
- The wrecked Explorer settles further into the mud with a groan of stressed metal.
- Rain pools in the upturned footwell and drips through the shattered windshield in a curtain.
- Mr. DNA continues his cheerful explanation on the tilted headrest screen, undeterred by the carnage around him.
- The torn fence wire nearby hums in the rain — not with electricity. Just the wind moving through it.
- Dinosaur tracks in the mud here are each large enough to stand in. They circle the vehicle and then lead away.
- A hubcap rolls slowly across the mud until it catches on a fence post and stops. The silence that follows is enormous.
