roomid: 1908
zone: The Little Prince
title: The Geographers Asteroid
description: >-
  Enormous <ansi fg="itemname">books</ansi> line every surface of the asteroid,
  each one a geography of somewhere the Geographer has never been. He sits
  at a grand <ansi fg="itemname">desk</ansi> of polished mahogany, consulting
  his records, his quill ready to note the features of lands described by
  travelers he has sent out and may or may not trust. He is a very important
  person. He cannot go himself -- he is far too busy recording what others
  find. He knows every river, every mountain, every city on every planet in
  the region -- by report. He has never seen any of them. He finds explorers
  to verify what he already suspects. When the Little Prince told him about
  his rose, the Geographer was not interested. Roses are <ansi fg="itemname">ephemeral</ansi>,
  he said. We do not record ephemeral things. This is when the Little Prince
  understood something about his rose that he had not understood before. The
  path leads back to the <ansi fg="exit">lamplighter</ansi> north, and an
  exit leads to <ansi fg="exit">earth</ansi> from here, east.
