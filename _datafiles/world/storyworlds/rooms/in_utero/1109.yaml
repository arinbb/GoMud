nouns:
  kettle: >-
    A dented aluminum kettle on a gas burner turned low, the water inside a murky
    green -- herbal, medicinal, the color of remedies that predate pharmacology.
    The steam smells of mint and bitterness and something astringent that catches
    in the back of your throat. The whistle is thin and constant, easy to ignore
    after a while, easy to forget is there at all.
  bottles: >-
    Medicine bottles crowd the windowsill, jostling for space. Prescription labels
    overlap and contradict -- take with food, take without food, take twice daily,
    take as needed, do not take, take anyway. Some bottles are empty. Some are full.
    The distinction matters less than it should.
  table: >-
    A small kitchen table, Formica top, chrome legs, the kind found in a million
    kitchens in a million small towns. Cigarette burns scar the edge in a pattern
    that maps years of sitting and staring. A single cup sits on the surface, its
    contents murky and cooling. A spoon rests beside it, unused.
  wallpaper: >-
    Peeling in slow curls, each layer revealing the one beneath -- yellow flowers
    over blue stripes over green checks over bare plaster. Every decade tried to
    cover the one before it. Every decade failed. The glue has given up. The walls
    are undressing themselves, slowly, one era at a time.
idlemessages:
- The kettle whistle thins to a reedy whine, the water level dropping, the steam growing more desperate.
- Another curl of wallpaper peels free and drifts to the floor, revealing a faded layer of daisies beneath.
- 'The cup on the table grows colder. The murky liquid inside does not move, does not settle, does not clear.'
- A medicine bottle on the windowsill tips over in slow motion, pills scattering across the sill like tiny white punctuation marks.
- 'The light through the window dims further, though the sun has not moved -- the room itself is absorbing brightness.'
- The gas flame under the kettle flickers blue, then yellow, then blue again, uncertain of its own temperature.
