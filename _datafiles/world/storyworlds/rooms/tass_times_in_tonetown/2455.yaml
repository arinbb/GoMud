roomid: 2455
zone: Tass Times in Tonetown
title: Tass Avenue
description: >-
  The main commercial artery of Tonetown is a continuous spectacle of
  <ansi fg="magenta">storefronts</ansi> competing for the honor of being the
  most visually declarative building on the block. Mannequins in <ansi
  fg="itemname">shop windows</ansi> model outfits that function as complete
  aesthetic arguments. <ansi fg="itemname">Music</ansi> leaks from every
  doorway -- synth, post-punk, new wave -- each shop having a different opinion
  about what the block should sound like, the whole becoming an accidental
  symphony. Citizens carry shopping bags in shapes that suggest the contents
  are ideas rather than objects. To the east, the <ansi fg="itemname">Tass
  Market</ansi> glows with the particular light of a place that can fix what
  is wrong with your wardrobe. West, the bass from the <ansi fg="itemname">Jam
  Session</ansi> pulses like a second heartbeat. The avenue continues south
  toward the swamp road, and north back to downtown.
