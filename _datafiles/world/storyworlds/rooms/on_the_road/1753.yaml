roomid: 1753
zone: On the Road
title: Des Moines Bus Station
description: >-
  The <ansi fg="itemname">Greyhound bus station</ansi> in Des Moines, Iowa,
  at <ansi fg="itemname">3 in the morning</ansi>. The <ansi fg="itemname">fluorescent lights</ansi>
  buzz overhead with the specific frequency of late-night emptiness —
  that hum that is most audible at 3am and that Sal Paradise knows very
  well. He is sitting on a hard plastic bench with sixteen dollars in
  his pocket and nowhere particular to be. The other passengers sleep
  with their heads on their bags or stare at nothing. A <ansi fg="itemname">janitor</ansi>
  pushes a mop in slow arcs. The <ansi fg="itemname">vending machine</ansi>
  in the corner offers crackers and candy bars for a dime. This is the
  exact geographic center of everything, and it is 3am, and Sal feels
  alone in a way that is not unpleasant but is not pleasant either. It
  is the loneliness that is the underside of freedom, the thing you find
  when you go far enough. To the <ansi fg="exit">east</ansi> along the <ansi fg="exit">road</ansi> the highway runs back toward wherever you came from.
mapsymbol: B
maplegend: Des Moines Bus Station
