nouns:
  bald: "The grassy balds of the southern Appalachians are a mystery. These treeless meadows exist at elevations where forest should dominate. Some theories blame ancient megafauna grazing, others point to Native American burning practices, others to ice age remnants. Whatever the cause, they are among the most beautiful landscapes on the AT\x97open sky, wind-bent grass, and wildflowers in season."
  ridge: "The ridgeline here forms the state boundary between North Carolina and Tennessee. You are literally walking the border, one foot in each state. The ridge runs northeast to southwest, a wall of mountains that catches weather from both sides."
  spencefield: "Spence Field is one of the great grassy balds of the Smokies\x97a rolling meadow of grass and wildflowers at nearly 5,000 feet. In June, flame azaleas bloom orange and red across the bald. The views are panoramic, stretching to the horizon in every direction."
  wildflowers: "Depending on the season: flame azaleas in June, blueberries in July, goldenrod and asters in September. The balds support a community of plants that thrive in the wind and sun of the open ridgetop."
  wind: "The wind is relentless on the ridgeline, funneled through gaps and over saddles. It carries the smell of grass and distant rain. Your pack cover flaps and snaps. The sound is both lonely and exhilarating."
idlemessages:
- The wind bends the ridge grass in silver waves, carrying the smell of distant rain.
- A dark-eyed junco flits along the trail edge, showing flashes of white tail feathers.
- Clouds build and dissolve over the ridgeline in an endless cycle, never quite committing to rain.
- The blue haze fills every valley to the south, making each ridge a paler shade of blue until they vanish.
- A hawk rides the updraft along the ridge, motionless, letting the wind do the work.
- The grass rustles with something small and unseen moving through it.
- Far below on the Tennessee side, the sound of a distant creek rises faintly on the updraft.
