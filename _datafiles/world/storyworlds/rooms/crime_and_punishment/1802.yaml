roomid: 1802
zone: Crime and Punishment
title: Stolyarny Lane
description: >-
  The street outside the building, a narrow lane between tenement walls that
  lean toward each other as if in confidence. The <ansi fg="itemname">summer heat</ansi> here is worse than anywhere — trapped between the stones, no
  breeze, the smell of <ansi fg="itemname">horse dung</ansi> and dust and
  something rotting in a gutter. A drunk is already asleep against the wall
  at midmorning. Workmen in sheepskin coats — somehow, even in this heat —
  move past with purpose. The lane opens to larger streets in several
  directions: <ansi fg="exit">north</ansi> to Haymarket Square, <ansi
  fg="exit">east</ansi> to the pawnbroker's building, <ansi
  fg="exit">south</ansi> toward the canal, <ansi fg="exit">west</ansi> to the
  police station. The building entrance is <ansi fg="exit">up</ansi> the
  staircase.
