roomid: 1103
zone: In Utero
title: Heart-Shaped Box
description: >-
  A garden that should not exist. <ansi fg="itemname">Flowers</ansi> grow from
  flesh-colored soil, their petals wet and organic, opening and closing like
  breathing. Heart-shaped <ansi fg="itemname">boxes</ansi> hang from dead trees
  like grotesque ornaments, swaying in a wind that carries no temperature.
  Umbilical cords trail across the ground like ivy, connecting nothing to
  nothing. At the garden's center, a papal <ansi fg="itemname">throne</ansi>
  stands among the decay, occupied by a figure in a hospital gown whose face
  you cannot quite resolve. The <ansi fg="itemname">sky</ansi> above is the
  color of raw meat -- neither day nor night but something wounded and eternal.
  The melody here is inescapable. It rises from the soil, falls from the branches,
  hangs in the air like pollen. It is the most beautiful thing on the album,
  and it is growing from rot.
mapsymbol: '3'
maplegend: Heart-Shaped Box
biome: forest
