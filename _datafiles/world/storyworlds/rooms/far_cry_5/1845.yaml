roomid: 1845
zone: Far Cry 5
title: Holland Valley
description: >-
  The valley spreads before you in a wash of <ansi fg="yellow">gold</ansi> —
  wheat fields at the end of summer, miles of them, the stalks heavy-headed
  and bending in the breeze. <ansi fg="itemname">Silos</ansi> rise against the
  mountain backdrop like silver pillars. <ansi fg="itemname">Farmhouses</ansi>
  sit at intervals along the roads, most of them with Eden's Gate symbols
  painted or mounted on the doors. John Seed's country. The Baptist's domain.
  The valley is beautiful in the way that all occupied territories are beautiful
  when the occupier has done nothing to the land itself and everything to the
  people on it. <ansi fg="itemname">Crop dusters</ansi> buzz somewhere over
  the fields. The county road is to the <ansi fg="exit">west</ansi>. The valley
  runs <ansi fg="exit">north</ansi> toward Johns Gate. The Seed Ranch lies
  to the <ansi fg="exit">ranch</ansi> (east).
