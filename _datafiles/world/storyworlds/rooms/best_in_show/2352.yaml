nouns:
  bags: >-
    The gear bags are professional and very full. Extra leads, towels, conditioning
    spray, lint rollers -- so many lint rollers -- number holders, business cards,
    photographs of previous wins, protein bars from the last show still in the bottom.
    The complete detritus of competitive dog showing, organized with varying degrees
    of system.
  station: >-
    The water station has a large bowl on the floor for dogs and a dispenser of paper
    cups for handlers. The dog bowl has been in use today. The paper cups have been
    in use today. There is a kind of equality in this that seems right.
  bench: >-
    The wooden bench is institutional, worn, permanent. The Good Luck scratched into
    it is old enough that the letters have softened. Someone did this before some show
    years ago, for someone specific. The specificity has worn away. It is addressed to
    everyone now.
spawninfo:
idlemessages:
- A handler runs through the gaiting pattern in the corridor, footsteps precise on the concrete.
- Gerry Fleck passes through with Winky, talking to him in a low, reassuring voice. Winky's ears are at full alert.
- Cookie stands near the gear bags, eyes closed, lips moving slightly. She is running through the pattern. Possibly praying. Possibly both.
- A dog sits perfectly still while its handler adjusts one strand of hair. The dog does not move. It has been here before.
- 'The muffled ring announcer floats through the bleachers: another group finished. One more before Best in Show.'
- Someone paces the corridor with the rhythm of a person who has tried everything else and been reduced to pacing.
- The fluorescent light flickers once. Several people look up. It steadies. They look back down.
- A treat is produced and a dog takes it with focused professional interest. It was earned for something. The dog understands this.
