roomid: 2303
zone: The Office
title: The Bullpen
description: >-
  The open floor of Dunder Mifflin, where the actual work happens, or at least
  where the actual work is supposed to happen. Rows of <ansi fg="itemname">cubicle
  partitions</ansi> in standard corporate beige divide the space into workstations,
  each one a small universe of personal expression within corporate constraint.
  <ansi fg="itemname">Jim's desk</ansi> faces <ansi fg="itemname">Dwight's desk</ansi>
  across a narrow aisle -- this arrangement was not an accident. The <ansi fg="itemname">copier</ansi>
  in the corner has a yellow 'OUT OF ORDER' sign that has been there long enough
  that someone has written underneath it: 'as always.' A <ansi fg="itemname">whiteboard</ansi>
  on one wall shows Q3 sales targets next to a drawing of a beet. The fluorescent
  lights maintain their eternal hum. <ansi fg="exit">Reception</ansi> is to the
  south. The <ansi fg="exit">annex</ansi> is to the east. The <ansi fg="exit">conference
  room</ansi> is to the north. The <ansi fg="exit">kitchen</ansi> is to the west.
