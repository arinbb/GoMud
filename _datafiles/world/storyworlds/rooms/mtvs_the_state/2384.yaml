  east:
    roomid: 2380
  north:
    roomid: 2388
nouns:
  racetrack: >-
    A regulation racetrack scaled for porcupines. The engineering required to produce
    this is not acknowledged anywhere on the premises, but it was considerable.
  track: >-
    Packed dirt, smooth on the straightaways and slightly banked at the curves. The
    porcupines know these curves. They have trained on these curves. They are, within
    the context of porcupine racing, professionals.
  bleachers: >-
    Metal bleachers that seat perhaps sixty people total. Today there are eight people
    in them. All eight are watching with the focused intensity of true believers. This
    sport does not need large crowds. It needs the right crowds.
  scoreboard: >-
    A scoreboard showing race times, porcupine names, and betting odds. The porcupine
    names are things like SPINAL and NEEDLEPOINT and QUILLIAM. The odds are calculated
    with more seriousness than most things in this world are calculated.
  starting: >-
    The white painted line that divides before from during. The porcupines approach it
    with what can only be described as purpose.
spawninfo:
- mobid: 578
  message: '<ansi fg="11">The Porcupine Announcer takes the microphone with the gravity of a man who has been trusted with something important.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- The announcer narrates porcupine positions with the precision of a man who has studied this.
- A porcupine crosses the finish line. The eight spectators make the sound of a full stadium.
- The starting gates rattle. The porcupines are ready. They are always ready.
- The scoreboard updates. The odds shift. Someone in the bleachers recalculates.
- A porcupine pauses mid-race to investigate something on the track. The announcer describes this.
- The dirt track shimmers in the afternoon light. The porcupines cast small, spiky shadows.
- Someone in the bleachers says 'Come on, Needlepoint' with complete sincerity.
