roomid: 610
zone: Great Smoky Mountains
title: Cosby Knob Shelter
description: "Cosby Knob Shelter sits at 4,740 feet, the last shelter before the trail drops to Davenport Gap and the end of the Great Smoky Mountains National Park. The elevation has dropped enough that hardwoods are reclaiming the canopy from the spruce\x97oak, birch, and beech mingle with the last red spruce, creating a transitional forest with its own particular beauty. The shelter has the standard chain-link bear fence and reservation requirement. A reliable spring flows nearby. Many thru-hikers linger here, savoring the last night in the Smokies before descending to Interstate 40 and the shock of re-entering civilization. The register is full of reflections on seventy miles of ridgeline walking and the bittersweet feeling of leaving the park. Standing Bear Farm hostel is less than a day's walk north, and the promise of hot food and a shower lends the morning an eager energy."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 65
    exitmessage: You follow the side trail back to the AT ridge toward Davenport Gap.
    mapdirection: east
nouns:
  shelter: "The last Smokies shelter before the park boundary at Davenport Gap. Hardwoods have replaced most of the spruce at this lower elevation. The chain-link fence feels almost nostalgic now\x97you have spent a week behind these fences."
  fence: "The chain-link bear fence, a feature unique to the Smokies. After a week of sleeping behind chain-link, you have developed a complicated relationship with it. Protection and confinement. Safety and absurdity."
  register: "The register is thick with farewell entries\x97hikers leaving the Smokies after a week on the ridgeline, reflecting on the experience. Many are emotional. Some are just relieved."
  spring: "A reliable spring near the shelter, flowing through a hardwood hollow. The water is warmer than the high-elevation springs\x97merely cold rather than numbing."
  privy: "The last Smokies privy. You have used many. You will not miss them, but you will remember them."
  forest: "The forest here is transitional\x97high-elevation spruce giving way to hardwoods as the ridge descends toward Davenport Gap. Oak, birch, and beech crowd in, their leaves broader and greener than the dark spruce needles above. It feels like coming down from another world."
idlemessages:
- The hardwoods rustle with a warmer, fuller sound than the spruce forests above.
- A wood thrush sings from the understory, its ethereal fluting a soundtrack for the descent from the heights.
- The air is warmer and thicker here than the high ridges, rich with the smell of leaf litter and loam.
- A chipmunk dashes across the shelter platform, cheeks bulging, on urgent chipmunk business.
- Tomorrow is Davenport Gap, Standing Bear Farm, and pizza. Tonight is the last night behind the fence.
- Fireflies emerge at dusk, drifting through the hardwood canopy like green embers.
