character:
  name: Ennio
  description: >-
    A man who has been behind this bar long enough that he and the bar
    have reached an accommodation about who is in charge. His bartender
    vest is immaculate, his dark trousers knife-creased, his loafers
    polished. He moves with the economy of someone who has calculated the
    exact minimum motion needed to do everything perfectly. His face holds
    the considered neutrality of a person who knows a great deal and has
    learned that appearing to know it all at once is counterproductive.
    He will tell you what you need to know when you need to know it.
    He has been waiting to tell you several things for some time.
