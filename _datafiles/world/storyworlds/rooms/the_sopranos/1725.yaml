roomid: 1725
zone: The Sopranos
title: Route 21 / New Jersey Highway
description: >-
  A wide <ansi fg="8">New Jersey highway</ansi>, four lanes of aggressive motion
  flanked by the particular suburban landscape that New Jersey has perfected: <ansi fg="itemname">strip malls</ansi> in beige and tan, a <ansi fg="itemname">cell
  phone store</ansi> next to a nail salon next to a closed video rental. Power lines
  run overhead in sagging catenary curves. The <ansi fg="itemname">sky</ansi> is a
  flat Jersey white, not quite overcast, not quite sunny. A <ansi fg="itemname">diner</ansi>
  sign blinks in the distance. This is the connective tissue of North Jersey, the
  landscape between destinations, the nowhere you drive through to get somewhere. <ansi fg="exit">South</ansi> leads back toward the Soprano house, <ansi fg="exit">north</ansi>
  toward Satriales, <ansi fg="exit">east</ansi> toward the Bada Bing, and <ansi fg="exit">west</ansi>
  toward Vesuvio.
