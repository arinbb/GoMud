idlemessages:
- The red balloon turns once, very slowly, in a draft that comes from nowhere.
- The clock ticks. The fire settles. A coal shifts with a soft, sleepy sound.
- The quiet old lady's needles click once, twice, then pause. Then click again.
- The moonlight through the window grows a fraction brighter. The moon is still rising.
- Something moves at the edge of your vision -- the kittens, slipping behind a chair.
- The air smells of warm wool, of woodsmoke, of milk left near the fire.
- The great green walls seem to breathe very slowly, in and out with the room's deep quiet.
- You feel your eyelids growing heavy, then light, then uncertain. The room hums with sleep.
