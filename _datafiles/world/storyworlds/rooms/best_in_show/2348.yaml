roomid: 2348
zone: Best in Show
title: The Press Box
description: >-
  A narrow elevated room overlooking the main ring through a wide window, just
  large enough for two chairs, a <ansi fg="itemname">broadcast desk</ansi>, two
  <ansi fg="itemname">microphones</ansi>, and whatever is happening between Buck
  Laughlin and Trevor Beckwith at any given moment. <ansi fg="itemname">Monitors</ansi>
  show multiple camera angles of the ring below. An earpiece cable runs from the
  desk to an untouched cup of coffee. A stack of <ansi fg="itemname">index cards</ansi>
  beside Buck's microphone contains research that Buck has not consulted and will
  not consult. Trevor's notes are immaculate. Trevor's face is the face of a man
  doing his absolute best. Buck is saying something. Trevor is already redirecting
  it. The <ansi fg="exit">show ring</ansi> is east.
mapsymbol: B
maplegend: The Press Box
biome: house
exits:
  east:
    roomid: 2343
nouns:
  desk: >-
    The broadcast desk has two positions: TREVOR BECKWITH and BUCK LAUGHLIN, both
    in the same font, as if they are equivalent. They are not equivalent in
    preparation. They are equal in title and in the effect they have, together,
    on the broadcast, which is to say one of them provides information and one of
    them provides something that is harder to categorize but which viewers seem
    to find compelling.
  microphones: >-
    Two microphones. Trevor's is correctly positioned and will stay that way.
    Buck's is correctly positioned and will not stay that way. Buck gestures
    when he talks. This is a documented issue. The technical director has adapted.
  monitors: >-
    The monitors show the ring from above, from the side, and from the close-up
    lens that catches dogs' faces. The close-up camera is Buck's favorite. Several
    things Buck has said about dogs' faces on this camera have required redirection.
  cards: >-
    The index cards contain comprehensive information: breed histories, judging
    criteria, notable champion lineages. There is a producer's note attached that
    reads PLEASE DO NOT SPECULATE ABOUT THE PRIVATE LIVES OF THE HANDLERS with
    a follow-up post-it that says THIS MEANS YOU BUCK. Buck has not read either note.
spawninfo:
- mobid: 547
  message: '<ansi fg="8">Buck Laughlin settles into his commentary chair with the ease of a man who has never been nervous. He says something into the microphone. Trevor Beckwith, beside him, does not visibly react. Trevor has extensive experience not visibly reacting to things Buck says.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- Buck leans into the microphone. Trevor redirects him, smoothly, to the dog currently being shown.
- Trevor consults his notes and provides precise breed information. Buck says 'huh' and then says something else.
- Buck is laughing at something he said. Trevor is watching the ring with professional focus.
- 'Trevor says: "And there you have it, an exceptional Norwich Terrier." Buck says: "You know what else is exceptional?"'
- The camera cuts to a close-up of a dog. Buck has feelings about this. They are genuine feelings. They are not appropriate for broadcast.
- Trevor summarizes judging criteria clearly and correctly. Buck adds a story about a dog his neighbor had in 1987.
- Buck removes his earpiece. The floor producer makes a note. Trevor continues without breaking stride.
- Buck looks at the index cards for approximately three seconds. He sets them down. He will not return to the index cards.
