roomid: 2143
zone: Northern Exposure
title: Ruths General Store
description: >-
  <ansi fg="yellow">Ruths General Store</ansi> is everything in Cicely that
  the town needs and cannot find anywhere closer than Anchorage. <ansi fg="itemname">Shelves</ansi>
  run floor to ceiling, organized by a logic that is entirely Ruth-Annes and
  comprehensible only to her, though she can find anything in under thirty
  seconds. Hardware and <ansi fg="itemname">books</ansi> share a shelf.
  Canned goods and <ansi fg="itemname">philosophy</ansi> are in the same
  general vicinity. A <ansi fg="itemname">wood stove</ansi> in the corner
  radiates steady heat. The <ansi fg="itemname">counter</ansi> is old
  pine, worn white where ten thousand transactions have happened, and behind
  it Ruth-Anne Miller sits on her stool with the placid authority of someone
  who has already considered every question you are about to ask. A
  <ansi fg="itemname">bulletin board</ansi> by the door holds the civic
  life of Cicely in miniature. To the <ansi fg="exit">south</ansi>, Main Street.
mapsymbol: G
maplegend: Ruths General Store
biome: house
exits:
  south:
    roomid: 2140
    exitmessage: The bell above the door rings as you step out onto Main Street.
nouns:
  shelves: >-
    The shelves of Ruths General Store contain multitudes. Motor oil next to
    Maya Angelou. Nails next to Nietzsche. Coffee filters next to Chekhov.
    This is either haphazard or the most integrated organizational system
    in retail history. The regulars stopped noticing years ago. New arrivals
    always find exactly what they need, even when they do not know they need it.
  books: >-
    A remarkable selection for a town of 215 people. Ruth-Anne orders what
    she thinks the town should be reading, which turns out to be exactly
    what individual members of the town need at this moment in their lives,
    with an accuracy that is either excellent intuition or something stranger.
    The fiction section is in the back. The philosophy section is next to
    the fishing lures, which Ruth-Anne says is intentional.
  bulletin: >-
    The bulletin board is the newspaper of Cicely. Lost: one dog named
    Thunder, reward offered, call Holling. Wanted: someone who understands
    the Hendersons tractor. KBHR FRIDAY NIGHT BROADCAST -- Chris in the
    Morning, special evening edition, bring a chair. Annual Run registration
    now open. A note in careful handwriting: 'Anyone who wants to discuss
    the implications of Kant for small-town governance, Tuesday evenings,
    Maggie's cabin.'
  counter: >-
    The pine counter is the altar of the store. This is where money changes
    hands, where gossip is dispensed and collected, where Ruth-Anne performs
    the civic function of knowing everyone and remembering everything. The
    surface is smooth and slightly sticky near the register, which has been
    here since 1971 and still works.
  stove: >-
    The wood stove in the corner is the heart of the store in winter, which
    in Cicely means most of the year. People stop in not to buy things but
    to warm their hands and hear Ruth-Anne's assessment of the situation.
    Her assessment is usually accurate. Her coffee is always good.
spawninfo:
- mobid: 486
  message: '<ansi fg="10">Ruth-Anne Miller looks up from her book as you enter, her eyes sharp and unhurried, the expression of someone who has greeted ten thousand arrivals and is genuinely interested in this one.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- Ruth-Anne turns a page and looks up once at nothing in particular, then returns to her book.
- The wood stove ticks and settles. The heat is even and reliable. Like Ruth-Anne.
- A can falls off a shelf somewhere in the store and Ruth-Anne does not flinch. This happens.
- 'The smell of the store: pine wood, old paper, machine oil, cedar, and something baked that is not for sale.'
- Ruth-Anne picks up the phone receiver, listens for a moment, says three words, hangs up. Problem solved.
- The bell above the door rings as someone else comes in. Ruth-Anne greets them by name before they speak.
- A copy of something by Tolstoy is face-up on the counter next to a display of fishhooks.
- The afternoon light comes through the front window in a long bar across the wooden floor.
