roomid: 2201
zone: The Wire
title: The Towers
description: >-
  High-rise public housing, twenty stories of <ansi fg="8">concrete and broken promise</ansi>.
  The elevator has not worked since the second Bush administration and nobody
  has filed a work order that has gone anywhere. The <ansi fg="itemname">lobby</ansi>
  smells of ammonia and older things. <ansi fg="8">Stash houses</ansi> occupy
  strategic apartments on multiple floors -- the higher up, the more warning you get.
  The walls of the stairwell are layered with <ansi fg="itemname">tags</ansi>, some
  going back years, an unintended archive of everyone who passed through. A <ansi fg="itemname">lookout</ansi> on the roof has eyes on three streets below.
  The <ansi fg="exit">Pit</ansi> is to the west, and the <ansi fg="exit">rooftop</ansi>
  is above.
mapsymbol: T
maplegend: The Towers
biome: house
