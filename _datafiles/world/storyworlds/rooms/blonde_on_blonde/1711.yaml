roomid: 1711
zone: Blonde on Blonde
title: Absolutely Sweet Marie
description: >-
  A <ansi fg="yellow">jail cell</ansi> with the door swinging open, unlatched,
  the cell's purpose annulled by something the key holder did or didn't do.
  The bars are iron and real and the door hangs at thirty degrees, creak-still
  in the stale jail air. Through the open door and the high window beyond,
  you can see the <ansi fg="itemname">six white horses</ansi> out there -- not
  tied, not bridled, just standing in a field as white and patient as snow.
  They were a promise. Promises look like this: six white horses in a field,
  waiting for someone who has a railroad gate to cross. The <ansi fg="itemname">gate key</ansi> sits on the bunk. The <ansi fg="itemname">bunk</ansi> itself has
  been slept in hard and recently. The law says well, but to live outside the
  law you must be honest, and the honesty in this room is the door swinging
  open and the horses waiting and the promise not yet kept, and you, standing
  here, with the key on the bunk. The <ansi fg="exit">studio</ansi> is back
  to the north.
mapsymbol: B
maplegend: Absolutely Sweet Marie
biome: dungeon
exits:
  north:
    roomid: 1700
    exitmessage: You leave the cell. The door keeps swinging.
nouns:
  horses: >-
    Six white horses visible through the high window, standing in a field
    that is just large enough for six horses. They are absolutely still
    except for the occasional flick of a tail. They have been promised.
    They are honoring their part. They do not know how long they will wait
    but they will wait.
  key: >-
    A gate key on the bunk, iron, heavy, clearly cut for a specific lock
    somewhere on the railroad. Someone left it here. Whether that was
    kindness or instruction is not clear. The bunk suggests someone slept
    here longer than they expected to.
  bunk: >-
    A jail bunk, the kind with a thin mattress and a blanket too short for
    a tall man. The blanket is rumpled. Someone spent real time here,
    thinking about the gate and the horses and the woman and the promise.
    You can feel the thinking in the springs.
  gate: >-
    You cannot see the gate from here but it exists somewhere between this
    cell and those horses, between the promise made and the promise kept.
    The key on the bunk is the whole distance between them.
idlemessages:
- The cell door swings a half-inch and stops. Swings back. An argument in slow motion.
- 'The six white horses stand in their field, waiting with the patience of a promise that has not been broken yet.'
- 'The bunk springs creak under nothing. A ghost of occupation, a shape in the metal.'
- Through the high window the sky is the pale yellow of early morning or late afternoon, you cannot tell.
- The key on the bunk catches a stripe of light through the window bars.
- 'To live outside the law: the door is open. The horses wait. Now what?'
