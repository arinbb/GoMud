nouns:
  sidewalk: >-
    Grey concrete, cracked and heaved by decades of freeze-thaw cycles. Salt
    residue forms white ghost-lines along its edges.
  snow: >-
    Not fresh snow. Old snow. Grey, compacted, crystallized into ice at the
    edges. It has been here since November and it will be here until April.
  phone: >-
    The phone booth glass is spider-webbed with cracks. The receiver hangs
    from its cord. You pick it up and hear nothing. Not even a dial tone.
  booth: >-
    The phone booth glass is spider-webbed with cracks. The receiver hangs
    from its cord. You pick it up and hear nothing. Not even a dial tone.
idlemessages:
- A traffic light changes from red to green to red again. No one is driving.
- The wind funnels between the buildings, picking up speed and losing warmth.
- Somewhere a shop sign creaks on its hinges, a slow metronome of rust.
- A newspaper page skitters across the sidewalk and plasters itself against a fire hydrant.
- The phone booth receiver swings gently, clicking against the glass.
- Everything here looks like it was built to last and then abandoned anyway.
