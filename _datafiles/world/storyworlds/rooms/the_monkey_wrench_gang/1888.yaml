nouns:
  walls: >-
    The canyon walls are Navajo sandstone, laid down as windblown dunes two hundred
    million years ago in what was then the largest desert on Earth. The cross-bedding
    is visible -- diagonal lines in the rock that show the original direction of the
    dune face. The colors range from cream to deep red. Running your hand along the
    surface, you feel the smoothness of stone that has been polished by water and sand
    for ten thousand years.
  sand: >-
    The canyon floor is covered in fine red sand, each grain a fragment of sandstone
    carried here by the last flash flood. The sand is deep and soft underfoot, cooler
    than the rock above. Bootprints track south through it. The gang came this way.
  sky: >-
    The sky is a narrow ribbon of blue overhead, framed by the canyon walls.
    On cloudy days, it can disappear entirely. In rain, flash floods funnel down
    this passage with terrifying speed. Right now it is blue and still and the
    color of everything the desert is not.
  prints: >-
    Bootprints in the canyon sand, heading south. Multiple people, recently.
    One set is heavy and wide -- Hayduke's boots. One is smaller, lighter.
    One set is cowboy boots, probably Seldom Seen. One set wears something
    with a distinctive tread that might be Bonnie's hiking boots.
spawninfo: []
idlemessages:
- The canyon walls radiate the warmth stored from the day, the stone cooling slowly toward midnight.
- 'A wind from somewhere upstream moves through the slot, carrying the smell of the desert above: sage, dust, distance.'
- 'The light shifts as the sun moves, the color of the walls changing from salmon to blood-orange to rust.'
- Your footsteps in the sand are unnaturally loud in the silence of the slot.
- A lizard appears at the base of the wall, freezes, then vanishes into a crack before you can look directly at it.
- 'The sky overhead is a perfect blue rectangle, framed by the perfect red walls. It looks like a painting.'
- Water has polished the sandstone into curves and hollows, each one a record of some flood now decades gone.
