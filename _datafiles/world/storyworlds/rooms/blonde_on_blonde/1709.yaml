roomid: 1709
zone: Blonde on Blonde
title: Most Likely You Go Your Way
description: >-
  A <ansi fg="yellow">fork in the road</ansi>, literal and metaphysical, two
  paths diverging at exactly the angle of a clean break. Both roads look the
  same length, the same weather, the same indifferent gray light. A <ansi fg="itemname">judge</ansi> sits on a stone at the apex of the fork,
  not ruling on anything, just watching. He has seen this particular parting
  before. He keeps seeing it. His <ansi fg="itemname">gavel</ansi> rests on
  his knee, unused. The verdict was rendered before you arrived -- most likely
  you will go your way and I will go mine, and we will both arrive somewhere,
  and neither of us will have been wrong exactly. The <ansi fg="itemname">road</ansi>
  to the left leads the same direction as the road to the right, eventually.
  You have to choose anyway. You have to choose before the judge loses interest.
  The <ansi fg="exit">studio</ansi> is back to the south.
mapsymbol: 9
maplegend: Most Likely You Go Your Way
biome: road
exits:
  south:
    roomid: 1700
    exitmessage: You find the road back to the studio, which was always one of the two options.
nouns:
  judge: >-
    The judge is old and unhurried, wearing robes that seem too formal for a
    roadside stone. His eyes are half-closed but he misses nothing. He is not
    judging you specifically. He is judging the situation, and the situation
    is clear to him, and he is not surprised by it. Gavel on his knee. Ready.
    Not needed.
  gavel: >-
    The gavel rests on the judge's knee, head down, handle up, like a weapon
    he has decided not to use today. He does not need it. The verdict is
    obvious. The road itself is the verdict.
  road: >-
    Two roads, identical in quality and prospect, diverging from the same
    point. Each one goes somewhere. Neither one is better. The choice is not
    about quality. It is about direction. You chose a direction the moment
    you entered the song, and the road is confirming it.
idlemessages:
- The judge watches the fork with the patience of someone who has been watching forks for centuries.
- Wind moves along both roads simultaneously, the same wind, not taking sides.
- 'The judge taps his gavel once on his knee -- not a decision, just a habit, just time passing.'
- 'Both roads go on past the point of visibility. Both of them are probably fine. Both of them lead away.'
- 'You go your way. The judge records it. He has been recording partings all day.'
