zone: wonderland
name: the Cheshire Cat
description: >-
  A large tabby cat with an impossibly wide grin. It has the disconcerting
  habit of appearing and disappearing at will, sometimes leaving only its
  grin behind -- a luminous crescent hanging in the air. It speaks in riddles
  and paradoxes, but unlike the Hatter, there seems to be genuine wisdom
  hidden in its nonsense. Or perhaps that's just what it wants you to think.
