roomid: 1700
zone: Blonde on Blonde
title: Columbia Studio A, Nashville
description: >-
  February 1966. Two in the morning and Columbia Studio A is wide awake. A
  <ansi fg="itemname">grand piano</ansi> stands open at the center of the room, its lid catching
  the fluorescent light, chord charts fanned across the bench. Al Kooper's
  <ansi fg="itemname">organ</ansi> hums beside it, the Leslie speaker turning slow. Tangled
  <ansi fg="itemname">cables</ansi> cross the floor in every direction, taped down in paths only the
  session musicians understand. <ansi fg="itemname">Lyric sheets</ansi> in Dylan's cramped handwriting
  lie scattered on music stands, on the piano lid, on the floor -- crossed-out
  words and arrows and whole verses circled in red. Vintage RCA ribbon
  <ansi fg="itemname">microphones</ansi> stand at attention around the room. Through the glass of the
  vocal <ansi fg="itemname">booth</ansi>, a music stand holds another sheaf of lyrics. The <ansi fg="itemname">clock</ansi>
  on the wall reads twenty past four but nobody believes it. Stacked <ansi fg="itemname">tape</ansi>
  reels line the back shelf -- a double album's worth of music and then some.
  Cigarette smoke hangs in the air like weather. The Nashville session players,
  the best sight-readers in the world, wait with their instruments, not sure
  what is about to happen. Nobody is sure. That is what makes it historic.
mapsymbol: S
maplegend: Columbia Studio A
biome: house
nouns:
  piano: >-
    A Steinway grand, lid raised, the felt hammers worn soft from hours of
    takes. Someone has left a coffee cup on the lid and nobody has moved it.
    The bench holds chord charts in three different hands. Charlie McCoy's
    bass is leaned against the side. The piano is always in use here -- someone
    is always working something out between takes.
  organ: >-
    Al Kooper's Hammond B-3 with the Leslie speaker cabinet beside it. The
    organ was not supposed to be the signature sound of the album. Kooper was
    not even supposed to be playing organ. But here it is, the tone that holds
    everything together -- warm and swirling, a sound like light through
    stained glass. The volume knob is set to 4.
  sheets: >-
    Dylan's handwritten lyrics, dozens of pages scattered everywhere. The
    handwriting is fast and private, full of crossings-out. One page works
    through visions -- the word appears seven times in various forms, a woman
    named Johanna who seems to be everywhere and nowhere. Another is a single
    run-on verse about a sad-eyed lady of the lowlands, eleven minutes of
    devotion compressed onto two sheets. A third page has JUST LIKE A WOMAN
    written across the top, with the chorus rewritten four times. Somewhere
    in the pile, a page reads EVERYBODY MUST GET STONED in block letters
    with a drawing of a tambourine.
  cables: >-
    A spaghetti of XLR cables, instrument cables, and speaker cables in a
    dozen colors, taped to the floor in paths that only the session players
    understand. Follow the wrong one and you unplug something important. The
    Nashville cats step over them without looking, muscle memory from a
    thousand sessions, though never one quite like this.
  microphones: >-
    Vintage RCA 77-DX ribbon microphones on tall chrome stands, positioned
    with the care of a chess opening. One faces the piano, one the organ, two
    flank the drum kit, one hangs above the bass amp. The placement took an
    hour. The takes take three minutes. That is how it works in Nashville.
  booth: >-
    The vocal booth, visible through a wide glass window. Inside, a single
    microphone on a stand, a pair of headphones draped over it, and a music
    stand holding the latest draft of whatever Dylan is about to sing. The
    glass is smudged with fingerprints. When Dylan is in there singing, the
    rest of the studio goes quiet and watches through the glass like witnesses.
  clock: >-
    A round industrial clock on the studio wall. It reads twenty past four
    in the morning, but nobody has checked it in hours. The sessions started
    at two AM and will run until dawn or until Dylan says they are done,
    whichever comes first. Time does not work normally here. A three-minute
    song can take six hours. An eleven-minute epic can happen in one take.
  tape: >-
    Stacked reels of recording tape on the back shelf, each one labeled in
    grease pencil with a song title and take number. There are a lot of
    takes. A double album's worth of music, fourteen songs, the longest
    rock album anyone has ever attempted. The tape is always rolling. The
    red light is always on.
spawninfo:
- mobid: 280
  message: Dylan glances up from a lyric sheet, pencil behind one ear.
- mobid: 281
  message: The Ragman flickers at the edge of your vision, drawing circles up and down the block.
- mobid: 282
  message: Johanna is here -- or the ghost of her, or the vision of her, outlined in the cigarette haze.
- mobid: 283
  message: The Sad Eyed Lady appears in the vocal booth glass like a reflection that belongs to no one in the room.
- mobid: 284
  message: The Guilty Undertaker stands in the corner, his footsteps giving him away.
- mobid: 285
  message: Al Kooper sits at the organ, adjusting the Leslie speaker speed with one careful finger.
- mobid: 286
  message: Louise drifts through the studio like a memory, her face half-hidden by the smoke.
idlemessages:
- Dylan scribbles something on a lyric sheet, crosses it out, writes it again smaller in the margin.
- Al Kooper finds a chord on the organ and holds it. The Leslie speaker turns slow. The sound fills the room like warm water.
- 'The tape rolls. The red light goes on. The engineer says: ''Rolling.'' Everything in the room changes slightly.'
- One of the Nashville cats sight-reads a chord change he has never seen before and nails it on the first pass. He shakes his head, not quite believing what he just played.
- Cigarette smoke curls upward from three different ashtrays, braiding together in the fluorescent light.
- The clock on the wall reads an impossible hour. Nobody has gone home. Nobody wants to.
- A session musician sets down his guitar and shakes his head slowly, a grin spreading across his face. He has never played on anything like this.
- A harmonica wail rises from the vocal booth, high and lonesome, bending a note until it almost breaks.
- 'Someone in the back of the studio starts humming the chorus -- ''everybody must get stoned'' -- and catches himself, but it is too late. The phrase is in the air now.'
- The Sad Eyed Lady appears for a moment in the glass of the vocal booth, then is gone. The organ holds its chord.
