zone: On the Road
title: Times Square at Night
description: >-
  <ansi fg="itemname">Times Square</ansi>, 1947, at something past midnight.
  The <ansi fg="itemname">neon signs</ansi> are enormous and gaudy, spelling
  out pleasures in red and yellow and the kind of blue that only neon makes.
  <ansi fg="mobname">Hustlers</ansi>, <ansi fg="mobname">sailors</ansi>,
  <ansi fg="mobname">girls</ansi> in high heels move through the crowds with
  the specific purposefulness of people who know exactly what they want and
  exactly what it costs. A newsstand sells papers full of a world recovering
  from war. Horn-players blow their heads off in the clubs overhead. This is
  New York in the moment before everything changes. To the <ansi fg="exit">east</ansi>
  is Sal's apartment. To the <ansi fg="exit">south</ansi> the city opens up
  toward the bridge and the highway and everything west.
