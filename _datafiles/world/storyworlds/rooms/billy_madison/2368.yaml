roomid: 2368
zone: Billy Madison
title: High School Hallway
description: >-
  The high school end of the building has a completely different energy -- <ansi fg="itemname">band
  posters</ansi> for real concerts, a vending machine that sells actual coffee, and
  a specific smell of AXE body spray and ambition. <ansi fg="itemname">Seniors</ansi>
  move through the hallway with the practiced cool of people who have been here
  long enough to stop being impressed. The <ansi fg="itemname">class schedule</ansi>
  on the wall lists electives that did not exist in elementary school: Economics,
  Auto Shop, AP Chemistry. One room has a sign that reads "DEBATE CLUB -- ALL
  WELCOME" with half the letters fallen off. A <ansi fg="itemname">water fountain</ansi>
  by the bathroom has been broken since 1991 and everyone knows it but the work
  order has been lost. To the <ansi fg="exit">west</ansi> is middle school. To the
  <ansi fg="exit">north</ansi> is the principal's office. To the <ansi fg="exit">east</ansi>
  is the cafeteria.
