displayname: a jewel case containing <ansi fg="13">Smashing Pumpkins - Siamese Dream</ansi>
description: >-
  A CD in a jewel case, the cover art a dreamlike photograph of two girls
  against a floral background, faces pressed together, eyes closed, the
  colors oversaturated and soft. "THE SMASHING PUMPKINS" and "SIAMESE DREAM"
  in thin type. The disc inside is printed with an abstract purple and orange
  design. The liner notes are thick: lyrics, credits, a note in small print
  acknowledging that most of the guitar and bass parts were played by Billy
  Corgan. Thirteen tracks. Summer 1993. Atlanta. The jewel case has a small
  crack in the corner, as if it has been opened too many times with too much
  urgency.
