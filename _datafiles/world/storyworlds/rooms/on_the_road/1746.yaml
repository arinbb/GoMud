nouns:
  saxophone: >-
    The tenor saxophone, this particular one played by a man who has had
    it for twenty years and knows every hesitation in its action, every
    key that sticks slightly in cold weather. It is made of brass and it
    makes a sound that is not brass at all — it is the sound of the human
    lung amplified, the sound of breathing pushed past breathing into
    something that does not have a name yet.
  stage: >-
    The stage is a low riser with a spotlight that makes the players
    look like saints in old paintings. The drummer taps the brushes
    across the snare with the patience of someone who knows exactly
    where he is going and is in no hurry to arrive. The pianist's left
    hand walks the bass line. The tenor man stands slightly apart, eyes
    closed, going.
  crowd: >-
    The crowd at the back — men in work shirts and women in good dresses
    and a few white people from the university who are the most earnest
    people in the room and the least essential. They are all listening.
    Some of them are crying. None of them could tell you why. The music
    knows why. The music is always way ahead of the explaining.
  smoke: >-
    The cigarette smoke in this room has been accumulating since the
    club opened in 1944 and has achieved an almost architectural quality,
    layering the ceiling in blue strata. Breathing it is breathing history.
    Every breath you take here has been breathed before by someone who
    stood in this same spot listening to this same eternal music.
