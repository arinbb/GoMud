roomid: 2324
zone: Siamese Dream
title: Hummer
description: >-
  The longest room. It stretches ahead of you in a way that does not match
  its physical dimensions, the far end always the same distance away regardless
  of how far you walk. The <ansi fg="itemname">walls</ansi> are warm gray,
  vibrating with a subsonic frequency you feel in your molars. A sustained
  <ansi fg="itemname">drone</ansi> fills the air -- a single chord, slowly
  building, layer by layer, the bass entering first and then the mid-range
  and then the top end, the whole thing accumulating mass over seven minutes
  that feel like a single breath. The <ansi fg="itemname">floor</ansi> hums
  in sympathy. The ceiling is too far up to see. You have been walking for
  a long time. You are still walking. The <ansi fg="exit">studio</ansi> is
  back to the northwest.
mapsymbol: '4'
maplegend: Hummer
biome: house
exits:
  northwest:
    roomid: 2320
nouns:
  walls: >-
    Gray and vibrating, the walls absorb the drone and release it back at a
    different phase, creating a standing wave that makes the air feel thick.
    The further you walk, the warmer the walls become, the frequency shifting
    slightly upward as the song builds. At the seven-minute mark -- wherever
    that is -- the walls will release everything they have been holding.
  drone: >-
    A single sustained chord, impossibly complex beneath its apparent simplicity.
    The root note is there, and the fifth, and the seventh, and overtones that
    should not coexist but do. The drone does not decay. It builds. Each new
    element enters so gradually that you cannot locate the moment of its arrival,
    only notice that it is there, has been there, and will become more there.
  floor: >-
    The floor hums in sympathy with the drone, a low resonance that moves up
    through your feet and into your legs and eventually into your chest. You
    are a resonant body in a resonant room, and the frequency has found your
    natural pitch. Your bones are part of the chord now.
idlemessages:
- The drone adds another layer. It was not absent before. It was simply waiting for this moment.
- The room is longer than it was. The far wall has not moved but the distance to it has increased.
- A sub-bass frequency rises through the floor and settles in your chest like something you have been feeling all day.
- Seven minutes is both a very long time and exactly right. The song knows how long it needs to be.
- 'The air thickens with accumulated sound -- each new layer pressing against the ones before it, building something enormous.'
- You stop walking and stand still. The drone builds around you like a room inside a room.
