nouns:
  parker: >-
    Charlie Parker, Bird, the alto saxophonist from Kansas City who
    changed jazz in 1945 by playing faster and stranger and truer than
    anyone had played before. He is not here tonight — he is in New York,
    probably — but his influence is here, in every phrase the tenor man
    plays, in the harmonic language the whole band speaks. Parker is the
    reason all the saxophonists sound like saxophonists now.
  crowd: >-
    The Fillmore District crowd in 1949 — a mixed crowd, Black and white,
    workers and students and people who have no other category. They are
    here for the music and they know how to listen. The ones who are
    talking are talking about music. The ones who are quiet are in it.
    The couple in the corner has achieved a state of listening that is
    indistinguishable from prayer.
  bar: >-
    A wooden bar with a mirror behind it reflecting the room back at
    itself — the musicians, the crowd, the smoke, the couples, the man
    standing alone with a warm beer trying to memorize everything. The
    bartender is efficient and uncurious. He has seen everything and
    found most of it worth a nod and a refill.
  music: >-
    The music in this room is playing through the air like air, like
    it was always here and the instruments just found it. The tenor
    man is playing at the edge of what he knows, past the place where
    the notes have names, into the place where they just have feeling.
    The drummer is a clock that knows the time is always now.
