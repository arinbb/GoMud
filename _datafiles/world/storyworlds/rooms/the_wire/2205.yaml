nouns:
  weeds: >-
    Queen Anne's lace and sumac and something with purple flowers that does not
    have a common name. They have taken the floors. They are working on the walls.
    In ten years the houses will be green. The city will not notice.
  walls: >-
    Plaster over lath, crumbling to the floor in dry chunks. Somebody has written
    on one wall in marker. The message is illegible now, faded to the ghost of an
    intention. But someone needed to write it down, which was something.
  nothing: >-
    Not nothing. You look more carefully and there are signs of recent use --
    a flattened cardboard box, a cleared space, marks on the floor that are
    not weeds. The vacants are used by people who have nowhere else to go,
    and by people who need places that ask no questions. Both come here.
spawninfo: []
idlemessages:
- Wind moves through the broken windows and the houses breathe, technically.
- Something shifts in one of the vacants -- a board settling, or something else.
- A pigeon walks the sill of a broken window and flies away without landing.
- The silence here is architectural. It was built into these houses along with everything else.
- Rain drips through a hole in a roof somewhere. The steady patience of water on brick.
- The block used to have thirty families in it. The block has no families now.
- You feel watched but there is nobody. Or there is nobody visible.
