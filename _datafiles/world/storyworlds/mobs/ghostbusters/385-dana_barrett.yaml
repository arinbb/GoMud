character:
  name: Dana Barrett
  description: >-
    A beautiful woman in her thirties whose brown eyes are currently amber-orange
    and whose posture has changed in a way that is difficult to articulate -- upright
    in a way that suggests something accustomed to having a throne. She is wearing
    a flowing dress that belongs to Dana Barrett's wardrobe but sits differently on
    her now, ceremonial in effect if not in intention. When she speaks, her voice has
    a doubled quality, as if two entities are using the same vocal apparatus. She holds
    herself with supernatural patience. She is waiting for the Keymaster. She has
    waited before.
