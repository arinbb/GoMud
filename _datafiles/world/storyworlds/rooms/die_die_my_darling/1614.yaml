roomid: 1614
zone: Die Die My Darling
title: The Cellar
description: >-
  The cellar is not what the house above it would suggest. It is enormous —
  vaulted ceilings, flagstone floors, stone walls that pre-date the rest of the
  house by centuries. And it is full of <ansi fg="3">colour</ansi>. Theatrical
  <ansi fg="3">costumes</ansi> hang in rows from ceiling-mounted racks — gowns in
  <ansi fg="red">deep red</ansi> and <ansi fg="3">gold</ansi> and <ansi fg="4">midnight
  blue</ansi>, feather boas and silk stoles and sequined things that catch the
  light of the bare <ansi fg="3">yellow bulb</ansi> overhead. And the <ansi
  fg="yellow">mirrors</ansi>. They are everywhere — full-length dressing mirrors,
  ornate gilt-framed mirrors, a triptych mirror from a theatrical dressing room,
  dozens of them, facing each other and multiplying the room endlessly. Everything
  removed from the house above is here. Against the far wall, a large <ansi
  fg="8">portrait</ansi> of Stephen Trefoile stands propped on an easel —
  a formal photograph enlarged, his face blown up to nearly life-size. At its base,
  dry flowers and a folded letter. The cellar stairs are back <ansi fg="exit">up</ansi>.
