character:
  name: Krist Novoselic
  description: >-
    Six foot seven and built like someone who was meant for a different century.
    He holds the bass guitar the way a normal person holds a ukulele -- easily,
    with no drama. He is the most politically aware person in the room and the
    most likely to have an opinion about Balkan geopolitics, which he will share
    if asked and occasionally if not. He worries about Kurt in a way that is
    visible if you know to look for it. He is loyal in the specific way of someone
    who has decided loyalty is the thing he has to offer and intends to offer it
    completely.
