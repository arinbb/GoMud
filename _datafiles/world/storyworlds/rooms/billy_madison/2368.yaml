nouns:
  posters: >-
    Concert posters for bands that were either very popular or very cool, rarely
    both simultaneously. Someone has added a thought bubble to the Nirvana poster
    that says "SMELLS LIKE TEEN SPIRIT" with an arrow pointing at the AXE display
    near the vending machine. This is the funniest thing in the building.
  seniors: >-
    A group of seniors moving through the hallway with the slow, deliberate pace
    of people who are counting down their days here. They have that specific senior
    expression: world-weary, slightly superior, and fundamentally terrified about
    what comes next. Two of them are wearing graduation hoodies already. It is October.
  schedule: >-
    The class schedule lists: AP History, AP Chemistry, AP English, Calculus,
    Gym (required), Auto Shop (elective), Home Ec (elective), Band, and one
    enigmatic block labeled simply "STUDY HALL." Study Hall is where things happen.
  fountain: >-
    The water fountain by the bathroom has a handwritten sign taped to it:
    "OUT OF ORDER -- USE OTHER FOUNTAIN." The other fountain is at the other
    end of the building. Someone has added to the sign: "has been out of order
    since 1991." Someone else has added: "I was born after 1991 and it was
    already broken." The sign is a collaboration.
idlemessages:
- The vending machine dispenses a can of coffee with a clunk that seems disproportionately loud.
- A senior walks past without looking at anyone, which is a very specific kind of power move.
- The broken water fountain drips once, as if trying to be relevant.
- From the debate club room, the sound of one person arguing very enthusiastically with no response.
- Lockers slam in a staggered rhythm down the hall, like applause for nothing in particular.
- The bell rings and the hallway transforms from empty to full to empty again in under sixty seconds.
- Someone's backpack is so heavy it sounds like a small avalanche when it hits the floor.
