nouns:
  mountains: >-
    The Whitetails to the west, the ranges flanking Holland Valley to the east.
    They have been here for millions of years and will be here millions more.
    Right now they are hosting a conflict that would have seemed insane to anyone
    describing it from the outside. From the inside it feels completely real.
  roadblock: >-
    Orange plastic barriers across the road, an Eden's Gate logo printed on
    each one. A white pickup. A cultist with a rifle. A handmade sign reads
    "THE COLLAPSE IS COMING. JOSEPH SEED OFFERS SALVATION." The rifle is real.
    The salvation is debatable.
  hawk: >-
    A red-tailed hawk riding thermals above the valley, unhurried and
    indifferent to the human chaos below. You envy it. It doesn't know
    about Eden's Gate. It doesn't know about any of this.
  flowers: >-
    Wildflowers along the roadside — Indian paintbrush, blue lupine, yellow
    sunflowers. Montana in summer, insisting on its beauty despite everything.
    You notice some of the flowers to the south have a faintly purple tint.
    Bliss. The cult's drug. Growing wild now, spreading.
idlemessages:
- A white Eden's Gate pickup rolls slowly past on a parallel road, the driver watching you through aviator glasses.
- The mountains stand in every direction, beautiful and immovable, completely indifferent to the county at their feet.
- A hawk circles overhead in a thermal, riding it higher until it is a speck against the blue.
- Somewhere north, a church bell rings. Once. Twice. Stops on the third.
- The road is empty for long stretches. Then a Peggie patrol walks past, rifles up, eyes forward, hymns on their lips.
- Wild roses grow along the fence line, blooming as if this were any summer, any year, any peaceful place.
- The smell of pine and clean air carries from the west. From the south comes something sweeter. Wrong-sweet.
