roomid: 2240
zone: Harvest
title: Broken Arrow Ranch
description: >-
  Northern California, 1972. Late afternoon. The sun hangs low and golden over
  Broken Arrow Ranch, throwing long amber light across rolling <ansi fg="itemname">fields</ansi>
  of wheat that stretch east toward the hills. A weathered wooden <ansi fg="itemname">porch</ansi>
  wraps around the front of a low ranch house, an acoustic <ansi fg="itemname">guitar</ansi>
  leaning against the rail. A <ansi fg="itemname">harmonica</ansi> sits on the
  fence post where someone left it and forgot. The <ansi fg="itemname">fence</ansi>
  line runs north toward a small white cottage just visible through the trees.
  The <ansi fg="itemname">sky</ansi> is enormous here — California sky, the kind
  that makes you feel both small and free at the same time. A dirt path leads
  <ansi fg="exit">east</ansi> to the barn. The fence line goes <ansi fg="exit">north</ansi>
  to the old man's cottage.
mapsymbol: R
maplegend: The Ranch
biome: farmland
