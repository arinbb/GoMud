character:
  name: Doc Ostrow
  description: >-
    The ship's doctor, a man of middle age and considerable scientific
    curiosity. He carries the portable medical kit of a field physician and
    the notebook of a researcher. He is drawn to the Krell laboratory with
    the precise pull of a man who has spent his career studying intelligence
    and is now standing before something that makes all his instruments
    irrelevant. He knows, professionally, that this feeling of irresistible
    attraction is a warning sign. He cannot quite make himself heed it.
