roomid: 16
zone: Georgia
title: Blue Mountain Shelter
description: "A three-sided wooden shelter stands at 3,900 feet on the flanks of Blue Mountain. The elevation gives this shelter a cooler, more exposed feel than the lower gaps. The sleeping platform is standard\x97rough planks, room for a dozen. A spring runs nearby, and the privy is uphill through the trees. A bear box sits at the edge of the clearing. The forest here is a mix of hardwoods and conifers, and the air has a crisp, resinous quality. A trail register hangs in its zip-lock bag from a nail on the shelter post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 20
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A standard three-sided lean-to at a respectable elevation. The tin roof shows patches of lichen. The walls are solid, though a few gaps let in drafts at night."
  platform: "Room for twelve on the wooden platform. At this elevation the wood stays cool to the touch even on warm days."
  register: "The shelter register is thin\x97this stretch of trail sees less traffic than the first thirty miles. Entries are spaced days apart."
  water: "A spring runs nearby, flowing steadily from a rocky seep. The water is cold from the elevation."
  spring: "The spring emerges from a rocky seep downhill from the shelter. Clear and cold at 3,900 feet."
  privy: "The privy is uphill through a stand of young hemlocks."
  bearbox: "A steel bear box, less battered than the ones near Springer. Fewer hikers means less wear."
idlemessages:
- The air is cooler here at 3,900 feet\x97a noticeable change from the lower gaps.
- A nuthatch works its way headfirst down an oak trunk, probing bark crevices for insects.
- The spring trickles steadily nearby, a thin but persistent sound.
- Hemlock boughs sway overhead, releasing their sharp green scent.
- A cloud shadow passes across the clearing, dimming the light for a moment.
- The wind is stronger at this elevation, humming through the conifers.
