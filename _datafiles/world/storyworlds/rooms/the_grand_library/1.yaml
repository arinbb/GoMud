    exitmessage: You follow the sound of distant music down a corridor to the south.
  arcade:
    roomid: 8
    mapdirection: southwest
    exitmessage: You follow the glow of CRT monitors through a side passage.
  trophies:
    roomid: 9
    mapdirection: southeast
    exitmessage: You step into a warm, amber-lit alcove lined with glass shelves.
    exitmessage: You follow the glow of CRT monitors through a side passage.
nouns:
  desk: >-
    A grand oak reception desk, its surface worn smooth by countless hands. A
    small brass placard reads "Welcome, Traveler. Every story needs a reader."
  guestbook: >-
    The leather-bound guestbook is filled with names and notes from visitors
    past. Some entries shimmer faintly, as if written in ink that hasn't quite
    dried, even after what must be years.
  constellations: >-
    The painted ceiling depicts constellations you half-recognize -- Orion's
    belt hangs beside what looks like a dragon in flight, and the Big Dipper
    shares the sky with a compass rose made of stars.
spawninfo:
- mobid: 1
  message: The Librarian quietly appears from behind a shelf.
  idlecommands:
  - say Welcome to the Grand Library. Browse the stacks, the screening room, the listening room, or the arcade.
  - ""
  - say Every story here is a doorway. All you have to do is open it.
  - ""
  - emote adjusts their spectacles and peers at a dusty tome.
  - ""
  - wander
  levelmod: 50
  respawnrate: 1 real minutes
idlemessages:
- A <ansi fg="mobname">visitor</ansi> crosses the atrium, their footsteps echoing softly on the marble floor.
- The brass lanterns flicker briefly, casting dancing shadows across the painted ceiling.
- You hear the distant sound of pages turning from somewhere deeper in the library.
- A faint melody drifts down from the mezzanine above, like a music box playing far away.
- The smell of old books mingles with hints of cedar and candle wax.
