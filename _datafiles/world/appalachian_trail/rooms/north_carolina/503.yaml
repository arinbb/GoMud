roomid: 503
zone: North Carolina
title: Wayah Shelter
description: "Wayah Shelter sits at 4,526 feet in a clearing on the approach to Wayah Bald, the mountain the Cherokee named for the wolf. The shelter is a standard three-sided lean-to in a hardwood clearing, with a reliable spring nearby and a privy uphill. The forest here is a mix of northern red oak, yellow birch, and serviceberry, the understory carpeted with ferns and wood sorrel. Red wolves once hunted these ridges in packs\x97the Cherokee considered them sacred, teachers of loyalty and family. The last wild red wolves in these mountains were trapped or shot by the early twentieth century. A reintroduction program in the Smokies was attempted but ultimately failed. The wolves are gone from Wayah now, but the name remains. A trail register hangs from the shelter beam."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
