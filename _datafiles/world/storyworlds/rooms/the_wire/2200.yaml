roomid: 2200
zone: The Wire
title: The Pit
description: >-
  A low-rise project courtyard, the ground broken concrete and old asphalt, weeds
  pushing through every crack. Against the chain-link fence sits an <ansi fg="itemname">orange couch</ansi>, sun-bleached and listing, its cushions
  compressed by years of corner boys waiting out the hours. The <ansi fg="8">buildings</ansi>
  here are low and institutional, brick the color of dried clay. <ansi fg="8">Lookouts</ansi> lean in doorways with the practiced casualness of people
  whose job is to notice everything. The <ansi fg="itemname">package</ansi> moves here.
  The money moves here. The police come and go and the game continues exactly as before.
  The <ansi fg="exit">towers</ansi> are to the east, <ansi fg="exit">west Baltimore</ansi>
  to the north, and the row houses go <ansi fg="exit">south</ansi> toward the vacants.
