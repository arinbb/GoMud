character:
  name: Alyona Ivanovna
  description: >-
    A small old woman with sharp eyes and dry hands, dressed in black that
    has seen better decades. She moves in her flat with the efficiency of
    someone who knows exactly where everything is and will notice immediately
    if it is moved. She lends money at interest to the desperate and poor
    of the quarter and lives alone behind two locks and a door painted dark.
    She is suspicious, cautious, and has survived sixty years in St.
    Petersburg by trusting nothing. The novel does not make her a saint.
    The novel does not make her villain enough to justify what happens here.
