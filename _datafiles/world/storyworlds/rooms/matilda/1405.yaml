title: Road to Crunchem Hall
description: >-
  A long, straight road lined with <ansi fg="itemname">hedgerows</ansi> that
  stretches between the village and the school. The pavement is cracked and patched.
  Children walk this road every morning with the particular dread of those heading
  somewhere they do not wish to go. The road narrows as it approaches the school,
  as if the landscape itself is reluctant. To the <ansi fg="exit">north</ansi> lies
  the village and the library. To the <ansi fg="exit">south</ansi>, the dark iron
  gates of Crunchem Hall loom ahead. A narrow <ansi fg="exit">lane</ansi> branches
  off through the countryside to the west.
