nouns:
  piano: >-
    A Steinway grand, lid raised, the felt hammers worn from use. Someone has
    left a coffee cup on the lid and nobody has moved it. The bench holds three
    pages of chord charts in different handwriting. Middle C has a tiny piece of
    tape on it with the number 3 written in red marker.
  board: >-
    The control room mixing board, visible through double-pane glass. Chrome
    faders, bakelite knobs, an array of inputs wired to more microphones than
    you can count. The engineer moves behind it like a man adjusting a ship.
    Everything going in comes out as music. It is alchemy, every take.
  sheets: >-
    Dylan's lyric sheets, dozens of them, scattered across the music stands and
    the piano bench and the floor. The handwriting is fast and private, words
    crossed out and written above and crossed out again. One sheet just says
    JOHANNA in capital letters, six times, followed by a question mark.
  microphones: >-
    Shure SM57s, Neumann U47s, a ribbon mic on a tall stand facing the grand
    piano. Each one wired with purpose. The placement took an hour. The takes
    take three minutes. That is how it works.
  cables: >-
    A spaghetti of XLR cables, instrument cables, speaker cables in a dozen
    colors, taped to the floor in paths that only the session players understand.
    Follow the wrong one and you unplug something important.
spawninfo:
- mobid: 280
  message: Dylan glances up from a lyric sheet, pencil behind one ear.
- mobid: 285
  message: Al Kooper sits at the organ, adjusting the Leslie speaker speed with one careful finger.
idlemessages:
- 'A take ends. Silence. Then Dylan says: ''Again.'' They play it again.'
- The session players tune between takes -- pedal steel, bass, piano, drums finding their center.
- Someone in the control room laughs at something. The laughter is muffled by the glass.
- A lyric sheet slides off a music stand and drifts to the floor. Nobody picks it up.
- 'The organ holds a chord while Dylan scribbles a word on his sleeve, crosses it out, writes something else.'
- The tape rolls. The red light goes on. Everything in the room changes slightly.
- Al Kooper adjusts the Leslie speed on the organ and the sound blooms outward like weather.
