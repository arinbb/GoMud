nouns:
  machines: >-
    The machines are industrial, white, coin-operated. They do what machines
    should do: accept quarters, fill with water, agitate, spin. They do not
    have opinions about the clothes. They perform their function without
    philosophical complexity, which is more than can be said for the people
    using them.
  chairs: >-
    Plastic chairs, orange or yellow, the color of things that were designed
    by someone who had an idea about cheerfulness in institutional spaces.
    The idea has worn off. The chairs remain. People sit in them for forty-five
    minutes and have conversations that they would not have anywhere else.
  table: >-
    The folding table. The surface where agreements are reached about whose
    laundry is whose, about whether it is acceptable to move someone's
    clothes from the washer to the dryer without asking, about the complex
    social contract of shared laundry space in a city of millions.
  change: >-
    The change machine. You put in a dollar and it gives you four quarters
    and that is the entire transaction and it is satisfying in a way that
    very few things in this city are satisfying: completely, and without
    ambiguity.
spawninfo: []
idlemessages:
- A dryer finishes and buzzes. The person whose clothes are in it does not immediately notice.
- The change machine accepts a dollar and produces four quarters. A small negotiation with the city, completed.
- Two people sit next to each other in the plastic chairs, both pretending to read, both aware of the other person.
- A washer enters its spin cycle and the whole row of machines vibrates sympathetically.
- Someone is folding a fitted sheet. They have given up on the corners. The sheet will be folded approximately.
- The fluorescent lights hum at a frequency that is not quite music and not quite silence.
- A shirt tumbles in the dryer, visible through the porthole, going around and around with the commitment of something with no choice.
- The detergent smell is warm and clean and slightly chemical, the smell of all laundromats everywhere since the beginning of laundromats.
