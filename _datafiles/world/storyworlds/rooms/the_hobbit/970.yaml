  message: Bilbo Baggins fusses about the kitchen, looking slightly bewildered.
  idlecommands:
  - say Oh dear, oh dear. I do hope they don't chip the plates.
  - ""
  - emote polishes a brass button on his waistcoat nervously.
  - ""
  - say I never asked for any adventures, you know. Nasty disturbing uncomfortable things.
  - ""
  - emote glances wistfully at the pantry.
  - ""
  respawnrate: 3 real minutes

- itemid: 55
  message: A tiny spark of wizard-light hovers near the doorway.
  respawnrate: 5 real minutes
idlemessages:
- The fire pops and sends a shower of sparks up the chimney. The kettle whistles softly.
- A warm draft carries the smell of seed-cakes from the pantry. Your stomach rumbles.
- 'Through the round window, the Shire stretches green and golden: a land of peace and plenty.'
- The clock on the mantelpiece ticks with a reassuring steadiness. All is well. For now.
- 'A faint scratching comes from the front door -- as if someone is marking it with a rune.'
- Dust motes drift through a beam of sunlight, turning lazily in the warm air.
