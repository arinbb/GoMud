roomid: 1101
zone: In Utero
title: The Live Room
description: >-
  The door closes behind you and the sound hits like a wall. This is where it
  happens -- the actual room where the album is being recorded. Battered
  <ansi fg="itemname">amplifiers</ansi> line the back wall, their pilot lights
  glowing orange, cranked past the point of clean sound into pure distortion.
  A massive <ansi fg="itemname">drum</ansi> kit dominates the center, toms the
  size of oil drums, cymbals tarnished and cracked from sheer force.
  <ansi fg="itemname">Cables</ansi> snake across every inch of floor like a
  nest of black serpents. A Fender Mustang -- Kurt's <ansi fg="itemname">guitar</ansi> --
  leans against an amp, its sunburst finish hidden under stickers and grime.
  <ansi fg="itemname">Pedals</ansi> are scattered at the foot of the amp stack,
  though most are bypassed -- Albini does not believe in effects. The air is
  thick with heat and volume and cigarette smoke. The band is HERE, playing,
  recording, laying down take after take. Through the glass to the
  <ansi fg="exit">west</ansi>, you can see Albini in the control room. The room
  thrums with sound that you feel in your ribcage before you hear it in your ears.
mapsymbol: L
maplegend: Live Room
biome: house
