roomid: 1735
zone: The Sopranos
title: The Stugots
description: >-
  Tony's <ansi fg="12">boat</ansi>, the Stugots, moored at a marina slip in the
  late afternoon light. A substantial <ansi fg="itemname">cruiser</ansi>, white
  and clean, rocking slightly on the <ansi fg="itemname">water</ansi>. On the deck,
  a pair of <ansi fg="itemname">fishing chairs</ansi> face out toward the open bay,
  and you can see, beyond the marina mouth, the <ansi fg="itemname">open water</ansi>
  of the Raritan Bay and beyond that the Atlantic. Tony comes out here to be someone
  without a title. The boat smells of salt and marine diesel and something like
  <ansi fg="8">freedom</ansi>, which on a boat in New Jersey means the temporary
  suspension of everything waiting for you on shore. The water rocks the boat gently
  and constantly. The <ansi fg="exit">dock</ansi> leads back to the highway.
