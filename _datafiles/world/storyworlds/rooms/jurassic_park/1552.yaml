nouns:
  explorers: >-
    Ford Explorer XLTs, custom-painted in the park's colors — cream and hunter
    green — with the Jurassic Park logo on the doors. They're electric, running
    on the tour track. The interiors are upholstered in green, with a video
    screen in the headrest of each seat and a recorded guide narration ready to
    play. Mr. DNA stares up from the screen menu, waiting.
  rail: >-
    A metal track embedded in the center of the road, flush with the asphalt.
    The tour vehicles ride this track on an automated circuit, controlled from
    the main control room. Right now the vehicles are parked and still. The
    whole system has been shut down. Nobody's told the tour vehicles yet.
  jungle: >-
    The jungle is not decorative. It is not a backdrop. It is a living system
    of trees and vines and undergrowth that has been here for millions of years
    and will be here long after everyone on this island is dead. Things move
    in it. The road through the middle of it seems very thin.
idlemessages:
- One of the parked Explorers beeps softly — its tour narration activating on some internal timer, speaking into the empty road.
- The jungle on either side trembles. Not from wind. Something passes through it, briefly.
- The electric rail in the road hums with current, a low vibration you feel through your feet.
- A bright tropical bird lands on the roof of an Explorer, cocks its head at you, and departs.
- The tour guide recording plays a snatch of narration before cutting off: "...and if you look to your left..."
- The smell of recent rain rises from the road's hot asphalt, mixing with green jungle and something musky.
