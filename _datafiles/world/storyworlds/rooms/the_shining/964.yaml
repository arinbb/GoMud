roomid: 964
zone: The Shining
title: Deep in the Maze
description: >-
  The maze has closed in. The <ansi fg="itemname">hedges</ansi> press tighter
  here, branches reaching across the path like grasping fingers. The <ansi fg="itemname">sky</ansi> is a narrow strip of gray between the dark
  green walls. <ansi fg="itemname">Snow</ansi> falls steadily, thick flakes
  that muffle every sound and fill in your footprints almost as fast as you
  make them. The path branches and doubles back on itself. You are not sure
  which way you came from. Every turning looks the same. The hedges are taller
  here — nine feet, maybe ten — blocking out the hotel, the mountains,
  everything but the snow and the narrow gray sky. Something is following you.
  You can hear its footsteps in the snow behind you, always stopping when you
  stop. Paths lead <ansi fg="exit">south</ansi>, <ansi fg="exit">north</ansi>,
  and <ansi fg="exit">east</ansi>.
mapsymbol: '~'
maplegend: Deep Maze
biome: snow
exits:
  south:
    roomid: 963
  north:
