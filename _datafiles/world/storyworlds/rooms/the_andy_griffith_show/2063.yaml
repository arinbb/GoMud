nouns:
  bench: >-
    A wooden bench worn smooth by generations of Mayberry residents sitting on
    it and watching the street go by. The two old men with the checkerboard have
    been here most afternoons since time immemorial. They play slowly and talk
    slower. Neither one has any pressing business elsewhere.
  window boxes: >-
    Each storefront has a window box planted with red and pink geraniums, watered
    regularly, the blooms vivid against the white-painted wood. Nobody organized
    this. Everyone just does it. This is Mayberry.
  elm trees: >-
    Mature elms line both sides of Main Street, their canopies reaching to meet
    overhead. They throw dappled shade across the sidewalk in a way that makes
    even the middle of summer feel bearable. The town has been planting and tending
    these trees for longer than anyone can remember.
  checkers: >-
    The two old men on the bench are locked in a checkers game of unhurried
    complexity. One of them moves a piece. The other considers. A car passes.
    A pigeon lands on the curb and looks at the board. The consideration continues.
  hardware store: >-
    A general hardware store with a hand-lettered sign and a porch where
    the bench sits. Inside you can see barrels of nails, coils of rope, paint
    in a rainbow of practical colors, and the particular smell of metal and
    sawdust that hardware stores have always had.
idlemessages:
- Two people stop on the sidewalk and have a conversation that involves laughter and absolutely no urgency.
- A car rolls past at twenty miles an hour. The driver waves at nobody in particular. Habit of the town.
- The checkers game on the bench reaches a critical juncture. Neither player rushes.
- A bird lands on the bench back between the two old men and is not disturbed and does not disturb.
- The elm trees sway together in a slow unified motion, moving the light on the sidewalk like water.
- A child runs past at the speed of a child who has somewhere exciting to be and no obstacles between here and there.
- The whole street smells of geraniums and cut grass and something cooking somewhere that you cannot quite identify.
- Mayberry goes about its afternoon at the pace Mayberry chooses, which is unhurried and always has been.
