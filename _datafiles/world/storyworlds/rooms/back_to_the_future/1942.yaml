nouns:
  counter: >-
    Fourteen chrome-and-red stools lined up at a white Formica counter.
    Every surface gleams. Lou keeps it spotless, because spotless is
    the only way Lou keeps things. The counter is where you sit if you
    want fast service and do not mind overhearing other people's business.
  jukebox: >-
    A Wurlitzer 1015, lit up like a cathedral window. It cycles through
    45s: Chuck Berry, Little Richard, Eddie Cochran. The volume is set
    just loud enough to fill the diner without making conversation
    impossible. Someone has punched in "Earth Angel" three times running.
  "soda fountain": >-
    The soda fountain occupies the entire back wall: chrome taps, syrup
    pumps, a malted-milk machine, an ice cream chest. Lou operates it
    like a pianist, without looking at his hands. The milkshakes here
    are magnificent. The Pepsi Free, however, does not exist yet.
  booth: >-
    Red vinyl booths, cracked at the seams, patched with electrical tape
    in two places. The tables have little individual jukeboxes -- a
    nickel a song. Someone has carved "Biff + Lorraine" into the
    tabletop by the window, which is inaccurate and would horrify Lorraine.
  "coca-cola": >-
    A red-and-white Coca-Cola vending machine, ten cents a bottle. It
    hums with refrigerator contentment. This is the beverage of the
    1950s. Everything else -- Pepsi Free, Tab, anything diet or
    caffeine-free -- is a concept that has not arrived yet.
idlemessages:
- Lou wipes down the counter with a damp cloth, not breaking his rhythm.
- The jukebox clicks to a new 45 and the opening bars of "Earth Angel" fill the diner.
- George McFly scribbles something in his notebook, crosses it out, stares into space.
- A couple in a booth shares a milkshake with two straws, oblivious to everyone else.
- 'Lou hollers toward the kitchen: "Order up!"'
- A group of letterman-jacketed boys crowds into the front booth, loud and full of themselves.
- The Coca-Cola machine hums a half-step flat, a minor chord of refrigeration.
- Biff Tannen's laugh carries from somewhere nearby, thick and humorless.
