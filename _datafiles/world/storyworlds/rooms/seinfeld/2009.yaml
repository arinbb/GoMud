roomid: 2009
zone: Seinfeld
title: Yankee Stadium
description: >-
  The offices of the <ansi fg="yellow">New York Yankees</ansi>, specifically the
  desk of the assistant to the traveling secretary. George Costanza works here,
  which is a fact that still doesn't fully parse even after all these episodes.
  The <ansi fg="itemname">desk</ansi> is George's desk, and it has been used for things
  that are not the job and the job has been done poorly as a result. A <ansi fg="itemname">Yankees
  pennant</ansi> hangs on the wall. The <ansi fg="itemname">stadium</ansi> is visible
  through the window, the great bowl of it, grass cut in diamond patterns, the most
  beautiful thing George has access to without deserving. A <ansi fg="itemname">nameplate</ansi>
  reads G. Costanza, which is a sentence that should not be possible but is. The exit
  to the <ansi fg="exit">street</ansi> is to the north.
