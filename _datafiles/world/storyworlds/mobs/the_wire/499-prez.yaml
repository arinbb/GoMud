character:
  name: Prez
  description: >-
    Roland Pryzbylewski -- Prez -- a former Baltimore police officer who shot
    a wall and an undercover officer and eventually a kid, and who has arrived
    at teaching seventh-grade math as the place where he can do genuine good
    with limited collateral damage. He was not a good cop. He is becoming a
    good teacher, which is harder and pays less and requires him to care about
    individual people in a way that police work did not reward. He has traded
    one institution for another and found that the second one might fit better,
    which is more than most people in West Baltimore get to discover about themselves.
