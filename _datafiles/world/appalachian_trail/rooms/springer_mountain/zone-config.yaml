name: Springer Mountain
roomid: 1
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: forest
idlemessages:
- The wind sighs through bare hardwoods, carrying the clean smell of decaying leaves.
- A woodpecker drums somewhere uphill, the rhythm echoing off granite.
- 'Rhododendron leaves curl tight against the cold, dark green fists along the trail.'
- A white blaze on a nearby tree catches your eye, reassuring and familiar.
- 'The trail stretches ahead, a narrow brown ribbon through the green. One foot in front of the other.'
- Somewhere a creek tumbles over rocks, the sound rising and falling with the breeze.
