nouns:
  board: >-
    Albini's analog mixing board -- no computers, no digital trickery. Rows of
    faders and knobs, each one set with the precision of someone who believes the
    room IS the sound. Tape saturation. Natural compression. He records bands the
    way they sound in the room, not the way the label wants them to sound. The
    board is warm to the touch, humming with current, every channel alive.
  tapes: >-
    Reels of two-inch analog tape, stacked on shelves and threaded through the
    machine. Each one labeled in Sharpie with track names and take numbers -- two
    weeks of work, the whole album laid down fast and live. This is the record in
    its rawest form, magnetic oxide holding frequencies that will change everything.
    No overdubs. No fixing it in the mix. What happened in this room is what you hear.
  microphones: >-
    Condenser and dynamic microphones positioned with surgical care around the
    control room, and more visible through the glass in the live room. Albini
    spent longer placing these than the band spent recording most tracks. Every
    angle, every distance, every reflection calculated to capture the truth of
    the sound.
  window: >-
    Snow falls steadily outside the studio windows, blanketing Cannon Falls in
    white silence. The nearest town is miles away. The nearest distraction even
    further. This is why Albini chose this place -- isolation so complete that the
    only thing left to do is play. Through the interior glass, you can see the
    live room -- the band, the amps, the drums, all of it separated from you by
    soundproof glass and the philosophy of a man who believes in capturing truth.
spawninfo:
- mobid: 200
  message: "A thin man in round glasses sits behind the mixing board, threading tape."
idlemessages:
- The tape reels spin silently, the magnetic heads reading ghosts of performances already laid down.
- Someone left a half-smoked cigarette balanced on the edge of the mixing board. The ash is two inches long and still growing.
- 'Snow ticks against the studio windows -- the only audience for miles in any direction.'
- The red recording light pulses faintly, as if the studio itself has a heartbeat.
- 'Coffee, cold and black, sits in paper cups on every flat surface -- the fuel of a two-week session.'
- Albini adjusts a microphone stand by a quarter inch, listens, adjusts it back, listens again, nods.
- Through the glass, you can see the band locked in -- a muffled roar of guitar and drums bleeds through the soundproofing.
- A VU meter needle pins to the right and stays there. Albini does not flinch.
- The tape machine clicks as it reaches the end of a reel. Albini threads a fresh one without looking.
