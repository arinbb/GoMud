nouns:
  desks: >-
    Two desks side by side facing the window. Andys is the picture of calm
    competence -- papers in order, phone in reach, nothing superfluous.
    Barneys is a war room, covered in notes about crime prevention strategies,
    suspect descriptions, patrol routes, and what appears to be a hand-drawn
    organizational chart of Mayberrys criminal element, which is limited.
  gun rack: >-
    A standard wall-mounted gun rack holding two rifles above an empty lower
    section. The empty lower section is where Barney Fifes pistol does not live,
    because Barneys pistol lives in its holster on Barneys belt, and the one
    bullet it is issued lives in Barneys shirt pocket, where it cannot
    accidentally discharge. This is Andys policy. It is a wise policy.
  notebook: >-
    Barneys notebook is dense with preparation. Crime statistics for Mayberry
    since 1960 (minimal). Patrol schedules (thorough). A section marked
    CONTINGENCIES with elaborate plans for scenarios that have not occurred
    and are unlikely to occur. Barney has prepared for all of them.
  telephone: >-
    The office telephone, black, Bakelite, sits on Andys desk. When it rings
    it usually means something has happened in Mayberry that requires Andys
    patient attention. It rings infrequently, and things that require patient
    attention are usually resolved by the end of the afternoon.
  cells: >-
    Two iron-bar jail cells visible through the doorway. Both are currently
    empty, unless Otis has let himself in, which Otis does with some regularity.
    The cell on the left has a blanket folded on the cot. That is Otis's cell,
    effectively. He keeps it tidy.
spawninfo:
- mobid: 451
  message: '<ansi fg="yellow">Barney Fife stands very straight behind his desk, one hand hovering near his holster with the vigilance of a man who has not had a criminal to deal with today but remains fully prepared for one.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- The telephone sits silent on Andys desk, waiting to be needed.
- The jail cells are empty. This is the normal state of the Mayberry jail, except for Otis, who does not count.
- From outside the window, the sound of Main Street going about its unhurried business drifts in.
- Barneys notebook lies open on his desk. A new contingency plan is being developed. It is thorough.
- The gun rack holds its rifles in a silence that suggests they are very rarely consulted.
- A coffee cup on Andys desk sends up a thin thread of steam. The sheriff is around somewhere.
- A fly enters the courthouse window and reconsidered almost immediately, as well it should.
- The office clock ticks. Whatever crime there is to prevent in Mayberry today has already been prevented.
