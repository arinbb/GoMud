character:
  name: The Moose
  description: >-
    The moose of Cicely is not a moose. Or rather, it is entirely a moose,
    but it is also the moose -- the one that appears on Main Street regularly,
    that has appeared in The Brick's front window, that has been seen in the
    post office and on the roof of the radio station. No one named it. Everyone
    knows it. It moves through Cicely with the authority of something that was
    here first and intends to be here last, accepting the town as a minor
    interruption in its otherwise moose-focused existence. It has never
    charged anyone. It has never been fed. It simply persists, enormous and
    calm, as a fact of life in Cicely, Alaska.
  raceid: 1
  level: 6
