character:
  name: Meg Swan
  description: >-
    Meg Swan is, by any objective standard, doing very well. She is together, intelligent,
    professionally accomplished, married to someone she chose at a Starbucks counter in
    a moment that still moves her, and the co-owner of a champion Weimaraner. She is also
    anxious in the specific modern way of people who have done all the right things --
    therapy, books, the breathing, communication skills -- and found that doing all the
    right things does not fully address the feeling. She and Hamilton are not fighting.
    They are communicating. The communication is, currently, tense. Beatrice monitors both
    of them from the bed with the calm authority of a dog who has been through this before
    and knows how it ends.
