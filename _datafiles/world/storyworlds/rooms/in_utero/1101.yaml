nouns:
  headlines: >-
    Tabloid headlines wallpaper every surface. NIRVANA FRONTMAN IN DRUG SCANDAL.
    COBAIN AND LOVE -- AMERICA'S NIGHTMARE COUPLE. BAND SELLS OUT, FANS REVOLT.
    GENIUS OR JUNKIE? The ink runs where the walls are damp, headlines blurring
    into each other until they become a single accusation with no specific charge.
  television: >-
    A broken television with a cracked screen, cycling through MTV footage on a
    loop. The band on stage. The band in interviews. The band looking uncomfortable
    at award shows. The signal degrades a little more with each loop, the faces
    becoming less recognizable, the sound becoming more distorted, until it is just
    color and noise.
  bench: >-
    The judge's bench, split clean down the center. No gavel -- just a guitar pick
    embedded in the wood where the gavel should be. The nameplate reads nothing. The
    crack runs deep, and if you look into it, it seems to go down forever.
  exhibit: >-
    Three items arranged on a folding table where evidence is displayed. Exhibit A
    is a platinum record in a cracked frame. Exhibit B is a syringe with a blue
    cap, placed with awful care on a white cloth. Exhibit C is a love letter, hand-
    written, its ink smeared from water or something like it. No verdict is posted.
    The jury box behind you has twenty-four empty seats, each one with a name tag
    that reads simply FAN.
  record: >-
    A copy of Nevermind propped against the witness stand. The cover shows a baby
    in water reaching for a dollar on a fishhook. Someone has written over the cover
    in red marker: THIS WAS THE TRAP. Whether they mean the image, the album, or
    the success it brought is not specified. The record is still sealed. It has
    never been played in this room.
idlemessages:
- The television flickers between footage and static, the signal decaying a little more each time.
- A newspaper headline peels from the wall and floats to the floor, landing face-down.
- 'The courtroom smells of old paper, stale ambition, and the particular sadness of someone who got exactly what they wished for.'
- Feedback whines from the broken television like a sustained scream at a frequency just below pain.
- Somewhere in the building, a gavel strikes -- but there is no judge, and no verdict that matters.
- The fluorescent lights above the jury box buzz and flicker, illuminating empty seats.
