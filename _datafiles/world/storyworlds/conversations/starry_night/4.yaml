    - ["#1 say You see this sky? The whole thing is moving."]
    - ["#2 emote looks up"]
    - ["#1 say Most people look at the night sky and see fixed points. I see currents. Rivers of light with direction and force."]
    - ["#2 say Is that what you paint?"]
    - ["#1 say I try to paint what the sky actually is. Not what it looks like. What it IS."]
    - ["#2 emote considers this"]
    - ["#1 emote already reaching for the notebook, already somewhere else", "#1 say People think I exaggerate. I do not exaggerate. I simply see."]
