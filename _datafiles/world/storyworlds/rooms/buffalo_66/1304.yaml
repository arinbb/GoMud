roomid: 1304
zone: Buffalo 66
title: Billy's Car
description: >-
  A brown <ansi fg="itemname">sedan</ansi> idling at the curb, exhaust curling up
  into the frozen air. The interior smells of cigarette smoke and vinyl. The <ansi fg="itemname">seats</ansi> are cracked leather, cold to the touch. A <ansi fg="itemname">pine tree</ansi> air freshener hangs from the rearview mirror,
  long dead. The <ansi fg="itemname">radio</ansi> plays something tinny and far away,
  barely audible over the engine rattle. Through the <ansi fg="itemname">windshield</ansi>,
  Buffalo stretches out grey and flat in every direction. You can <ansi fg="exit">drive</ansi> to the Brown house from here.
mapsymbol: C
maplegend: Car
biome: road
exits:
  drive:
    roomid: 1305
    mapdirection: south
nouns:
  sedan: >-
    A brown sedan of uncertain vintage. It runs, barely. The paint is oxidized
    and the bumper is dented. It is the kind of car that gets you from one
    disappointment to the next.
  seats: >-
    Cracked brown leather, patched with electrical tape in places. Cold seeps
    through them from underneath.
  radio: >-
    AM radio, pulling in a weak signal. A man is talking about the Bills game.
    His voice sounds tired, like he has been disappointed many times before.
  windshield: >-
    Streaked with road salt and grime. The wipers have left arcs of
    semi-clarity. Through them, the world looks like a photograph left out
    in the rain.
  pine: >-
    A cardboard pine tree dangling from the mirror. It lost its scent years
    ago. Now it just swings back and forth, a small pendulum measuring nothing.
idlemessages:
- The engine idles rough, shuddering every few seconds like a cough.
- Heat wheezes from the dashboard vents, barely warmer than the air outside.
- The radio crackles with static, then a voice comes through, then static again.
- Road salt crunches under the tires as the car settles on its springs.
- Through the fogged window, a figure walks past on the sidewalk, hunched against the cold.
- The pine tree air freshener swings once, slowly, and comes to rest.
