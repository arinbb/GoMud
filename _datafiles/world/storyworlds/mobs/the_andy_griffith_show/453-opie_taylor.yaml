character:
  name: Opie Taylor
  description: >-
    A red-haired boy of about eight or nine years old, freckled, in overalls
    and a plaid shirt, with the look of a person who is paying attention to
    everything. His eyes are wide and direct in the manner of someone who
    has not yet learned to pretend not to notice things. He asks questions
    the way other people breathe -- constantly and without apology. He is
    Andys son and he shows it, not in the same calm that Andy has but in
    the same fundamental decency working its way to the surface. He is
    going to be all right.
