roomid: 1872
zone: Super Mario Bros
title: World 8-1 The Long Run
description: >-
  World 8. The final world. The palette here is <ansi fg="4">darker</ansi> --
  brown ground that's almost gray, a sky that's gone deeper blue, colors
  that say clearly: this is the end. World 8-1 is the longest overworld
  level in the game, everything thrown together -- pipes, platforms, Goombas,
  Koopas, Piranha Plants, Bullet Bills, all overlapping, the game
  synthesizing everything it has taught you into a single relentless <ansi fg="itemname">gauntlet</ansi>. The <ansi fg="itemname">horizon</ansi>
  to the east seems further away than it should be. The castle spires
  are visible in the distance, spiked and black against the darkening sky.
  West leads <ansi fg="exit">back</ansi>; east continues to the <ansi fg="exit">final castle</ansi>.
mapsymbol: 8
maplegend: World 8-1
biome: land
exits:
  west:
    roomid: 1871
  east:
    roomid: 1873
nouns:
  gauntlet: >-
    World 8-1 is everything at once. Goombas where there should be open
    ground. Piranha Plants in every pipe. Platforms with Koopas and Bullet
    Bills crossing overhead. The gaps are wider. The platforms are fewer.
    The enemies move faster. It is not a new challenge -- it is every
    previous challenge simultaneously, demanding that you have internalized
    everything the game has shown you. The gauntlet does not introduce
    anything new. It only asks you to prove you learned.
  horizon: >-
    The castle is visible in the distance, its silhouette against the
    darkening sky -- spired and angular and unmistakably the destination.
    It seems further away than geography should allow, the way the end
    of something always seems further than the middle. But the horizon
    gets closer with every step. It always does.
  sky: >-
    The sky of World 8 is a deeper blue than all the previous worlds --
    closer to the dark blue of the night levels but not quite night.
    Dusk, maybe, or a color that means this is serious now. The same
    square pixel clouds drift through it, unchanged, indifferent. The
    background is the last thing to change. Then it changes too.
spawninfo: []
idlemessages:
- The ground is darker here, the palette shifted toward something final.
- 'Enemies ahead -- more than before, closer together, faster. The game knows you are almost done.'
- The castle spires are visible on the horizon, spiked and certain and waiting.
- 'A Goomba and a Koopa share a platform, a combination that would have seemed unfair in World 1.'
- The long run. Every skill the game has given you, tested at once.
- 'You have come through seven worlds of this. The eighth is the same and it is different: the stakes are real.'
- The sky is a deeper blue. The music plays at the same tempo. The distance to the castle shrinks.
