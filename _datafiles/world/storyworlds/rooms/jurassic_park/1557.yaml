nouns:
  fence: >-
    Nine feet of chain-link topped with three strands of electrified wire at
    10,000 volts. The indicator lights cycle: green, amber, green, amber. The
    system is fluctuating. When it's green, ten thousand volts. When it's amber,
    something in between. When it's dark... that was when Tim climbed it.
  scorchmarks: >-
    Dark carbon marks on the chain links and the wooden post at the four-foot
    level where someone grabbed on — grabbed on, and then the power came back.
    The wood is blackened in a perfect handprint. The smell of burnt insulation
    lingers even in the rain.
  indicators: >-
    Small green LED indicators every six feet along the fence, showing active
    current. Most are green. Two are amber. One is dark. The dark one is not
    a relief — it is a warning about what happens to the pattern.
idlemessages:
- The fence hums with current, a high electric whine that sets your teeth on edge.
- An indicator light flickers from green to amber and back, the voltage fluctuating.
- Rain runs down the fence wire in rivulets, each droplet catching the green indicator light.
- The scorch marks on the post are the shape of a hand. Someone held on here. In the dark.
- A frog jumps against the lower fence wire and is flung back — unhurt, at this section, this moment.
- The fence indicator closest to you goes dark for three full seconds, then returns to green.
