roomid: 1108
zone: In Utero
title: Milk It
description: >-
  A room that is falling apart as you stand in it. The <ansi fg="itemname">walls</ansi>
  crack and reform in real time, plaster splitting along fault lines that spell
  words you almost recognize before the surface heals and cracks again somewhere
  new. The <ansi fg="itemname">floor</ansi> tilts and shifts underfoot, never
  quite level, a seasick pitch that makes standing feel like an act of faith. <ansi fg="itemname">Furniture</ansi> -- chairs, tables, a bookshelf -- melts and
  reconstitutes in slow motion, oak becoming liquid becoming oak becoming something
  that is not oak, has never been oak, was lying about being oak the entire time.
  A voice echoes from every surface, screaming contradictions at itself. This is
  the album's fever dream, its id unleashed. Nothing makes sense. The room does
  not pretend otherwise. The room is honest about its dishonesty, which is the
  only kind of honesty left.
mapsymbol: '8'
maplegend: Milk It
biome: house
