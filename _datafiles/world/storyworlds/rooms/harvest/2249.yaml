roomid: 2249
zone: Harvest
title: The Needle and the Damage Done
description: >-
  A small stage. One <ansi fg="itemname">man</ansi>. One <ansi fg="itemname">
  guitar</ansi>. No microphone stand -- just a condenser mic on a boom, close.
  The rest of the room is dark and perfectly still. The stage is small enough
  that you could reach out and touch the guitar if you stepped forward. You
  do not step forward. The sound in here is the <ansi fg="8">quietest sound</ansi>
  on the album, which makes it the loudest. The guitar plays a fingerpicked
  pattern, the same phrase, slowly, the notes separate and clear. Danny Whitten
  taught Neil Young how to play that pattern. Danny Whitten is not here now.
  He will not be here. The song is for him, about him, about what the needle
  takes. It is one verse and a chorus, performed live at UCLA in 1971. Two and
  a half minutes. The shortest song on the record. The one that fills the most
  space.
mapsymbol: '9'
maplegend: The Needle and the Damage Done
biome: house
exits:
  east:
    roomid: 2240
    exitmessage: You step back quietly, out of the small dark room, back toward the ranch.
spawninfo:
- mobid: 513
  message: A figure sits on the small stage, guitar in hand, the light barely reaching him.
nouns:
  man: >-
    Neil Young, alone on the small stage. He is not performing in the usual
    sense. He is playing the song because the song needs to be played. He
    learned this pattern from Danny Whitten, who played it on the first album,
    who is gone now in the way the song describes. When he plays it, you can
    hear that he is trying to hold something that cannot be held, which is
    what you do when you cannot hold it.
  guitar: >-
    A Martin acoustic, close-miked, the sound detailed and intimate. The
    fingerpicking pattern is deceptively simple: thumb on bass, fingers on
    treble, the melody emerging from the space between. It is a pattern you
    could learn in an afternoon. What you cannot learn is what to do when
    the person who taught it to you is gone.
  microphone: >-
    A condenser mic on a boom arm, close enough to pick up everything --
    the nail on the string, the breath, the slight hesitation before the
    chorus. This is not a concert recording. This is a document. The
    difference matters. A concert is for an audience. A document is for
    whoever finds it later, which is you, which is everyone.
idlemessages:
- The guitar plays its phrase and stops. The silence after is part of the song.
- The condenser mic picks up a breath, a shift in weight on the stool.
- The room holds the sound the way a cupped hand holds water -- carefully, and not for long.
- Danny Whitten is not here. The song is why he is not here. The song is all there is now.
- 'The fingerpicking pattern repeats: bass, treble, bass, treble, the melody in the space between.'
- Nothing else is happening in this room. This is the whole room. This is enough.
- The light barely reaches the man on the stage. It reaches him just enough.
