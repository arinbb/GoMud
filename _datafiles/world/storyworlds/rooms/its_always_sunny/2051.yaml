roomid: 2051
zone: its_always_sunny
title: The Courthouse
description: >-
  Philadelphia County Courthouse, a room where the law is applied. The
  <ansi fg="itemname">gallery benches</ansi> are hard wood and full of a
  cross-section of people who do not want to be here. The <ansi fg="itemname">judge's bench</ansi>
  is elevated and imposing and the judge behind it has the expression of a
  person who went to law school and served decades on the bench and somehow
  still did not anticipate the Gang. <ansi fg="itemname">The Lawyer</ansi>
  sits at the counsel table with a stack of papers and the compressed patience
  of a man who knew, before he got out of bed this morning, that today was
  going to be like this. The Gang is represented by themselves, which the
  court has tried to prevent and failed. The bailiff has the distant look
  of someone who has seen enough. To the <ansi fg="exit">street</ansi> is
  the exit.
