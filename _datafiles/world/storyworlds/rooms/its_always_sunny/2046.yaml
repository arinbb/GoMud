title: Charlie and Franks Apartment
description: >-
  The apartment Charlie Kelly and Frank Reynolds share by choice is a single
  room of almost artistic squalor. A <ansi fg="itemname">pullout couch</ansi>
  dominates the center, deployed permanently — it has not been folded back
  into couch configuration in years. The <ansi fg="itemname">kitchen counter</ansi>
  holds stacked cans of cat food, a hot plate, a jar of something indeterminate,
  and a stack of papers with large crayon writing on them. On the floor, a
  paper bag with a familiar chemical smell sits near the wall. The television
  is old and the antenna is bent and taped with aluminum foil in a configuration
  that gets two channels. <ansi fg="itemname">Post-it notes</ansi> cover the
  refrigerator, written in what can only charitably be called letters. To the
  <ansi fg="exit">west</ansi> is the street. A hole in the baseboard leads
  to the <ansi fg="exit">tunnel</ansi> below.
