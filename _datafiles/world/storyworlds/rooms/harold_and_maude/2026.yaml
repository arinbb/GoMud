roomid: 2026
zone: Harold and Maude
title: Inside the Hearse
description: >-
  The interior of the hearse is unexpectedly intimate. The <ansi fg="8">velvet-lined
  walls</ansi> are deep black, muffling all sound from outside. Two jump
  seats face each other behind the driver's compartment, and the long flat
  space in back -- intended for caskets -- holds instead a <ansi fg="itemname">blanket</ansi>,
  a <ansi fg="itemname">thermos</ansi>, and a stack of <ansi fg="itemname">funeral programs</ansi>
  from services Harold has attended, none of them his own. From the
  <ansi fg="itemname">radio</ansi> comes the sound of Cat Stevens, clear
  and warm: <ansi fg="10">If you want to sing out, sing out. And if you
  want to be free, be free.</ansi> It fills the hearse like sunlight.
  The driver's seat is Harold's. To the <ansi fg="exit">west</ansi> is the
  driveway. To the <ansi fg="exit">east</ansi>, the road stretches on.
mapsymbol: H
maplegend: Inside the Hearse
biome: house
exits:
  west:
    roomid: 2025
    exitmessage: You slide out the long door back onto the driveway.
  east:
    roomid: 2027
    exitmessage: Harold turns the key and the hearse rolls smoothly out into the street.
nouns:
  walls: >-
    Black velvet walls, padded and sound-absorbing. The hearse was designed
    to be a private space for the recently dead. Harold has made it a private
    space for himself, which amounts to the same thing in certain philosophies.
  blanket: >-
    A soft wool blanket, navy blue, folded neatly. Maude probably folded it.
    She has been in this hearse many times, sitting in the back and singing
    along with the radio, making the whole thing feel like a picnic.
  thermos: >-
    An old aluminum thermos, dented in a way that suggests it has been used
    for years and dropped several times. Whatever is inside has gone cold. It
    does not matter. The thermos belongs here the way Harold belongs here.
  programs: >-
    A carefully maintained stack of funeral programs, each one a small
    printed booklet with a name, dates, and a photograph. Harold collects
    them the way other people collect tickets to concerts. They are lives
    that interested him. He keeps them in good condition.
  radio: >-
    A chrome-trimmed radio installed in the dashboard, tuned to a station
    that plays only Cat Stevens. This is not possible -- there is no such
    station -- and yet here it is. The volume is low but the clarity is
    extraordinary. Every word arrives as if sung directly to you.
spawninfo:
- mobid: 430
  message: "<ansi fg=\"8\">Harold sits in the driver seat with both hands on the wheel, going nowhere, listening to the radio with the concentrated attention of someone receiving a transmission from somewhere important.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- 'The radio plays: There will always be a better way, so if you want it, you can say.'
- Harold taps the wheel very gently, twice, with one finger, in time with the song.
- The hearse is completely still but the radio makes it feel as if it is moving through something.
- Light filters through the black velvet curtains and makes the interior glow faintly amber.
- The smell of old wool blanket and coffee thermos and whatever Maude left last time -- flowers, probably.
- The radio shifts songs and Harold turns the volume up just barely, just enough.
- Outside the windows, the driveway gravel gleams. Inside, everything is dark and safe and very quiet.
- Harold opens the glove compartment and looks at something inside it for a long moment, then closes it.
