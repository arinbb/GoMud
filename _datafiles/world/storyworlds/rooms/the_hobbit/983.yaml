roomid: 983
zone: The Hobbit
title: Lake-town
description: >-
  A town of wooden <ansi fg="itemname">platforms</ansi> built on stilts over
  the Long Lake, connected by bridges and boardwalks. The <ansi fg="itemname">market</ansi> bustles with fishermen, merchants, and
  traders. Smoke rises from chimneys. The smell of fish, tar, and wet wood
  fills the air. The Master's hall rises above the other buildings, its
  windows glowing with lamplight. To the <ansi fg="exit">east</ansi>, visible
  across the water and the desolation, the Lonely <ansi fg="itemname">Mountain</ansi>
  rises solitary and dark against the sky, wreathed in cloud. The people of
  Lake-town remember the old songs about the King under the Mountain and the
  river running gold. They also remember the songs about the dragon. The
  path leads <ansi fg="exit">west</ansi> back along the Forest River.
mapsymbol: L
maplegend: Lake-town
biome: city
