roomid: 2071
zone: The Andy Griffith Show
title: The Fishing Hole
description: >-
  <ansi fg="cyan">Myers Lake.</ansi> The fishing hole. The single most peaceful
  room in all of Mayberry and therefore in all the world. The water is <ansi fg="cyan">dark green and still</ansi>, reflecting the sky and the trees
  in a surface that is only disturbed, slowly, by the ring of a fish rising. <ansi fg="10">Willow trees</ansi> overhang the bank, their trailing branches
  touching the water. The bank itself is <ansi fg="10">grass worn to soft mud</ansi>
  at the water's edge, the particular mud of a fishing spot visited weekly for
  years. Two <ansi fg="itemname">cane poles</ansi> are propped in forked sticks
  at the water's edge, their lines in the water. A <ansi fg="itemname">bait bucket</ansi>
  sits in the shade. Somewhere up the bank, a <ansi fg="itemname">lunch pail</ansi>
  sits with what is probably Aunt Bees sandwiches in it, wrapped in wax paper.
  There is no sound here except water and birds and the occasional distant music
  of Andy whistling something on the way here or back. The <ansi fg="10">afternoon
  light</ansi> is thick and golden and slow. Nothing bad has ever happened at
  Myers Lake. Nothing bad could. To the <ansi fg="exit">road</ansi> is the way
  back to town.
