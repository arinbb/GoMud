- itemid: 51
  message: A PKE meter hums quietly on the workbench.
  respawnrate: 5 real minutes
idlemessages:
- The Ecto-1 lets out a single tick of metal cooling, like it just got back from a run.
- The ghost trap on the worktable emits a faint rattle. Something inside shifts.
- Janine answers the phone, listens for two seconds, says "Yeah, is that slime? That is absolutely slime," and hangs up.
- The proton pack charging station hums at a frequency that makes your back teeth vibrate.
- A coffee mug on the desk reads "World's Okayest Parapsychologist." It belongs to Venkman. He put it there himself.
- The Ecto-1's dashboard lights flicker once, go green, and steady.
- Outside, a cab honks. Someone shouts. A pigeon explodes off the windowsill. New York.
