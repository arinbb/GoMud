roomid: 600
zone: Great Smoky Mountains
title: Mollies Ridge Shelter
description: "Mollies Ridge Shelter sits at 4,570 feet on the high ridgeline, the first Smokies shelter north of Fontana Dam. Like all shelters in the park, it is enclosed on three sides with a chain-link fence across the front\x97an unusual feature designed to keep black bears from helping themselves to hikers' food and sleeping bags. The fence gives these shelters a slightly prisonlike feel, but given that the Smokies have one of the densest black bear populations in the eastern United States, it is a reasonable precaution. A reservation is required to stay here. The sleeping platform is rough-hewn timber, and the tin roof amplifies every raindrop into a drumroll. A trail register hangs from a nail on the center post. The privy is uphill to the east. A spring provides water a short walk downhill."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 61
    exitmessage: You follow the side trail back to the AT ridge.
