nouns:
  barn: >-
    A working barn, tools hung in order on the walls, hay stacked in the loft.
    The smell of horses and oil and old wood. A guitar case sits open on a hay
    bale, the instrument gone -- someone took it out to play. The door is never
    quite shut. Light falls through the gaps in the planks in thin gold bars.
  fields: >-
    Wheat, heavy and gold and almost ready. You run your hand along the tops of
    the stalks and they bend and spring back. The field stretches to the ridge.
    In the evening light it looks like something out of a painting of a country
    that used to exist, or still does somewhere, if you know where to look.
  road: >-
    A dirt road leading up into the hills, tire tracks in the dry dust. It goes
    somewhere and comes from somewhere and right now it is empty and orange in
    the late light. The kind of road you drive when you have no particular
    destination and that is the whole point.
  harmonica: >-
    A Marine Band harmonica, key of C, worn at the edges where a man's hands
    have held it for years. It is almost too personal to pick up. You bring it
    to your lips and blow a single note -- it rings across the ranch, clear and
    aching, and then fades into the wheat.
  cottage: >-
    Just visible through the fence line -- a small white cottage, a front porch,
    a rocking chair in motion. The old man has been here for decades. The land
    knows his name. He is part of the place the way a fence post is part of the
    place, worn by weather and still standing.
spawninfo:
- mobid: 510
  message: Neil Young sits on the fence rail, acoustic guitar across his knees, looking at the fields.
idlemessages:
- An acoustic guitar drifts from the direction of the barn, unhurried, a man playing for no one in particular.
- The wheat shifts in the evening breeze, a long golden wave moving from east to west and gone.
- The pedal steel bends a note somewhere over the ridge, the sound carrying clean in the dry air.
- A hawk turns slow circles above the field, riding something invisible.
- The light thickens toward gold. Everything on the ranch looks permanent and temporary at once.
- Somewhere a screen door bangs, the sound carrying across the still afternoon air.
- The harmonica on the fence post catches the late light, a thin line of silver.
