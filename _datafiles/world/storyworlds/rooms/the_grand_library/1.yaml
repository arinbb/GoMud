roomid: 1
zone: The Grand Library
title: The Grand Library
description: >-
  A vast circular chamber beneath a domed ceiling of painted constellations.
  Warm brass lanterns cast golden light across mahogany shelves lining every
  wall. The <ansi fg="cyan">bookshelf</ansi> holds novels and poetry. The
  <ansi fg="red">projector</ansi> shelf holds film reels. A
  <ansi fg="blue">painting</ansi> hangs on the west wall. The
  <ansi fg="yellow">turntable</ansi> shelf holds vinyl and CDs. The
  <ansi fg="magenta">console</ansi> holds game discs. A leather
  <ansi fg="itemname">guestbook</ansi> lies open on the desk. A spiral
  staircase leads <ansi fg="exit">up</ansi> to the Overlook Tower.
mapsymbol: L
maplegend: Library
biome: house
isstorage: false
exits:
  up:
    roomid: 5
    exitmessage: You climb the spiral staircase, the brass railing cool under your hand.
nouns:
  desk: >-
    A grand oak reception desk worn smooth by countless hands. A brass
    placard reads "Welcome, Traveler. Every story needs a reader."
  guestbook: >-
    The guestbook is filled with names and notes. Some entries shimmer
    faintly. Type read guestbook to read it. Type sign to add your name.
  constellations: >-
    The painted ceiling depicts constellations you half-recognize -- Orion
    hangs beside a dragon in flight, and the Big Dipper shares the sky
    with a compass rose made of stars.
  staircase: >-
    A spiral staircase of wrought iron and dark wood, climbing through the
    center of the dome toward a warm light above. The brass railing is
    worn smooth by many hands. Go up to reach the Overlook Tower.
