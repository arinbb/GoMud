roomid: 21
zone: Georgia
title: Bly Gap / NC Border Approach
description: "The trail descends and climbs through the final Georgia ridges, rolling over a series of gaps and knobs as it approaches the North Carolina border. Bly Gap marks an important watershed divide\x97waters to the south drain toward the Gulf of Mexico, while those to the north flow toward the Tennessee Valley. The landscape grows wilder here, the forest thick with oak, hickory, and mountain laurel. Plumorchard Gap Shelter is the last Georgia shelter before crossing into NC. Somewhere ahead, a small sign nailed to a tree marks the state line\x97the unremarkable boundary between Georgia and North Carolina, and the end of the first state on a northbound thru-hike."
