character:
  name: Winston Zeddemore
  description: >-
    A steady, solid man with the posture of someone who has decided that whatever
    situation arises, he will handle it with dignity. He wears his Ghostbusters
    jumpsuit with the practicality of a professional rather than the enthusiasm
    of a true believer, and it suits him. His expression is consistently that of
    a man who accepted a job, discovered the job involved ancient Sumerian deities,
    and decided that a deal is a deal. He is checking the Ecto-1. He is always
    checking the Ecto-1.
