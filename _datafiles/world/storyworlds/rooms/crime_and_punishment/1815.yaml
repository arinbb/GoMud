roomid: 1815
zone: Crime and Punishment
title: The Crossroads
description: >-
  An intersection where several streets meet, the cobblestones worn to
  smoothness at the center where the traffic of the city has passed for
  generations. The <ansi fg="itemname">crossroads</ansi> of the Haymarket
  district: a woman with a bundle crossing diagonally, a man at the corner
  selling newspapers he holds up without calling, pigeons working the
  gutters. Here, in the novel, Raskolnikov comes on a morning when something
  has broken open in him. He walks to the center of the crossroads and
  kneels. The people around him notice and step back and watch. He touches
  his forehead to the cobblestones and kisses the earth of the city that he
  has sinned against. Then he stands, looks around at the staring faces,
  and walks to the police station. The Haymarket is to the <ansi fg="exit">north</ansi>. Here, now, the cobblestones are warm from the sun.
