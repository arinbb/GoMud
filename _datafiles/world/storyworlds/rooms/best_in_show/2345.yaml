roomid: 2345
zone: Best in Show
title: The Hotel Lobby
description: >-
  The lobby of the Taft Hotel, Philadelphia -- the official hotel of the Mayflower
  Kennel Club Dog Show. Every <ansi fg="itemname">armchair</ansi> has a dog in it,
  or has recently had a dog in it, or is being regarded by a dog as a future sitting
  location. The <ansi fg="itemname">front desk</ansi> is staffed by a man named Dale
  who is maintaining professional composure in the face of a Weimaraner that has been
  staring at him for twenty minutes without blinking. A Standard Poodle in a
  <ansi fg="itemname">travel crate</ansi> beside the luggage cart sits in perfect
  composure, as if she is waiting for the world to catch up to her standard. Scott
  Donlan and Stefan Vanderhoof are at a corner table with their Shih Tzu, Miss Agnes,
  discussing the lighting situation with the intensity of people for whom the lighting
  situation is a genuine professional concern. The <ansi fg="exit">registration hall</ansi>
  is east. <ansi fg="exit">Hotel rooms</ansi> are north. The <ansi fg="exit">hotel bar</ansi>
  is west.
