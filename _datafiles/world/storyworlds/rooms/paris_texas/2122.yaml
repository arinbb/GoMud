zone: Paris Texas
title: The Highway to LA
description: >-
  A two-lane <ansi fg="8">highway</ansi> through the American Southwest, filmed
  from inside a moving car. The desert gives way to scrubland gives way to dry
  mountains gives way to scrubland again. <ansi fg="itemname">Motels</ansi> appear
  at long intervals — their signs promising VACANCY and COLOR TV and little else.
  A <ansi fg="itemname">pickup truck</ansi> moves at a steady pace that neither
  hurries nor delays. The passenger does not speak. The driver does not ask him
  to. This is a silence chosen and kept and offered like a gift. The road runs
  <ansi fg="exit">south</ansi> back toward Texas and <ansi fg="exit">east</ansi>
  toward Los Angeles. A <ansi fg="exit">motel</ansi> sign blinks on the right.
