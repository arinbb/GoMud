nouns:
  lobby: >-
    The tile floor is cracked along lines that have been cracked so long they
    are permanent features of the building, like load-bearing fractures. A
    bulletin board on the wall is empty except for staple holes. The mailboxes
    are mostly broken. The ones that are not broken are mostly empty.
  stash: >-
    You cannot find the stash. That is the point of the stash. But somewhere
    in this building, behind a panel or in a vent or under a loose board, there
    is product. It is always there. The game does not stop because the police
    arrive. It moves. Then it comes back.
  tags: >-
    Layers of spray paint, years of names and symbols and crossed-out names and
    gang signs and sometimes just words -- I WAS HERE. I WAS HERE TOO. I AM
    STILL HERE. The wall knows more names than anyone living.
  lookout: >-
    High above, barely visible -- a figure at the edge of the roof, watching
    the streets below with a casual thoroughness that is not casual at all.
    They have a phone. The phone is a tool. Tools have purposes.
spawninfo: []
idlemessages:
- Somewhere in the stairwell, a door opens and closes. The echo takes a long time to die.
- From above, muffled through concrete floors, the sound of a television arguing with itself.
- 'The elevator doors open. The elevator is broken. They close again. The mechanism has hope.'
- A child runs through the lobby and out the far door. Small sneakers on cracked tile. Gone.
- The building hums with the sound of dozens of lives stacked on top of each other, each contained.
- Rain starts outside. Through the lobby windows the street turns dark and gleaming.
