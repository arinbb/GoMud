title: The Church
description: >-
  The First United Methodist Church of Scranton, Pennsylvania, where the ordinary
  extraordinary moments of Dunder Mifflin have gathered for the important occasions.
  The <ansi fg="itemname">sanctuary</ansi> is plain white with dark wood pews and
  stained glass windows that let in a filtered Pennsylvania light that makes the
  dust motes visible, slowly turning. Phyllis Vance was married here, to Bob Vance
  of Vance Refrigeration, in a ceremony that Michael partially hijacked. Jim Halpert
  stood in this church in a grey suit and looked at a woman in a white dress and
  the look on his face was a whole season of television compressed to a single moment.
  A <ansi fg="itemname">program</ansi> on the pew reads: 'Phyllis Lapin and Bob Vance.'
  A small <ansi fg="itemname">altar arrangement</ansi> of white flowers is still fresh.
  The <ansi fg="itemname">pews</ansi> are half-full with the sense of people who have
  been here, recently, for something that mattered. The <ansi fg="exit">Schrute Farms
  road</ansi> is to the east.
