  Supported:
    "vincent": ["*"]
  Conversation:
    - ["#1 say The color blue. Do you know how many blues there are?"]
    - ["#2 say I suppose--"]
    - ["#1 say Prussian blue. Cobalt. Cerulean. Ultramarine. Indigo. The blue of shadow, which is not blue at all but violet. The blue of water at night. The blue of the space between stars."]
    - ["#2 say How do you choose?"]
    - ["#1 emote holds his hands up, stained cadmium yellow and prussian blue", "#1 say You do not choose. You look until you see the true color, and then you use the paint that is most honest about what you saw."]
    - ["#2 say That sounds very simple."]
    - ["#1 say It is the hardest thing I have ever tried to do.", "#1 emote looks at his stained hands for a moment."]
