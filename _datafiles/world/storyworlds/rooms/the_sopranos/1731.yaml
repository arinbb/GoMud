roomid: 1731
zone: The Sopranos
title: Dr. Melfis Office
description: >-
  A quiet <ansi fg="12">therapy room</ansi> that feels like the only room in this
  whole world designed for honesty. Two <ansi fg="itemname">chairs</ansi> face each
  other at a slight angle -- not confrontational, not avoidant, carefully calibrated.
  A <ansi fg="itemname">bookshelf</ansi> lines one wall with serious spines. A <ansi fg="itemname">painting</ansi> above the fireplace, abstract, something
  you could look at for a long time and not be done looking. A small <ansi fg="itemname">table</ansi> between the chairs holds a box of <ansi fg="itemname">tissues</ansi>
  and a glass of water, always fresh, never mentioned. The room holds the particular
  silence of a space that has absorbed a great many difficult truths. Outside the
  window, <ansi fg="itemname">New Jersey</ansi> continues. In here, the light is
  warm and nothing has to be explained. The waiting room is <ansi fg="exit">south</ansi>,
  or go <ansi fg="exit">outside</ansi> to the highway.
