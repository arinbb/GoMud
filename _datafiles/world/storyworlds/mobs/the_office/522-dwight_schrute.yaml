character:
  name: Dwight Schrute
  description: >-
    A compact man in his early thirties in a collared work shirt, dark trousers,
    heavy work boots, and a necktie that communicates authority rather than fashion.
    His posture is military. His expression is the permanent expression of a man
    who is ready for something and is somewhat disappointed that the something has
    not yet happened. He has a bobblehead of himself on his desk. He considers
    this normal. He is the Assistant Regional Manager -- he will correct you if you
    say Regional Manager -- and he takes this seriously with a completeness that
    passes through absurdity and comes out the other side as something almost noble.
