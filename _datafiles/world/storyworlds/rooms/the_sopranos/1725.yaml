nouns:
  strip: >-
    A strip mall in that particular New Jersey tan, half of the storefronts
    occupied and half dark. The occupied ones sell things people need but
    do not think about: cellular accessories, lottery tickets, sub sandwiches.
    The dark ones have white paper in the windows.
  malls: >-
    See strip.
  sky: >-
    That particular overcast white that settles over New Jersey in certain
    seasons, neither threatening nor reassuring. It simply is, the way New
    Jersey simply is.
  sign: >-
    A lot of signs. Route numbers. Gas prices. Discount furniture.
    Attorneys-at-law. A billboard for a personal injury lawyer whose face
    is twenty feet tall and deeply reassuring.
  traffic: >-
    The traffic moves in that stop-and-go way that New Jersey traffic has
    been moving since the highways were built. It is not going anywhere.
    It is just going.
spawninfo: []
idlemessages:
- A black SUV passes at speed, dark windows, not stopping.
- The strip mall parking lot holds six cars and an argument between two of their owners.
- 'A diner sign blinks in the distance: OPEN ALL NIGHT.'
- The smell of exhaust and someone's fast food and a brief chemical sweetness from somewhere industrial.
- A truck downshifts on the on-ramp with a sound like complaint.
- The highway hum is constant and without character. It is the sound of New Jersey in motion.
