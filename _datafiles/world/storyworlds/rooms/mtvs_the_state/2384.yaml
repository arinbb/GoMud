roomid: 2384
zone: MTVs The State
title: Porcupine Racetrack
description: >-
  A proper <ansi fg="itemname">racetrack</ansi>, miniaturized to accommodate its
  athletes. The <ansi fg="itemname">track</ansi> is a half-mile oval of packed dirt
  with a painted white <ansi fg="itemname">starting line</ansi>. Small
  <ansi fg="itemname">bleachers</ansi> line both sides, mostly empty except for a few
  very committed spectators. The <ansi fg="itemname">scoreboard</ansi> shows odds in
  a font too small to read from here. In the gates, porcupines wait. They are not
  large. They are not fast, by objective measure. But they are porcupines, and they
  are racing, and the announcer has a microphone and a belief in what he is doing
  that transcends the objective facts of porcupine speed. To the
  <ansi fg="exit">east</ansi> is the MTV Studio. To the <ansi fg="exit">north</ansi>
  is the Diner.
mapsymbol: R
maplegend: Porcupine Racetrack
biome: road
