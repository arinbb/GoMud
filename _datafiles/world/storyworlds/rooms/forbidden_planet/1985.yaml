roomid: 1985
zone: Forbidden Planet
title: Morbius House Interior
description: >-
  The interior of the dome is a scholar's paradise and a man's fortress of
  solitude. <ansi fg="itemname">Bookshelves</ansi> line every curved wall,
  packed with volumes in a dozen languages including several that are not
  human. A pair of <ansi fg="itemname">armchairs</ansi> flank a low table
  bearing a half-finished glass of something amber. <ansi fg="cyan">Krell
  artifacts</ansi> are displayed on dedicated pedestals -- geometric shapes
  of a material that is neither stone nor metal, cool to the touch and subtly
  luminous. On the wall, a reproduction of a painting of
  <ansi fg="itemname">Shakespeare</ansi> watches over the room. The air is
  climate-controlled, precisely Earth-temperature, filtered and recycled for
  twenty years. To the <ansi fg="exit">west</ansi> the exterior. To the
  <ansi fg="exit">north</ansi> is the study. The <ansi fg="exit">lab</ansi>
  entrance is to the east. <ansi fg="exit">Robbys workshop</ansi> is to the
  west past the service corridor.
