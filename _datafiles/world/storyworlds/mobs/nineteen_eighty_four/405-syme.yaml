character:
  name: Syme
  description: >-
    A small, dark man with large protuberant eyes that have a disconcerting habit
    of fixing you with a too-direct, too-penetrating stare. He works in the Research
    Department and is one of the team producing the Eleventh Edition of the Newspeak
    dictionary, which will be the definitive edition. He is genuinely brilliant and
    genuinely excited about the elimination of language, which he considers a beautiful
    project. He sees too clearly. He is too honest about what the Party is actually
    doing. He will be vaporized. He knows, in some corner of his mind, that he will be
    vaporized. He has not let this slow him down.
