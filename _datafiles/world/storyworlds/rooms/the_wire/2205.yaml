roomid: 2205
zone: The Wire
title: The Vacants
description: >-
  Abandoned <ansi fg="8">row houses</ansi>, their windows long since boarded or
  broken, their doors hanging or missing entirely. The brick faces are intact --
  brick does not give up -- but behind the brick there is <ansi fg="8">nothing</ansi>.
  Or not nothing. Silence has a texture here, a particular quality of held breath.
  <ansi fg="itemname">Weeds</ansi> have pushed up through the floors inside, through
  the boards that covered the floors, the root systems indifferent to ownership.
  The <ansi fg="itemname">walls</ansi> inside carry marks of occupation and absence
  both. <ansi fg="red">Something</ansi> has been left in these houses that the houses
  do not speak about. This is where Baltimore buries the things it cannot address.
  The Pit is back to the <ansi fg="exit">north</ansi>.
mapsymbol: V
maplegend: The Vacants
biome: house
