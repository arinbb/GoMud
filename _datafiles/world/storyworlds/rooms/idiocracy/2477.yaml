roomid: 2477
zone: Idiocracy
title: Carls Jr
description: >-
  The Carls Jr in 2505 is larger than the concept of Carls Jr implies.
  Every surface bears the <ansi fg="red">star logo</ansi> and below every
  star logo, a reminder: <ansi fg="red">YOUR KIDS ARE NOW PROPERTY OF CARLS JR.</ansi>
  This is not a slogan. This is the result of the Child Welfare Privatization
  Act of 2308, under which Carls Jr acquired legal guardianship over a
  significant portion of the child population in exchange for feeding them.
  The children receive <ansi fg="itemname">Kids Meals</ansi> in perpetuity.
  The <ansi fg="itemname">speaker</ansi> at the counter says EXTRA BIG ASS FRY
  with the particular warmth of a corporation that has learned to approximate
  affection. A <ansi fg="itemname">disclaimer</ansi> on the wall lists the
  terms of the Child Welfare Agreement in print so small it requires a
  microscope and a desire to feel terrible.
