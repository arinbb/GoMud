roomid: 2330
zone: Siamese Dream
title: Spaceboy
description: >-
  Small. Gentle. A boy's room, this one on the ground, gravity intact,
  anchored to earth. The <ansi fg="itemname">window</ansi> looks up at
  stars. An acoustic <ansi fg="itemname">guitar</ansi> leans against the
  wall, its sound intimate and unamplified. A <ansi fg="itemname">photograph</ansi>
  on the dresser shows two boys -- one the singer, one not, one who will
  grow up to speak differently than the world expects, one who will write
  songs about the distance between them and the love that is not diminished
  by distance. The room smells of old carpet and the particular warmth of
  a house at night. This is the most personal room. Billy wrote this for
  his brother. The tenderness is real. The <ansi fg="exit">studio</ansi>
  is back up. Further south is a dark place -- <ansi fg="exit">south</ansi>
  leads deeper.
