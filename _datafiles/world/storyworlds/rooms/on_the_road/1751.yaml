idlemessages:
- The heat comes down from directly overhead and the shade is the only politics anyone cares about.
- Dean has been awake for three days and his eyes are enormous and his laugh comes from somewhere deep and frightening.
- The tequila is cold. The air is hot. The combination is something approaching philosophy.
- 'A radio somewhere plays a trumpet. The trumpet knows where it is. The trumpet has always been here.'
- Dust rises from the unpaved street when the wind comes through. Everything tastes like dust.
- 'The girls in the doorways watch everything with the patience of people who understand that this too will pass.'
- 'Sal feels the fever starting. A heat that is not the weather. A distance opening between him and the world.'
