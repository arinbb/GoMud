roomid: 1807
zone: Crime and Punishment
title: The Canal Embankment
description: >-
  The embankment along the <ansi fg="itemname">Ekaterininsky Canal</ansi>,
  where the dirty green water moves slowly between stone walls below the street
  level. Here there is slightly more sky than in the lanes, and a breath of
  something that is almost a breeze off the water. The smell changes — still
  the city, still lime and dust, but underneath it the damp cold smell of
  the canal itself, of deep water and old stone. This is where Raskolnikov
  walks when the garret becomes unbearable. He does not find peace here.
  He finds more space for his thoughts, which is different. People cross the <ansi fg="itemname">iron bridge</ansi> to the <ansi fg="exit">east</ansi>.
  The lane goes <ansi fg="exit">north</ansi>. A vacant lot lies to the <ansi fg="exit">northwest</ansi>.
