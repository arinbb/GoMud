roomid: 2208
zone: The Wire
title: The Courthouse
description: >-
  The Baltimore City <ansi fg="8">courthouse</ansi>, its marble lobby high and <ansi fg="8">cold</ansi> and ringing with the sound of heel strikes on stone. <ansi fg="itemname">Lawyers</ansi> move through with the practiced speed of people
  billing by the hour. <ansi fg="itemname">Defendants</ansi> sit on benches in
  their church clothes, waiting for a system that knows their name only from a
  file number. The <ansi fg="itemname">judges</ansi> here are part of the game too,
  which is not a corruption of the institution so much as a clarification of what
  the institution has always been. Plea deals happen in hallways. Evidence gets
  suppressed in motions. The wiretap authorizations the Detail needs are decided
  on the third floor by a judge who is running for something. The <ansi fg="exit">Detail</ansi>
  is to the west, and the <ansi fg="exit">city hall</ansi> exit runs north.
mapsymbol: C
