roomid: 2473
zone: Idiocracy
title: Costco
description: >-
  It is impossible to describe the scale of Costco in 2505 except to say that
  you cannot see the far wall and there may not be one. The <ansi fg="itemname">aisles</ansi>
  extend in every direction, stacked to the structural limit with bulk merchandise
  in quantities that presuppose a purchasing unit larger than a family -- perhaps
  a nation. Somewhere in the middle distance is a <ansi fg="itemname">Starbucks</ansi>
  which no longer serves coffee. Somewhere further is the <ansi fg="itemname">law school</ansi>,
  a folding table with a laminator. A <ansi fg="itemname">greeter</ansi> stands
  at every entrance in an orange vest. The lighting is the aggressive fluorescent
  white of a place that does not believe in shadows. The smell is Brawndo and
  bulk pretzels and the particular scent of civilization having given up on
  small retail.
