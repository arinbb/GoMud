roomid: 1109
zone: In Utero
title: Pennyroyal Tea
description: >-
  A kitchen. Dim, close, the wallpaper peeling in slow spirals that reveal older
  wallpaper beneath, and older still beneath that -- layers of domestic pretense
  going back decades. A <ansi fg="itemname">kettle</ansi> whistles on a gas stove,
  steam rising in a thin column, the water inside a murky green. Medicine
  <ansi fg="itemname">bottles</ansi> crowd the windowsill, their prescription
  labels faded and overlapping, a pharmacy of quiet desperation. A small kitchen
  <ansi fg="itemname">table</ansi> sits against the wall, cigarette burns along
  its edge, a single cup of something murky sitting untouched. The
  <ansi fg="itemname">wallpaper</ansi> continues its slow, inevitable peel.
  Everything in this room requires effort -- standing, breathing, existing. The
  light from the window is the color of dishwater. This is depression made
  architecture. A room where gravity is slightly stronger than everywhere else.
