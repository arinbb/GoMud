character:
  name: Julia
  description: >-
    A bold, dark-haired young woman of about twenty-six, with quick movements
    and a bright, healthy face. She wears the overalls of the Junior Anti-Sex
    League and a scarlet sash around her waist that she ties tight in a way
    that suggests she finds the sash amusing rather than constraining. She is
    practical rather than philosophical about her rebellion: she does not hate
    the Party in the abstract, she hates it specifically, for specific things
    it has done to specific people, and her hatred has given her energy rather
    than despair. She has real chocolate. She found real coffee somewhere.
    She is alive.
