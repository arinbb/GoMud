roomid: 2070
zone: The Andy Griffith Show
title: The Road to Myers Lake
description: >-
  A dirt road that leaves Main Street behind almost immediately -- three steps
  onto it and the storefronts are gone and there is nothing but <ansi fg="10">pine trees</ansi> on both sides and the smell of <ansi fg="10">pine resin and warm earth</ansi>
  in the late afternoon heat. The road is packed down by years of feet going to
  and from the fishing hole. <ansi fg="itemname">Fishing poles</ansi> lean against
  a pine here -- someone left them, or they belong here, or in Mayberry the
  distinction does not always matter. A <ansi fg="itemname">bait can</ansi> sits in
  the shade. The road narrows ahead and the sound of water begins, very faint. <ansi fg="cyan">Myers Lake</ansi> is this way. The road back to town is to the <ansi fg="exit">south</ansi>. The fishing hole is to the <ansi fg="exit">lake</ansi>.
