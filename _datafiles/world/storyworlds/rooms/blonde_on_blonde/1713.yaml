roomid: 1713
zone: Blonde on Blonde
title: Obviously 5 Believers
description: >-
  A <ansi fg="yellow">garage</ansi>, the kind of garage that is also a band
  practice space and always will be. <ansi fg="itemname">Amplifiers</ansi>
  stacked against the back wall, some still warm, their indicator lights
  red dots in the oil-and-rubber dark. <ansi fg="itemname">Cables</ansi>
  coiled on hooks and scattered on the floor. The garage door is up and the
  night comes in from wherever garages are at night. On the unpainted drywall
  someone has painted <ansi fg="cyan">baby blue eyes</ansi> -- big, careful,
  almost photorealistic -- staring from the wall at whatever happens in the
  garage. Five of them. Not pairs. Five individual eyes in five separate
  places on the wall, each watching a different angle. The song is a rocker,
  the simplest on the album, and that simplicity is the garage itself:
  no metaphysics, no Johanna, no surrealism. Just <ansi fg="itemname">amps</ansi>
  and eyes and the obvious five believers in something fast and loud and
  unsophisticated and alive. The <ansi fg="exit">studio</ansi> is back down.
mapsymbol: D
maplegend: Obviously 5 Believers
biome: house
exits:
  down:
    roomid: 1700
    exitmessage: You climb down from the garage into the studio, ears ringing.
nouns:
  amps: >-
    Fender Twins, a Vox AC30, a Silvertone combo with a cracked speaker
    grille. All pointed at the center of the garage where the band would
    stand. The Twins are still warm -- a practice ended recently, or a
    session ran long, or someone just left an amp on because turning it
    off would be giving up. The tubes glow amber in the dark.
  eyes: >-
    Five baby blue eyes painted on the walls and ceiling in various sizes,
    each one a careful oil-painted iris and pupil, each one anatomically
    accurate except for the color, which is blue the way crayon is blue.
    They were painted by someone who knew what they were doing. Why five?
    The song knows. You are obviously the five believers watching.
  cables: >-
    Instrument cables coiled and uncoiled, some plugged in, some terminated
    in air. The kind of tangle that means someone was working. The kind of
    coils that mean someone cares enough to store them properly. The floor
    ones are the ones that got away from the system.
idlemessages:
- 'One of the amplifiers gives a soft pop -- a tube settling, a ghost signal, something alive in there.'
- The baby blue eyes on the wall hold you in steady, unembarrassed attention.
- The garage door admits a cool draft and the sound of a street that does not know this music is in here.
- 'Five believers, obviously. In what? In this. In amps and garages and fast simple songs.'
- A string of a guitar nobody is playing resonates slightly from the amp vibration. One long hum.
