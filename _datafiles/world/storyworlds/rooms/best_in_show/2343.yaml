roomid: 2343
zone: Best in Show
title: The Main Show Ring
description: >-
  The main ring of the Mayflower Kennel Club Dog Show is a green rectangle of
  competition-grade <ansi fg="itemname">carpet</ansi> under a cathedral of lights.
  <ansi fg="itemname">Bleachers</ansi> rise on three sides, occupied by an audience
  that knows exactly what they are watching and reacts accordingly. At the center, a
  <ansi fg="itemname">judging table</ansi> draped in white holds the silver Best in
  Show cup, polished to a standard that suggests it was polished twice. A handler and
  dog enter the far end and begin their pattern -- the handler's footsteps precise, the
  dog's gait absolutely textbook. The ring announcer's voice is clear and measured.
  This is where it all comes down. The <ansi fg="exit">registration hall</ansi> is
  south. The <ansi fg="exit">judges table</ansi> is east. The <ansi fg="exit">press box</ansi>
  is west. The <ansi fg="exit">bleachers</ansi> are accessible from the side. The
  <ansi fg="exit">circle</ansi> lies to the north.
