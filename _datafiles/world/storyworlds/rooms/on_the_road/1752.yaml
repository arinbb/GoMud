roomid: 1752
zone: On the Road
title: New Orleans - Old Bull Lee's House
description: >-
  A shotgun house in a New Orleans neighborhood, the <ansi fg="itemname">garden</ansi>
  overgrown with weeds that <ansi fg="mobname">Old Bull Lee</ansi> maintains
  in preference to anything else. Inside, the house is sparse and strange
  and full of the accumulated evidence of a man who has been conducting
  experiments on himself and on the world for many years. <ansi fg="itemname">Books</ansi>
  on unusual subjects crowd the shelves. In the <ansi fg="itemname">garden</ansi>,
  Old Bull Lee has been known to set up tin cans and shoot them with a
  pistol while delivering a lecture on something that only becomes clear
  in retrospect. He is the most dangerous intelligent man Sal has ever
  met, and also possibly the most interesting. Outside, <ansi fg="itemname">Bourbon Street</ansi>
  two blocks away is alive with its eternal party. To the <ansi fg="exit">east</ansi>
  along the <ansi fg="exit">road</ansi> is the highway back north.
