character:
  name: Stanley Hudson
  description: >-
    A heavyset man in his mid-fifties in a work shirt and slacks and dress shoes,
    with a face that communicates his position on virtually everything without
    moving. He has a crossword puzzle open on his desk every day. He finishes it
    every day. He does his actual work during the remaining time, which is
    sufficient. He has been at Dunder Mifflin for a long time and has developed
    a system for getting through the day that involves the crossword, a minimum
    of unnecessary engagement, and pretzel days. He loves pretzel day.
