character:
  name: Sonya Marmeladova
  description: >-
    A girl of eighteen, thin and pale, with enormous blue eyes that have seen
    too much too soon and have refused, somehow, to be diminished by it. She
    is small and simply dressed. Her hands are rough from work and her face
    is young and old at the same time, the face of someone who has found a
    way to live with unbearable things by holding onto something the
    unbearable things cannot touch. She carries a worn New Testament. She
    is the purest person in this novel. The city does not deserve her.
  raceid: 1
  level: 8
