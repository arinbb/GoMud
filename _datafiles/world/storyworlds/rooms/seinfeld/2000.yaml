roomid: 2000
zone: Seinfeld
title: Jerrys Apartment
description: >-
  The <ansi fg="yellow">apartment</ansi> at 129 West 81st Street, 5A. You have seen this
  room ten thousand times and it still looks exactly right. The <ansi fg="itemname">couch</ansi>
  faces the kitchen, blue-grey upholstery, slightly overstuffed, the kind of couch that
  became famous just by being there. The <ansi fg="itemname">kitchen counter</ansi> is a
  perpetual staging ground for cereal boxes, a coffee maker, and the particular stillness
  of a man who lives alone and is fine with it. A <ansi fg="itemname">Superman magnet</ansi>
  clings to the refrigerator door. The <ansi fg="itemname">intercom</ansi> buzzes periodically
  with the presence of the downstairs world. Everything in this apartment is slightly too
  clean for someone who eats as much cereal as Jerry Seinfeld eats cereal. The <ansi fg="exit">hallway</ansi>
  is to the east. The <ansi fg="exit">bedroom</ansi> is to the south. And there is always
  the possibility that the door to <ansi fg="exit">Kramers</ansi> apartment is about to slam
  open.
