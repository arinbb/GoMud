name: Harvest
roomid: 2240
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: farmland
idlemessages:
- The late afternoon light turns everything gold, the kind of gold that only exists in Northern California in autumn.
- A breeze moves through the wheat fields, bending the stalks in long slow waves like breathing.
- Somewhere far off, a screen door claps shut and the sound carries across the whole property.
- The smell of dry grass and warm earth rises from the ground, patient and old.
- A hawk circles high above the ranch, riding thermals in silence.
- The sun is lower now. The shadows of fence posts stretch across the dirt like sundials.
