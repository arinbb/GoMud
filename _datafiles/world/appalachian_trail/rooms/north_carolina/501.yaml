roomid: 501
zone: North Carolina
title: Carter Gap Shelter
description: "Carter Gap Shelter sits at 4,540 feet in a small clearing between ridges, the forest pressing close on all sides. The shelter is older but well-maintained, its dark wood walls carved with decades of trail names and dates. A small creek runs nearby, audible from the sleeping platform. The gap itself is a natural low point between two ridgelines, a place where deer trails and game paths converge. The clearing catches whatever breeze moves through, and the shelter stays relatively dry. A trail register hangs from the support beam. The Nantahala forest here is dense with Fraser magnolia and yellow birch, the understory thick with dog hobble and ferns."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 31
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "An older shelter with character. The walls are dark with decades of weathering, every inch carved with trail names, dates, and the occasional piece of trail wisdom. Someone has scratched a surprisingly detailed map of Georgia into the back wall."
  platform: "The sleeping platform is worn smooth from thousands of sleeping bags. A few nail heads poke up from the boards where patches have been made over the years."
  register: "The register is a thick spiral notebook in a zip-lock bag. The pages are filled with tight handwriting, some entries running to full paragraphs."
  creek: "A small creek runs past the shelter, maybe thirty yards away. The water is clear and cold, flowing over a bed of rounded stones. It runs year-round but slows to a trickle in dry summers. TODO_RESEARCH: Watershed this creek feeds into, water quality data."
  privy: "The privy sits on a slight rise behind the shelter, its wood graying with age."
  bearbox: "The bear box is dented and scratched\x97evidence of determined black bears testing the hardware."
  carvings: "The shelter walls are a palimpsest of trail names and dates stretching back decades. You can trace the history of thru-hiking culture in the names: Sunshine, Grizzly, Wanderlust, Ghost, Peanut Butter."
idlemessages:
- The creek beside the shelter makes a soft, continuous sound like a whispered conversation.
- A downy woodpecker taps at a dead branch above the shelter, methodical and persistent.
- The gap channels a cool breeze that keeps the shelter comfortable even in summer.
- A salamander crosses the damp ground near the spring, orange and black and glistening.
- The forest closes in tight around the small clearing, the trees ancient and patient.
- A deer steps into the clearing at dusk, freezes, then melts back into the undergrowth.
