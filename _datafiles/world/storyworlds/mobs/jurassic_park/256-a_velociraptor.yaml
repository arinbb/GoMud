idlecommands:
- emote moves along the prep table edge with the precise, clawed economy of something that has calculated the shortest distance between two points and found it.
- emote tilts its head to a perfect angle and tracks movement with one amber, vertical-pupiled eye.
- emote is completely still for a long, deliberate moment. Then shifts its weight. Then is still again.
- emote tests the air with a quick flicker of its tongue, processing the information.
- ""
