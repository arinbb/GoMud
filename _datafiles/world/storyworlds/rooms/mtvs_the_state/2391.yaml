roomid: 2391
zone: MTVs The State
title: NYU Dorm Room
description: >-
  A small, aggressively lived-in <ansi fg="itemname">dorm room</ansi> at New York
  University, circa 1988-1992. Two <ansi fg="itemname">beds</ansi> pushed to opposite
  walls. A <ansi fg="itemname">desk</ansi> covered in papers and a half-broken
  <ansi fg="itemname">typewriter</ansi> and a VHS <ansi fg="itemname">camcorder</ansi>
  on a cheap tripod. <ansi fg="itemname">Posters</ansi> of comedians and bands and
  movies cover the walls in overlapping layers. The <ansi fg="itemname">whiteboard</ansi>
  on the door has "THE STATE" written on it in dry-erase marker and below that a
  list of sketch ideas, some crossed out, most not. This is where it started. Eleven
  kids found each other here, or somewhere exactly like here, and decided to make
  the funniest thing possible. The decision was made in a room just like this one.
  To the <ansi fg="exit">west</ansi> is Doug's Apartment.
mapsymbol: Y
maplegend: NYU Dorm Room
biome: house
exits:
