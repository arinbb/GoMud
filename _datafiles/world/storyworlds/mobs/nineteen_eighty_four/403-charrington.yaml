character:
  name: Charrington
  description: >-
    A man of about sixty, frail and bowed, with long delicate hands and mild,
    slightly watery blue eyes behind round spectacles. He wears a crushed velvet
    jacket that has seen better decades. He has an air of gentle, disarming
    harmlessness, the air of a man who has lived quietly among old things for
    many years. He knows nursery rhymes from before the Revolution. He keeps a
    room above the shop. He is pleasant. He is kind. He is a Thought Police agent.
    But not today. Today he is just the shopkeeper.
