character:
  name: The Stray Gators
  description: >-
    Neil Young's backing band for the Harvest sessions, set up on the barn
    stage in a loose semicircle. Ben Keith on pedal steel guitar, his long
    fingers finding notes that bend and shimmer like heat off a highway.
    Tim Drummond on upright bass, holding down the low end with calm
    authority. Kenny Buttrey on drums, brushes in hand, keeping time with
    the patience of a man who knows the song will find its tempo. Jack
    Nitzsche at the piano, adding color and weight. Together they make the
    warm, aching sound that holds the whole album together — country and
    rock and folk all braided into something that sounds like the California
    landscape itself.
