nouns:
  fence: >-
    The paddock fence is electrified chainlink, nine feet high with another
    three feet of barbed wire at the top. It should be carrying ten thousand
    volts. Right now the indicator lights are dark. The fence is cold and
    dead, and somewhere on the other side of it, something very large is
    awake and aware.
  goat: >-
    The goat is gone. The post stands in the center of the paddock, chain
    lying in the mud. The chain was not cut. It was pulled apart, link by link.
    The post itself is leaning at a ten-degree angle, driven into the ground
    and then the ground shifted.
  water: >-
    A plastic cup of water on the dashboard of the nearest Explorer. Sitting
    perfectly still — except that it's not. Concentric rings ripple across
    the surface once. Twice. Each time, stronger than the last. The interval
    between rings is decreasing.
  rain: >-
    Tropical rain, the kind that comes in as a wall. It hammers the metal
    viewing station roof, fills every depression in the mud, drips from
    every leaf. The visibility is dropping. The darkness is complete beyond
    the fence line.
spawninfo:
- mobid: 257
  message: The ground shakes, and in the darkness beyond the fence, something enormous moves.
  idlecommands:
  - emote 's footstep sends a shockwave through the ground that you feel from your knees to your teeth.
  - emote 's presence is announced by a vibration in the mud, in the fence posts, in the metal viewing station structure.
  - emote lets out a sound that is not quite a roar — it's lower than that, more physical, a pressure wave rather than a noise.
  - ""
  - ""
  - ""
  respawnrate: 3 real minutes
idlemessages:
- The cup of water on the dashboard ripples. Concentric circles. One per second. Getting stronger.
- The rain intensifies, and for a moment you cannot see to the far fence line. Something could be anywhere.
- A deep vibration moves through the mud, up through your feet, into your chest. Impact tremors.
- The fence indicator lights are all dark. The fence is not on. The fence is NOT on.
- The goat chain in the paddock sways in no wind at all, as if something brushed past it.
- A tree at the paddock's far edge leans and falls with a crash muffled by rain. Something walked through it.
