roomid: 2247
zone: Harvest
title: Theres a World
description: >-
  You are above everything. The <ansi fg="itemname">Earth</ansi> hangs below
  you, blue and white and brown and green, the whole of it visible, the whole
  of it absurdly beautiful. The California ranch is a small thing from here,
  a pixel in the vast pattern. The <ansi fg="8">orchestra</ansi> plays
  somewhere in the void -- strings and brass, enormous, swelling, the sound
  of something too big for words trying to use music instead. Below, the
  <ansi fg="itemname">fields</ansi> are stitched together in patterns that
  only make sense from this distance, the irrigation lines and fence rows and
  road cuts forming the geometry of human habitation. The <ansi fg="itemname">
  clouds</ansi> move slowly. Everything moves slowly from here. From here, you
  can see that the world has been going on for a very long time and will go
  on for a very long time after the album ends. This is comforting. This is
  the most cosmic track on the record, and also somehow the most human.
mapsymbol: '7'
maplegend: Theres a World
biome: cliffs
exits:
  west:
    roomid: 2240
    exitmessage: Gravity reasserts itself and you descend back to the ranch.
nouns:
  earth: >-
    The planet. From here it is a sphere, a marble, a blue and white and brown
    and impossibly beautiful accident. The California ranch is not visible as
    a ranch from here -- it is a texture, a color, a small part of a vast
    pattern. The wheat fields are an amber smear. The roads are lines. The
    rivers are silver threads. Everything is the size it actually is, which
    is very small, which is also very large, depending on what you are
    comparing it to.
  orchestra: >-
    The London Symphony is out here somehow, strings filling the void with
    something enormous and tender. The sound has no source you can point to --
    it comes from the direction of everywhere, the way light comes from
    everywhere on an overcast day. It is the sound of a man who wanted more
    than an acoustic guitar for two of these songs and got the whole orchestra
    and still could not fill the space he was trying to fill.
  fields: >-
    From here the fields are a color and a shape in a larger pattern. The
    harvest moon is visible too, on the other side of the planet, smaller
    from here, more accurate in scale. The whole earth is in harvest from
    here. The whole earth is always in harvest.
  clouds: >-
    White and dense and slow from here, the clouds cast shadows on the
    earth below that move like the hands of a very slow clock, marking
    something, not hours. The shadows pass over the ranch, over the wheat,
    over the road where the truck idles on the shoulder, over everything
    equally, without preference.
idlemessages:
- The orchestra swells in the void, enormous and tender, the sound of looking at the world from outside it.
- The Earth turns slowly below, the California coast in and out of the cloud cover.
- The strings hold a chord that sounds like the space between things -- between notes, between people, between years.
- From here, the fields are the color of gold thread in a dark cloth.
- The brass section enters, broad and warm, and the whole cosmos feels slightly more ordered.
- The harvest moon is visible on the far side of the planet, orange and patient.
- You are very far from the ranch. You are also still on it.
