roomid: 505
zone: North Carolina
title: Sassafras Gap Shelter
description: "Sassafras Gap Shelter sits at 4,330 feet in a narrow gap between Cheoah Bald and Swim Bald, deep in the most physically demanding section of the southern AT. The shelter is named for the sassafras trees that once grew thick in this gap\x97their mitten-shaped leaves and root-beer-scented bark a distinctive feature of the Appalachian understory. The shelter itself is a simple three-sided lean-to, showing its years. The sleeping platform holds about eight, cozy by AT standards. A spring runs nearby, threading through the gap. This section of trail between the NOC and Fontana Dam has a reputation among thru-hikers for relentless elevation changes\x97the terrain never flattens, never relents, just climbs and drops in a punishing rhythm that breaks down bodies and builds up character. A trail register hangs from the shelter beam."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 33
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "An older shelter showing its age. The wood is dark and slightly soft in places. Moss grows on the north-facing wall. It is small but functional\x97a roof, a platform, a place to stop."
  platform: "The sleeping platform is tight\x97room for eight if everyone cooperates. The boards are worn and slightly uneven."
  register: "The shelter register is thin, this being a less-visited shelter between more popular stops. The entries tend toward the exhausted and the brief."
  spring: "A spring runs through the gap about 40 yards from the shelter, flowing over rocks and root tangles. It is reliable in normal conditions but can slow to a seep in dry spells. TODO_RESEARCH: Reliability data for this water source, alternative sources in the area."
  sassafras: "Sassafras trees grow in the gap, their distinctive mitten-shaped leaves bright green in the understory. The bark smells faintly of root beer when scratched. The Cherokee used sassafras medicinally\x97the roots for tea, the bark for poultices. TODO_RESEARCH: Cherokee medicinal uses of sassafras, traditional preparation methods."
  privy: "The privy is a short walk from the shelter, partially hidden by rhododendron."
  bearbox: "A small bear box sits near the shelter. The metal is scarred with scratches."
idlemessages:
- Sassafras leaves catch the light in the understory, their mitten shapes bright against the darker canopy.
- The gap funnels a steady breeze that carries the smell of damp earth and decaying leaves.
- Your legs ache from the relentless ups and downs. This section shows no mercy.
- A spring peeper calls from near the water source, its voice echoing in the narrow gap.
- The shelter is quiet and isolated, tucked into a fold of the mountains far from any road.
- A box turtle crosses the muddy ground near the spring, deliberate and unhurried.
