roomid: 1920
zone: Ghostbusters
title: The Ghostbusters Firehouse
description: >-
  The ground floor of a converted hook-and-ladder firehouse in the heart of Manhattan. <ansi fg="itemname">Ecto-1</ansi>, a battered 1959 Cadillac ambulance loaded with
  equipment and roof lights, sits in the bay looking ready to roll at a moment's notice.
  The <ansi fg="itemname">fire poles</ansi> gleam in the center of the room, one
  descending from the upper lab floor. Proton pack storage racks line the wall,
  along with charging stations and a whiteboard covered in equations nobody else
  could read. A <ansi fg="itemname">ghost trap</ansi> sits on a worktable, its pedal
  mechanism worn smooth from use. The whole place smells of motor oil, burnt ozone,
  and something indefinably strange.
mapsymbol: F
maplegend: Firehouse HQ
biome: house
exits:
  east:
    roomid: 1921
    exitmessage: You push through the big bay doors onto the street.
  up:
    roomid: 1922
    exitmessage: You grab the fire pole and shin upward to the lab.
  down:
    roomid: 1923
    exitmessage: You descend the pole into the basement below.
nouns:
  ecto-1: >-
    The Ecto-1 is a heavily modified 1959 Cadillac Miller-Meteor Futura Duplex that
    started life as an ambulance and has since become something considerably stranger.
    The roof is festooned with sensors, sirens, and equipment racks. The doors are
    marked with the NO GHOST logo. It smells of high-voltage electricity and, faintly,
    of hospital antiseptic from a previous life. The odometer reads numbers that
    should not be possible.
  poles: >-
    The classic fire poles of polished steel run through holes in the ceiling and
    floor, the original firefighting infrastructure now repurposed for Ghostbuster
    speed. Someone has written "DO NOT SLIDE WHILE HOLDING PROTON PACK - VENKMAN"
    on a laminated card taped to one of them. Below that, someone else has written
    "I KNOW FROM EXPERIENCE - STANTZ."
  trap: >-
    A standard-issue ghost trap: a flat rectangular device with a foot pedal trigger.
    When deployed and the pedal is stomped, the trap springs open and emits a beam
    that captures whatever supernatural entity is nearby. This one has seen heavy use.
    The latch shows scorch marks and the pedal is worn down on one side.
  whiteboard: >-
    The whiteboard is covered in Egon Spengler's meticulous handwriting: equations
    relating to psychokinetic energy, diagrams of the containment grid, and a series
    of increasingly alarmed notes about "mass PKE accumulation." Someone -- presumably
    Venkman -- has drawn a smiley face next to the most alarming calculation.
  sign: >-
    A hand-painted sign above the bay door reads "GHOSTBUSTERS" with the iconic NO
    GHOST logo. Below it, in smaller letters: "We're ready to believe you."
