roomid: 1712
zone: Blonde on Blonde
title: 4th Time Around
description: >-
  A <ansi fg="cyan">spiral staircase</ansi> that goes up and goes up and does
  not arrive anywhere. At each <ansi fg="itemname">landing</ansi> there is a <ansi fg="itemname">tambourine</ansi> -- hanging, or propped against the
  wall, or sitting on a step. Four landings, four tambourines, all slightly
  different. The staircase is made of iron, the flights tight and steep, the
  railing cold. The song is a mirror of a Beatles song, turned sideways,
  Norwegian Wood refracted into something sharper and more personal and
  less kind. You have climbed these stairs before. The fourth time the
  whole logic of the climb becomes clear: <ansi fg="itemname">the crutch</ansi>
  is on the third landing, left there by someone who did not want it pointed
  out that they were using it. Dylan never asked for your crutch. Now you
  must carry your own. The staircase continues upward past the fourth landing.
  Where it goes is not your business this time around. The <ansi fg="exit">studio</ansi> is back to the east.
mapsymbol: C
maplegend: 4th Time Around
biome: house
exits:
  east:
    roomid: 1700
    exitmessage: You descend the spiral stairs and find the door back. The tambourines recede above you.
nouns:
  tambourine: >-
    A tambourine on the first landing, its jingles bright and cheap. A
    tambourine on the second landing, quieter, the jingles slightly bent.
    A tambourine on the third landing, one jingle missing. A tambourine
    on the fourth landing, silent, the jingles all removed. The progression
    is unmistakable. You understand it and wish you did not.
  crutch: >-
    On the third landing, leaning against the wall: a wooden crutch,
    the kind used for a leg injury or used as a way of asking for
    sympathy without asking for sympathy. Someone left it here. Someone
    left it here because they were done needing it, or because someone
    told them they had never needed it. The song is about this without
    ever saying this.
  stairs: >-
    The spiral staircase, tight and iron, the steps worn in the center
    where feet have gone before. There is no top. There is no bottom,
    now that you have climbed. Going up and going around become the same
    thing. You have been here. The fourth time makes it a pattern.
idlemessages:
- A tambourine on one of the landings shifts without wind and settles back to silence.
- 'The staircase goes up. You have been here before. That is the whole of it.'
- The crutch on the third landing casts a long shadow down the spiral.
- 'From below, the tambourines sound like something. From above, they sound like something else.'
- The iron railing is cold no matter how long you hold it.
- 'Somebody climbed these stairs every time the song was played. Somebody always left the crutch.'
