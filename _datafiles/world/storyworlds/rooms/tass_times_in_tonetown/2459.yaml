roomid: 2459
zone: Tass Times in Tonetown
title: The Toxic Swamp
description: >-
  The swamp is what happens when someone with resources and contempt for color
  is left unsupervised. <ansi fg="10">Dead trees</ansi> stand in arrangements
  that suggest they were alive recently and remember it. The <ansi fg="10">water</ansi>
  between their roots is a particular shade of green that is not a healthy green
  but rather a green that used to be something else and was converted against
  its will. <ansi fg="itemname">Pipes</ansi> from Snotty's operation emerge
  from the eastern undergrowth, discharging a pale grey effluent that hits the
  water with a sound of small defeat. The air tastes of chemicals and something
  that was once a chromatic aspiration. The sky overhead is technically still
  the Tonetown sky but it has been argued into a lower register. To the east,
  the <ansi fg="itemname">mansion gates</ansi> are barely visible through the
  chemical haze. North leads back toward the road. This place is not tass.
  This place is the definition of the problem.
