  east:
    roomid: 2241
    exitmessage: You walk east along the dirt path toward the barn.
  north:
    roomid: 2242
    exitmessage: You follow the fence line north toward the cottage.
nouns:
  porch: >-
    A wide wooden porch, the boards sun-bleached and smooth from years of boots
    and bare feet. A rocking chair sits at one end, a coffee mug on the rail
    beside it, long cold. This is where the songs get written — sitting here
    watching the light change over the fields, a guitar across your knees, waiting
    for something true to arrive.
  fields: >-
    Wheat fields rolling east toward low brown hills, golden in the late
    afternoon light. The stalks move in the wind like water, like something
    alive and dreaming. This is the harvest the album is named for — not just
    the crop but the gathering of something, the collecting of years and songs
    and losses into one warm, sad, beautiful record.
  guitar: >-
    A Martin D-45 acoustic guitar, its spruce top mellowed to honey by years
    of play. The fretboard is worn smooth at the first three positions where
    Neil's fingers find the same open chords over and over — D, G, A, the
    vocabulary of everything he needs to say. A capo is clipped to the headstock.
    It smells like wood and rosin and California.
  fence: >-
    A weathered split-rail fence running north from the ranch house toward a
    small white cottage visible through a stand of live oaks. The fence posts
    are silvered with age, leaning slightly, held together more by habit than
    by hardware. The old man lives up that way.
  sky: >-
    The sky is enormous and golden, deepening toward amber at the western
    horizon where the sun is making its slow descent. A few high clouds catch
    the light and hold it. This is the sky that hangs over every song on the
    album — open, warm, tinged with something you cannot name until later, when
    you realize it was sadness all along.
  harmonica: >-
    A Hohner Marine Band harmonica in the key of G, sitting on the fence post
    where someone set it down between songs and forgot to pick it back up. The
    chrome is warm from the sun. The reeds inside smell like breath and metal.
    This is the harmonica that opens Heart of Gold — that searching, lonesome
    sound that makes you feel like you are looking for something you have not
    lost yet.
spawninfo:
- mobid: 510
  message: "Neil Young sits on the porch steps, tuning an acoustic guitar with patient, unhurried hands."
  idlecommands:
  - ""
  - ""
  - emote plays a few quiet chords, pauses, plays them again slightly different.
  - ""
  - emote looks out at the fields and squints, like he is listening to something only he can hear.
  - ""
  - emote picks up the harmonica, blows a single long note, then sets it back down.
  - ""
  respawnrate: 5 real minutes
idlemessages:
- A meadowlark calls from the fence line, two notes repeated, the simplest song in the world.
- The wheat fields ripple in the breeze and the whole landscape seems to breathe.
- The porch boards creak as the house settles in the warmth of the afternoon.
- A truck passes on the distant highway, the sound arriving late and fading slowly.
- The guitar on the porch hums faintly in the wind, a single harmonic rising and falling.
- 'Dust motes hang in the golden light like tiny planets, suspended and still.'
