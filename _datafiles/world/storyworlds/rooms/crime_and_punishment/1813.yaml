roomid: 1813
zone: Crime and Punishment
title: Razumikhins Room
description: >-
  A different kind of poverty — cheerful poverty, the poverty of a young
  man who does not mind it yet. Books are everywhere: stacked on the floor,
  piled on the table, two of them open at once on the desk. A <ansi fg="itemname">samovar</ansi> on the sideboard still warm from the morning.
  A <ansi fg="itemname">coat</ansi> too large for its hook, hanging off one
  side. The room smells of tea and tobacco and beeswax and the particular
  warmth of a person who is basically fine. Razumikhin is large and loud
  and laughs easily and is one of those people for whom the world has not
  yet turned hostile. He worries about Raskolnikov. He feeds Raskolnikov
  when Raskolnikov lets him. He talks too much and means all of it. The
  street is to the <ansi fg="exit">east</ansi>.
