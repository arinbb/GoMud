character:
  name: Darryl Philbin
  description: >-
    A tall man in his early forties in a work shirt and jeans and steel-toed boots,
    with a face that expresses what he wants it to express and nothing else. He manages
    the Dunder Mifflin warehouse with the quiet competence of a man who has been doing
    this correctly for years and is aware that the people above him are not always doing
    their jobs correctly. He plays keyboard. He has music in him that is looking for
    its moment. He is smarter than Michael and knows it, and the show knows it, and
    lets this be true without making it a joke.
