roomid: 2028
zone: Harold and Maude
title: Maudes Railroad Car
description: >-
  An old <ansi fg="10">railroad car</ansi> repurposed as the home of someone
  who takes life very seriously, which is to say she does not take it seriously
  at all. Every surface is covered in something wonderful: <ansi fg="itemname">paintings</ansi>
  in progress, <ansi fg="itemname">sculptures</ansi> of wire and found objects, <ansi fg="10">plants</ansi> crowding every windowsill in coffee tins and clay pots.
  A <ansi fg="itemname">banjo</ansi> leans against the wall. A <ansi fg="itemname">phonograph</ansi>
  plays something that might be folk music or might be something Maude invented
  this morning. The smell is extraordinary: <ansi fg="10">flowers</ansi> and paint
  and something cooking, something with garlic. A ladder leads up through a hatch
  to the <ansi fg="exit">roof</ansi> garden. To the <ansi fg="exit">south</ansi>
  the iron gate leads back to the street.
