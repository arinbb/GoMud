roomid: 2309
zone: The Office
title: The Break Room
description: >-
  The break room is where Dunder Mifflin employees go when they need to be in a room
  that is not their desk but also not anywhere in particular. A <ansi fg="itemname">couch</ansi>
  along one wall -- utilitarian grey upholstery, slightly compressed in the middle from
  years of use -- faces a small <ansi fg="itemname">television</ansi> that gets cable but
  is always on something nobody chose. A <ansi fg="itemname">bulletin board</ansi> holds
  notices that have been here since 2004, a reminder about the upcoming Pretzel Day that
  has not been updated to reflect which year, and a handwritten note that says 'whoever
  keeps leaving their mug in the sink: you know who you are.' A <ansi fg="itemname">table
  and chairs</ansi> in the center of the room serve as a satellite meeting space, a lunch
  location, and occasionally the setting for something true. Jim and Pam have sat at this
  table. The conversations they've had here are in the walls. The <ansi fg="exit">reception
  area</ansi> is to the east. The <ansi fg="exit">stairwell</ansi> is to the north.
