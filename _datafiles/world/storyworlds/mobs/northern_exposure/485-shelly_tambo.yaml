character:
  name: Shelly Tambo
  description: >-
    Former Miss Northwest Territories, current wife of Holling Vincoeur and
    co-proprietor of The Brick, Shelly is twenty-six in a town of much older
    people and has decided this is interesting rather than limiting. She is
    bright in the way that comes from paying attention to everything, pretty
    in the way that was her primary identity once and is now one of several
    things she is, funny without meaning to be. She has depths that surprise
    her as much as anyone. She loves Holling with a completeness that the
    age difference does not explain and does not need to. She sings when she
    thinks no one is listening. Everyone is listening. She is very good.
