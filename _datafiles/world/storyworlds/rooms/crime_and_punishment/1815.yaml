nouns:
  cobblestones: >-
    The cobblestones at the center of the crossroads, worn to smoothness
    by the passage of carts and feet and years. Warm now from the sun.
    The surface of the city itself, the earth it is built on, and beneath
    that earth: the city that was here before this one, and before that,
    and before that. When he kissed these stones he was kissing all of it.
  crossroads: >-
    The intersection of several streets. In older beliefs, the crossroads
    was a place of decision, of meeting, of the spirits that live at
    thresholds. Here it is just an intersection in St. Petersburg. And
    also exactly those things.
  pigeons: >-
    The pigeons work the gutters with professional thoroughness, not
    startled by the people around them, not paying attention to anything
    that cannot be eaten. They were here before whatever happened here
    happened. They will be here after.
  newspapers: >-
    The man at the corner holds up newspapers without calling out. He has
    been doing this long enough to know that the people who want one will
    come and the people who do not will pass. He does not require more
    from the transaction.
idlemessages:
- The crossroads is busy and loud at midmorning, all the commerce of the Haymarket district passing through.
- 'A cart turns the corner without slowing: the driver knows this intersection, knows the second it will open, is already through.'
- The center of the crossroads is the warmest spot in the street, the cobblestones holding a whole summer in their stone.
- 'Someone crosses the intersection at a run, late for something, their footsteps ringing off the surrounding buildings.'
- The pigeons scatter for a cart horse and reassemble immediately behind it, undisturbed by their own scattering.
- 'In the middle of all the motion: a moment of stillness, as if the city pauses, as if something is about to happen.'
