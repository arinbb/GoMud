roomid: 2347
zone: Best in Show
title: Backstage
description: >-
  The backstage area is where the handlers pace. A narrow corridor behind the main ring,
  lit by practical fluorescent fixtures, <ansi fg="itemname">crates</ansi> and
  <ansi fg="itemname">gear bags</ansi> stacked along one wall. This is where people come
  to be nervous in private. The air has a specific quality: the smell of competition, which
  is mostly adrenaline and conditioning spray. A <ansi fg="itemname">whiteboard</ansi> on
  the wall lists the showing order for Best in Show in neat printed letters. Handlers move
  through in both directions, some with dogs, some alone, their faces set in the various
  masks of people who care very much about what is about to happen. A <ansi fg="itemname">bench</ansi>
  runs along the far wall where someone is sitting with a dog, talking to it in a very
  low voice, the way you talk to something you love before something important. The
  <ansi fg="exit">grooming area</ansi> is north.
mapsymbol: K
maplegend: Backstage
biome: house
exits:
  north:
    roomid: 2346
nouns:
  crates: >-
    Travel crates in a range of sizes, all high-end, all labeled with breed names
    and handler surnames in neat marker. Some of them have small blankets inside.
    Some of them have a favorite toy. All of them are empty right now -- the dogs
    are all out there, getting ready.
  bags: >-
    The gear bags are professional and very full. Extra leads, towels, spray
    bottles, lint rollers (many lint rollers), number holders, business cards,
    photographs of previous wins, protein bars that have been in the bottom of
    the bag since the last show. The detritus of competitive dog showing.
  whiteboard: >-
    The Best in Show order on the whiteboard: Sporting (Vizsla), Hound (Bloodhound),
    Working (Standard Schnauzer), Terrier (Norwich), Non-Sporting (Poodle), Toy
    (Shih Tzu), Herding (Border Collie). Seven groups. One winner. The whiteboard
    is very clean. Someone erased everything else and wrote only this.
  bench: >-
    The bench is wooden, institutional, permanent. Someone has scratched "Good luck"
    into it at some point, without specifying to whom.
spawninfo:
- mobid: 550
  message: "<ansi fg=\"8\">Christy Cummings moves through backstage with Rhapsody in White at perfect heel position. Christy's focus is absolute. She sees you, acknowledges you with a brief nod, and moves on. Rhapsody does not look at you. Rhapsody is working.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- A handler runs through the gaiting pattern in the corridor, their footsteps precise on the concrete floor.
- Gerry Fleck passes through with Winky, talking to him in a low, reassuring voice. Winky's ears are at full alert.
- Cookie stands near the crates, eyes closed, lips moving slightly. She is either praying or running through the course. Possibly both.
- A dog sits perfectly still while its handler adjusts a single strand of hair. The dog does not move. The dog has been here before.
- The muffled sound of the ring announcer floats through the walls: another group is being judged.
- Someone paces backstage with the rhythm of a person who has tried everything else and has been reduced to pacing.
- A treat is produced from somewhere and a dog takes it with focused, professional interest. The treat is a reward for something. The dog understands this.
- The fluorescent light flickers once. Several handlers look up. It steadies. They look back down.
