roomid: 1891
zone: The Monkey Wrench Gang
title: The Dam Base
description: >-
  At the <ansi fg="8">foot of Glen Canyon Dam</ansi>, the scale becomes overwhelming.
  The concrete wall rises seven hundred and ten feet above you, curving slightly as
  it recedes into the gorge walls on either side, its surface pale grey and massive
  and absolutely implacable. You are standing in the gorge that the Colorado River
  carved over millions of years, and the dam occupies that gorge completely, its
  footings anchored in the canyon floor, its arch transferring the immense pressure
  of the reservoir against the canyon walls themselves. The <ansi fg="cyan">river</ansi>
  emerges from the base in a cold, controlled rush — water released through the
  penstocks at whatever rate the Bureau of Reclamation decides. It is no longer a
  river at this point. It is a utility. The powerhouse <ansi fg="8">turbines</ansi>
  vibrate the concrete underfoot. <ansi fg="8">Spray</ansi> from the tailrace keeps
  the gorge floor cool and damp, ferns growing in the constant mist. To the <ansi fg="exit">overlook</ansi> to the <ansi fg="exit">north</ansi>, the road leads back up.
