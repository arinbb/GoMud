character:
  name: Gomer Pyle
  description: >-
    A young man with an enormous, open face and the expression of someone
    who finds the world astonishing on a reliable basis. He says shazam.
    He says golly. He says surprise surprise surprise. He means all of
    it. He is simple and sincere and his sincerity has a specific quality --
    it is not naive exactly, it is more that he has decided to remain
    present to the world instead of learning to take it for granted.
    He pumps gas at Wallys with care and goodwill. He will eventually
    join the Marines and become a legend. For now he is here, marveling
    at tires and butterflies and the general miracle of the afternoon.
