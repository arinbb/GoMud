character:
  name: the Sad Eyed Lady
  description: >-
    A silhouette against the warehouse windows, backlit and precise, luminous
    in the way that outlines are luminous when everything behind them is light.
    She is Sara, who Dylan loved enough to write eleven minutes of music for,
    and the music is the proof of the love and also the distance the love
    required to exist. Sad eyes, mercury mouth, savage gift. Remote. Complete.
    She does not come closer. She does not need to. The organ holds.
  raceid: 1
  level: 10
