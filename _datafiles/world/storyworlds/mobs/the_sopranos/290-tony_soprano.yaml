character:
  name: Tony Soprano
  description: >-
    A large, heavily built man in his mid-forties, wearing a silk bathrobe
    over a white undershirt and slacks, or sometimes an expensive suit,
    depending on the time of day. His face is broad and lived-in, capable
    of expressing warmth and menace sometimes simultaneously. He moves
    through a room the way a large stone moves through water -- displacing
    everything around him without apparent effort. There is something
    melancholy behind his eyes that he has been trying to address for
    several seasons now, with limited success. He smells of cologne and
    cigar smoke and something else that is harder to name.
