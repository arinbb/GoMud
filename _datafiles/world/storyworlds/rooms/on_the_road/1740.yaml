nouns:
  typewriter: >-
    A battered Underwood typewriter, its ribbon worn thin, its keys sticking
    on the letters that get used most. On it sits a page half-full of
    sentences that run on and refuse to stop — sentences that move the way
    the road moves, the way America moves, the way Dean Moriarty moves.
    This is where the book begins. This is where it always begins, in a
    cold room with a typewriter and a letter from somewhere else.
  letter: >-
    A letter from Dean Moriarty, postmarked Denver, Colorado. The handwriting
    is enormous and slants forward as if it cannot wait to arrive. It talks
    about Marylou. It talks about a '49 Hudson. It talks about the road, the
    road, the road, and what is at the end of it, which is more road. Reading
    it, you feel the pull. The pull west. The pull out.
  window: >-
    The apartment window looks out over a street so unremarkable it is almost
    beautiful. A fire escape, a grey sky, the distant sound of a taxi horn.
    You have been looking out this window all winter. What is out there is
    not what you want. What you want is out there.
  papers: >-
    Pages of manuscript, written in rolling jazz-rhythm sentences that pour
    forward without punctuation marks getting in the way. This is the novel.
    This is the whole of it, trying to get out of a man who cannot stay still
    long enough to finish anything except the road.
  coffee: >-
    A coffee cup, empty, cold. The last cup before leaving. There is always
    a last cup, a last ordinary moment before the extraordinary begins.
