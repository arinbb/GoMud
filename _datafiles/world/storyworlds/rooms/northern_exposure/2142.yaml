roomid: 2142
zone: Northern Exposure
title: The Brick Back Room
description: >-
  Behind the bar is where The Brick keeps its real conversations. The back room
  is half <ansi fg="itemname">storage</ansi> -- cases of beer, canned goods,
  extra glasses in cardboard sleeves -- and half <ansi fg="8">living space</ansi>,
  with a worn <ansi fg="itemname">couch</ansi> against one wall and a small table
  where Holling keeps his accounts. A <ansi fg="itemname">window</ansi> looks
  out on the alley and the spruce line beyond. The room smells of cedar and
  beer and the particular intimacy of a place where two people have been
  comfortable with each other for a long time. <ansi fg="yellow">Photographs</ansi>
  cover one wall -- Holling's trapping years, the early days of The Brick, a
  young Shelly at what appears to be a beauty pageant, various Cicely community
  events going back decades. Through the door to the <ansi fg="exit">south</ansi>
  is the bar proper.
