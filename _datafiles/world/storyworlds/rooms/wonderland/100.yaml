roomid: 100
zone: Wonderland
title: The Bottom of the Rabbit Hole
description: >-
  You land with a soft thump on a carpet of dry leaves and mushroom caps. Above
  you, the rabbit hole stretches upward into darkness -- there's no climbing back
  that way. You're in a long, low hall lined with doors of every size and color.
  Most are locked. A tiny <ansi fg="itemname">golden key</ansi> glints on a
  three-legged glass <ansi fg="itemname">table</ansi> in the center of the hall.
  At the far end, a <ansi fg="itemname">curtain</ansi> conceals something small.
  The air smells of earth, curiosity, and the faintest hint of cake frosting.
mapsymbol: R
maplegend: Rabbit Hole
biome: dungeon
exits:
  north:
    roomid: 101
  east:
    roomid: 102
nouns:
  table: >-
    A three-legged glass table, perfectly transparent. The golden key sits upon
    it. Beside the key is a small bottle labeled "DRINK ME" and a tiny cake with
    "EAT ME" written in currants.
  curtain: >-
    Behind the curtain is a tiny door, barely fifteen inches high. Through the
    keyhole you can glimpse the most beautiful garden you've ever seen -- bright
    flowers and cool fountains. If only you were small enough to fit through...
  key: >-
    A tiny golden key, delicately made. It looks like it would fit a very small
    lock indeed.
  doors: >-
    The doors come in every conceivable size, from grand double doors tall
    enough for a giant to tiny doors that a mouse would have to duck through.
    Each has a different knocker, handle, or keyhole. None of them open.
idlemessages:
- Something scurries behind one of the locked doors. A mouse? Something larger?
- The tiny door at the end of the hall seems to shimmer, as if the garden beyond it is beckoning.
- A clock ticks somewhere, but it seems to be counting backward.
- You could swear the hall is longer than it was a moment ago.
- The "DRINK ME" bottle on the table bubbles faintly, though no one has touched it.
