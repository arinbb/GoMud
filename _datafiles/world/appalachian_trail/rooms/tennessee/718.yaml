roomid: 718
zone: Tennessee
title: Vandeventer Shelter
description: "Vandeventer Shelter sits on a rocky overlook high on Iron Mountain, offering one of the best views of any shelter on the AT in Tennessee. The three-sided shelter sleeps eight on a raised platform. The overlook faces west, catching spectacular sunsets over the ridges and valleys of the Cherokee National Forest. A spring about three hundred yards below the shelter provides water, though it can slow to a trickle in dry weather. The exposed location means wind is a constant companion. Tent sites are limited on the rocky terrain. A bear box and privy serve the site. A trail register hangs from the front post."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 39
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A three-sided shelter on a rocky overlook. The views are extraordinary but the exposure is real."
  platform: "The sleeping platform holds eight. The wood is roughened by the constant wind."
  register: "A trail register fluttering in the breeze."
  overlook: "The rocky overlook faces west, catching the full sweep of the sunset over the Cherokee National Forest. Ridges layer into the distance, turning from green to blue to purple to gold as the sun drops."
  spring: "A spring about three hundred yards below, reached by a steep descent. It can slow in dry weather."
  privy: "A wind-battered privy near the ridgeline."
  bearbox: "A bear box wedged into a level spot on the rocky terrain."
idlemessages:
- The western view from the overlook stretches for fifty miles, ridge after ridge fading into haze.
- Wind pours across the exposed ridgeline, making the shelter creak.
- A vulture rides a thermal off the overlook, circling higher without a wingbeat.
- The sunset paints the western ridges in gold, then copper, then deep purple.
- Rocks on the overlook are warm from the afternoon sun, radiating heat into the evening.
- The Cherokee National Forest spreads below like a green ocean, unbroken and wild.
