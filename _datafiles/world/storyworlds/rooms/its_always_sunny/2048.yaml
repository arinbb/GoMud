nouns:
  poster: >-
    A karate poster on Mac's side of the apartment shows a fighter mid-kick
    in front of an American flag. The word EXCELLENCE is printed across the
    bottom. Mac has added a note in marker: "THIS IS ME (SOON)." Below that,
    in different ink, Dennis has written "No." Mac has crossed this out.
    Dennis has written it again.
  mirrors: >-
    Dennis's side of the apartment has mirrors at precise angles calculated
    to show him from every angle simultaneously. They have been arranged with
    the care of a man who needs to confirm his appearance frequently and from
    multiple angles. One of them has a sticky note on it that reads "Golden."
    Dennis wrote it. It is for himself.
  weights: >-
    Mac's weight set near his side of the apartment shows evidence of recent
    use. The chalk dust on the bar is fresh. The weights are heavier than you
    expected, which tells you something — Mac does actually do the work, even
    if the mass cultivation timeline has stretched considerably.
  television: >-
    The shared television in the middle of the apartment is the site of most
    of the apartment's negotiations. There are two remotes. One works. Ownership
    of the working remote is a constant background tension.
idlemessages:
- Dennis's side of the apartment is in perfect order. Mac's side has a slightly different relationship with order, but not a bad one.
- 'The mirrors on Dennis''s side reflect a room from several angles. In the right light, you can see the back of your own head, which is unusual.'
- 'The karate poster watches over Mac''s side of the room. The fighter in it has excellent form. Mac has studied this poster. He has notes.'
- 'Something is written on the bathroom mirror in dry-erase marker: a number, circled, followed by a question mark. A rating system in action.'
- 'From somewhere in the apartment, the faint smell of an extremely expensive hair product. Dennis is somewhere nearby or was here recently.'
- The weight set has a folded piece of paper tucked under the bar. It appears to be a mass cultivation training log. The dates go back three years.
