nouns:
  posters: >-
    Movie posters from the late 1930s, water-damaged and curling at the edges.
    COME AND GET IT. RHYTHM ON THE RANGE. TOAST OF NEW YORK. The woman in the
    posters is luminous, fierce, alive -- a face built for defiance. Someone has
    drawn a halo over her head in ballpoint pen. Someone else has crossed it out.
  windows: >-
    Barred windows looking out at a city that cannot see in. Seattle in the rain,
    always in the rain -- grey buildings, grey sky, grey water. The Space Needle
    is not there yet. The grunge scene is fifty years away. But the rain is the
    same rain. It has always been the same rain.
  wheelchair: >-
    An institutional wheelchair, chrome and leather, positioned in the exact center
    of the room as if on display. The seat is worn to the shape of a body that
    spent too long sitting still. The wheels are locked. There are scratch marks
    on the armrests -- fingernails, desperate and persistent, over years.
idlemessages:
- A door somewhere down the corridor opens and closes. No footsteps follow. No footsteps ever follow.
- 'Rain hits the barred windows in gusts, each drop a tiny percussion against the glass -- applause from a city that stopped clapping decades ago.'
- The fluorescent lights flicker, and in the half-second of darkness the ward feels infinite.
- The wheelchair rolls forward an inch on its own, then stops, as if remembering it is not allowed to leave.
- 'Antiseptic smell surges and fades, the institution breathing, cleaning, erasing.'
- A movie poster peels another inch from the wall, the actress's face slowly disappearing behind curling paper.
