character:
  name: Bubbles
  description: >-
    A thin Black man of indeterminate age -- the street ages people at its own
    rate -- with quick eyes and a shopping cart loaded with white t-shirts and
    the particular alertness of someone who has learned that missing things
    costs more than paying attention. He is an addict and a police informant and
    genuinely one of the most perceptive people in West Baltimore. He knows
    everything that happens on these streets because he is a permanent, portable
    fixture of them. He is trying. That is what you need to understand about Bubbles.
    He is trying, and trying in Baltimore, in the game, on the corners -- it costs.
