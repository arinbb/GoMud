roomid: 1702
zone: Blonde on Blonde
title: The Loft
description: >-
  A loft apartment above the studio, the small hours, the room Visions of
  Johanna lives in. <ansi fg="itemname">Candles</ansi> burn on every flat surface -- the
  mantel, the windowsill, the floor beside the <ansi fg="itemname">mattress</ansi> where
  Louise sleeps or pretends to sleep. Tall factory <ansi fg="itemname">windows</ansi>
  line one wall, and through them the city lights of Nashville flicker like
  the city is breathing. A <ansi fg="itemname">painting</ansi> hangs on the far wall -- a
  museum piece, or a memory of one, and every time you look at it the subject
  shifts. The heat pipes cough and knock. The room smells like candle wax
  and old wood and something electrical, like the air before a storm. Johanna
  is here. Johanna is always here. She is in the candlelight and in the
  spaces between things and in the corners of your vision, and when you turn
  to look at her directly she becomes the room again.
  Stairs lead <ansi fg="exit">down</ansi> to the studio.
mapsymbol: L
maplegend: The Loft
