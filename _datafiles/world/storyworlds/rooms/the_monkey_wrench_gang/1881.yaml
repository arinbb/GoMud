nouns:
  raft: >-
    A fourteen-foot rubber raft, veteran of many river miles, patched in a dozen
    places and still seaworthy in the way that things held together by determination
    and duct tape often are. The name stenciled on the bow is barely legible.
    Empty beer cans rattle in the bilge. A set of wooden oars lies across the thwarts.
  walls: >-
    The canyon walls are a textbook of geology written in stone. The Kaibab limestone
    at the top gives way to Toroweap Formation, Coconino sandstone, Hermit shale,
    the Supai Group -- four hundred million years of sediment laid down in shallow
    seas that are now a mile above sea level. Abbey said the canyon was proof that
    God, if there is one, is not in a hurry.
  water: >-
    The Colorado runs cold and heavy with silt, its color somewhere between red and
    green depending on the light. Before the dam, it ran red as blood in spring flood.
    Now it runs cold and clear and controlled and dead in the way that controlled
    things are dead. The fish that evolved here over millions of years are mostly gone.
    The river still runs, but it runs on a schedule now.
  canyon: >-
    The canyon is so deep and so old that human time becomes meaningless inside it.
    The walls were here before the first human eye ever looked at them. They will be
    here long after the last human eye has closed. Abbey found this comforting rather
    than depressing. It suggests that our catastrophes are local.
