nouns:
  television: >-
    An enormous television in the living room, on. It is always on. The sound
    is high enough that conversation must be conducted over it. This is not
    considered a problem in this household. It is considered ambient.
  table: >-
    The dining table. Six chairs, white tablecloth, a ceramic fruit bowl that
    has never held fruit that anyone ate. The table is where arguments are
    conducted. The arguments are about everything. The arguments are always
    about the same thing, which is power, and who has it, and why.
  pole: >-
    The Festivus pole. Aluminum, undecorated. Frank Costanza invented Festivus
    as a holiday to protest the commercialization of Christmas and also because
    he wanted his own holiday. It stands in the corner year-round because
    removing it would be an implicit concession that it was a seasonal item,
    which would imply a consensus about the nature of Festivus that has not
    been reached.
  wallpaper: >-
    The wallpaper is a large floral pattern from a decade when large floral
    patterns were making a statement. The statement has been forgotten but the
    wallpaper remains, committed to its position.
