character:
  name: Sherri Ann Cabot
  description: >-
    Sherri Ann Cabot married well, which is to say she married a man named Leslie Cabot
    who is much older and very wealthy and, by her description, very supportive. She is
    polished in the way of people for whom polish is a professional skill, warm in a way
    that is entirely genuine about certain things -- Rhapsody, primarily -- and entirely
    practiced about others. She does not explain herself. She does not need to. She has
    come to this show to win it, which she came close to last year, and the only part of
    her that shows is the certainty that this time is different. Rhapsody, her Standard
    Poodle, is magnificent. Christy, her handler, is professional. Sherri Ann, above all
    of it, is composed.
