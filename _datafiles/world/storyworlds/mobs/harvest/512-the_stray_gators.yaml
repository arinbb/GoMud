idlecommands:
  - emote tunes the pedal steel, bending the E string until it finds the right warm pitch.
  - emote plays a slow country phrase on the pedal steel, the sound bending and settling.
  - emote waits for the next number, the pedal steel resting on its stand.
  - emote adjusts the volume pedal with one foot and plays a chord, testing the tone.
