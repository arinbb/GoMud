roomid: 2211
zone: The Wire
title: The Baltimore Sun Newsroom
description: >-
  The <ansi fg="8">newsroom</ansi> of the Baltimore Sun, a large open floor of
  <ansi fg="itemname">desks</ansi> and monitors and the sound of keyboards going at
  different tempos. The <ansi fg="8">fluorescent overheads</ansi> are identical to
  the ones in the Detail office, which is not a coincidence -- both are institutions
  running on budgets that have been cut past the bone. The back wall has <ansi fg="itemname">
  award plaques</ansi> from the 1990s when there were more reporters and more resources
  and the paper still believed it could cover the city as the city deserved to be
  covered. <ansi fg="8">Gus Haynes</ansi>, the city editor, stands at the assignment
  board with the expression of a man responsible for reporting everything important
  with half the people he needs. A <ansi fg="itemname">scanner</ansi> crackles on one
  desk. The <ansi fg="exit">street</ansi> is to the south.
