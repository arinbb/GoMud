nouns:
  lights: >-
    The sodium lights of the parking lot cast everything in amber, the way old
    photographs look. In this light the handlers loading or unloading their cars
    look like figures from another era doing something that has always been done
    and will continue to be done long after tonight.
  wagons: >-
    The station wagons near the east wall have that particular look: rear seats
    folded, crate strapped in, a towel over the crate, a lint roller visible
    through the glass. One has a bumper sticker that says PROUD HANDLER. Another
    has a sticker from a dog show in Ohio. This region is well-represented tonight.
  wagon: >-
    The Flecks station wagon from Shakey Hills, Ohio. Ohio plates, a couple of
    small dents, a bumper sticker from what might be a fishing supply store.
    Through the rear window: a Norwich Terrier in a travel crate, ears fully
    deployed, watching the parking lot with the keen attention of a dog that
    knows something is happening and is ready for it. A fly-fishing catalog sits
    on the passenger seat. This is a car lived in by good people.
spawninfo:
idlemessages:
- A car door slams. A dog inside shifts in its crate. The car rocks once.
- Two handlers stand by a minivan comparing notes on something. They are not done talking yet.
- A trunk opens and a crate slides in with a practiced motion that suggests this has been done many times.
- Headlights sweep across the parking lot as another competitor arrives.
- Gerry Fleck can be seen through the station wagon window, checking something on his phone with an expression of uncomplicated patience.
- The cold November air is very clear. You can see your breath. You can see the dogs breathing too.
- Someone walks a dog along the row of cars before heading in. The dog wants to smell everything. The handler has learned to allow for this.
- A Bloodhound gets into a pickup truck with the slow inevitability of a large thing settling. The truck dips noticeably.
