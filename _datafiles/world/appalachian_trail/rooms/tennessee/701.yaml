roomid: 701
zone: Tennessee
title: Roaring Fork Shelter
description: "A weathered three-sided shelter sits on a slope above Roaring Fork, a fast-moving stream that earns its name after heavy rain. The shelter is older, its logs darkened with age and patched in several places. The sleeping platform holds six, and the tin roof has a few leaks that regulars have learned to avoid. Roaring Fork drops through a series of small cascades just below the shelter, the sound a constant rush of white noise. Tent sites are limited and uneven on the slope. A bear box and privy complete the standard amenities. A trail register hangs from a nail near the entrance."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 35
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "An older AT shelter showing its years. The logs are dark with age and lichen, the chinking crumbling in places. Still solid, but with character that comes from decades of mountain weather."
  platform: "The sleeping platform holds about six hikers. The wood is worn smooth by thousands of sleeping bags and foam pads."
  register: "A trail register in a battered zip-lock bag. The notebook is damp around the edges."
  creek: "Roaring Fork is a fast-moving mountain stream that drops through a series of small cascades below the shelter. After rain, it earns its name. In dry weather, it is merely a cheerful babble."
  privy: "The privy leans slightly downhill. It works, but just barely."
  bearbox: "A standard steel bear box, its brown paint scratched and faded."
idlemessages:
- Roaring Fork tumbles through its cascades below, a rush of white noise that drowns out everything.
- The old shelter creaks in the wind, its logs settling against each other.
- A salamander crosses the damp ground near the shelter, bright orange against the dark earth.
- Dripping sounds come from somewhere in the roof, the legacy of last night's rain.
- A wood thrush sings from the canopy above the creek, its flutelike notes echoing.
- The smell of wet wood and creek water fills the shelter area.
