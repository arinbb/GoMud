roomid: 1200
zone: A Confederacy of Dunces
title: Outside D.H. Holmes
description: >-
  You stand beneath the ornate clock of <ansi fg="itemname">D.H. Holmes</ansi>
  department store on Canal Street, the grandest boulevard in New Orleans. The
  year is somewhere in the early 1960s. The air is thick enough to chew, heavy
  with humidity and the smell of <ansi fg="itemname">Lucky Dogs</ansi> and
  chicory coffee. A large man in a <ansi fg="itemname">green hunting cap</ansi>
  with earflaps stands nearby, consulting a Big Chief tablet and radiating
  contempt for the modern world. Shoe-shine boys work the sidewalk. Streetcars
  rattle past on iron rails. The department store windows display fashions that
  were current at least two decades ago and are now displayed with a confidence
  that borders on defiance. To the <ansi fg="exit">east</ansi>, Canal Street
  continues toward the French Quarter. To the <ansi fg="exit">south</ansi>,
  a residential street leads to the neighborhoods of Uptown.
