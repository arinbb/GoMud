roomid: 1555
zone: Jurassic Park
title: The T. Rex Paddock
description: >-
  The tour track ends at the <ansi fg="red">T. Rex paddock</ansi>. Rain falls
  in a steady curtain, drumming on the metal roof of the viewing station and
  turning the unpaved paddock into a dark expanse of mud and shadows. A lone <ansi fg="itemname">goat post</ansi> stands in the center of the paddock, the
  tethered goat conspicuously absent — the chain hangs loose, gnawed through.
  The electric fence stretches away in both directions, its <ansi fg="red">voltage
  indicators</ansi> dark. Not amber. Dark. The fence is not on. Somewhere in
  the paddock — in the dark, in the rain, in the impossible black between the
  trees — something is there. You know this the way you know things before you
  know them: the <ansi fg="red">cup of water</ansi> on the dashboard of the
  Explorer is vibrating. Concentric rings. One per second. Getting stronger.
  The <ansi fg="exit">east</ansi> path leads to the wrecked Explorer. A
  crumbling fence to the <ansi fg="exit">north</ansi> opens onto the Gallimimus
  flats. The <ansi fg="secret-exit">climb</ansi> leads south to the electric
  fence section.
mapsymbol: T
