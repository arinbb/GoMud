idlemessages:
- The projector lens catches the light and throws a tiny rainbow across the ceiling.
- A film canister rattles faintly on the shelf, as if something inside is stirring.
- The velvet curtains sway slightly, though there's no breeze in the room.
- For a moment, you think you see movement on the blank screen -- a shadow, a flicker.
- The smell of buttered popcorn drifts in from nowhere, then fades.
