roomid: 2353
zone: Best in Show
title: Best in Show Winners Circle
description: >-
  The <ansi fg="yellow">Winners Circle</ansi> is a small elevated platform at
  the north end of the main ring, set apart by <ansi fg="itemname">gold rope</ansi>
  on brass standards. The carpet here is the same hunter green as the ring, but this
  section has never been walked on by anything that did not win. A single
  <ansi fg="itemname">spotlight</ansi> illuminates the platform. The
  <ansi fg="itemname">trophy table</ansi> holds the Best in Show cup -- silver,
  heavy, engraved with winners going back to 1903 -- and the blue-and-gold
  <ansi fg="itemname">ribbon</ansi>. The official <ansi fg="itemname">photographer</ansi>
  is positioned to one side, camera ready. The bleachers are visible, the audience
  expectant. Whatever happens in this circle has happened one hundred and twenty years
  in a row, and it will happen again tonight. The <ansi fg="exit">show ring</ansi>
  is south via the circle exit.
mapsymbol: C
maplegend: Winners Circle
biome: city
