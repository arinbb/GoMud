description: >-
  A small matchbook from the Bada Bing strip club in Lodi, New Jersey. The
  cover is red with a simple design: a silhouette of a woman and the words
  "BADA BING" in white. Below that, in small print, a phone number that
  has probably been disconnected. The matchbook still has eleven matches.
  It smells faintly of cigarette smoke and that particular chemical sweetness
  that lives in clubs with no windows. When you hold it you think of red light
  and bass and conversations that happen at plastic tables under the cover of
  loud music. You think of all the things that get decided in rooms like that.
  Then you think about something else.
