roomid: 2060
zone: The Andy Griffith Show
title: Andys Front Porch
description: >-
  Two <ansi fg="itemname">rocking chairs</ansi> sit side by side on a wide wooden porch
  that faces the quiet street. The boards are worn smooth by years of evenings.
  A <ansi fg="itemname">guitar</ansi> leans against the wall beside the door, and a <ansi fg="10">honeysuckle vine</ansi> climbs the porch rail, filling the warm air with
  sweetness. The sky above Mayberry is the color of <ansi fg="yellow">peach preserves</ansi>
  at this hour, fading slowly toward purple at the edges. <ansi fg="10">Fireflies</ansi>
  are beginning to blink in the yard. This is the emotional center of everything.
  Whatever trouble exists in Mayberry, it gets worked out here, in these chairs,
  in the long unhurried conversations of a summer evening. To the <ansi fg="exit">east</ansi>
  is the living room. To the <ansi fg="exit">south</ansi> the porch steps lead down
  to the street.
mapsymbol: P
maplegend: Andys Front Porch
biome: house
exits:
  east:
    roomid: 2061
