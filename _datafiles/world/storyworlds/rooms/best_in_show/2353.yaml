nouns:
  rope: >-
    The gold rope on brass standards is purely ceremonial. It says: this place is
    different. This place is set apart. Nothing that crosses this rope tonight will
    be the same afterward. The rope is thin enough that any dog could step over it.
    The idea is that no dog should have to.
  spotlight: >-
    The spotlight comes from a single source above. When you stand in it, the rest
    of the room recedes. You understand, under this light, what it feels like to be
    the only thing that matters for a moment. Even if that moment belongs to a dog.
    Especially if that moment belongs to a dog.
  trophy: >-
    The Best in Show cup. Silver, genuine, engraved. The names go back to 1903 --
    names of dogs in the formal naming convention that says: this animal was
    officially excellent. The most recent name at the bottom is last year's winner.
    Below it, space for tonight's.
  ribbon: >-
    The blue-and-gold Best in Show ribbon is larger than it needs to be. This is
    entirely correct. This is the largest possible dog show ribbon because this is
    the largest possible result of a dog show. Someone spent the night before this
    show dreaming about holding this. They were right to.
  photographer: >-
    The official photographer has a professional camera, two lenses, and the calm
    patience of someone who has taken this photograph before and knows exactly how
    to make a dog and its handler look their best in the ten seconds after a win
    when everything is true and nothing has been processed yet.
spawninfo:
idlemessages:
- The spotlight holds steady on the platform. Whatever it is waiting for, it will wait.
- A handler walks past the winners circle on their way to the ring, not looking at it, absolutely looking at it.
- The photographer checks his camera, changes a setting, checks it again.
- The trophy cup catches the light and throws a small white reflection onto the ceiling.
- The audience in the bleachers is very quiet now. Best in Show is close.
- Someone in the audience says something to their neighbor in a low voice. The word Weimaraner is audible.
- The gold rope gleams. The platform waits. The names on the trophy wait for one more name.
- The ring is empty now. The judging is almost done. Soon.
