idlemessages:
- A crow lands on a nearby headstone, looks around with its black intelligent eyes, and moves on.
- The sprinklers run briefly at the far end of the cemetery, a soft hiss, then shut off.
- Someone is visiting a grave two rows over. They brought no flowers. They just stand there.
- Wind moves through the cemetery in a long gentle wave. The flowers on a grave lean slightly.
- The cemetery is quiet in the way that has nothing to do with the absence of sound.
- Light comes across the grass at an angle that makes each blade cast a shadow. Everything here casts a shadow.
- A car pulls up at the cemetery entrance, parks, and the driver sits in it for a while before getting out.
- Ruth has left fresh flowers at Nathaniel Sr's grave. White lilies. He liked gardenias but lilies were what they had.