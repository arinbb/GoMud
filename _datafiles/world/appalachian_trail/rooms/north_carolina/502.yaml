roomid: 502
zone: North Carolina
title: Siler Bald Shelter
description: "Siler Bald Shelter sits at 4,600 feet in a clearing just below the grassy summit of Siler Bald. The shelter is relatively new by AT standards, rebuilt in 2004, with a solid roof and clean sleeping platform. A spring runs reliably nearby. The bald itself is a ten-minute walk above the shelter\x97a grassy summit with open views of the Nantahala range in every direction. Siler Bald was once maintained by grazing cattle and periodic burning. Without that maintenance, the forest is slowly reclaiming the open ground, young trees creeping upward from the margins. In another generation, the views may be gone. The trail register here tends toward the reflective\x97something about the proximity of the open bald and the wide sky encourages longer entries."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 31
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: west
nouns:
  shelter: "A well-built shelter from 2004, replacing an older structure that had deteriorated. The wood is still relatively light, the roof tight, the platform solid. It feels newer and cleaner than most AT shelters."
  platform: "The sleeping platform is in good condition, the boards still relatively smooth and free of the deep wear that marks older shelters. Room for about twelve."
  register: "The register here tends toward longer entries. The proximity of the open bald and the big sky seems to inspire reflection. Several entries run to full pages."
  spring: "A spring runs about 100 yards downhill from the shelter, piped into a small collection pool. The water is reliable year-round and cold enough to make your teeth ache."
  bald: "Siler Bald rises just above the shelter, its grassy summit open to the sky. The views are panoramic\x97the Nantahala ridgelines rolling away in every direction, blue-green and endless. Young trees are encroaching from the edges, slowly reclaiming the open ground. TODO_RESEARCH: History of Siler Bald management, who the Siler family was, cattle grazing history."
  privy: "The privy is set back in the tree line, well-maintained."
  bearbox: "A standard metal bear box at the clearing edge."
idlemessages:
- Wind sweeps across the bald above the shelter, rustling the grass in long waves.
- The open sky above Siler Bald is enormous after days in the forest canopy.
- A meadowlark sings from the grassy summit, its song carrying down to the shelter.
- Young trees creep onto the margins of the bald, slowly reclaiming the open ground.
- The Nantahala ridgelines are visible through the trees above, rolling away to the horizon.
- A gentle breeze carries the smell of warm grass and wildflowers down from the bald.
