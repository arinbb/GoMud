roomid: 2306
zone: The Office
title: The Conference Room
description: >-
  The long table. The whiteboard. The projector that takes ten minutes to warm up.
  The chairs that are not quite comfortable enough to sit in for more than forty
  minutes, which is, some say, intentional. The <ansi fg="itemname">whiteboard</ansi>
  at the front of the room is dense with agendas, half-erased diagrams, and a
  drawing of a face that has been there since 2008 and survived every meeting since.
  A <ansi fg="itemname">motivational poster</ansi> on the wall shows a mountain and
  the word 'TEAMWORK' and has been providing this information since before anyone
  currently employed at Dunder Mifflin started working there. The projector screen
  is half-lowered. The chairs are arranged around the long table with the resigned
  order of furniture that knows what is coming. Every meeting that has ever gone
  wrong in this company has gone wrong in this room. Many of them have gone wrong
  in interesting ways. The <ansi fg="exit">bullpen</ansi> is to the south. The
  <ansi fg="exit">accounting corner</ansi> is up.
