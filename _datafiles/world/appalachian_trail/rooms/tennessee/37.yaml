nouns:
  erwin: "Erwin is a small railroad town in the Nolichucky River gorge. The Norfolk Southern line still runs through, shaking the buildings when the trains pass. The town has embraced its role as a trail town\x97hostels, shuttles, and cheap eats cater to thru-hikers. But there is a weight to the place that the friendliness cannot quite dispel."
  elephant: "TODO_RESEARCH: In September 1916, Sparks World Famous Shows came to Erwin. Mary, a five-ton Asian elephant, killed a handler\x97accounts vary on the circumstances. The next day, she was hanged from a railroad derrick car in the Clinchfield Railroad yard before a crowd of over 2,500 people. The first chain broke. They tried again. The town has wrestled with this legacy ever since."
  nolichucky: "The Nolichucky River cuts a deep gorge through the mountains here, its waters popular with kayakers and rafters. The trail crosses on a road bridge at the edge of town. The river is brown and fast after rain, green and gentle in dry weather."
  nonahala: "The Cherokee name for what the settlers called No Business Knob. Nonahala\x97a place where people were not meant to go. Whether this was a warning about the terrain, the spirits, or simply the remoteness, the name endures."
  blazes: "White blazes follow the road through the edge of Erwin before turning back into the woods and beginning the long climb into the Unaka Mountains."
idlemessages:
- A Norfolk Southern freight train rumbles through the gorge, its horn echoing off the mountain walls.
- The Nolichucky River churns through the gorge below, brown with mountain runoff.
- Dense spruce forest crowds the trail, the branches interlocking overhead into a dark tunnel.
- The wind picks up along the exposed ridge, carrying the sharp scent of balsam fir.
- A hiker sits on a rock, studying a map and shaking their head at the elevation profile ahead.
- Somewhere in the spruce thicket, a red squirrel chatters an angry warning at your passage.
