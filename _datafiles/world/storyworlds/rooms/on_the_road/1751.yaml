nouns:
  tequila: >-
    Cheap tequila in a shot glass, fifteen cents American, served without
    fanfare in a bar with no name, by a bartender with a face like a
    geography lesson. It tastes of agave and heat and the particular
    quality of the south, which is slower and older and less interested
    in where you are going than in whether you have arrived.
  girls: >-
    The women in the doorways of the border town are people Sal sees
    briefly and Kerouac writes about in ways that are of their time
    and place, and they are women first, and the time was not always
    kind to women, and the book is not always kind about them, and this
    is one of the places where the novel's beauty and its blindness live
    together, which they often do in American literature and in American life.
  sky: >-
    The Mexican sky is the same sky as the American sky but it feels
    different. Lower, possibly. More present. The blue of it in midday
    is a blue that has authority. The stars at night are closer. The
    temperature drops thirty degrees after dark and the coldness is
    startling and welcome and brief.
  fever: >-
    This is what happens after the road — after the speed and the music
    and the joy, the body presents its bill. Sal gets sick here, a genuine
    fever, and lies in a room while Dean disappears into the town and
    comes back changed. Something ends here. Not the friendship. But
    something adjacent to it, something that was mistaken for the friendship
    and was actually just the motion.
