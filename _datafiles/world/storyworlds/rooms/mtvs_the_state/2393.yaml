zone: MTVs The State
title: The Street
description: >-
  A New York City <ansi fg="itemname">sidewalk</ansi> outside the MTV studio,
  circa 1994. The <ansi fg="itemname">building</ansi> behind you has the MTV logo
  on its facade, larger than makes sense. The <ansi fg="itemname">street</ansi>
  itself is fully New York: yellow cabs, a hot dog cart, a man walking fast with
  a purpose you cannot identify. A <ansi fg="itemname">newsstand</ansi> on the
  corner sells papers that have this year's headlines on them. The city moves at
  its own speed around you — indifferent, magnificent, specific. This is 1994.
  This is New York. The show is being made upstairs and the city has no idea and
  does not need to. The city is its own show. <ansi fg="exit">Up</ansi> leads back
  to the MTV Studio.
mapsymbol: K
maplegend: The Street
biome: city
exits:
  up:
