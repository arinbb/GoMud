description: >-
  A single guitar pick, tortoiseshell celluloid, worn smooth on one side from
  ten thousand downstrokes. It is the color of honey and autumn and California
  light. When you hold it between your thumb and finger, it fits perfectly — the
  way a pick does when it has been shaped by years of playing the same open
  chords. D, G, A. The vocabulary of everything Neil Young needed to say. A
  souvenir from the world of Harvest.
