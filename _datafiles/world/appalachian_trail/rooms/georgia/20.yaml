roomid: 20
zone: Georgia
title: Tray Mountain Area
description: "The trail climbs through some of the highest terrain in Georgia, gaining and losing elevation across a series of steep, rocky ridges. Tray Mountain looms ahead at 4,430 feet\x97one of the tallest peaks on the Georgia AT. The forest here is dense spruce and hardwood, remote and wild, with little sign of civilization in any direction. Rocky footing and steep grades characterize every climb. On clear days, the summit opens to sweeping panoramic views of the Blue Ridge stretching into North Carolina. The air is thinner here, noticeably cooler, carrying the sharp bite of high-altitude wind."
biome: mountains
