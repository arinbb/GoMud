roomid: 5
zone: Georgia
title: Gooch Gap / Woody Gap
description: "The trail rolls through a series of mountain gaps, the terrain rising and falling in an exhausting rhythm. At Gooch Gap, a gravel forest road crosses the trail\x97a reminder that civilization is never far in these southern mountains. Further north, at mile 20.5, Woody Gap marks the first paved road crossing on the Appalachian Trail. A small parking lot sits here, and the sound of cars on GA-60 is jarring after days in the woods. Some hikers get picked up here, their thru-hike already over. The trail threads between the two gaps through second-growth hardwoods and mountain laurel."
biome: forest
mapsymbol: G
maplegend: Gooch/Woody Gap
