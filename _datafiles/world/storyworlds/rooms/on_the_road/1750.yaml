roomid: 1750
zone: On the Road
title: The Road South (Toward Mexico)
description: >-
  South of San Francisco, the highway runs through California farm country
  and then through the dry hills and then into the open desert heading for
  the <ansi fg="itemname">border</ansi>. The air gets hotter. The landscape
  gets stranger. The <ansi fg="itemname">road</ansi> goes past olive groves
  and oil derricks and the occasional roadside shrine with plastic flowers
  fading in the sun. Dean is driving and he has discovered speed again —
  he lost it for a while in San Francisco, weighed down by the complications
  of his women and his debts, but now he has it back and the car is going
  south at that speed that is slightly faster than prudent and slightly
  slower than fatal. Through the open window, the air smells of sage and
  hot asphalt and something else, something that might be Mexico coming up
  ahead, the country below the country, the world Dean and Sal have never
  been to yet. To the <ansi fg="exit">north</ansi> is San Francisco. To
  the <ansi fg="exit">south</ansi> is the border.
mapsymbol: R
maplegend: Road to Mexico
