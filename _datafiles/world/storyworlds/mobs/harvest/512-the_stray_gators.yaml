  - emote runs through the changes of a song, slow and exploratory, not quite playing it yet.
character:
  name: the Stray Gators
  description: >-
    The backing band -- Ben Keith on pedal steel, Tim Drummond on bass, Kenny
    Buttrey on drums. They are the musicians who recorded Harvest in Nashville
    and at the ranch. Ben Keith is the one you notice, the pedal steel player
    whose bends and sustains define the album sound. He plays the instrument
    the way weather moves -- inevitable, warm, with a specific kind of
    tenderness that only the pedal steel can carry.
  raceid: 1
  level: 8
