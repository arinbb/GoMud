description: >-
  A lightweight AR visor with a green tint. When activated, it identifies
  and annotates native plant species — trees, wildflowers, ferns, mosses,
  and fungi are labeled with common and Latin names, bloom seasons, and
  ecological roles. Invasive species are flagged in red. Toggle with
  'use visor' or 'visor plants'.
