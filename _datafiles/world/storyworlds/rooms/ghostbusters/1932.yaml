exits:
  street:
    roomid: 1921
    mapdirection: north
    exitmessage: You slip out of City Hall and back onto the street.
nouns:
  mayor: >-
    The mayor is a practical man in an impossible situation. He has three people
    claiming the city is about to be destroyed by an ancient god, one EPA official
    claiming those three people are the problem, and a report on his desk from the
    Commissioner that says the PKE readings across all five boroughs have exceeded
    any previously recorded level by three orders of magnitude. He will make a
    decision in approximately ninety seconds. It will be the right one.
  peck: >-
    Walter Peck is from the EPA's Violation Division and he shut off the containment
    unit because he believed it was an environmental hazard, and he was technically
    correct about the hazard part and catastrophically wrong about the solution part.
    He is currently arguing that the Ghostbusters should be arrested. He will continue
    arguing this position until very large things start happening outside the window.
  window: >-
    Through the window behind the mayor's desk, City Hall Park is visible. People
    are walking dogs, eating lunch, living their lives. Above the park, the sky is
    the wrong color. In the distance, a building is glowing orange at its peak.
    None of the dog walkers have noticed yet. This is not unusual. New Yorkers
    have perfected the art of contextual obliviousness.
  ghostbusters: >-
    The three Ghostbusters standing by the mayor's desk look exactly as tired as
    men who have captured and contained hundreds of supernatural entities in six
    months should look. Their jumpsuits show burn marks, slime stains, and the
    particular texture of gear that has been through too much. Egon holds a PKE
    meter. It is screaming. Peter Venkman is the one doing the talking. This is
    how it always goes.
idlemessages:
- Peck says something about unlicensed nuclear accelerators. Venkman says something about saving the city. Neither of them is entirely wrong.
- The PKE meter in Egon's hand lets out a chirp. He glances at it. His expression does not change but his grip on the device tightens.
- The mayor steeples his fingers, looks from the Ghostbusters to Peck and back, and says nothing. The silence is doing the work.
- Through the window, the sky over the East River looks like a bruise.
- Someone on the mayor's staff enters, whispers something, and leaves quickly. The mayor's expression shifts incrementally toward urgency.
- Ray Stantz is sketching a diagram of the building at 55 Central Park West on a legal pad, trying to illustrate Shandor's design to a room full of people who do not want to understand it.
