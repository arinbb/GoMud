nouns:
  noc: "The Nantahala Outdoor Center is a sprawling complex on the riverbank\x97outfitter store, restaurant, bunkhouse, laundry, showers. It has been a paddler and hiker hub since 1972. Thru-hikers stagger in from the steep descent, eat enormous meals, and dread the climb out."
  river: "The Nantahala River flows through a gorge of dark rock and dense hemlock, its water a startling blue-green from the dam-controlled release upstream. The whitewater section runs Class II-III rapids, and rafts full of screaming tourists career past all day long."
  plaque: "A bronze plaque near the river marks the crossing point of the Trail of Tears. In the winter of 1838, over 10,000 Cherokee men, women, and children were forced through this gorge on the march to Indian Territory in Oklahoma. Thousands died on the journey. The plaque is small and easy to miss. TODO_RESEARCH: Specific Cherokee accounts of the Nantahala crossing, number of Cherokee who passed through this exact point, winter conditions during the march."
  gorge: "The Nantahala Gorge cuts deep into the mountains, its walls rising hundreds of feet on either side. The forest presses in from above\x97hemlock, rhododendron, and mountain laurel clinging to the steep slopes. The gorge is so deep and narrow that direct sunlight reaches the river only around noon, giving the gorge its Cherokee name."
  trail_of_tears: "In 1838, President Andrew Jackson's Indian Removal Act forced the Cherokee from their ancestral homeland. The Nantahala crossing was one of the most difficult passages on the route\x97steep, narrow, and bitterly cold in winter. The Trail of Tears and the Appalachian Trail cross at this exact point, two very different American journeys sharing the same ground. TODO_RESEARCH: The specific Cherokee detachments that crossed here, oral histories from descendants."
  rapids: "Whitewater rapids churn through the gorge, the river dropping over ledges and boulders. Rafts bounce through the standing waves, paddles flailing. The sound of the rapids is constant, a low roar beneath every other sound."
  blazes: "White blazes mark the steep descent into the gorge. The trail down from the ridgeline is notoriously rocky and knee-punishing."
idlemessages:
- A raft full of paddlers shoots through the rapids below, their whoops echoing off the gorge walls.
- The Nantahala River roars through its gorge, blue-green water churning over dark rocks.
- A thru-hiker limps into the NOC from the descent, poles clicking on the pavement, eyes glazed with that thousand-yard stare.
- The smell of grilled burgers drifts from the NOC restaurant, an almost cruel temptation.
- Sunlight reaches the gorge floor briefly, illuminating the river in a shaft of gold before the shadow returns.
- A kayaker rolls through a hydraulic in the rapids, emerging with a triumphant paddle raise.
- Somewhere upstream, a great blue heron stands motionless in the shallows, waiting.
