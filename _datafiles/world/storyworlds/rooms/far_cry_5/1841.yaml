roomid: 1841
zone: Far Cry 5
title: The County Road
description: >-
  The road runs through the heart of <ansi fg="10">Hope County, Montana</ansi>,
  and the county is brutally, heartbreakingly beautiful. <ansi fg="10">Mountains</ansi>
  rise in every direction, their slopes dark with pine forest, their peaks white
  against a sky so blue it looks painted. Wildflowers edge the road. A hawk
  circles somewhere overhead. And there, at the intersection ahead, a <ansi fg="red">
  cult roadblock</ansi> — orange barriers, a white pickup with an Eden's Gate
  seal on the door, a Peggie with a rifle watching the road. The beauty and the
  menace occupy exactly the same space, and neither acknowledges the other.
  Roads lead <ansi fg="exit">north</ansi> toward Falls End, <ansi fg="exit">east</ansi>
  into Holland Valley, <ansi fg="exit">south</ansi> toward the Henbane River,
  and <ansi fg="exit">west</ansi> into the Whitetail Mountains. The bunker
  hatch is <ansi fg="exit">down</ansi>.
