roomid: 1703
zone: Blonde on Blonde
title: Visions of Johanna
description: >-
  A <ansi fg="cyan">loft apartment</ansi> in the small hours. Louise sleeps on
  a mattress against one wall, or pretends to sleep, her breathing too careful,
  too measured. <ansi fg="itemname">Candles</ansi> melt on every ledge and
  sill, their wax pooling into shapes that almost mean something. Through the
  tall factory <ansi fg="itemname">windows</ansi>, the city does not sleep, but
  the city is not here -- it is only lights, stacked and layered into a <ansi fg="cyan">distance that might be infinity</ansi>. The heat pipes <ansi fg="itemname">cough</ansi> and clank. A <ansi fg="itemname">museum</ansi>
  exists in the corner of your vision, the one with the painting you cannot quite
  see, where the Countess who's never met a man that she didn't like is pinned
  to the wall. Johanna is not here. She is everywhere. She is the shape of the
  absence that everything else defines. When the candles gutter you feel her
  nearness. When they steady you feel only Louise pretending to sleep and the
  city doing nothing at all. A <ansi fg="exit">secret</ansi> passage leads to
  somewhere else entirely. The <ansi fg="exit">studio</ansi> is back to the west.
mapsymbol: J
maplegend: Visions of Johanna
