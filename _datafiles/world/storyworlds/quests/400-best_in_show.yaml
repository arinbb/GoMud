questid: 400
name: Best in Show
description: >-
  Check into the Taft Hotel, meet the competitors and their remarkable dogs, watch
  the grooming and the ring, and witness the culmination of a year of work -- the
  moment when Best in Show is decided, and seven dogs stand in a ring, and one of
  them is excellent.
reward:
  experience: 4500
  item_id: 320
  playermessage: >-
    You have seen it all -- the hotel lobby full of dogs, the grooming area, the
    show ring under its cathedral of lights, and the Winners Circle where everything
    is decided. As a souvenir, you receive a Busy Bee dog toy. It makes a sound
    between a honk and a wheeze when squeezed. Somewhere, a Weimaraner perks up.
steps:
- description: Check into the Taft Hotel and see who has arrived.
- description: Meet the dog show competitors in their rooms.
- description: Watch the grooming process -- the primping, the spraying, the focus.
- description: Enter the Mayflower Kennel Club main ring.
- description: Stand in the Winners Circle and see what the whole thing has been about.
