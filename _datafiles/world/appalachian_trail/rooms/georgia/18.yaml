roomid: 18
zone: Georgia
title: Deep Gap Shelter
description: "A three-sided wooden shelter sits at 3,550 feet in a deep gap between ridges. The name is literal\x97the terrain drops sharply on both sides, and the gap funnels wind and weather through the narrow passage. The shelter is standard AT construction, with a sleeping platform for a dozen and the usual accoutrements\x97privy, bear box, nearby creek. The hardwood forest here is thick and mature, with tall tulip poplars and oaks shading the clearing. The creek runs close enough to hear from the shelter. A trail register hangs from a nail on the post."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 21
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A standard three-sided lean-to in the deep gap. The walls are dark with age and damp. The gap channels moisture, and the shelter shows it\x97moss grows on the north-facing wall."
  platform: "The sleeping platform is slightly damp from the gap humidity. Room for twelve, though the moisture makes it less inviting than drier shelters."
  register: "The shelter register is damp around the edges despite the zip-lock bag. Humidity is a constant in this deep gap."
  water: "A creek runs nearby, close enough to hear from the shelter. It flows year-round, fed by the gap drainage."
  creek: "The creek tumbles through the gap over mossy rocks. The water is clear but needs filtering\x97upstream drainage is unknown."
  privy: "The privy is off to the left, its wood darkened by the persistent moisture of the gap."
  bearbox: "A bear box at the clearing edge. The metal has a faint patina of rust from the humidity."
idlemessages:
- The creek in the gap murmurs constantly, a liquid backdrop to every other sound.
- Moisture beads on every surface\x97the shelter walls, the bear box, the leaves overhead.
- A wood thrush sings from the thick forest, its song spiraling through the gap.
- The gap funnels a cool breeze that carries the smell of wet earth and creek water.
- A crawdad clicks its claws in the shallows of the creek nearby.
- Tulip poplar leaves drift down from the canopy, spinning like green helicopters.
