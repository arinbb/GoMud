  message: The tenor man steps to the microphone, raises the saxophone, and begins.
  container: ''
idlemessages:
- The saxophone climbs a run of notes that has no ceiling, going up and up past where notes are supposed to go.
- Dean shouts "Yes! Go! That is IT!" from the back of the room and nobody minds.
- The drummer brushes the snare and the room inhales.
- A woman in a red dress closes her eyes and sways with her hands loose at her sides.
- The tenor man steps back from the microphone, wipes his face with his sleeve, steps forward again, goes.
- 'Something is happening in this room. Not music exactly. Something that uses music the way fire uses wood.'
- The piano fills the silence between phrases like water filling a shape it was made for.
