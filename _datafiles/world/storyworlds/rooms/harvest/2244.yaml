roomid: 2244
zone: Harvest
title: Heart of Gold
description: >-
  A bare <ansi fg="itemname">stage</ansi>, wooden boards, a single <ansi fg="yellow">spotlight</ansi> cutting down from above. In the circle
  of light: a wooden <ansi fg="itemname">stool</ansi>, an acoustic guitar
  leaning against it, and a <ansi fg="itemname">harmonica</ansi> in a neck
  rack, ready to play. The rest of the stage is dark. The audience is dark.
  Everything beyond the edge of the light does not exist. This is the essential
  room -- the one track on the album that the whole world heard, the single
  perfect thing that arrived out of nowhere and stayed. The harmonica is in the
  key of something that sounds like searching. The guitar is in the key of
  something that sounds like almost having found it. The spotlight is warm on
  your face. You have been looking for this your whole life. You are still
  looking.
mapsymbol: '4'
maplegend: Heart of Gold
biome: house
exits:
  ranch:
    roomid: 2240
    mapdirection: northwest
    exitmessage: You step back off the stage, out of the spotlight, back toward the ranch.
nouns:
  stage: >-
    Plain wooden boards, worn smooth, the kind of stage where the floor itself
    has soaked up sound. You can feel it through the soles of your feet -- every
    performance that has happened here, vibrating at a frequency just below
    hearing. This is the stage where the most famous harmonica in rock was
    played, the one that became the sound of something everyone already knew
    they wanted before they knew they wanted it.
  spotlight: >-
    The spotlight is a cone of warm yellow-white, sharp-edged against the dark.
    Step into it and the world narrows to just this -- just you, just the
    guitar, just the harmonica in your neck rack, just the note you are about
    to play. Everything else falls away. This is the condition of the song:
    singular, searching, alone in the best possible way.
  stool: >-
    A plain wooden stool, the kind every folk singer has sat on since folk
    singers existed. Its height is exactly right for a man with a guitar across
    his knee and a harmonica at his lips. Sitting on it, you understand something
    about how the song was made -- not in a studio with orchestras, but here,
    alone, a man and the instruments and the question he has been asking for years.
  harmonica: >-
    The harmonica in the neck rack. Key of C, same as always. You pick it up
    and it is warm from the spotlight. When you blow through it, the sound
    that comes out is the sound of looking for something you cannot name,
    which is the only honest answer to the question the song is asking.
  guitar: >-
    A Martin acoustic, the finish worn through at the soundhole from years of
    strumming. The strings are light. The action is low. When you strum a G
    chord the whole stage vibrates slightly, the wood and the boards and the
    air all agreeing that this is the right note in the right room at the
    right time.
idlemessages:
- The spotlight holds, warm and steady, waiting for whoever steps into it next.
- The harmonica in the neck rack catches the light, the metal warm with it.
- The acoustic guitar leans against the stool, perfectly positioned, perfectly patient.
- Somewhere in the dark beyond the stage, someone is listening. You can feel it.
- The light is the color of the word gold. Not the metal -- the idea.
- The boards creak once under no weight, the wood settling, remembering.
- The note the harmonica is holding is not played but it is there, just under the air.
