  respawnrate: 10 real minutes
idlemessages:
- Claire photographs something out the window with the economy of someone who has learned to move before the moment leaves.
- The lava lamp cycles through its shapes, amber light rising and falling. The room is quiet except for this.
- A sketchbook lies open on the desk, a drawing in progress -- charcoal lines that are almost something.
- Claire pins a new photograph to the wall, stepping back to look at where it fits in the constellation.
- Someone plays music in the room. It is something Claires age and slightly defiant.
- The window is open. Street noise comes in -- a car, a bird, someone talking on their phone.
- She is reading something, one knee up, the book at an angle. She does not look up.
- A drawing gets crumpled, thrown, smoothed out and reconsidered. She picks up the charcoal again.