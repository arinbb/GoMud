nouns:
  shelter: "A standard AT shelter, three-sided and open to the south. The walls are darkened with weather and age. Mouse droppings on the platform suggest hanging your food bag is advisable."
  platform: "The sleeping platform shows its years\x97worn smooth in the center where hundreds of sleeping bags have lain. Room for about ten."
  register: "The shelter register is well-used, its pages buckled from humidity. The entries range from brief mileage notes to longer reflections."
  spring: "The spring is about 80 yards downhill, flowing from a seep in the hillside. It collects in a small natural pool before continuing downslope. Reliable but slow in dry weather."
  wolves: "Red wolves once roamed these ridges. Smaller and more elusive than gray wolves, they were native to the southeastern mountains. The Cherokee word Wayah means wolf. The wolves were trapped, poisoned, and shot until none remained in the wild. A captive breeding program preserves the species, but the wolves are gone from these mountains. TODO_RESEARCH: Cherokee wolf ceremonies and beliefs, details of the Smoky Mountains red wolf reintroduction attempt."
  privy: "The privy is uphill from the shelter, partially screened by rhododendron."
  bearbox: "A dented bear box sits at the clearing edge. Bears are common in this section."
idlemessages:
- A coyote howls from the ridgeline at dusk, a pale echo of the wolves that once owned this mountain.
- Ferns carpet the forest floor in every direction, their fronds unfurling in the damp air.
- The spring gurgles downhill, a thin thread of sound in the quiet forest.
- A barred owl calls from the canopy, its voice carrying through the twilight.
- The shelter clearing is still and cool, the forest pressing in from every side.
- Wood sorrel flowers nod in a slight breeze, their white petals bright against the dark earth.
