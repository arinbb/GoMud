character:
  name: Billy Madison
  description: >-
    A man in his late twenties with the energy of someone who has no idea he should
    be embarrassed about anything. His hair is slightly chaotic. He is holding a
    juice box. He looks like someone who got everything wrong for a long time and
    recently started getting things right and cannot quite believe it. His eyes are
    warm and slightly unfocused, as if he is always in the middle of a thought that
    was better before he said it out loud. He means well, constantly and completely.
    He is wearing a Hawaiian shirt in a way that suggests he has never considered
    not wearing a Hawaiian shirt.
