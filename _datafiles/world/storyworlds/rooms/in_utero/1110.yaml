roomid: 1110
zone: In Utero
title: Radio Friendly Unit Shifter
description: >-
  A record label corner office, or what is left of one. The destruction is
  thorough and recent. Smashed gold <ansi fg="itemname">records</ansi> hang
  crooked on the walls, their frames splintered, the vinyl cracked. Overturned
  desks spill <ansi fg="itemname">contracts</ansi> across the carpet -- licensing
  agreements, publishing deals, royalty statements, all torn. A <ansi fg="itemname">radio</ansi>
  on a filing cabinet plays nothing but static, its tuning dial spinning on its
  own, searching for a frequency that does not exist. In the corner, a
  <ansi fg="itemname">mannequin</ansi> in a business suit holds out a pen and a
  contract, frozen in the eternal gesture of the deal. The fluorescent lights
  above flicker in time with feedback that bleeds through the walls. The carpet
  is expensive. The destruction is cathartic. The title of this room is the most
  contemptuous thing anyone has ever said about the music industry, and the
  industry never noticed.
mapsymbol: A
maplegend: Radio Friendly Unit Shifter
biome: city
exits:
  west:
    roomid: 1109
  east:
    roomid: 1111
nouns:
  records: >-
    Gold and platinum records, every one of them smashed. Some have been punched
    through the center. Some have been snapped in half. Some have been thrown at
    the wall and left where they stuck. The plaques beneath them read
    CONGRATULATIONS and CERTIFIED and UNITS SHIPPED. The vinyl itself is worthless
    now. It was always worthless. The music was never in the vinyl.
  contracts: >-
    Scattered across every surface -- record deals, licensing agreements, publishing
    contracts, merchandising rights, touring obligations. Dense with legal language,
    percentages, escalation clauses. Someone has gone through with a red pen and
    written the same word on every page, on every line, in every margin. The word
    is NO.
  radio: >-
    An old transistor radio on a dented filing cabinet, its speaker crackling with
    pure static. The tuning dial spins slowly on its own, scanning frequencies,
    finding nothing but white noise. Occasionally the static thins and you almost
    hear a melody -- familiar, half-remembered -- before the static surges back
    and drowns it.
  mannequin: >-
    A department store mannequin in a tailored business suit, its plastic hand
    extended, holding a Mont Blanc pen and a fifty-page contract. The face is
    featureless and smiling. The posture says trust me. The contract says sign
    here, and here, and here, and here. The pen is out of ink. It was always out
    of ink.
idlemessages:
- The radio dial spins faster, static rising in pitch, searching frantically for a signal that will not come.
- A gold record slides down the wall an inch, its broken frame catching on the nail, hanging by a thread.
- 'The fluorescent lights flicker in a rhythm that sounds like a cash register -- ka-ching, ka-ching, ka-ching.'
- A contract page lifts off the floor in a draft from nowhere, turns once in the air, and settles face-down.
- The mannequin in the suit seems slightly closer than it was a moment ago. The pen is still extended. The smile is still frozen.
- 'Feedback bleeds through the office walls -- a sustained howl that sounds like a guitar being tortured for information it does not have.'
