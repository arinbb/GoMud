character:
  name: Jimmy Brown
  description: >-
    A thin, distant man in his sixties, sunk into a recliner that has
    taken on his shape. He wears a cardigan over an undershirt. His eyes
    are unfocused, aimed at a middle distance that might be the wall or
    might be 1968. He hums old songs to himself — fragments, never
    complete melodies. He is present in the room the way furniture is
    present. He occupies space. He does not engage. He retreated from
    this family years ago and has been humming ever since.
