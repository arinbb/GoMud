character:
  name: Mary May Fairgrave
  description: >-
    A woman in her thirties who looks like she was born behind a bar and
    has been running toward a fight since she could walk. Her father built
    the Spread Eagle. Eden's Gate took it. She took it back with the help
    of people she organized from nothing, and she has been maintaining
    both the bar and the resistance with the same focused competence ever
    since. She is not large. She is not armed visibly. She has a shotgun
    under the bar and she could reach it before you finished a sentence.
    She pours good drinks. She listens while you talk. She has no patience
    for anything she considers self-indulgent, which includes despair.
