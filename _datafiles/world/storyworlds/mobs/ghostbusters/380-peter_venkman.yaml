character:
  name: Peter Venkman
  description: >-
    A man with the face of someone who has calculated exactly how much he can get
    away with and has been getting away with it for years. He wears a Ghostbusters
    jumpsuit with the ease of a man who was born in a jumpsuit. His expression
    cycles between sardonic and charming with the unconscious rhythm of breathing.
    He is carrying a proton pack that he holds with the specific nonchalance of
    someone who would never admit they find it genuinely exciting. He is simultaneously
    the least qualified and most effective person in any room he occupies.
  raceid: 1
  level: 15
