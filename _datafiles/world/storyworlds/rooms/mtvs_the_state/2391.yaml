nouns:
  dorm: >-
    The dorm room of someone who is becoming who they are going to be. The evidence
    is in every corner: the books they are reading, the movies they are collecting,
    the jokes they are writing on the whiteboard at 2am. This is the incubator.
  beds: >-
    Two twin XL beds with mismatched sheets. One has a pillow that has been on the
    floor and replaced approximately a thousand times. The other is more made.
    People are different, even about beds.
  desk: >-
    A desk covered in the paper evidence of thinking. Notes, drafts, crossed-out
    lines, arrows connecting ideas to other ideas. The chaos is organized to the
    person whose chaos it is.
  typewriter: >-
    A portable typewriter that sticks on the letter E. Scripts typed on this typewriter
    have an unusual number of e-less substitutions. You can see the workarounds in
    old drafts. "And I'm outa here!" instead of "And I'm outtee here!"
  camcorder: >-
    A VHS camcorder on a cheap plastic tripod, aimed at the cleared floor space that
    serves as the staging area. This is how you make a television show in 1991 before
    you have a television show. You point the camera at the thing and you do the thing.
  posters: >-
    The wall is archaeological — layers of posters going back years. Monty Python.
    SCTV cast. National Lampoon. Some band. A movie poster for something that made
    someone laugh enough to put it here. They are all here together, the comedic
    influences of eleven people, overlapping.
  whiteboard: >-
    The whiteboard on the door reads THE STATE at the top in letters that have been
    written and erased and rewritten until they are permanent shadows in the board.
    Below that: sketch ideas. "Louie and the pudding." "Two guys. A barrel. It's fine."
    "The porcupines." "What if the awards show but also the awards are wrong." All of
    it is here, at the beginning, in dry-erase marker on a dorm room door.
idlemessages:
- Someone laughs in the hallway, the kind of laugh of a person who has just thought of something.
- The camcorder records. There is no tape in it. It records anyway.
- A draft blows through the cracked window and lifts the edge of a script on the desk.
- The whiteboard has been added to. A new idea appears in different handwriting.
- The posters watch with the approval of precedents that know they are being honored.
- The typewriter keys are cold. It is late. Someone will be back tomorrow to use it.
- This is NYU. This is 1991. This is before. Everything after began here.
