roomid: 1706
zone: Blonde on Blonde
title: Stuck Inside of Mobile
description: >-
  A <ansi fg="cyan">surreal collage</ansi> of places that do not belong together,
  all of them somehow here. An <ansi fg="itemname">alley</ansi> where Shakespeare
  leans against the bricks in his Elizabethan collar, looking bored, muttering
  something about Alabama. A <ansi fg="itemname">compass</ansi> on the ground
  spins without settling, pointing at everything and nothing, stuck. The <ansi fg="itemname">ragman</ansi> moves through the space arranging and
  rearranging debris -- hubcaps, playing cards, a railroad spike, a postcard
  from Memphis with no return address. Highway 61 passes through here, theoretically,
  but the highway has been looped back on itself until it only leads to more
  of this. The Memphis blues are everywhere, nowhere, the feeling of being
  somewhere wrong while the right place keeps naming itself from a distance.
  The neon sign overhead says <ansi fg="itemname">MOBILE</ansi> and flickers
  and says nothing useful. The <ansi fg="exit">studio</ansi> is back to the
  northeast.
