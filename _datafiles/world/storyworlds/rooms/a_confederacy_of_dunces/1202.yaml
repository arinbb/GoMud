nouns:
  balconies: >-
    Wrought-iron balconies draped with ferns and flower boxes, laundry hanging
    between them on lines strung from railing to railing. The ironwork is
    intricate and old, each balcony a slightly different pattern of curves and
    flourishes. Some of the ferns are so large they seem to be attempting an
    escape.
  cart: >-
    A Paradise Vendors hot dog cart shaped like a giant wiener on wheels. The
    umbrella reads PARADISE HOT DOGS in faded lettering. This is a thinly
    disguised version of the real Lucky Dogs brand, whose carts have been a
    French Quarter institution since 1948. Ignatius J. Reilly was condemned to
    work one of these. He ate more inventory than he sold.
  musicians: >-
    A trio of jazz musicians on the corner. Trumpet, clarinet, upright bass.
    They are playing something slow and blue, the notes hanging in the humid
    air like smoke. The trumpet player has his eyes closed. The bass player
    taps his foot. The clarinetist watches the crowd with the calm appraisal
    of a man who has seen everything and found most of it amusing.
