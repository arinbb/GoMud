questid: 370
name: Harvest
description: >-
  Walk the grounds of Broken Arrow Ranch in 1972. Listen to the Stray Gators
  in the barn studio, sit with Danny Whitten in the corner, and spend time
  with the Old Man on his cottage porch. To understand Harvest, you need both
  the warmth and the sadness.
reward:
  experience: 4000
  item_id: 305
  playermessage: >-
    You have walked the whole ranch, heard every song, and come out the other
    side changed in ways you cannot yet name. As a memento, you receive a
    guitar pick -- worn smooth on one side, the kind that has played ten
    thousand songs and will play ten thousand more.
steps:
- description: Arrive at Broken Arrow Ranch.
- description: Listen to the band in the Barn Studio.
- description: Sit with the Old Man.
