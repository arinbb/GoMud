nouns:
  lake: "Watauga Lake is a TVA reservoir, created in 1948 when the Watauga Dam flooded the valley. The water is deep blue and cold, ringed by forested mountains. The old town of Butler lies drowned beneath the surface\x97a community sacrificed for cheap electricity."
  gorge: "Laurel Fork Gorge is a wild slash through ancient rock, its creek tumbling over falls and cascades for miles. Rhododendron and hemlock crowd the banks. The trail follows the rim before descending to cross the creek on stepping stones."
  overmountain: "The Overmountain Shelter was a large red barn converted to a hiker shelter in 1983. It could sleep thirty in its open loft and was one of the most beloved shelters on the AT. The US Forest Service closed it due to structural deterioration. It sits on ground where the Overmountain Men marched in September 1780, a militia force that crossed these mountains to defeat the British at Kings Mountain\x97a turning point of the Revolutionary War in the South."
  iron: "Iron Mountain runs northeast for over forty miles, forming the Tennessee-Virginia border. The trail follows its spine through mixed hardwood forest, gaining and losing elevation in a steady rhythm. Damascus, Virginia, sits at the mountain's northern end."
  blazes: "White blazes mark the rocky trail along the Iron Mountain ridgeline, leading steadily north toward the Virginia border and Damascus."
  damascus: "Damascus, Virginia\x97Trail Town, USA\x97lies just ahead to the north. The town hosts Trail Days every May, the biggest hiker gathering on the AT. Nearly every business in town caters to hikers."
idlemessages:
- Watauga Lake gleams blue through gaps in the forest, its surface mirror-still in the morning calm.
- The trail follows the Iron Mountain ridgeline, the border between Tennessee and Virginia underfoot.
- A waterfall thunders in Laurel Fork Gorge somewhere below the trail, hidden by rhododendron.
- The forest transitions from spruce-fir back to hardwood as the trail loses elevation.
- A northbound hiker passes with a huge grin, saying Damascus is only two days out.
- Wind sighs through the oaks along Iron Mountain, carrying the faint smell of woodsmoke from a valley below.
