idlemessages:
- The river moves with a deep, muscular current, brown-green and cold, carrying silt from a thousand miles of canyon.
- Doc Sarvis stands in the stern of the raft, watching the water with a surgeon's careful attention to what should not be there.
- Bonnie reads her paperback with one hand, trails the other in the current, and does not look up.
- 'A great blue heron lifts from a gravel bar upstream and crosses the canyon on slow, deliberate wingbeats.'
- The canyon walls hold the late sun like a furnace, radiating warmth long after the sun itself has dropped below the rim.
- An empty beer can bobs against the raft, spinning slowly in the eddy.
- 'The river makes a sound here: not loud, but constant. It is the sound of something that has been doing this for a very long time.'
