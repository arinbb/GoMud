roomid: 1848
zone: Far Cry 5
title: Henbane River
description: >-
  The river country of the Henbane moves slow and foggy, the water dark and
  heavy with silt, the banks thick with willows and cottonwood and something
  else — something <ansi fg="purple">purple</ansi> and wrong that isn't quite
  any plant you know. <ansi fg="itemname">Bliss flowers</ansi> grow at the
  water's edge, their petals a deep violet-white, their pollen a fine mist
  that drifts off them in the still air. The smell is extraordinary: sweet
  and floral and chemical, like a perfume designed by someone who wanted
  to make you forget something. <ansi fg="itemname">Faith's people</ansi>
  wander the banks in a state that is not quite consciousness — robed,
  peaceful, their faces turned up toward nothing. In the fog, shapes
  move that might be <ansi fg="purple">her</ansi>. They might be anyone.
  The county road is <ansi fg="exit">north</ansi>. The Bliss fields are
  further <ansi fg="exit">east</ansi>.
mapsymbol: H
maplegend: Henbane River
biome: swamp
