roomid: 1883
zone: The Monkey Wrench Gang
title: The Desert Road
description: >-
  A <ansi fg="itemname">two-lane blacktop</ansi> cuts across the desert floor, straight
  as a surveyor's ambition, running between the red buttes of <ansi fg="red">Monument Valley</ansi> toward horizons that seem to recede as you approach them. The <ansi fg="yellow">sandflats</ansi>
  on either side are studded with sage and saltbush, the occasional juniper, everything
  low and spare and adapted to the absence of water. The sky overhead is a blue so pure
  and so absolute that it functions as a kind of argument. A battered <ansi fg="itemname">jeep</ansi>
  sits on the shoulder, engine ticking in the heat, its bed full of rope, tools, canned
  food, and beer. Hayduke's beer. The <ansi fg="itemname">Mittens</ansi> of Monument
  Valley rise in the distance, red and implausible, like God's fists left on the table
  after the argument ended. To the <ansi fg="exit">north</ansi>, the road runs to Lees
  Ferry. To the <ansi fg="exit">east</ansi>, a dirt track leads off toward a billboard
  on the mesa. To the <ansi fg="exit">south</ansi>, the road descends toward the strip mine.
