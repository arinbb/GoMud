roomid: 1100
zone: In Utero
title: Pachyderm Studios - Control Room
description: >-
  February 1993. Cannon Falls, Minnesota. You stand in the control room of
  Pachyderm Studios, separated from the chaos next door by a thick pane of
  soundproof glass. An analog mixing <ansi fg="itemname">board</ansi> glows
  amber in the dim light, its faders and knobs set with obsessive precision.
  Reels of two-inch <ansi fg="itemname">tape</ansi> spin on a machine against
  the wall, capturing everything raw and live. <ansi fg="itemname">Microphones</ansi>
  of every type hang from hooks and sit on shelves -- condensers, dynamics,
  ribbons -- each one placed with surgical care. Through the control room
  <ansi fg="itemname">window</ansi>, you can see the live room where the band
  is working, their sound reduced to a muffled roar by the glass. Snow falls
  outside. The red recording light is on. It is always on. The <ansi fg="exit">east</ansi>
  door leads into the live room. A heavy door to the <ansi fg="exit">north</ansi>
  opens onto the snow-buried grounds outside.
