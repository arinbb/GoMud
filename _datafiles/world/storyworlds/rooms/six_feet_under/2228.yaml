title: Nates Room
description: >-
  The prodigal son's room, unchanged since he left for Seattle. A room that
  became a <ansi fg="itemname">museum</ansi> of someone who did not want to
  be preserved. High school posters still on the wall -- bands, a map of the
  world with pins in the places he wanted to go. A <ansi fg="itemname">shelf</ansi>
  of trophies and books from a self he shed like a skin. The <ansi fg="itemname">bed</ansi>
  with its old quilt, made now because Ruth makes it. A <ansi fg="itemname">window</ansi>
  with a view of the side yard and the garage where the hearse lives. Nate
  has complicated feelings about this room, about the version of himself it holds,
  about the fact that he came back. The room waits for him patiently, which is
  its own kind of pressure. Down to the <ansi fg="exit">living room</ansi>.
