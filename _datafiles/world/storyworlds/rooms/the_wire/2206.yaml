title: Hamsterdam
description: >-
  A few blocks that <ansi fg="8">Deputy Ops Colvin</ansi> carved out of West
  Baltimore and told the dealers to use. An experiment in managed chaos. The deal
  was simple: you do your business here, we do not arrest you there. The corner
  boys came. Then the users came. Then the food trucks and the health workers
  and the church vans. Then, eventually, the cameras. <ansi fg="itemname">Dealers</ansi>
  work in the open here with a casualness that is almost surreal, their product
  visible, their transactions uncontested. A <ansi fg="itemname">church van</ansi>
  is parked at the corner, handing out sandwiches and clean needles, which two
  weeks ago would have been impossible and is now Tuesday. It should not work.
  It works, in the way that things that should not work sometimes work, until
  someone with more authority finds out. West Baltimore Street is to the <ansi fg="exit">east</ansi>.
