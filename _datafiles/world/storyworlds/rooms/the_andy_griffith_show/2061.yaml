nouns:
  sofa: >-
    A wide sofa upholstered in a blue-and-cream floral pattern, the cushions
    worn soft with years of sitting. Andy and Opie have had ten thousand
    conversations here, side by side in the evening. The fabric is faded just
    slightly in the spot where the lamp light falls. This sofa has been witness
    to a great deal of good sense being dispensed.
  rug: >-
    A braided rug, oval, the colors of autumn -- rust and cream and warm brown
    -- spread in the center of the floor like a quiet statement about what a
    home should feel like. Aunt Bee made it herself, over the course of two
    winters, and she does not mention this.
  pie: >-
    An apple pie, golden-crust, still warm from the oven, sitting on a wire
    rack on the side table. The smell of cinnamon and brown sugar fills the
    room. This is the kind of pie that has been perfected over years of baking
    for people you love. There is no better smell in all of Mayberry, and in
    Mayberry that is a serious competition.
  lamp: >-
    A floor lamp with a cream fabric shade that diffuses the light into
    something warm and ambient. This is reading light, talking light, the
    kind of light that makes every problem seem smaller than it did in
    the fluorescent glare of the courthouse.
idlemessages:
- The pie on the side table releases one more wave of cinnamon and apple and everything good.
- A clock on the wall ticks with the measured patience of a Mayberry afternoon.
- The braided rug is positioned exactly as Aunt Bee positioned it, which is to say correctly.
- The sofa cushions hold the shape of whoever last sat there. The indent is gentle and recent.
- A sparrow lands on the windowsill outside, looks in, decides to continue its business elsewhere.
- The reading lamp hums softly with the contentment of a lamp that has a purpose.
- Through the window, the maple tree in the yard sways once in a breeze that carries honeysuckle.
- The whole house breathes in a long slow rhythm, like something that knows it is loved.
