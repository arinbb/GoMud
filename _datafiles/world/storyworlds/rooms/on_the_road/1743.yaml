roomid: 1743
zone: On the Road
title: The Open Highway (Iowa)
description: >-
  The <ansi fg="itemname">highway</ansi> cuts through the heart of America
  like a sentence that refuses to end. On both sides, <ansi fg="itemname">cornfields</ansi>
  stretch to the horizon, flat and enormous and full of the kind of silence
  you can only hear when you have been moving fast for a long time and then
  stopped. A <ansi fg="itemname">truck stop diner</ansi> sits at the roadside,
  its windows yellow with fluorescent light, its parking lot full of big
  rigs with their engines running. Inside, coffee is being poured and men
  with road-tired eyes are eating eggs at 3am. The sky above Iowa is the
  whole sky — no buildings, no mountains, just stars going all the way down
  to the edge of the earth. To the <ansi fg="exit">east</ansi> the road runs
  back to the bridge and New York. To the <ansi fg="exit">west</ansi> is Denver.
  You can stick out your thumb and <ansi fg="exit">hitchhike</ansi> a ride.
