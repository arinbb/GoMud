character:
  name: Cookie Fleck
  description: >-
    Cookie Fleck has two left feet -- actual, medical, both shoes for the left
    foot -- and she walks just fine. She has made complete peace with this, the way
    she has made complete peace with most things, which is to say thoroughly and
    without drama. She is warm without being soft, friendly without being incautious,
    and entirely comfortable with who she is. She met Gerry at a dog show twelve
    years ago. She had a lot of ex-boyfriends before that -- a lot -- and she does
    not think about them much, though they occasionally appear at dog shows as local
    vendors or parking attendants, in ways she finds unremarkable and Gerry finds
    slightly alarming and she finds his finding it alarming charming.
