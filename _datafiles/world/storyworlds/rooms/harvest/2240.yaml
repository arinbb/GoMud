roomid: 2240
zone: Harvest
title: Broken Arrow Ranch
description: >-
  Northern California, 1972. A working ranch in the late afternoon, the kind
  of place that earns its quiet. A weathered <ansi fg="itemname">barn</ansi>
  leans slightly southward, its red paint faded to the color of dried blood
  and rust. <ansi fg="itemname">Wheat fields</ansi> roll out to the east and
  north, the stalks heavy and gold in the slant light. A <ansi fg="itemname"> dirt road</ansi> disappears into the hills. The ranch house is simple,
  low, the kind of house a man builds when he plans to stay. On the fence post
  nearest the barn, a <ansi fg="itemname">harmonica</ansi> rests on the top
  rail -- left there the way you leave something when you know you will come
  back for it. The neighbor's <ansi fg="10">cottage</ansi> is just visible to
  the north through the fence line, the old man's rocker on the porch. The air
  smells of dry grass and woodsmoke and the particular sweetness of a harvest
  that is almost ready.
