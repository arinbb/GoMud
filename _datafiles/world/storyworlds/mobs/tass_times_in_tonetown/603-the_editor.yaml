activitylevel: 30
character:
  name: The Editor
  description: >-
    A person of relentless forward motion dressed in a press vest worn over
    a shirt that was probably ironed this morning but has achieved character
    since. Their blue jeans are practical. Their sneakers are fast. Their
    visor is a gesture toward shade for eyes that spend their day at close
    range with the urgent. They move through the newsroom as if the floor
    is a racetrack and the deadline is always five minutes away, which it is,
    which it always is. Their voice carries the practiced projection of someone
    who has spent years competing with a printing press for the attention of
    the room.
