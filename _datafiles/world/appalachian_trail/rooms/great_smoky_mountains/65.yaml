roomid: 65
zone: Great Smoky Mountains
title: Tricorner Knob to Davenport Gap
description: "The trail enters the most remote and wild section of the Smokies, threading along the high ridge between Pecks Corner and Davenport Gap. This is the eastern end of the park, where the crowds thin to nothing and the forest closes in with a density that borders on claustrophobic. The ridge climbs over nameless knobs and through dense spruce tangles before descending to lower elevations where hardwoods reclaim the canopy. Mt. Cammerer's fire tower stands on a rocky promontory to the north, a stone-and-timber tower built by the Civilian Conservation Corps in the 1930s, its panoramic windows commanding a view of the French Broad River valley and the mountains of eastern Tennessee. The trail finally drops steeply to Davenport Gap at 1,975 feet, where Interstate 40 roars through the gap and the Great Smoky Mountains National Park ends as abruptly as it began. You have walked seventy miles of ridgeline. The Smokies release you back into the world."
