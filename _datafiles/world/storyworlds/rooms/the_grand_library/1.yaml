roomid: 1
zone: The Grand Library
title: The Grand Library
description: >-
  A single vast circular chamber beneath a domed ceiling of painted constellations.
  Warm brass lanterns cast golden light across mahogany shelves that line every wall
  from floor to ceiling. The room is organized into alcoves -- <ansi fg="cyan">books</ansi>
  to the north, <ansi fg="red">film reels</ansi> to the east, a lone
  <ansi fg="blue">painting</ansi> on the west wall, <ansi fg="yellow">vinyl records and CDs</ansi>
  to the south, and <ansi fg="magenta">game discs</ansi> in a console near the door.
  A glass-fronted <ansi fg="itemname">display case</ansi> holds your personal collection
  of souvenirs. An oak <ansi fg="itemname">reception desk</ansi> stands at the center with
  a worn leather <ansi fg="itemname">guestbook</ansi> open upon it.
mapsymbol: L
maplegend: Library
biome: house
isstorage: true
nouns:
  desk: >-
    A grand oak reception desk, its surface worn smooth by countless hands. A
    small brass placard reads "Welcome, Traveler. Every story needs a reader."
  guestbook: >-
    The leather-bound guestbook is filled with names and notes from visitors
    past. Some entries shimmer faintly, as if written in ink that has not quite
    dried, even after what must be years. Type sign to add your name.
  constellations: >-
    The painted ceiling depicts constellations you half-recognize -- Orion
    hangs beside a dragon in flight, and the Big Dipper shares the sky
    with a compass rose made of stars.
  books: >-
    The book alcove holds novels, poetry, and epics from every tradition.
    Leather-bound volumes, cloth-covered paperbacks, gilded folios. Some
    spines glow faintly. Browse the shelves to find a world to enter.
  reels: >-
    Film reels in frost-covered canisters, warm amber tins, and battered
    metal cases. Each one contains a world. Pick one up and play it.
  painting: >-
    A single framed painting hangs on the west wall. The colors shift
    subtly when you look away. The figures seem to follow you with their
    eyes. Pick it up and enter it.
  records: >-
    Vinyl LPs and CDs arranged on a shelf. Each contains a world built
    from sound. Drop the needle or press play to step inside.
  games: >-
    Game discs and cartridges sit in a console. Each one a world to play
    through. Insert a disc and press play.
  case: >-
    A glass-fronted display case for your personal collection of souvenirs
    from the worlds you have visited. Type storage to manage your collection.
    Type collection to see your progress.
containers:
  shelves: {}
spawninfo:
- mobid: 100
  message: The Librarian quietly appears from behind a shelf.
  idlecommands:
  - say Welcome to the Grand Library. Every story here is a doorway.
  - ""
  - say Browse the shelves to find books, films, music, art, and games. Pick one up and use it.
  - ""
  - emote adjusts their spectacles and peers at a dusty tome.
  - ""
  - say Type collection to see how many worlds you have visited.
  - ""
  respawnrate: 1 real minutes
