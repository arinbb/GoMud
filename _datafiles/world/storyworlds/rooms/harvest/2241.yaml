  - ""
  - ""
  respawnrate: 5 real minutes
idlemessages:
- The pedal steel sings a long, bending note that hangs in the air like a question nobody answers.
- Hay dust drifts through the lamplight, golden and slow, the same color as the music.
- 'Someone taps a cymbal lightly and the shimmer fills the barn like wind through dry grass.'
- The barn doors creak in the evening breeze and the lanterns sway, sending shadows dancing.
- A bass note rumbles through the floorboards, felt more than heard, deep and warm.
- 'The spotlight on the empty stool waits patiently, the way a song waits to be played.'
