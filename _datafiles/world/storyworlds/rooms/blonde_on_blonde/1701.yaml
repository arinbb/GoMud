roomid: 1701
zone: Blonde on Blonde
title: The Alley Behind the Studio
description: >-
  The back door of Columbia Studio A opens onto a Nashville alley at two in
  the morning. <ansi fg="itemname">Neon</ansi> signs from the honky-tonks on Broadway
  reflect in shallow <ansi fg="itemname">puddles</ansi> on the asphalt -- red and blue
  and green smeared across the wet ground like paint that will not dry. A
  <ansi fg="itemname">guitar case</ansi> sits open on the curb, a few coins glinting inside
  it, though no one is playing. The studio <ansi fg="itemname">door</ansi> behind you leaks a thin
  line of light and the muffled sound of an organ chord that will not resolve.
  The air smells like rain on hot asphalt and cigarette smoke and something
  older -- the smell of songs that have escaped the studio and are living in
  the alley now, made flesh, walking around with faces and opinions. Two
  figures stand in the neon wash: one carries a burlap sack, the other checks
  a pocket watch. They are not from Nashville. They are from the album.
  The studio is <ansi fg="exit">north</ansi>. A fire escape leads <ansi fg="exit">up</ansi> to the loft.
mapsymbol: A
maplegend: The Alley
biome: city
