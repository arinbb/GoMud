roomid: 2481
zone: Idiocracy
title: Brawndo HQ
description: >-
  The Brawndo Corporation headquarters is the tallest building in the hemisphere
  and is shaped like a Brawndo can, which is either impressive or a sign. The
  <ansi fg="yellow">lobby</ansi> is a vast space of polished floors and Brawndo-green
  surfaces with a <ansi fg="yellow">fountain</ansi> at the center that dispenses
  Brawndo instead of water. The <ansi fg="itemname">stock ticker</ansi> runs along
  the top of every wall -- Brawndo has been the only publicly traded company since
  2214, when it acquired all the others. The <ansi fg="itemname">mission statement</ansi>
  is carved in thirty-foot letters above the entrance: BRAWNDO: IT'S GOT
  ELECTROLYTES. This is the complete mission statement. A bank of elevators
  serves the upper floors where the agricultural division, the political division,
  the media division, the water division, and the government division operate.
mapsymbol: B
maplegend: Brawndo HQ
biome: city
