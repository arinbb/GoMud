nouns:
  dam: >-
    Glen Canyon Dam, completed in 1966, is seven hundred and ten feet of concrete
    holding back the Colorado River. It creates Lake Powell, which flooded Glen
    Canyon -- a landscape of side canyons, natural arches, waterfalls, and walls
    of Navajo sandstone that Edward Abbey considered among the most beautiful places
    on Earth. He had floated through it in 1959, the last good year. By 1966 it was
    gone. He never stopped wanting it back. The gang shares this want, and has more
    concrete plans.
  lake: >-
    Lake Powell is the reservoir created by Glen Canyon Dam, the second-largest
    man-made reservoir in the United States. Its level fluctuates with the West's
    drought cycles. When the water is low, the canyon walls reemerge from the
    surface, red and dripping, a landscape returned from the dead. Hayduke watches
    the level obsessively. He is rooting for drought.
  turbines: >-
    The turbines are in the powerhouse at the base of the dam, eight of them,
    generating a total of 1.3 gigawatts. They hum at a frequency you can feel
    in your teeth. They represent the entire purpose of the dam: not water storage
    but power, the electricity that feeds Phoenix and Las Vegas and all the
    expansion of the Southwest that Abbey found inexplicable and catastrophic.
  lines: >-
    The power transmission lines march away from the dam across the desert on steel
    towers, carrying electricity to cities that were built in the wrong place
    and would not exist without this river's impoundment. From the overlook they
    look thin and delicate, like thread stretched across the landscape. They are
    not as delicate as they look.
