nouns:
  springs: "Natural hot springs bubble up along the French Broad River, their mineral-rich waters maintaining a steady temperature year-round. The Cherokee called this place the warm springs and used them for centuries. Stone-lined soaking pools have been built along the bank, fed by the natural flow."
  river: "The French Broad is one of the oldest rivers in the world, older than the mountains it cuts through. Here it runs wide and gentle past limestone bluffs, its surface broken by the occasional ripple of a smallmouth bass."
  town: "Hot Springs is barely a town\x97a post office, a gas station, a couple of restaurants, an outfitter, and more hostels than you can count. The AT runs right down the main road. White blazes are painted on telephone poles."
  hotel: "Nothing remains of the grand Mountain Park Hotel that once stood here. During the First World War, it served as an internment camp for German merchant sailors captured from ships in American ports. The sailors were brought to these remote mountains, far from any coast, to wait out the war."
  blazes: "White blazes are painted on telephone poles and fence posts through town\x97the trail runs right down the main street before crossing the bridge and heading north."
idlemessages:
- Steam rises from the hot springs along the riverbank, curling in the cool mountain air.
- A hiker emerges from the outfitter with a new pair of trail runners, grinning like a kid at Christmas.
- The French Broad slides past, wide and unhurried, its surface catching the light.
- Someone is playing guitar on the porch of one of the hostels, the sound drifting down the empty main street.
- The smell of burgers from the trail cafe mingles with the mineral tang of the springs.
- A shuttle van pulls up, disgorging a group of hikers fresh off the trail, blinking in the sunlight.
