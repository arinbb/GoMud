roomid: 1604
zone: Die Die My Darling
title: The Drawing Room
description: >-
  The drawing room might have been elegant once — the fireplace is marble-mantled,
  the ceiling corniced, the windows tall. Now it is stripped of warmth. A <ansi fg="white">lectern</ansi> stands near the window bearing a large open <ansi fg="white">Bible</ansi>, its pages held open with a ribbon. Two hard chairs face
  it, positioned for an audience of one. Above the fireplace hangs a <ansi fg="8">portrait</ansi>
  of a young man in a dark suit — handsome, pale, with his mother's severity already
  forming in the jaw. Fresh <ansi fg="white">flowers</ansi> have been placed beneath
  it, real ones, the only living colour in the room. On the low <ansi fg="8">table</ansi>
  beside the armchair, a <ansi fg="8">scrapbook</ansi> lies face-down, pushed slightly
  behind a cushion as though someone put it there hastily. To the <ansi fg="exit">south</ansi>
  is the entrance hall; to the <ansi fg="exit">east</ansi>, the chapel.
mapsymbol: W
maplegend: Drawing Room
biome: house
exits:
  south:
