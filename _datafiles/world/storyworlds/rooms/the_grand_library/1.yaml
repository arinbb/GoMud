roomid: 1
zone: The Grand Library
title: The Grand Atrium
description: >-
  You stand in the soaring atrium of the Grand Library, a vast circular chamber
  with a domed ceiling painted to resemble a night sky full of constellations. Warm
  light spills from brass lanterns mounted along curving mahogany balustrades. A
  sweeping staircase spirals upward to the mezzanine level. The air hums with a
  quiet energy, as though the stories contained within these walls are alive and
  waiting. A large oak <ansi fg="itemname">reception desk</ansi> stands at the center,
  and a worn leather <ansi fg="itemname">guestbook</ansi> lies open upon it.
mapsymbol: A
maplegend: Atrium
biome: house
