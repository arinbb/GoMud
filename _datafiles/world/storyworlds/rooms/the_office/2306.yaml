nouns:
  whiteboard: >-
    Today's whiteboard contains: 'Q3 GOALS' underlined twice, a pie chart that adds
    up to more than 100%, a list of synergy-adjacent words (leverage, paradigm, forward-
    thinking, solutions), a drawing of a face that has been there since 2008, and in
    small writing in the corner, in a handwriting that is identifiably Jim's: 'that's
    what she said.' It is unclear when this was written. It does not refer to anything
    specific on the whiteboard. It refers to everything on the whiteboard.
  poster: >-
    'TEAMWORK.' A mountain at sunset. A silhouette of a person at the top with arms
    spread. This poster has been in this room since approximately 2001 and has never
    been updated or replaced. It no longer communicates anything to anyone who works
    here. It is furniture.
  projector: >-
    The conference room projector takes eleven minutes to warm up and produces an
    image that is either too bright or too dim, never calibrated. Michael's PowerPoint
    presentations -- which he makes himself, with animations -- look exactly the way
    you would imagine they look on a projector that is either too bright or too dim.
  table: >-
    The long conference table, laminate wood-effect, surrounded by eight rolling
    chairs. The table has hosted: performance reviews, birthday parties, interventions,
    a wedding shower, a breakup, three fire safety trainings, one actual fire, and
    every single meeting Michael has ever called in the nine years he has worked here.
    The table knows everything.
spawninfo: []
idlemessages:
- The chairs are arranged around the table. They have been arranged. They will be rearranged. They will be arranged again.
- The projector screen is half-lowered. Someone left it this way. It will stay this way.
- The whiteboard marker is dried out. There is another marker in the tray. Nobody has switched them.
- Through the glass wall, the bullpen is visible -- rows of heads, the gentle ambient of work being performed.
- Someone left a coffee mug on the table. It is from a meeting that ended hours ago. The coffee is cold.
- The TEAMWORK poster's mountain catches the fluorescent light and for a moment seems almost aspirational.
- "An agenda paper is on the table: Q3 Review -- 10 items. The meeting went to item three."
- The room smells like dry-erase marker and the ghost of someone's afternoon snack.
