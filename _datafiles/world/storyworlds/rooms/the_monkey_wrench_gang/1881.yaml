roomid: 1881
zone: The Monkey Wrench Gang
title: The River
description: >-
  The <ansi fg="cyan">Colorado River</ansi> runs broad and powerful here, hemmed in
  by <ansi fg="red">canyon walls</ansi> that soar hundreds of feet on either side. The
  water is an improbable green-brown, heavy with canyon silt, cold from the depths
  of the reservoir above. A battered <ansi fg="itemname">rubber raft</ansi> is tied
  to a willow branch at the bank, its hull patched with duct tape, beer cans
  floating in the bilge. <ansi fg="mobname">Doc Sarvis</ansi> stands in the stern
  looking upstream with the expression of a man contemplating something both beautiful
  and wounded. <ansi fg="mobname">Bonnie Abbzug</ansi> sits amidships, her New York
  face tilted into the desert sun, reading something waterlogged. The canyon walls on
  either side are geological scripture — limestone, sandstone, shale, the pages of
  four hundred million years stacked in plain sight. To the <ansi fg="exit">west</ansi>,
  the river trail leads back to the ferry crossing. To the <ansi fg="exit">east</ansi>,
  the canyon bends and the current quickens.
