roomid: 34
zone: North Carolina
title: Fontana Dam
description: "Fontana Dam rises 480 feet above the Little Tennessee River, the tallest dam east of the Rocky Mountains. The Tennessee Valley Authority built it between 1940 and 1944, a wartime crash project to generate electricity for the aluminum smelters feeding the war effort. At its peak, over 5,000 workers lived in a temporary town on the riverbank, working around the clock. When TVA filled Fontana Lake behind the dam, entire communities were drowned\x97homesteads, churches, cemeteries, and the old Highway 288, all submerged beneath cold mountain water. The AT crosses the top of the dam on a narrow road, 480 feet of concrete separating the deep lake from the plunge of the spillway. Ahead lies the entrance to Great Smoky Mountains National Park. The Fontana Hilton\x97the legendary shelter near the dam\x97has hot showers, a covered porch, and flush toilets, luxuries that seem almost hallucinatory after weeks on the trail."
