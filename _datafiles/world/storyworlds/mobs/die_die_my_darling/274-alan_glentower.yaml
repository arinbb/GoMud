character:
  name: Alan Glentower
  description: >-
    A handsome man in his early thirties, well-dressed in the country manner,
    wearing a tweed jacket and carrying a flat cap he has not put on. He has
    the look of someone who has been worrying about something for several
    days without sleeping adequately — there are lines around his eyes that
    concern has put there recently. He sits at a corner table but barely uses
    his chair, rising every few minutes to look out the window. He is polite
    to everyone in the pub, which is how you can tell he is frightened.
