roomid: 1892
zone: The Monkey Wrench Gang
title: The Power Line
description: >-
  <ansi fg="8">Steel transmission towers</ansi> march across the desert in a line that
  disappears over the mesa to the south and north, each one sixty feet tall, their
  lattice frames trailing <ansi fg="8">high-voltage cables</ansi> that hum in the desert
  wind with a frequency just below hearing. The cables sag in long graceful catenaries
  between towers, vibrating slightly in the thermals rising from the heated rock below.
  The right-of-way has been cleared of vegetation for a hundred feet on either side —
  a raw scar through the desert, the sage scraped away to reveal the bare red earth
  beneath. The nearest tower has a <ansi fg="itemname">warning sign</ansi> bolted to
  its base: DANGER / HIGH VOLTAGE / AUTHORIZED PERSONNEL ONLY. No one authorized is
  present. The desert stretches in all directions, empty and hot and patient. The cables
  carry electricity from Glen Canyon Dam to Phoenix and beyond. They carry it with
  absolute reliability, in all weather, at all hours. They have not, as yet, been
  interrupted. To the <ansi fg="exit">road</ansi> to the <ansi fg="exit">east</ansi>,
  the highway leads back toward the desert road junction.
