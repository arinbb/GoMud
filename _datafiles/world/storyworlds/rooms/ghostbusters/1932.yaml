roomid: 1932
zone: Ghostbusters
title: City Hall
description: >-
  The Mayor's office at New York City Hall, a room of oak paneling and old paint
  and the specific institutional carpet that exists in government buildings across
  America. The <ansi fg="itemname">mayor</ansi> sits behind his desk in a state
  of managed crisis. On one side of the room stand three tired, proton-burned
  <ansi fg="itemname">Ghostbusters</ansi> -- Peter, Ray, and Egon -- with the
  particular posture of men who know they are right and are accustomed to being
  treated like they are not. On the other side stands <ansi fg="itemname">Walter
  Peck</ansi> from the Environmental Protection Agency, a man whose entire function
  in this scene is to be wrong with tremendous conviction. The <ansi fg="itemname">window</ansi>
  behind the mayor's desk looks out over City Hall Park, which is currently host to
  a Category 7 supernatural convergence if Egon's projections are correct. Arguments
  fill the room. The fate of New York is on the table.
