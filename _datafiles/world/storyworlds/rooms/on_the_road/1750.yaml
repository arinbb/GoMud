nouns:
  border: >-
    The Mexican border, the line the road crosses from the United States
    into Mexico. On one side: rules, speed limits, the law. On the other
    side: something looser, something older, something that Sal and Dean
    experience as freedom and that is partly freedom and partly dissolution,
    which are not always different things.
  road: >-
    Route 99, the Valley Road, heading south through California farm
    country toward the border. The farms on both sides grow things
    that feed the country — cotton, tomatoes, grapes, almonds — and
    the people who pick them live in conditions that are not in the
    book because Sal and Dean are driving through too fast to see them
    clearly, which is not Kerouac's finest moment.
  shrines: >-
    Roadside shrines appear occasionally along the shoulder — small
    wooden crosses with plastic flowers, photographs in plastic frames,
    names. Each one marks the place where someone was going somewhere
    and did not arrive. The road is full of these small monuments to
    the not-arriving, and they are easy to miss at speed.
  derricks: >-
    Oil derricks punctuating the landscape, their pump jacks moving
    in slow arcs, patient and mechanical, pulling something ancient
    out of the ground so it can be burned at speed by people going
    somewhere. There is a poem in this. Several poems. They have been
    written. You are living inside one now.
idlemessages:
- The car passes a roadside stand selling oranges. Dean does not stop. The oranges recede.
- The heat shimmer on the road ahead makes it look like water, always retreating.
- A border patrol checkpoint appears in the distance. Dean tenses, then relaxes. They wave him through.
- The landscape south of Fresno is the dream of the end of things, flat and hot and getting hotter.
- A sign in Spanish appears and then another. The country is changing underneath the road.
- Dean rolls his window down and leans his head out into the hot wind like a dog going somewhere important.
- 'The odometer turns over another thousand miles. Dean laughs. Sal writes it down.'
