name: Wonderland
roomid: 100
autoscale:
  minimum: 1
  maximum: 5
defaultbiome: forest
mutators:
- mutatorid: wonderland-logic
idlemessages:
- Nothing is quite the right size here. The flowers seem too large, or perhaps you are too small.
- A grin without a cat floats past, lingering in the air before fading.
- The rules of logic feel... optional in this place.
- Time moves strangely here. Your watch, if you had one, would disagree with itself.
- Something is watching you. It seems friendly about it. This is not entirely reassuring.
- The word CURIOUSER surfaces in your mind without invitation. You acknowledge it. It leaves.
- A playing card drifts past on the air. It is face-down. You do not turn it over. Some things are better as possibilities.
