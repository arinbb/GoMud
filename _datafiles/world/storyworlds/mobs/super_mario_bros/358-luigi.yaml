character:
  name: Luigi
  description: >-
    Mario's brother, slightly taller, wearing a green cap and green
    overalls instead of red. He has the same mustache, the same
    round eyes, the same ready-to-jump posture, but his expression
    carries an extra layer of awareness -- he knows what is coming
    and has assessed the risk more thoroughly than his brother. Luigi
    jumps higher than Mario. Luigi is faster but has worse traction
    on ice. Luigi is player two. Luigi is the person who does the
    same things as the protagonist but in slightly different circumstances
    and for slightly different reasons, and this is its own kind of
    heroism.
