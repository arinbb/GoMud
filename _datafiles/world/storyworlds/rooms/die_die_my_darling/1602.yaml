nouns:
  icons: >-
    They are everywhere — crucifixes of varying sizes, framed passages from scripture
    in ornate script, a painted wooden triptych, a brass plaque engraved with a verse
    from Revelation. They are not decorative. They are a statement. Perhaps a warning.
  crucifix: >-
    A large wooden crucifix above the front door. The Christ figure is carved with
    unusual specificity — the expression not peaceful but anguished. Someone chose
    this one deliberately.
  mirror: >-
    There is no mirror here. Only a pale rectangle on the wallpaper — lighter than
    the surrounding paper — in exactly the shape a mirror would leave. The hook is
    still in the wall. The mirror has been removed recently, and deliberately.
  carpet: >-
    The carpet runner is thick with age, its pattern — once a floral design, perhaps
    — worn to a uniform grey-brown. It has absorbed decades of footsteps and said
    nothing about any of them.
  madonna: >-
    A small plaster Madonna in a niche beside the umbrella stand. She has been touched
    so often that the paint has worn from her hands and face, leaving white plaster
    showing through. She is very old and very handled.
  curtain: >-
    A heavy curtain of black velvet hanging beneath the staircase, pulled tight
    against the wall. It covers something. The edge of a low door is just visible
    at the side of the curtain if you look directly at it. Someone hung this to
    conceal the cellar entrance.
  cellar: >-
    At the far end of the entrance hall, almost hidden behind the staircase, a low
    door with iron hinges leads down into darkness. The stairs beyond it creak even
    when no one is on them.
spawninfo: []
idlemessages:
- The flagstone floor is cold even through your shoes.
- The house ticks and settles around you, wood contracting in the chill air.
- You notice the umbrella stand contains one black umbrella. One. Always the same one.
- A draught moves under the front door and stirs the faded carpet runner.
- The scripture passage on the wall catches your eye. You read one line and look away.
- The absence of a mirror above the hall table feels louder than a shout.
- From somewhere upstairs, the faint sound of someone moving very deliberately.
