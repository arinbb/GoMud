character:
  name: Barney Fife
  description: >-
    A thin man of nervous energy and absolute sincerity, in a deputy sheriffs
    uniform that fits him with military precision because he has pressed it
    himself, twice. His eyes are alert in the manner of a man who expects
    something to happen at any moment and is fully prepared for it, even
    if it does not. He carries one bullet. He keeps it in his shirt pocket.
    This is Andys policy and Barney complies with it, though not without
    opinions. He is, at all times, doing his very best. His very best is
    something to behold.
