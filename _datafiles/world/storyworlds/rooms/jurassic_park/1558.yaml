nouns:
  gallimimus: >-
    Ostrich-dinosaurs, eight feet tall at the hip, built entirely for speed.
    Their feathers — yes, feathers, small and vestigial along the forearms —
    are bright amber in the sun. They move in loose groups, heads up, watching
    everything. When one turns to run, they all turn. The mechanism of the
    stampede is ancient and involuntary and beautiful and terrifying.
  grass: >-
    Tall savannah grass, yellowed in patches where the Gallimimus have cropped
    it short, green elsewhere. It ripples in the wind. Things move through it
    that are not wind.
  plain: >-
    Open land, perhaps a quarter mile across — broad by human standards,
    cramped by the scale of the things that use it. The sight lines are good.
    You can see whatever is coming. That is the consolation.
idlemessages:
- A group of Gallimimus erupts from the tall grass fifty yards away, running flat-out for no visible reason.
- The ground trembles — not the T. Rex, you tell yourself. Just the Gallimimus. Just the herd.
- The flock wheels overhead — no, not overhead: they run along the plain edge, a waterfall of dinosaurs.
- In the distance, something large enters the grass on the far side of the plain. The Gallimimus react instantly.
- The sound of the running herd fades, and in the silence, you hear a single short percussion: a footstep. Very heavy.
- The tall grass to the south sways in a pattern that has nothing to do with the wind's direction.
