name: Best in Show film reel
namesimple: reel
displayname: a film reel labeled <ansi fg="11">Best in Show</ansi>
description: >-
  A film reel in a round metal canister, the label hand-lettered in careful block
  print: BEST IN SHOW -- CASTLE ROCK ENTERTAINMENT, 2000. The canister has a few
  small dents that suggest it has been in a bag with other things. When you hold
  it up to the light and look through the celluloid, you can see: a convention center
  in Philadelphia, fluorescent-lit, smelling of conditioning spray and dog treats.
  A Weimaraner near the registration desk is staring at the volunteer with the
  focused patience of an apex predator told to sit and stay. A Bloodhound lumbers
  through a door with solemn purpose. In the background, barely visible, a man in
  a flannel shirt is reaching into a bag of mixed nuts with the unhurried ease of a
  man who is exactly where he wants to be. The dogs are calmer than the people.
  They always are.
