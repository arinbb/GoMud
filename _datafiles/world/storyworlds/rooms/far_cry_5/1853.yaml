roomid: 1853
zone: Far Cry 5
title: The Compound
description: >-
  Eden's Gate main compound: a collection of buildings behind chain-link and
  razor wire, expanded over months from a church property into something that
  has outgrown every ordinary category. <ansi fg="itemname">Armed cultists</ansi>
  move in pairs along the fence line, AR-pattern rifles on slings, Eden's Gate
  patches on their arms. The architecture is a mix of original buildings and
  hastily erected structures — dormitories, a food hall, storage, an armory. <ansi fg="itemname">Bunting</ansi> in the Eden's Gate colors — white and red
  — hangs between buildings. A <ansi fg="itemname">PA system</ansi> mounted
  on poles broadcasts scripture readings at intervals. The <ansi fg="itemname"> church</ansi> at the compound's heart is visible above the buildings, its
  steeple topped with a new cross. People here believe. That is not in question.
  What they believe, and what it has been made to require of them — that is
  the question. The road leads <ansi fg="exit">road</ansi> (south). The church
  is <ansi fg="exit">north</ansi>.
