character:
  name: Winston Smith
  description: >-
    A smallish, slight man of thirty-nine, with fair hair and a ruddy complexion.
    He wears the blue overalls of the Outer Party. His face might once have been
    handsome but is now deeply lined, and there is a varicose ulcer above his right
    ankle that he rubs habitually. His eyes are thoughtful in a way that, in Oceania,
    constitutes a kind of danger. He knows things he is not supposed to know, thinks
    things he is not supposed to think, and is trying not to let any of this appear
    on his face. He is not entirely succeeding.
