description: >-
  A battered paperback, its cover showing a stylized desert landscape and four figures
  against a red canyon sky. The spine has been cracked and taped and cracked again.
  The edges of the pages are brown from desert sun. Edward Abbey, 1975. Someone has
  penciled a note in the margin of the first page: "This is not a metaphor." The book
  smells faintly of campfire smoke, sagebrush, and cheap beer.
