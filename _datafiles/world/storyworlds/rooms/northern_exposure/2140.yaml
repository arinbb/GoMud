roomid: 2140
zone: Northern Exposure
title: Main Street Cicely
description: >-
  The main -- and largely only -- street of <ansi fg="cyan">Cicely, Alaska</ansi>,
  population 215. The buildings are low and weathered, paint peeling in the
  way that suggests character rather than neglect. A hand-painted sign reads
  <ansi fg="yellow">CICELY, ALASKA -- FOUNDED 1909</ansi> with what appears to
  be a portrait of two women in Victorian dress. The mountains rise on every
  side, enormous and indifferent, capped with snow that does not intend to melt.
  A <ansi fg="10">spruce forest</ansi> crowds the edges of town like an audience.
  The air is cold and clean and smells of pine resin and woodsmoke. To the
  <ansi fg="exit">east</ansi> is The Brick. To the <ansi fg="exit">north</ansi>,
  Ruths General Store. To the <ansi fg="exit">south</ansi>, the radio station.
  To the <ansi fg="exit">west</ansi>, the Raven Totem. And everywhere, the vast
  Alaskan wilderness pressing close, beautiful and unmoved by human concern.
