nouns:
  tower: "The Mt. Cammerer fire tower is a stone-and-timber structure built by the Civilian Conservation Corps in the 1930s, perched on a rocky promontory with a sheer drop on three sides. The panoramic windows are cracked and cloudy but intact, and the views are among the best in the park\x97the French Broad River valley, the mountains of eastern Tennessee, and on clear days, the haze-blue ridges stretching north into Virginia. The CCC boys hauled every stone up the mountain by hand and mule."
  cammerer: "Mt. Cammerer was named for Arno B. Cammerer, the third director of the National Park Service, who helped shepherd the Smokies through the complicated process of becoming a national park. The summit is rocky and wind-blasted, with stunted rhododendron and mountain laurel clinging to the crevices."
  ccc: "The Civilian Conservation Corps built much of the infrastructure in the Smokies during the 1930s\x97fire towers, trail, bridges, shelters. Young men from across the country, many from cities, sent to these mountains during the Depression. They earned thirty dollars a month and sent twenty-five home. The stonework of the Cammerer tower is their monument."
  davenport: "Davenport Gap marks the eastern boundary of Great Smoky Mountains National Park at 1,975 feet. Interstate 40 roars through the gap below, trucks and cars streaming between Knoxville and Asheville. The transition from deep wilderness to interstate highway is jarring. A parking area and a kiosk mark the park boundary."
  gap: "The gap is a wind funnel between the mountains, channeling the sound of Interstate 40 up from below. After seventy miles of ridgeline solitude, the sound of traffic is almost offensive. But it also means Standing Bear Farm hostel is only a few miles away, and that means food."
  firetower: "TODO_RESEARCH: Detailed construction history of the Mt. Cammerer fire tower - exact CCC company that built it, construction dates, restoration history. The tower was restored by volunteers in the 1990s after decades of neglect."
idlemessages:
- The hum of Interstate 40 rises from the gap below, a constant mechanical undertone after days of natural silence.
- A black bear crosses the trail ahead, unhurried, and vanishes into a rhododendron thicket without looking back.
- The forest is dense and dark here, the canopy closing overhead like a tunnel.
- Wind moans through the stone windows of the distant Cammerer fire tower.
- A scarlet tanager flashes through the understory, impossibly bright against the green.
- The trail is rooty and rocky, demanding attention with every step.
- Far below, the French Broad River glints silver in its valley, winding north toward Tennessee.
