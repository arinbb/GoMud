nouns:
  window: >-
    The window in Spaceboy looks straight up at the sky, not out at the horizon.
    It is designed for lying on your back and looking at stars -- the angle of
    it, the position of the chair beneath it. The stars outside are the stars of
    a Chicago suburb, the ones visible even through light pollution, the reliable
    ones: Orion, the Dipper, Jupiter on good nights. Someone has been watching
    them for years from this exact spot.
  guitar: >-
    An acoustic guitar without amplification, without effects, without any
    technology between the strings and the air. Chord shapes pressed without
    force. The sound is intimate -- made for a room of two people, not a
    theater. This is the volume of this song. Everything else on the album
    is louder than it needs to be. This one is exactly as loud as it needs
    to be.
  photograph: >-
    Two boys in the photograph, both young. One looks at the camera. One does
    not, is looking at something else, something that requires his full attention.
    The one looking at the camera has his hand near but not touching the shoulder
    of the other. The photograph is well-handled -- the edges are soft from
    being held, from being looked at, from being carried. There is no caption.
    No caption is needed.
  carpet: >-
    Thick brown carpet, the kind found in American houses built in the 1970s.
    Slightly compressed where the furniture used to be. You can read the history
    of the room's contents from the floor -- the square indent of a dresser,
    the dimple of a chair leg, the long pale strip where the afternoon sun has
    faded it for years through the window. The room is specific. The room is
    real. This is the most grounded room on the album because it is anchored to
    a real address in a real suburb, a house with a real carpet.
  letter: >-
    On the dresser beside the photograph, a folded letter -- hand-written, two
    pages. The handwriting is careful, the kind of careful that takes effort.
    The salutation reads: To my brother. The letter is not private. It was
    written to be read. The song is the letter given a melody. The letter is
    the song given a stamp. Both say: I see you. The distance does not change it.
idlemessages:
- The acoustic guitar makes a small sound -- a string vibrating from nowhere, a harmonic releasing.
- The window looks straight up at the stars. Chicago light pollution takes most of them. But not all.
- The house is warm and quiet and at night everything outside is manageable because there is this room.
- 'The photograph has been looked at many times. Each time is the first time and the thousandth time simultaneously.'
- No amplification. No effects. Just the guitar and the room and the love that does not require amplification.
- 'South leads somewhere darker. But here, for now, is warmth, and the stars, and a photograph held with care.'
