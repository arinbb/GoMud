character:
  name: the Ghost of DArcy
  description: >-
    The bassist, barely here. The bass guitar rests across her lap and she is
    not playing it -- Billy played the bass parts himself. She is present in
    the studio in a way that is mostly technical: she exists, she is in the
    room, her name is on the record. But something has pulled her attention
    elsewhere, and the empty bass track on the tape reels is a kind of ghost
    that the music carries without acknowledgment. She is not unhappy. She is
    simply elsewhere. The music went on without her. The music was always going
    to go on without her.
  raceid: 1
  level: 10
