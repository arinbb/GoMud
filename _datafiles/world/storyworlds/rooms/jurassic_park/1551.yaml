  message: Robert Muldoon walks the fence line toward the raptor pen, shotgun under his arm.
  idlecommands:
  - emote surveys the perimeter with narrowed eyes, shotgun tucked under his arm.
  - say Those fences better be holding. Check them again.
  - ""
  - emote adjusts his khaki hat and stares toward the raptor pen.
  - say Something's off today. I can feel it.
  - ""
  respawnrate: 4 real minutes
idlemessages:
- The massive gates creak in the jungle wind, straining at their hinges as if something tested them from the other side.
- The torches flare suddenly, driven sideways by a gust that smells of vegetation and distant rain.
- From somewhere deep in the park, a sound rises and falls — not quite a call, not quite a warning.
- The carved letters in the gate crossbeam cast long shadows in the torch light. JURASSIC PARK.
- Insects sing in the jungle on both sides, a wall of sound that swells and ebbs with no apparent cause.
- A security camera on the gate tower pans slowly, silently, watching the road.
