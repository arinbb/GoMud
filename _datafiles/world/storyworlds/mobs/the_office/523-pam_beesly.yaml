character:
  name: Pam Beesly
  description: >-
    A woman in her mid-to-late twenties in a cardigan and a long skirt and sandals,
    her hair in a loose arrangement that is casual in a way that took consideration.
    She has a face that is pleasant and open, the face of the person at the front
    desk who makes the whole building warmer. There is a quality of unrealized potential
    about her that the show spends nine seasons converting, slowly and beautifully,
    into realized potential. She doodles on everything. The doodles are good. She
    does not know they are good, but she knows she likes doing them, and that is the
    beginning of knowing.
