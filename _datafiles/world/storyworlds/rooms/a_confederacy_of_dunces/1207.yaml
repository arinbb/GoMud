roomid: 1207
zone: A Confederacy of Dunces
title: Lucky Dog Cart
description: >-
  A street corner in the French Quarter where a Paradise Vendors hot dog <ansi fg="itemname">cart</ansi> sits in the merciless sun. The cart is shaped
  like a giant hot dog on wheels, its faded <ansi fg="itemname">umbrella</ansi>
  reading PARADISE HOT DOGS. <ansi fg="itemname">Hot dogs</ansi> of questionable
  provenance turn slowly on the roller grill, glistening with grease. A small
  cash <ansi fg="itemname">register</ansi> sits on the counter showing more
  money going out than coming in, because the vendor -- when he is here -- eats
  more inventory than he sells. The cart is sticky with mustard and condensation.
  It smells of processed meat and regret. <ansi fg="exit">East</ansi> leads
  toward the Levy Pants office. <ansi fg="exit">West</ansi> leads back to the
  French Quarter.
