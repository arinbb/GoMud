  respawnrate: 5 real minutes
  idlecommands:
  - "emote sniffs cautiously at the empty porridge bowls."
  - ""
  - "emote hides behind Baby Bear's overturned chair, watching."
  - ""
  - "emote emerges briefly, then darts back into the shadows."
  - ""
idlemessages:
- The door to the dark forest stands open. No bears have come through it yet.
- The three empty bowls on the table catch the dim light. Someone ate here very recently.
- Baby Bear's broken chair lies on its side. The broken leg is near the cold fireplace.
- The cottage feels observed. The paintings always do.
- Upstairs, something creaks. You are the only one here. Probably.
- The forest through the door is perfectly still. No leaves move. They never do in pictures.
- The three bear-shadows on the wall are perfectly still, perfectly bear-shaped, waiting.
