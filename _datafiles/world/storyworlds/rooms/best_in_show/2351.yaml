roomid: 2351
zone: Best in Show
title: The Vendors Hall
description: >-
  The vendors hall is a long room lined with tables selling every conceivable
  dog-related product. <ansi fg="itemname">Conditioning sprays</ansi> in fifteen
  formulations. <ansi fg="itemname">Show leads</ansi> in every color and material.
  A table selling <ansi fg="itemname">dog portraits</ansi> in oil, watercolor, and
  one format the artist describes as impressionistic realism which looks, honestly,
  like something painted by a ghost. Near the back wall, a vendor sells rubber and
  plush dog toys, and among them, prominently featured, is the
  <ansi fg="itemname">Busy Bee</ansi>: a squeaky rubber bumblebee in yellow and
  black that resonates at a frequency Weimaraners find particularly activating.
  There are signs. The hall hums with the specific commerce of people hoping to
  find something that might help. The <ansi fg="exit">registration hall</ansi> is
  accessible south.
mapsymbol: V
maplegend: The Vendors Hall
biome: house
exits:
  south:
    roomid: 2341
    mapdirection: south
nouns:
  sprays: >-
    The conditioning spray table is operated by a woman who can describe the
    difference between protein-based and silicone-based coat conditioning in more
    detail than you have words for. She has samples. She will give you samples.
    The explanation of each sample will be thorough.
  leads: >-
    Show leads in leather, nylon, cotton, and one material the vendor calls technical
    fabric with the same reverence you would use for aerospace composites. The thin
    show leads used in the ring are works of engineering: maximum control, minimum
    visibility.
  portraits: >-
    The oil portraits are good. The watercolors are better. The impressionistic
    realism portraits look like the dogs are visible through fog, or grief, which
    the artist says is intentional. You believe her. This does not make them less
    unsettling.
  bee: >-
    The Busy Bee. A rubber bumblebee in yellow and black with a squeaker built into
    the thorax. The package says THE SQUEAK THAT DOGS LOVE! in a font that is very
    confident about this. The Busy Bee occupies a special place in the folklore of
    this show. There is at least one Weimaraner in this building for whom the sight
    of a Busy Bee is deeply activating. The vendor has several. They are two dollars.
spawninfo:
idlemessages:
- A handler picks up a conditioning spray, reads the label with focused attention, and buys two.
- The portrait artist is working on a miniature of a Dachshund from memory. The likeness is excellent.
- Someone picks up a Busy Bee, squeezes it, and puts it down. A dog three tables away lifts its head.
- The show lead vendor is explaining the physics of a slip lead to someone who asked a simple question.
- A Busy Bee falls off the table and squeaks when it hits the floor. Every dog within earshot has an opinion.
- The conditioning spray vendor is describing the difference between two products that appear identical. The difference is real.
- 'The vendor hall has the specific energy of commerce adjacent to competition: everyone is buying things that might help, hoping.'
- A child picks up a plush rabbit from the toy table. A nearby handler gives them a look. The child puts it back.
