idlemessages:
- The radiator bangs and hisses in the wall, working very hard at nothing.
- 'Sal reads the letter again. His lips move slightly. Denver. The word sounds like a destination.'
- The pigeons on the fire escape shuffle and resettle, indifferent to everyone's plans.
- 'Outside, a taxi horn sounds three times, sharp and impatient: the city reminding you it does not wait.'
- The typewriter sits there. The blank page sits in it. They have been staring at each other all winter.
- A cold draft comes under the door carrying the smell of the stairwell, boiled cabbage, and possibility.
- Sal looks up from the letter, stares at the window, and for a moment his face is pure longing.
