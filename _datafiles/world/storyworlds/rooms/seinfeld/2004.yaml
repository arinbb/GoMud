title: The Lobby and Street
description: >-
  The <ansi fg="8">lobby</ansi> of 129 West 81st Street opens onto the Upper West
  Side of Manhattan with the unhurried confidence of a block that has always been this
  block. The <ansi fg="itemname">mailboxes</ansi> line the inner wall. The <ansi fg="itemname">door</ansi>
  is heavy glass, slightly warped. Outside: the particular grey-brown light of a New
  York morning, <ansi fg="itemname">Broadway</ansi> a block to the west, Central Park
  a block to the east, the whole city arranging itself around the premise that this
  block matters. A <ansi fg="itemname">newsstand</ansi> stands at the corner, doing
  reasonable business. Everything feels exactly as consequential as it is, which is
  to say: not very, and also entirely. The hallway is <ansi fg="exit">up</ansi>. Monks
  Cafe is to the <ansi fg="exit">north</ansi>. The Soup Stand is to the <ansi fg="exit">east</ansi>.
  Yankee Stadium is to the <ansi fg="exit">south</ansi>. The J. Peterman Office is
  to the <ansi fg="exit">west</ansi>. Other destinations lurk in the geometry of the city.
