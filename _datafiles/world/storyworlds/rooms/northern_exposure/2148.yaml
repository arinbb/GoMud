roomid: 2148
zone: Northern Exposure
title: The Wilderness
description: >-
  Here the town ends and <ansi fg="cyan">Alaska</ansi> begins, without apology
  and without transition. The <ansi fg="10">spruce forest</ansi> is immediate
  and enormous -- trees that have been here centuries, their upper branches
  moving in a wind that does not reach the ground. A <ansi fg="10">river</ansi>
  runs somewhere close, its sound a constant beneath everything else. The <ansi fg="itemname">mountains</ansi> fill the northern horizon, white-capped
  and absolute, the kind of mountains that make a person understand the phrase
  'geological time' in a way no textbook can. The <ansi fg="cyan">sky</ansi>
  is everywhere up here, bigger than any sky in the lower forty-eight. At night
  the <ansi fg="cyan">northern lights</ansi> fill it entirely -- green and cyan
  ribbons folding and brightening over the peaks. A narrow <ansi fg="10">trail</ansi>
  leads south toward Cicely. To the <ansi fg="exit">south</ansi>, town.
  To the <ansi fg="exit">south</ansi> via the lake trail is the lake itself.
