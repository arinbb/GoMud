character:
  name: Anna
  description: >-
    A strong woman of middle years with capable hands and a face that has
    learned not to show what it knows. She is neither friendly nor hostile
    in her manner — she is efficient, which is its own form of neutrality.
    She wears plain dark clothes covered by a white apron that is always
    clean. She does what she is told and she does it well and there are
    moments when her expression suggests that she is aware these facts
    about herself are not entirely to her credit.
