nouns:
  set: >-
    The set is the set. It is plywood and paint and the absolute conviction that
    the material does not matter, that the material has never mattered, that the
    thing that matters is the eleven people who showed up and said yes and did it.
    It looks exactly like what it is and that is exactly the point.
  furniture: >-
    A couch, a stool, a folding table, a chair with a broken leg propped up with
    a stack of cue cards. None of it matches. All of it works. This is the furniture
    of people who are too busy making the thing to worry about the furniture.
  lights: >-
    The overhead lights are the kind that make everything equally bright and equally
    fake and equally real. Under these lights every face looks like it's about to
    deliver a punchline. Under these lights every moment is a sketch.
  logo: >-
    The MTV logo of the 1990s: the blocky M with the TV inset, animated in the real
    world by being printed on everything. It is a flag. It says: this is happening
    now, on television, for people who are young and paying attention.
spawninfo:
- mobid: 577
  message: '<ansi fg="13">Michael Ian Black strolls onto the set, hands in jacket pockets, surveying the room with the composed amusement of someone who has already seen through everything and likes it anyway.</ansi>'
  respawnrate: 5 real minutes
idlemessages:
- The camera light blinks red. Someone, somewhere, is watching.
- A stagehand runs through carrying something unidentifiable at low speed.
- The set wobbles slightly. Everyone ignores this. The show continues.
- An intern tapes a new mark on the floor with gaffer tape, then steps back to assess.
- A monitor shows static, then a clip of something, then static again.
- The overhead lights hum at exactly the frequency of creative momentum.
- Someone backstage says 'Take two' in a tone that implies this is going well.
