roomid: 2027
zone: Harold and Maude
title: The Street
description: >-
  A <ansi fg="8">California street</ansi> of the early 1970s, lined with
  palm trees and sun-bleached storefronts. The hearse is parked at the
  curb behind you. The <ansi fg="itemname">street</ansi> runs in all
  directions, connecting Harold's carefully maintained world to Maude's
  wonderfully chaotic one. To the <ansi fg="exit">west</ansi>, the hearse
  waits. To the <ansi fg="exit">north</ansi>, a path leads through a gate
  to Maude's <ansi fg="10">railroad car</ansi>. To the <ansi fg="exit">east</ansi>
  lies the <ansi fg="8">junkyard</ansi>, with its rusted iron and quiet
  purpose. To the <ansi fg="exit">south</ansi> the road winds down to the <ansi fg="8">sea cliffs</ansi>. The air here smells of eucalyptus and
  hot pavement and something indefinable that is simply California in 1971,
  the last moment before everything changed.
mapsymbol: S
maplegend: The Street
biome: road
exits:
  west:
    roomid: 2026
    exitmessage: You climb back into the hearse.
  north:
    roomid: 2028
