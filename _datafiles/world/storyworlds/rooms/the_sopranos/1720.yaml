nouns:
  driveway: >-
    Blacktop, freshly sealed. Not a crack, not a weed. Someone paid for this.
    The kind of driveway that says the man who owns this house does not have
    problems. Or so the driveway insists.
  suv: >-
    A black Chevrolet Suburban, immaculate, tinted windows. The kind of vehicle
    that projects authority and absorbs it simultaneously. There is a faint
    chemical smell -- not gasoline, something else. Pine air freshener, maybe,
    working very hard.
  hedges: >-
    Sculpted boxwood, trimmed with geometric precision. They border the property
    like a polite assertion of boundaries. They have been shaped to look natural
    while being entirely controlled.
  paper: >-
    The Star-Ledger. The front page has been scanned and discarded. Someone
    read the headlines and did not like them, or simply stopped caring at a
    certain point on the driveway.
  house: >-
    Big. Bigger than it needs to be. Red brick colonial revival, four bedrooms,
    a finished basement, a pool in the back. The kind of house a man builds to
    prove something to himself and then has to maintain forever.
spawninfo: []
idlemessages:
- A bird lands on the Suburban's side mirror, regards itself, and flies away.
- The sprinklers click on at the neighbor's house. A brief green hiss.
- A school bus rumbles past on the street at the end of the cul-de-sac.
- The morning paper sits at the end of the driveway, patient and unread.
- A cloud passes over the sun and the whole neighborhood goes momentarily grey.
- Somewhere, a lawn mower starts up. The sound of Saturday becoming obligation.
