title: West Baltimore Street
description: >-
  A long block of <ansi fg="8">row houses</ansi>, their <ansi fg="itemname">brick fronts</ansi> marked by decades of weather and intention. Steps lead up to
  narrow <ansi fg="itemname">stoops</ansi> where old women sit in the afternoon
  and teenagers congregate at night. A <ansi fg="itemname">corner store</ansi>
  anchors the far end of the block, its window advertising wire-transferred money
  and single cigarettes and the lottery. This is the real Baltimore -- not the
  harbor, not the convention center, but this block, this smell of fried chicken
  and old rain, this sky that is always about to do something. <ansi fg="8">Corner boys</ansi> work the block with the relaxed efficiency of people doing their job.
  The <ansi fg="exit">Pit</ansi> is to the south, <ansi fg="exit">Orlandos</ansi>
  is to the east, the <ansi fg="exit">Detail</ansi> is to the north, <ansi fg="exit">Hamsterdam</ansi> is to the west, and <ansi fg="secret-exit">something</ansi>
  might be found by those who listen.
