roomid: 1702
zone: Blonde on Blonde
title: Pledging My Time
description: >-
  A <ansi fg="8">blues bar at three in the morning</ansi>, the last holdouts
  at scattered tables, glasses half-empty and nobody refilling them. A single <ansi fg="itemname">bare bulb</ansi> swings on a cord above the bar. A <ansi fg="itemname">guitarist</ansi> plays in the corner -- not performing,
  just working something out, the same slow twelve-bar figure over and over,
  looking for the part that hurts most. The <ansi fg="itemname">bartender</ansi>
  wipes glasses with a rag he's been using for three years and shows no sign
  of stopping. A <ansi fg="itemname">radiator</ansi> in the corner knocks and
  hisses. Something was pledged here earlier tonight. Something costly. The
  air still carries the weight of the promise made, whatever it was. The <ansi fg="exit">studio</ansi> is back to the southwest.
mapsymbol: 2
maplegend: Pledging My Time
biome: house
exits:
  studio:
    roomid: 1700
    mapdirection: southwest
    exitmessage: You leave the bar while the guitar is still looking for the answer.
nouns:
  guitarist: >-
    He plays the same four bars over and over, not going anywhere, not trying
    to. The slide sits on his ring finger, copper-colored, worn smooth. His
    eyes are closed. He has pledged his time to this music and the music owes
    him nothing back and they both know it.
  bartender: >-
    A man who has been closing bars for thirty years, who has heard every pledge
    and watched most of them break. He wipes the same glass in slow circles.
    If you ask him what time it is, he will say it is time to go home. But he
    will not ask you to leave.
  radiator: >-
    An ancient iron radiator in the corner, knocking out its code in steam and
    metal. Hot and loud and alive in its own stubborn way. The bar would be
    colder without it. It has been here longer than the bar.
  bulb: >-
    A single incandescent bulb on a long cord, swinging imperceptibly in the
    heat rising from the radiator. It throws a circle of yellow light that
    reaches halfway to the walls and stops. Everything beyond is comfortable
    shadow.
idlemessages:
- The guitarist finds the note that hurts and holds it, bending it slowly past the point of comfort.
- 'A chair scrapes. Someone gets up, drops a few coins, goes home. One less witness.'
- 'The radiator knocks -- three short, two long -- and goes quiet again.'
- The bartender turns the last glass upside-down on the rack. The bar is done taking glasses. Not done taking people.
- 'The blues plays on -- not climaxing, not resolving, just going and going the way the night goes.'
- 'Someone has left a hat on the bar stool. Nobody has claimed it. Nobody will.'
