roomid: 2367
zone: Billy Madison
title: Middle School Hallway
description: >-
  The middle school hallway hits differently. The <ansi fg="itemname">lockers</ansi>
  are taller here, and someone has drawn on them with permanent marker in ways
  the administration has given up fighting. The <ansi fg="itemname">bulletin board</ansi>
  advertises a student council election in which the candidates are very serious
  about the cafeteria pizza situation. <ansi fg="itemname">Trophy cases</ansi> display
  the accumulated athletic achievements of the school and also several science fair
  ribbons and one award for Best School Spirit that dates to 1989 and no one has
  contested since. The hallway has the ambient tension of a place where social
  hierarchies are being actively negotiated at all hours. You can feel the <ansi fg="itemname">social
  pressure</ansi> from here. To the <ansi fg="exit">north</ansi> is the playground.
  To the <ansi fg="exit">east</ansi> is the high school. To the <ansi fg="exit">west</ansi>
  is O'Doyle territory.
