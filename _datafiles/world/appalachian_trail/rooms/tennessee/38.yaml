roomid: 38
zone: Tennessee
title: Roan Highlands
description: "The Roan Highlands are among the most spectacular stretches of the entire Appalachian Trail. The ridgeline runs above 5,000 feet for miles, alternating between dense spruce-fir forest and open grassy balds that feel like the roof of the world. In June, the Catawba rhododendron bloom in vast natural gardens along the ridge\x97acres of pink and purple flowers covering the mountainside in a display that has drawn visitors since the 1800s. Roan High Knob, at 6,285 feet, is the highest point on the AT between the Smokies and New Hampshire. The old fire warden cabin near the summit has been converted into the highest shelter on the entire trail. The air up here smells of Christmas\x97balsam fir and Fraser fir, their dark needles releasing resin in the mountain sun. The wind never stops. Cloud shadows race across the balds like living things."
