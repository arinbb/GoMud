roomid: 603
zone: Great Smoky Mountains
title: Derrick Knob Shelter
description: "Derrick Knob Shelter hunkers in a sheltered gap at 4,880 feet, surrounded by dense hardwood forest that keeps the worst weather at bay. This shelter was named for an old-time hunter and cattleman who grazed livestock in these mountains before the park was established. The chain-link bear fence fronts the standard three-sided stone structure. The sleeping platform holds twelve, and the gap location means slightly warmer overnight temperatures than the more exposed ridge shelters. A reliable spring flows below the shelter to the east. The old cattle gaps and clearings that Derrick once used are mostly grown over now, swallowed by the returning forest, but traces remain in the understory if you know what to look for\x97old wire, fence posts absorbed by tree trunks, stone piles where fields were cleared."
biome: mountains
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 62
    exitmessage: You follow the side trail back to the AT ridge.
    mapdirection: east
nouns:
  shelter: "Standard Smokies shelter with chain-link fence and stone-and-timber construction. The gap location provides shelter from the worst ridge winds. The timber is dark with age and carved with decades of trail names."
  fence: "Chain-link bear fence, gate latching from inside. A few links near the bottom have been bent outward\x97a bear testing its limits."
  register: "The register contains the usual mix of trail names, weather reports, and attempts at poetry. Several entries mention the ghost of old man Derrick tending his phantom cattle at night."
  spring: "A spring east of the shelter, piped from a seep. Reliable and cold. The collection basin is a concrete trough, utilitarian and effective."
  privy: "Uphill to the west. The door actually latches at this one, which feels like luxury."
  traces: "TODO_RESEARCH: Specific history of the Derrick family and their cattle operations on this knob. Pre-park settlement patterns in the high Smokies."
idlemessages:
- The gap is sheltered and still, the forest pressing close on all sides.
- A barred owl calls from the hardwoods, answered by another from across the gap.
- The spring runs with a steady trickle, audible from the shelter platform.
- Old wire from a pre-park fence pokes from the trunk of a huge tulip poplar near the trail.
- Fireflies drift through the gap in summer, green sparks floating between the trees.
- The tin roof pops as it cools, irregular as a slow heartbeat.
