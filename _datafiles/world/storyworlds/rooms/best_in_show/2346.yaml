nouns:
  crate: >-
    The travel crate is well-used and carefully maintained. The latch is sound.
    The blanket inside is Winky's -- he has had it since he was a puppy and it
    smells like home. Winky sits in it now with his ears at full alert, watching
    the parking lot with the precise focus of a dog that takes its responsibilities
    seriously. His responsibilities include watching. He is very good at watching.
  winky: >-
    Winky the Norwich Terrier is in the crate watching the parking lot. He is small
    and tan and wire-haired, and his ears stand straight up like small flags. He
    tracks movement in the lot with the smooth, professional eye of an animal that
    has been to shows before. He is not nervous. He is ready. He has been ready.
    He is, according to Gerry and Cookie Fleck, the best dog in the world, which
    is a position he occupies with complete grace.
  catalog: >-
    A fly-fishing equipment catalog, open to page forty-seven. Three items are
    circled in pencil: an Elk Hair Caddis, a Parachute Adams, and what appears to
    be a Blue-Winged Olive nymph. The circles are thoughtful, not impulsive. These
    are things being considered for Beaver Creek next spring. The decision will not
    be rushed.
  shoes: >-
    Two left shoes under the passenger seat. Both of them left. Cookie Fleck has
    two left feet -- actual, medical, both shoes for the left foot -- and she walks
    just fine. The shoes were found through a catalog from Vermont. Gerry drove to
    Vermont to pick them up in person. He said the drive was worth it. He would do
    it again. He would do it every time.
spawninfo:
idlemessages:
- Winky tracks a passing car with his ears, determines it is not the Flecks, and returns to general monitoring.
- The thermos reflects a small rectangle of parking lot light from the front seat.
- Winky yawns, showing all his small teeth, and resettles with his chin on his paws. He is comfortable. He is waiting.
- The fly-fishing catalog has been open to this page for the last forty minutes. The decision is still pending.
- A gust of wind moves through the parking lot. Winky's ears rotate toward it. He files this information.
- The car smells exactly like a car that belongs to two nice people and one excellent dog.
- Winky hears something outside. He stands up in the crate. He sits back down. It was not them.
- The left shoes under the passenger seat have been through three dog shows. They have more to do.
