character:
  name: Maggie OConnell
  description: >-
    A bush pilot operating out of Cicely, Alaska, with the specific self-possession
    of someone who navigates by instruments and instinct in equal measure. She wears
    her brown leather flight jacket like a second skin. Her hair is usually in a
    practical arrangement. Her opinions are always ready. She is completely at home
    in the Alaskan wilderness and in the air above it, and finds the distinction
    between the two somewhat academic. She has had a series of boyfriends who have
    died in increasingly improbable accidents, which is a thing she does not discuss
    and which everyone in Cicely knows. She is tougher than almost anyone she has
    ever met, and softer than she intends to be, and the distance between those
    two things is where her life actually happens.
