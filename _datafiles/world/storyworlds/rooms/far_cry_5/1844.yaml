roomid: 1844
zone: Far Cry 5
title: Falls End Church
description: >-
  It started here. You remember it: the warrant, the handcuffs, Joseph at the
  pulpit, and then everything going wrong at once in a way that was catastrophic
  and somehow, afterward, felt inevitable. The <ansi fg="itemname">church</ansi>
  has been reclaimed, its Eden's Gate iconography stripped with considerable
  effort — the <ansi fg="itemname">pew ends</ansi> still bear faint impressions
  where cult symbols were screwed in. The original <ansi fg="itemname">cross</ansi>
  hangs crooked above the altar; no one has straightened it and now no one will.
  The <ansi fg="itemname">stained glass</ansi> survived, saints and light in deep
  blues and greens, indifferent to the occupying theology below them. The air
  smells of old wood and candle wax and something that might be shame or might be
  grief. The <ansi fg="exit">town</ansi> is south.
