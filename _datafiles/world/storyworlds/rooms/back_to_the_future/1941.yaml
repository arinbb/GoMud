roomid: 1941
zone: Back to the Future
title: Hill Valley Town Square
description: >-
  The heart of Hill Valley, 1955. The <ansi fg="itemname">courthouse</ansi>
  presides over the square, its tall <ansi fg="itemname">clock tower</ansi>
  rising above everything, hands frozen at 10:04 PM -- a stopped clock
  waiting for lightning. <ansi fg="itemname">Elm Street</ansi> runs west
  toward Lyon Estates and the countryside beyond. The <ansi fg="itemname">town gazebo</ansi> sits in the center of a manicured park. Shop awnings line
  the square: a hardware store, a barbershop, Statler Studebaker. Everything
  gleams with postwar optimism. It is November, 1955.
