roomid: 11
zone: Georgia
title: Hawk Mountain Shelter
description: "A weathered three-sided shelter perches on the slope of Hawk Mountain at 3,200 feet. Built in 1993, it has the worn look of a shelter that has seen thousands of hikers pass through. The sleeping platform holds twelve, and the wood is darkened with age and countless handprints. A blue-blazed trail behind the shelter leads steeply downhill to the water source\x97a trickle in dry weather, a proper stream after rain. The privy sits off to the right. A bear box guards the clearing. Views are limited through the trees, but in winter when the leaves drop, you can see the ridgeline rolling north. A trail register hangs in its zip-lock bag from a nail."
biome: forest
mapsymbol: A
maplegend: Shelter
exits:
  trail:
    roomid: 4
    exitmessage: You follow the blue-blazed side trail back to the AT.
    mapdirection: east
nouns:
  shelter: "A standard three-sided AT shelter, smaller than Stover Creek. The sleeping platform fits twelve if everyone cooperates. The wood is dark with age, the tin roof patched in one corner."
  platform: "Twelve hikers can fit on this platform, but it is a tight squeeze. The wood is smooth from years of sleeping bags sliding across it."
  register: "The shelter register is a battered composition notebook in a zip-lock bag. Water damage has blurred some of the older entries."
  water: "The water source is down a steep blue-blazed path behind the shelter. In dry seasons it slows to a trickle\x97next reliable water is Justus Creek at mile 14.2."
  privy: "The privy leans slightly to the left. Someone has carved a surprisingly good likeness of a bear on the door."
  bearbox: "A dented brown steel bear box. The latch mechanism is stiff but functional."
  views: "In summer the trees block most views. In winter, leafless hardwoods reveal the rolling ridgeline stretching north toward Gooch Mountain."
idlemessages:
- A hawk circles above the ridge, riding the thermals with barely a wingbeat.
- The water source behind the shelter trickles faintly\x97barely audible from the platform.
- Wind pushes through the gap, rattling the tin roof.
- A chipmunk darts across the shelter floor and vanishes under the platform.
- The blue-blazed trail to the water source disappears steeply downhill into rhododendron.
- Acorns drop from the oaks overhead, bouncing off the tin roof with sharp pings.
