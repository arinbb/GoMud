nouns:
  flowers: >-
    Bliss flowers. Faith Seed's chemistry, cultivated from something that
    was almost a plant, engineered into something entirely controlled.
    The petals are violet-white, almost luminescent in the fog. The pollen
    is airborne and you are already breathing it. Just enough, here. Enough
    to feel the edges soften. Enough to understand why the robed figures
    on the bank are smiling.
  fog: >-
    The river fog sits heavy and still, the kind that comes at dawn and
    never fully leaves. It catches the Bliss pollen and holds it. It makes
    the far bank invisible. It makes everything beyond ten feet a theory.
    In the fog, sound behaves differently. Voices carry from nowhere.
    Faith's voice, perhaps, or an echo of it, or an hallucination of it.
    The distinction may not matter here.
  water: >-
    The Henbane River, dark and slow. Sediment, mineral tannins, and
    a faint chemical purple tint where the Bliss runoff enters. The
    water is not safe to drink. It is almost certainly not safe to touch.
    It moves with the patience of something that has all the time it needs.
  robed: >-
    Faith's people. They wear pale robes and move in the slow, purposeful
    way of the deeply medicated — not zombie-slow, not aggressive, just
    present in a different way than you are present. Some hold flowers.
    Some murmur to themselves. None of them seem unhappy. That is the most
    unsettling part.
idlemessages:
- The Bliss pollen drifts off the flowers in a slow purple haze. You breathe it. Your edges soften just slightly.
- A robed figure on the far bank turns and looks at you with perfect serenity. Then looks away. Then is gone in the fog.
- The river moves slow and dark and purple-tinged. The sound of it is deeply, wrongly peaceful.
- Something in the fog ahead. A shape. A woman, perhaps. Gone when the fog shifts.
- The willows trail their fingers in the water. The Bliss flowers nod in a breeze you cannot feel.
- 'A voice from nowhere, soft and female: ''Do not be afraid. You are already where you need to be.'''
- The fog closes in from the east and the purple-white glow of the Bliss fields pulses through it.
