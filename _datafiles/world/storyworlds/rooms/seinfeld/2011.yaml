roomid: 2011
zone: Seinfeld
title: J. Peterman Office
description: >-
  The offices of <ansi fg="yellow">J. Peterman Reality Tours and Catalog</ansi>, somewhere
  in Manhattan, furnished with the aggressive authenticity of a man who has been everywhere
  and wants you to know it. The <ansi fg="itemname">desk</ansi> is dark mahogany, wide,
  covered in the artifacts of adventures that are either real or comprehensively imagined.
  A <ansi fg="itemname">saddlebag</ansi> hangs from a hook. A framed <ansi fg="itemname">photograph</ansi>
  shows Peterman somewhere in Central Asia -- at least that is what the caption says.
  <ansi fg="itemname">Catalog pages</ansi> are spread across a secondary table: the
  urban sombrero, the Himalayan walking stick, a bathrobe described as suitable for
  either a Russian czar or a man who simply wants to be comfortable. Elaine Benes
  works here as an editor. She sometimes writes the copy. The copy is extraordinary.
  The exit to the <ansi fg="exit">street</ansi> is to the east.
mapsymbol: P
