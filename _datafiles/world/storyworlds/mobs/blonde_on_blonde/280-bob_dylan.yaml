character:
  name: Bob Dylan
  description: >-
    A young man who looks simultaneously famous and invisible, the sunglasses
    doing work that sunglasses do not usually do. Wild dark hair in the style
    of someone who is too busy thinking to manage it. A harmonica in a wire
    holder around his neck, the kind that lets you play hands-free while
    strumming a guitar. He is always writing or thinking about writing or
    thinking about something that will become writing. His answers to questions
    tend to come from a direction you did not expect.
