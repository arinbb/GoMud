character:
  name: Jim Halpert
  description: >-
    A tall man in his late twenties to mid-thirties depending on the season, in a
    flannel shirt or an oxford, khakis, sneakers. His hair is a controlled chaos.
    He has the look of a person who is much smarter than his current situation
    requires and has found peace with this, mostly. His default expression is a
    gentle irony that never quite becomes cruelty. When something happens nearby,
    he does not look at it directly -- he looks at the camera, which is always
    just to the right of the fourth wall, and the look says everything. He is the
    best person in this office and he knows it and he doesn't mention it and that
    is also part of why he is the best person in this office.
