title: The Diner
description: >-
  A classic American diner: <ansi fg="itemname">booths</ansi> with red vinyl upholstery,
  a <ansi fg="itemname">counter</ansi> with spinning stools, a <ansi fg="itemname">pie case</ansi>
  lit from within displaying rotating options, a <ansi fg="itemname">jukebox</ansi>
  in the corner playing something from 1994. The fluorescent lights do what fluorescent
  lights do. Coffee is always available. The diner is the setting for sketches about
  regular people doing regular things that suddenly go completely sideways — a couple
  at dinner, an awkward first date, a person ordering a meal who gradually reveals
  something extraordinary about themselves. Everyone here started normal.
  To the <ansi fg="exit">south</ansi> is the Porcupine Racetrack.
