nouns:
  walls: >-
    Cracking and reforming in real time, a constant cycle of destruction and
    renewal that follows no pattern. Plaster dust falls like snow, accumulates,
    then rises back up to fill the cracks. Words appear in the fractures --
    fragments, contradictions, nonsense syllables that feel more true than
    anything a dictionary could offer.
  floor: >-
    Tilting and shifting underfoot, never quite level, responding to your weight
    as if the room is a boat on an invisible ocean. Step left and it pitches right.
    Stand still and it rolls beneath you. The only constant is the inconstancy.
    The floor is honest about being unreliable.
  furniture: >-
    A chair melts into a puddle of mahogany and reforms as a stool. A table sags
    in the middle, its legs buckling, then snaps upright as something entirely
    different -- a lectern, a music stand, a thing with no name. The bookshelf
    pours its contents onto the floor and the books become liquid and the liquid
    becomes a bookshelf and the cycle begins again.
  voice: >-
    It comes from everywhere -- the floor, the ceiling, the walls mid-crack. It
    screams something and then immediately screams its opposite at equal volume.
    I AM GRATEFUL. I HATE THIS. I LOVE YOU. I CANNOT STAND BEING LOVED. The
    contradictions do not cancel out. They stack. By the time you have been in
    this room for two minutes, the voice has said everything that can be said
    about being a person in a world that is paying too much attention to you.
  mirror: >-
    A full-length mirror in the corner that has not yet decided what it is
    reflecting. Your face appears in it -- mostly your face -- but it cycles
    through other configurations, other expressions, none of them quite settling.
    The mirror is not broken. The mirror is honest about the difficulty of accurate
    self-reflection in a room where nothing stays still long enough to be seen.
idlemessages:
- A wall cracks open and a voice shouts something backward before the plaster seals shut again.
- 'The floor lurches hard to the left, settles, then lurches right -- the room seasick on dry land.'
- A chair finishes melting and begins reforming as something with too many legs and not enough purpose.
- Plaster dust rises from the floor back to the ceiling, gravity briefly optional, then resumes falling.
- 'The voice from the walls contradicts itself mid-sentence, agreeing and disagreeing simultaneously.'
- A crack in the wall spells out a word you almost understand before the plaster fills it in and starts a new word somewhere else.
