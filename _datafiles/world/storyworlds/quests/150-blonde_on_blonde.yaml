questid: 150
name: Blonde on Blonde
description: >-
  Step inside Columbia Studio A, Nashville, February 1966. Bob Dylan is
  recording his double album with session musicians who have never heard
  these songs before. Stay for the sessions. Witness something unprecedented.
  Bring back something to play.
reward:
  experience: 4500
  item_id: 195
  playermessage: >-
    You have witnessed the sessions -- Dylan at the piano at two in the
    morning, Kooper finding chords on the organ, the Nashville cats
    sight-reading music that has never existed before, fourteen songs cut
    in a few long nights. The longest, strangest, most beautiful rock
    record anyone has ever made. As a memento, you receive a harmonica
    in the key of A.
steps:
- description: Enter Columbia Studio A, Nashville.
- description: Experience the sessions.
