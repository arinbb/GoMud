roomid: 1729
zone: The Sopranos
title: The Bada Bing Back Office
description: >-
  The music is muffled here, reduced to a felt vibration in the walls and floor.
  A substantial <ansi fg="itemname">desk</ansi> fills the center of the room, its
  surface holding a <ansi fg="itemname">phone</ansi>, an ashtray with a dead
  <ansi fg="itemname">cigar</ansi>, and some papers. A large <ansi fg="itemname">safe</ansi>
  is built into the wall behind the desk. A <ansi fg="itemname">television</ansi>
  mounted high in the corner shows a security camera feed: the club floor, the
  parking lot, the back entrance. The room smells of smoke and men and money,
  which is its own specific smell. A framed <ansi fg="itemname">photo</ansi> of
  the Meadowlands behind the desk. This is where Tony Soprano actually works.
  The club is back <ansi fg="exit">west</ansi>.
mapsymbol: O
maplegend: Back Office
