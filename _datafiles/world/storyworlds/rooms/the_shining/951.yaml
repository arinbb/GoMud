roomid: 951
zone: The Shining
title: The Lobby
description: >-
  The grand lobby of the Overlook Hotel opens before you in a cathedral of
  timber and stone. Massive <ansi fg="itemname">columns</ansi> of rough-hewn
  wood rise to a beamed ceiling lost in shadow. A great stone <ansi fg="itemname">fireplace</ansi>
  dominates the far wall, cold and unlit. Native American <ansi fg="itemname">rugs</ansi>
  in geometric patterns cover the flagstone floor. The <ansi fg="itemname">front
  desk</ansi> stands unmanned to one side, a small bell glinting on its surface.
  At the far end, brass <ansi fg="itemname">elevator</ansi> doors gleam dully.
  Mounted <ansi fg="itemname">trophies</ansi> — elk, deer, mountain goat — stare
  down from the walls with glass eyes. The lobby is vast, grand, and utterly
  silent. Exits lead <ansi fg="exit">west</ansi> to the entrance, <ansi fg="exit">north</ansi>
  to the Colorado Lounge, <ansi fg="exit">east</ansi> to the elevator hall, and
  <ansi fg="exit">south</ansi> to the staff wing.
mapsymbol: L
maplegend: Lobby
biome: house
