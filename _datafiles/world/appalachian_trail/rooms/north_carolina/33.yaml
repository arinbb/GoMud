nouns:
  cheoah: "Cheoah Bald rises to 5,062 feet, its grassy summit offering panoramic views in every direction. To the north, the Great Smoky Mountains loom like a dark wall across the horizon. To the south, the Nantahala ridgelines recede in blue-green waves. The climb from Wesser is one of the hardest on the entire AT\x97nearly 3,000 feet of elevation gain in five miles. TODO_RESEARCH: Cherokee meaning of Cheoah, history of the bald (fire-maintained vs. natural)."
  stecoah: "Stecoah Gap is a low saddle between Cheoah Bald and the ridgeline to the north. A road crosses the trail here, and a small parking area serves as an informal shuttle stop. The gap takes its name from the Cherokee. TODO_RESEARCH: Cherokee etymology of Stecoah, historical use of the gap as a travel route."
  summit: "The grassy summit of Cheoah Bald is windswept and exposed, the grass cropped short by weather and the occasional cow that wanders up from the valleys below. On clear days the view is staggering\x97the entire southern Appalachian chain visible from Springer to the Smokies."
  switchbacks: "The switchbacks climbing out of the gorge are brutal\x97steep, rocky, and seemingly endless. Your calves burn. Your lungs burn. Your pack feels like it has doubled in weight. This is the price of dropping to river level."
  blazes: "White blazes mark the endless ups and downs. They seem almost mocking on the steepest pitches."
idlemessages:
- Your legs burn on the endless switchbacks. The trail goes up, and up, and up.
- A vulture rides a thermal above Cheoah Bald, effortlessly circling where you are struggling.
- The Smokies are visible to the north, a dark line of mountains higher than anything you have crossed yet.
- A timber rattlesnake suns itself on a flat rock beside the trail, thick-bodied and drowsy.
- Sweat drips from your nose onto the rocky trail. The climb out of the gorge is merciless.
- The grassy summit of Cheoah Bald opens suddenly after miles of forest, the sky enormous.
- A cold spring bubbles from beneath a rock in a hollow between climbs, impossibly welcome.
