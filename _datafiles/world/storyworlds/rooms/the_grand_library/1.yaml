idlemessages:
- The brass lanterns flicker briefly, casting dancing shadows across the painted ceiling.
- You hear the distant sound of pages turning, though no one else seems to be nearby.
- A faint melody drifts down from somewhere above, like a music box playing far away.
- The smell of old books mingles with cedar and candle wax.
- A book near the top shelf slides out an inch on its own, then slowly pushes itself back in.
- 'A film canister rattles on its shelf, as if the story inside is restless.'
- The painting on the west wall shifts its colors when you are not looking directly at it.
- A vinyl record on the south shelf spins a quarter-turn by itself. The needle is not down.
