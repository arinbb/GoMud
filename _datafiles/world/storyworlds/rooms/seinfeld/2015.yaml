nouns:
  pole: >-
    The Festivus pole. Unadorned aluminum. Frank Costanza selected aluminum
    for its high strength-to-weight ratio. He finds tinsel distracting. The
    pole stands straight and silver and without ornamentation and it is exactly
    what Festivus requires. You feel, looking at it, the specific satisfaction
    of a thing that is exactly what it needs to be and nothing else.
  table: >-
    The Festivus dinner table. A modest meal: a meatloaf, something with
    rice, some bread. Prepared not as a celebration but as a sustenance
    for the holiday activities ahead, specifically the Airing of Grievances
    and the Feats of Strength, both of which require some calories.
  card: >-
    The card table. This is where the Airing of Grievances takes place.
    Frank Costanza developed this tradition because he felt that the holidays
    had become too focused on warmth and generosity and he wanted to create
    space for the honest acknowledgment that everyone in the room has
    disappointed everyone else in the room over the past year.
  philosophy: >-
    The philosophy of Festivus is this: the holidays have become too commercial.
    Frank Costanza experienced this while shopping for a doll one Christmas,
    when he struggled with a man for the last doll and the doll's head fell
    off. At that moment, he decided there had to be a better way. The better
    way is Festivus.
