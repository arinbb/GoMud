    A tall, thin man in plaid flannel and khakis. He looks completely normal
    except for a slight translucency that catches the light at odd angles.
    His fingers are stained with model paint and there is sawdust in his hair.
    He has the gentle, slightly bewildered expression of someone still getting
    used to being dead.
