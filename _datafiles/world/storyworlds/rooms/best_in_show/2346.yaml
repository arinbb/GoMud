nouns:
  tables: >-
    The grooming tables are professional-grade: non-slip surface, adjustable height,
    the arm with the loop that holds the dog steady. Each one is a personal territory.
    The handler's whole philosophy of dog showing is visible in how they've laid out
    their equipment. Some are clinical. Some are loving. Some are both.
  smell: >-
    The smell is genuinely impressive in its complexity. There is a high note of
    something floral -- that's Stefan's conditioning spray, imported from France.
    Below it, something cedar-adjacent -- Harlan's product, from a tack shop in
    North Carolina. In the middle, a broad warm note that is just dog. The whole
    thing is not unpleasant. It is very, very specific.
  lights: >-
    Stefan and Scott's lighting rig casts Miss Agnes in a warm golden light that
    makes her look, if you squint slightly, like an advertisement for something that
    costs a great deal of money and is absolutely worth it. Stefan turns her gently.
    Adjusts the light. Turns her again. Says something in a low voice that is either
    to her or to Scott or to nobody.
  mirror: >-
    The grooming area mirror is currently reflecting Stefan looking at Miss Agnes
    from three angles simultaneously and finding all three satisfactory.
spawninfo:
- mobid: 545
  message: "<ansi fg=\"8\">Stefan Vanderhoof lifts Miss Agnes onto the grooming table with the careful reverence of a man handling something fragile and irreplaceable. He steps back, tilts his head, and regards her with the focused attention of an artist at work.</ansi>"
  respawnrate: 5 real minutes
- mobid: 546
  message: "<ansi fg=\"8\">Scott Donlan appears at Stefan's elbow carrying a brush, a spray bottle, and an expression of complete professional dedication. He hands the brush to Stefan. They do not need to discuss this. They have been doing this for years.</ansi>"
  respawnrate: 5 real minutes
idlemessages:
- A blow-dryer roars to life at a nearby table, and a Labrador briefly becomes twice its normal size.
- Stefan steps back from Miss Agnes, tilts his head, adjusts one strand of hair, and steps back again.
- Scott says something to Stefan in a low voice. Stefan nods without looking away from Miss Agnes.
- A handler at the next table sprays conditioning product and it drifts in a fine mist that catches the light.
- Two dogs on adjacent tables regard each other with the specific tension of two competitors who know what this is.
- Christy Cummings brushes Rhapsody in White in long, even strokes. The poodle stands perfectly still. This is years of training.
- "Someone's scissors click: snip snip snip. The sound is very deliberate. Every cut matters."
- The overhead lights are supplemented by portable rigs that cast everyone in slightly theatrical lighting. The dogs look better than the people.
