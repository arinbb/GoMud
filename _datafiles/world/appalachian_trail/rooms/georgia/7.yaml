nouns:
  summit: "The rocky summit of Blood Mountain is a jumble of exposed granite, worn smooth by centuries of wind and rain. At 4,461 feet, it is the highest point on the AT in Georgia and one of the most iconic landmarks in the southern Appalachians."
  view: "The panoramic view is staggering\x97360 degrees of Blue Ridge wilderness. Ridgelines layer upon ridgelines, each one a slightly paler shade of blue, stretching to the horizon in every direction. On a clear day, you can see for fifty miles or more."
  stones: "Native stone, quarried and laid by CCC workers in the 1930s, forms the walls of the summit shelter. The craftsmanship has endured almost a century of mountain weather."
  shelter: "The Blood Mountain Shelter is a CCC-built stone structure from the 1930s\x97walls of native rock, a heavy wooden door, and a dark interior that smells of damp stone and decades of wood smoke. It is the oldest shelter on the Georgia AT."
  cairn: "Stone cairns dot the rocky summit, marking the trail across exposed bedrock where white blazes cannot be painted on trees. Each cairn is a small pyramid of rocks, carefully balanced by hikers who came before."
  plaque: "A bronze plaque mounted on a stone reads: dedicated to the men of the Civilian Conservation Corps who built this shelter and blazed these trails. The letters are worn but legible, green with patina."
idlemessages:
- Wind howls across the exposed summit, tugging at your clothes and pack with real force.
- The view from Blood Mountain is endless, ridgeline after ridgeline fading into blue haze.
- A cloud shadow races across the valley below, darkening acres of forest in an instant.
- Ice crystals glitter on the exposed rock where morning frost has not yet melted.
- A peregrine falcon stoops past the summit at tremendous speed, hunting the updrafts.
- The old CCC shelter creaks in the wind, its stone walls enduring another day on this mountain.
- You can feel the elevation here in the thin air and the chill that cuts through your layers.
