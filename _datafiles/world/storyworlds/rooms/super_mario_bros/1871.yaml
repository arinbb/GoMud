roomid: 1871
zone: Super Mario Bros
title: World 7-1 Bullet Bill Level
description: >-
  <ansi fg="red">Cannons</ansi> line the platforms, black cylinders aimed
  at the sky, at the ground, at whatever angle would be most inconvenient.
  They fire <ansi fg="itemname">Bullet Bills</ansi> -- large black bullets
  with eyes and a grim expression, launched at regular intervals, crossing
  the screen at speed. The level is a narrow corridor of platforms with
  cannons above and below, and the Bullet Bills cross the available space
  in a constant overlapping lattice of danger. The platforms here are
  narrow -- just enough to land on, no wider. The gaps require jumping and
  the cannons fire while you are in the air. West leads
  <ansi fg="exit">back</ansi>; east continues toward <ansi fg="exit">World 8</ansi>.
mapsymbol: X
maplegend: Bullet Bill Level
biome: land
exits:
  west:
