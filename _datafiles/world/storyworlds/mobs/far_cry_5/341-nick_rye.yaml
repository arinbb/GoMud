character:
  name: Nick Rye
  description: >-
    A man in his early thirties with the weathered confidence of someone
    who has been flying since before he had a license. He has a pregnant
    wife and a crop duster and a bone-deep attachment to Hope County that
    Eden's Gate has made physical rather than philosophical. He is not
    complicated about any of this: this is his county, his home, his
    family's future, and he will fight for it with his plane and his
    fists and whatever else is available, preferably all at once. He
    checks the sky constantly. Old habit. New urgency.
