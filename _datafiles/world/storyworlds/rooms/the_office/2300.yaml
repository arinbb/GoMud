roomid: 2300
zone: The Office
title: Dunder Mifflin Lobby
description: >-
  The elevator opens and you are here. <ansi fg="8">Dunder Mifflin Paper Company,
  Scranton Business Park, Scranton, Pennsylvania.</ansi> The lobby is beige. Not
  aggressively beige, not aspirationally beige -- just beige, the color of a company
  that has never once thought about its own color. The <ansi fg="itemname">Dunder
  Mifflin sign</ansi> hangs on the wall in corporate navy and white, featuring a
  small illustration of a tree that implies the paper comes from somewhere considered
  and sustainable. It does not. A <ansi fg="itemname">security camera</ansi> watches
  from the corner with the passive indifference of surveillance that has never caught
  anything interesting. The <ansi fg="exit">reception area</ansi> is through the
  glass doors to the north. The <ansi fg="exit">parking lot</ansi> is to the east.
  The <ansi fg="exit">warehouse</ansi> is below.
