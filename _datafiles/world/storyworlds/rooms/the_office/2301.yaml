roomid: 2301
zone: The Office
title: Reception
description: >-
  The front desk of Dunder Mifflin, the first thing anyone sees when they come
  through the glass doors. <ansi fg="itemname">Pam's desk</ansi> sits at the center
  of this space -- a modest workstation with a <ansi fg="itemname">phone</ansi> that
  rings more than seems reasonable and a <ansi fg="itemname">jelly bean jar</ansi>
  that is perpetually half-full, because Pam refills it when it gets too low and
  nobody has ever asked her to do this. A <ansi fg="itemname">visitor log</ansi> sits
  open on the desk. Through the <ansi fg="itemname">window</ansi> to the east you can
  see directly into Michael's office, a fact that Michael finds enormously comforting
  and everyone else finds mildly oppressive. The <ansi fg="exit">lobby</ansi> is to
  the south. The <ansi fg="exit">bullpen</ansi> is to the north. <ansi fg="exit">Michael's
  office</ansi> is to the east. The <ansi fg="exit">break room</ansi> is to the west.
