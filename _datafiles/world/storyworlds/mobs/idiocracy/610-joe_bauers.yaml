character:
  name: Joe Bauers
  description: >-
    A man in his late thirties who looks like approximately half the men in any
    given zip code in early twenty-first century America -- medium height, medium
    build, a face that would not stand out in a lineup for anything. He is wearing
    clothes that were frozen with him and are now five hundred years out of date,
    which makes him look, in 2505, like a time traveler, which he is. His
    expression is the expression of someone who has just discovered that their
    IQ of one hundred is now the highest in the world and is not sure whether to
    feel proud of this or devastated by it. He has settled on a kind of sustained
    overwhelmed calm that is doing its best.
