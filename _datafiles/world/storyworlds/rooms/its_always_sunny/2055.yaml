roomid: 2055
zone: its_always_sunny
title: The Gang Breaks Dee
description: >-
  This is not a room with a proper name on the door. It is a room that
  exists whenever the Gang decides to make Dee cry as a collective activity,
  which happens with a frequency that says something very specific about all
  of them. The <ansi fg="8">walls</ansi> are just bar walls — the same
  sticky, close, inadequate walls of Paddys Pub. But the <ansi fg="itemname">attention</ansi>
  in the room has a direction. Every joke has a target. Every bit of cruelty
  is delivered with the practiced timing of a group that has done this many
  times and knows what lands. <ansi fg="itemname">Dee</ansi> is at the center
  of it, cycling through dignity and collapse, trying to hold on to something
  the Gang peels away layer by layer with cheerful dedication. And then — beneath
  it — something else. Something Dee has that none of them will admit: the fact
  that she keeps coming back. Every single day. That means something. The Gang
  will never say what. To the <ansi fg="exit">bar</ansi> is the way out.
mapsymbol: BD
maplegend: Break Dee
biome: city
