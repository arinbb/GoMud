description: >-
  A lightweight AR visor with a red-brown tint. When activated, it reveals
  the geological story beneath your feet — rock formations, tectonic
  history, mineral deposits, erosion patterns, and fossil records are
  annotated. The Appalachian Mountains are among the oldest on Earth,
  and this visor shows you why. Toggle with 'use visor' or 'visor geology'.
